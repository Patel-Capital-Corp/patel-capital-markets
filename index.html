/* ============================================================
   PCM — Cinematic Site Stylesheet
   Parts 1 & 2 | Bespoke craft, no boilerplate
   ============================================================ */

/* ------------------------------------------------------------
   1. CUSTOM PROPERTIES
   ------------------------------------------------------------ */
:root {
  --bg:          #06090a;
  --forest:      #1a2520;
  --forest-mid:  #2d3e36;
  --brass:       #c9a96e;
  --coin-gold:   #d9b97a;
  --cream:       #e8dcc4;
  --ink-green:   #0f1814;
  --accent-glow: #7fb89c;
  --ink:         #e3eee6;

  --font-serif:  'Cormorant Garamond', Georgia, serif;
  --font-body:   'Space Grotesk', system-ui, sans-serif;
  --font-mono:   'Space Mono', 'Courier New', monospace;

  --ease-cinema: cubic-bezier(0.77, 0, 0.175, 1);
  --ease-soft:   cubic-bezier(0.4, 0, 0.2, 1);
}

/* ------------------------------------------------------------
   2. RESET + BASE
   ------------------------------------------------------------ */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  cursor: none;
  position: relative;
}

a {
  color: inherit;
  text-decoration: none;
}

button {
  font-family: inherit;
  background: none;
  border: none;
  cursor: none;
}

ul,
ol {
  list-style: none;
}

img,
video {
  display: block;
  max-width: 100%;
}

/* ------------------------------------------------------------
   3. CANVAS HOST
   ------------------------------------------------------------ */
#canvas-host {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* ------------------------------------------------------------
   4. CUSTOM CURSOR
   ------------------------------------------------------------ */
#pcm-cursor {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 9999;
  pointer-events: none;
  will-change: transform;
}

#pcm-cursor::before {
  content: '';
  display: block;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(227, 238, 230, 0.45);
  transform: translate(-50%, -50%);
  transition: width 0.2s var(--ease-soft),
              height 0.2s var(--ease-soft),
              border-color 0.2s var(--ease-soft),
              background 0.2s var(--ease-soft);
}

#pcm-cursor::after {
  content: '';
  display: block;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--ink);
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  transition: opacity 0.2s var(--ease-soft);
}

#pcm-cursor.cursor-hot::before {
  width: 64px;
  height: 64px;
  border: 1px solid var(--brass);
  background: rgba(201, 169, 110, 0.08);
}

#pcm-cursor.cursor-drag::before {
  width: 20px;
  height: 20px;
  border: 2px solid var(--brass);
  background: transparent;
}

/* ------------------------------------------------------------
   5. CINEMA BARS
   ------------------------------------------------------------ */
.cinema-bar {
  position: fixed;
  left: 0;
  right: 0;
  z-index: 30;
  height: 0;
  background: var(--bg);
  transition: height 700ms var(--ease-cinema);
  pointer-events: none;
}

.cinema-bar--top {
  top: 0;
}

.cinema-bar--bottom {
  bottom: 0;
}

body.transitioning .cinema-bar {
  height: 80px;
}

/* ------------------------------------------------------------
   6. FLASH OVERLAY
   ------------------------------------------------------------ */
.flash-overlay {
  position: fixed;
  inset: 0;
  background: #ffffff;
  opacity: 0;
  pointer-events: none;
  z-index: 100;
  transition: opacity 0.15s linear;
}

/* ------------------------------------------------------------
   7. INTRO LOADER
   ------------------------------------------------------------ */
.intro-loader {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  transition: opacity 0.8s var(--ease-soft);
}

.intro-loader__spinner {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid rgba(201, 169, 110, 0.2);
  border-top-color: var(--brass);
  animation: spinBrass 1.2s linear infinite;
}

.intro-loader__text {
  font-family: var(--font-serif);
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.32em;
  color: var(--brass);
  text-transform: uppercase;
  opacity: 0.7;
}

.intro-loader.done {
  opacity: 0;
  pointer-events: none;
}

/* ------------------------------------------------------------
   8–10. SCENE COPY
   ------------------------------------------------------------ */
.scene-copy {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translateX(-50%) translateY(-50%);
  z-index: 10;
  text-align: center;
  width: 100%;
  max-width: 680px;
  padding: 0 24px;
  transition: opacity 0.8s var(--ease-soft),
              transform 0.8s var(--ease-soft);
}

.scene-copy.hidden {
  opacity: 0;
  transform: translateX(-50%) translateY(-55%);
  pointer-events: none;
}

.scene-copy.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(-50%);
  pointer-events: auto;
}

/* ------------------------------------------------------------
   11. SCENE COPY — PRE-TITLE
   ------------------------------------------------------------ */
.scene-copy .pre-title {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.32em;
  color: var(--brass);
  text-transform: uppercase;
  display: block;
  margin-bottom: 14px;
}

/* ------------------------------------------------------------
   12. SCENE COPY — MAIN TITLE
   ------------------------------------------------------------ */
.scene-copy .main-title {
  font-family: var(--font-serif);
  font-size: clamp(2.8rem, 5vw, 5.5rem);
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.18em;
  line-height: 1.1;
}

/* ------------------------------------------------------------
   13. SCENE COPY — TITLE RULE
   ------------------------------------------------------------ */
.scene-copy .title-rule {
  display: block;
  width: 40px;
  height: 1px;
  background: var(--brass);
  margin: 1rem auto;
  border: none;
}

/* ------------------------------------------------------------
   14. SCENE COPY — BODY TEXT
   ------------------------------------------------------------ */
.scene-copy .body-text {
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink);
  max-width: 540px;
  margin: 0 auto;
}

/* ------------------------------------------------------------
   15. SCENE COPY — STAT ROW
   ------------------------------------------------------------ */
.scene-copy .stat-row {
  display: flex;
  flex-direction: row;
  gap: 32px;
  justify-content: center;
  align-items: baseline;
  margin-top: 20px;
}

.scene-copy .stat-row .stat-number {
  font-family: var(--font-mono);
  font-size: 22px;
  color: var(--brass);
  line-height: 1;
}

.scene-copy .stat-row .stat-label {
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--cream);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.scene-copy .stat-row .stat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

/* ------------------------------------------------------------
   16. SCENE COPY — TAG ROW
   ------------------------------------------------------------ */
.scene-copy .tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 16px;
}

.scene-copy .tag-row .tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--brass);
  border: 1px solid var(--brass);
  padding: 4px 10px;
  text-transform: uppercase;
}

/* ------------------------------------------------------------
   17. HOME MARK
   ------------------------------------------------------------ */
.home-mark {
  position: fixed;
  top: 28px;
  left: 40px;
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 4px;
  cursor: none;
}

.home-mark__wordmark {
  font-family: var(--font-serif);
  font-size: 28px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.12em;
  line-height: 1;
}

.home-mark__slogan {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--brass);
  text-transform: uppercase;
}

/* ------------------------------------------------------------
   18. TOP SECTION META
   ------------------------------------------------------------ */
.top-section-meta {
  position: fixed;
  top: 28px;
  right: 40px;
  z-index: 20;
  text-align: right;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.top-section-meta__counter {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--brass);
  letter-spacing: 0.16em;
}

.top-section-meta__caption {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: rgba(232, 220, 196, 0.5);
  text-transform: uppercase;
}

/* ------------------------------------------------------------
   19. SIDE NAV
   ------------------------------------------------------------ */
.side-nav {
  position: fixed;
  right: 28px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
}

/* ------------------------------------------------------------
   20–22. SIDE NAV DOTS
   ------------------------------------------------------------ */
.side-nav-dot {
  position: relative;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1px solid rgba(201, 169, 110, 0.4);
  background: transparent;
  cursor: none;
  transition: background 0.3s var(--ease-soft),
              transform 0.3s var(--ease-soft),
              box-shadow 0.3s var(--ease-soft),
              border-color 0.3s var(--ease-soft);
  flex-shrink: 0;
}

.side-nav-dot.active {
  background: var(--brass);
  transform: scale(1.5);
  box-shadow: 0 0 12px var(--brass);
  border-color: var(--brass);
}

.side-nav-dot:hover::after {
  content: attr(data-label);
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--brass);
  white-space: nowrap;
  letter-spacing: 0.12em;
  pointer-events: none;
}

/* ------------------------------------------------------------
   23. BOTTOM MENU
   ------------------------------------------------------------ */
.bottom-menu {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 20;
  background: linear-gradient(
    to top,
    rgba(6, 9, 10, 0.85) 0%,
    transparent 100%
  );
  padding: 14px 40px 18px;
}

/* ------------------------------------------------------------
   24. BOTTOM MENU INNER
   ------------------------------------------------------------ */
.bottom-menu-inner {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: center;
}

/* ------------------------------------------------------------
   25–26. SECTION BUTTON
   ------------------------------------------------------------ */
.section-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: none;
  opacity: 0.5;
  transition: opacity 0.3s var(--ease-soft),
              color 0.3s var(--ease-soft),
              border-color 0.3s var(--ease-soft),
              box-shadow 0.3s var(--ease-soft);
  padding: 4px 0 6px;
}

.section-btn:hover {
  opacity: 0.9;
}

.section-btn__number {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: inherit;
}

.section-btn__label {
  font-family: var(--font-serif);
  font-size: 15px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: inherit;
  line-height: 1;
}

.section-btn.active {
  color: var(--brass);
  opacity: 1;
  border-bottom: 2px solid var(--brass);
  box-shadow: 0 0 12px rgba(201, 169, 110, 0.4);
}

/* ------------------------------------------------------------
   27. PROGRESS BAR WRAP
   ------------------------------------------------------------ */
.progress-bar-wrap {
  position: relative;
  height: 1px;
  width: 100%;
  background: rgba(201, 169, 110, 0.15);
  margin-top: 8px;
  overflow: visible;
}

/* ------------------------------------------------------------
   28. PROGRESS BAR FILL
   ------------------------------------------------------------ */
.progress-bar-fill {
  height: 1px;
  background: var(--brass);
  box-shadow: 0 0 12px var(--brass);
  transition: width 1.4s var(--ease-cinema);
  position: absolute;
  top: 0;
  left: 0;
}

/* ------------------------------------------------------------
   29. CONTROLS CLUSTER
   ------------------------------------------------------------ */
.controls-cluster {
  position: fixed;
  bottom: 80px;
  right: 28px;
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: center;
}

/* ------------------------------------------------------------
   30–31. CTRL BUTTON
   ------------------------------------------------------------ */
.ctrl-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(201, 169, 110, 0.3);
  background: rgba(6, 9, 10, 0.7);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink);
  cursor: none;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.25s var(--ease-soft),
              box-shadow 0.25s var(--ease-soft),
              background 0.25s var(--ease-soft),
              color 0.25s var(--ease-soft);
  flex-shrink: 0;
}

.ctrl-btn:hover {
  border-color: var(--brass);
  box-shadow: 0 0 10px rgba(201, 169, 110, 0.4);
}

.ctrl-btn.active {
  background: var(--brass);
  color: var(--bg);
  border-color: var(--brass);
}

/* ------------------------------------------------------------
   32. KEYBOARD HINTS
   ------------------------------------------------------------ */
.kbd-hints {
  position: fixed;
  bottom: 80px;
  left: 28px;
  z-index: 20;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--ink);
  opacity: 0.35;
  line-height: 1.8;
  pointer-events: none;
}

/* ------------------------------------------------------------
   33–34. STATUS CONSOLE
   ------------------------------------------------------------ */
.status-console {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 30;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--brass);
  background: rgba(6, 9, 10, 0.8);
  padding: 8px 14px;
  max-width: 600px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border: 1px solid rgba(201, 169, 110, 0.2);
}

.status-console.done {
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s var(--ease-soft);
}

/* ------------------------------------------------------------
   35–40. DETAIL CARD
   ------------------------------------------------------------ */
.detail-card {
  position: fixed;
  z-index: 40;
  background: rgba(10, 14, 12, 0.96);
  border: 1px solid var(--brass);
  padding: 24px 28px;
  max-width: 320px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.detail-card .card-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.32em;
  color: var(--brass);
  text-transform: uppercase;
  display: block;
}

.detail-card .card-title {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
  margin: 6px 0;
  line-height: 1.2;
}

.detail-card .card-rule {
  display: block;
  width: 100%;
  height: 1px;
  background: var(--brass);
  border: none;
  margin: 10px 0;
}

.detail-card .card-body {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.7;
  color: var(--ink);
}

.detail-card .card-close {
  position: absolute;
  top: 10px;
  right: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--brass);
  cursor: none;
  opacity: 0.7;
  transition: opacity 0.2s var(--ease-soft);
  line-height: 1;
}

.detail-card .card-close:hover {
  opacity: 1;
}

/* ------------------------------------------------------------
   41. KEYBOARD HELP OVERLAY
   ------------------------------------------------------------ */
.kbd-help-overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(6, 9, 10, 0.9);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ------------------------------------------------------------
   42. KEYBOARD HELP PANEL
   ------------------------------------------------------------ */
.kbd-help-panel {
  background: var(--ink-green);
  border: 1px solid var(--brass);
  padding: 36px 40px;
  max-width: 500px;
  width: 100%;
}

/* ------------------------------------------------------------
   43. KBD HELP PANEL — H2
   ------------------------------------------------------------ */
.kbd-help-panel h2 {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 500;
  color: var(--brass);
  letter-spacing: 0.12em;
  margin-bottom: 20px;
}

/* ------------------------------------------------------------
   44–45. KBD HELP PANEL — TABLE
   ------------------------------------------------------------ */
.kbd-help-panel table {
  font-family: var(--font-mono);
  font-size: 11px;
  width: 100%;
  line-height: 2;
  border-collapse: collapse;
  color: var(--ink);
}

.kbd-help-panel td:first-child {
  color: var(--brass);
  width: 120px;
  vertical-align: top;
  letter-spacing: 0.1em;
}

/* ------------------------------------------------------------
   46–47. MENU OVERLAY
   ------------------------------------------------------------ */
.menu-overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: var(--bg);
  transform: translateX(100%);
  transition: transform 0.7s var(--ease-cinema);
}

.menu-overlay.open {
  transform: translateX(0);
}

/* ------------------------------------------------------------
   48. MENU OVERLAY INNER
   ------------------------------------------------------------ */
.menu-overlay-inner {
  padding: 80px 80px;
  height: 100%;
  overflow-y: auto;
}

/* ------------------------------------------------------------
   49. MENU OVERLAY — NAV LINKS
   ------------------------------------------------------------ */
.menu-overlay nav a {
  font-family: var(--font-serif);
  font-size: 5rem;
  display: block;
  color: var(--ink);
  letter-spacing: 0.08em;
  line-height: 1.15;
  transition: color 0.3s var(--ease-soft);
}

.menu-overlay nav a:hover {
  color: var(--brass);
}

/* ------------------------------------------------------------
   50–51. COOKIE NOTICE
   ------------------------------------------------------------ */
.cookie-notice {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 50;
  background: var(--ink-green);
  border: 1px solid rgba(201, 169, 110, 0.4);
  padding: 20px 24px;
  max-width: 340px;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink);
  line-height: 1.6;
}

.cookie-notice .cookie-accept {
  display: inline-block;
  background: var(--brass);
  color: var(--ink-green);
  padding: 8px 20px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  cursor: none;
  border: none;
  margin-top: 14px;
  transition: background 0.2s var(--ease-soft),
              box-shadow 0.2s var(--ease-soft);
  text-transform: uppercase;
}

.cookie-notice .cookie-accept:hover {
  background: var(--coin-gold);
  box-shadow: 0 0 14px rgba(201, 169, 110, 0.4);
}

/* ------------------------------------------------------------
   52–53. CREDITS MODAL
   ------------------------------------------------------------ */
.credits-modal {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(6, 9, 10, 0.95);
  display: flex;
  align-items: center;
  justify-content: center;
}

.credits-modal-inner {
  background: var(--ink-green);
  border: 1px solid var(--brass);
  padding: 40px;
  max-width: 500px;
  width: 100%;
}

/* ------------------------------------------------------------
   54. SCROLL CUE
   ------------------------------------------------------------ */
.scroll-cue {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--brass);
  opacity: 0.6;
  text-transform: uppercase;
  animation: pulseBrass 2s ease-in-out infinite;
  white-space: nowrap;
  pointer-events: none;
}

/* ------------------------------------------------------------
   55. VIGNETTE
   ------------------------------------------------------------ */
.vignette {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  background: radial-gradient(
    ellipse at center,
    transparent 40%,
    rgba(6, 9, 10, 0.7) 100%
  );
}

/* ------------------------------------------------------------
   56–57. LANDSCAPE GATE
   ------------------------------------------------------------ */
.landscape-gate {
  position: fixed;
  inset: 0;
  z-index: 60;
  background: var(--bg);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 40px;
  text-align: center;
}

.landscape-gate__icon {
  font-family: var(--font-mono);
  font-size: 32px;
  color: var(--brass);
  opacity: 0.6;
}

.landscape-gate__text {
  font-family: var(--font-serif);
  font-size: 22px;
  color: var(--ink);
  letter-spacing: 0.12em;
}

.landscape-gate__sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--cream);
  opacity: 0.6;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

@media screen and (orientation: portrait) and (max-width: 768px) {
  .landscape-gate {
    display: flex;
  }
}

/* ------------------------------------------------------------
   58. PWA PROMPT
   ------------------------------------------------------------ */
.pwa-prompt {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 50;
  background: var(--ink-green);
  border: 1px solid rgba(201, 169, 110, 0.4);
  padding: 20px 24px;
  max-width: 340px;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink);
  line-height: 1.6;
}

.pwa-prompt .pwa-install {
  display: inline-block;
  background: var(--brass);
  color: var(--ink-green);
  padding: 8px 20px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  cursor: none;
  border: none;
  margin-top: 14px;
  text-transform: uppercase;
  transition: background 0.2s var(--ease-soft),
              box-shadow 0.2s var(--ease-soft);
}

.pwa-prompt .pwa-install:hover {
  background: var(--coin-gold);
  box-shadow: 0 0 14px rgba(201, 169, 110, 0.4);
}

.pwa-prompt .pwa-dismiss {
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(232, 220, 196, 0.5);
  cursor: none;
  border: none;
  background: none;
  margin-top: 10px;
  display: block;
  letter-spacing: 0.12em;
  transition: color 0.2s var(--ease-soft);
}

.pwa-prompt .pwa-dismiss:hover {
  color: var(--cream);
}

/* ------------------------------------------------------------
   59. SKIP TO CONTENT
   ------------------------------------------------------------ */
.skip-to-content {
  position: absolute;
  top: -100%;
  left: 0;
  z-index: 50;
  background: var(--brass);
  color: var(--bg);
  padding: 8px 16px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-decoration: none;
  transition: top 0.2s var(--ease-soft);
}

.skip-to-content:focus {
  top: 0;
}

/* ------------------------------------------------------------
   60. PCM FOOTER
   ------------------------------------------------------------ */
.pcm-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  z-index: 10;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink);
  opacity: 0.4;
  padding: 0 40px 6px;
  pointer-events: none;
}

/* ------------------------------------------------------------
   61. SCROLLBAR
   ------------------------------------------------------------ */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: rgba(201, 169, 110, 0.3);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(201, 169, 110, 0.6);
}

/* Firefox */
* {
  scrollbar-width: thin;
  scrollbar-color: rgba(201, 169, 110, 0.3) transparent;
}

/* ------------------------------------------------------------
   62. @KEYFRAMES — PULSE BRASS
   ------------------------------------------------------------ */
@keyframes pulseBrass {
  0% {
    opacity: 0.4;
    transform: translateX(-50%) scale(0.95);
  }
  50% {
    opacity: 1;
    transform: translateX(-50%) scale(1.05);
  }
  100% {
    opacity: 0.4;
    transform: translateX(-50%) scale(0.95);
  }
}

/* Variant for elements not using translateX(-50%) */
@keyframes pulseBrassSimple {
  0% {
    opacity: 0.4;
    transform: scale(0.95);
  }
  50% {
    opacity: 1;
    transform: scale(1.05);
  }
  100% {
    opacity: 0.4;
    transform: scale(0.95);
  }
}

/* ------------------------------------------------------------
   63. @KEYFRAMES — SPIN BRASS
   ------------------------------------------------------------ */
@keyframes spinBrass {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}

/* ------------------------------------------------------------
   64. @KEYFRAMES — FADE IN UP
   ------------------------------------------------------------ */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ------------------------------------------------------------
   65. REDUCED MOTION
   ------------------------------------------------------------ */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.3s !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.3s !important;
  }

  .cinema-bar {
    transition: height 0.3s linear;
  }

  .flash-overlay {
    transition: opacity 0.3s linear;
  }

  .intro-loader {
    transition: opacity 0.3s linear;
  }

  .intro-loader__spinner {
    animation: none;
    border-color: var(--brass);
  }

  .scene-copy {
    transition: opacity 0.3s linear,
                transform 0.3s linear;
  }

  .menu-overlay {
    transition: transform 0.3s linear;
  }

  .progress-bar-fill {
    transition: width 0.3s linear;
  }

  .scroll-cue {
    animation: none;
  }

  .status-console.done {
    transition: opacity 0.3s linear;
  }
}

.status-console div:nth-child(2) { animation-delay: 0.1s; }
.status-console div:nth-child(3) { animation-delay: 0.25s; }
.status-console div:nth-child(4) { animation-delay: 0.45s; }
.status-console div:nth-child(5) { animation-delay: 0.7s; }
.status-console div:nth-child(6) { animation-delay: 0.95s; }

.status-console div:nth-child(8) { animation-delay: 1.5s; }

/* ─────────────────────────────────────────────

.flash-overlay {

  inset: 0;
  z-index: 50;
  background: white;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease;

  // RENDERER
  const renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: false,
    powerPreference: 'high-performance',
    stencil: false
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.25;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('canvas-host').appendChild(renderer.domElement);

  // SCENE
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x06090a);
  scene.fog = new THREE.FogExp2(0x06090a, 0.018);

  // CAMERA
  const camera = new THREE.PerspectiveCamera(34, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 12, 22); // intro start position

  // PMREM (Room Environment for PBR reflections)
  // Using a manual IBL setup since RoomEnvironment import may not be available
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  // Create a simple bright env using a data texture
  try {
    // Try to load RoomEnvironment from esm.sh
    // Falls back gracefully
    const envData = new Float32Array(4 * 4 * 4 * 6);
    for (let i = 0; i < envData.length; i += 4) {
      envData[i] = 0.8; envData[i+1] = 0.85; envData[i+2] = 0.75; envData[i+3] = 1.0;
    }
    const envTex = new THREE.DataArrayTexture(envData, 4, 4, 6);
    envTex.type = THREE.FloatType;
    envTex.needsUpdate = true;
    // scene.environment will be set after PMREM processes
  } catch(e) {
    // graceful fallback
  }

  // 7-LIGHT RIG (exact values from spec)

  // 1. Ambient
  const ambientLight = new THREE.AmbientLight(0xb4c8be, 0.3);
  scene.add(ambientLight);

  // 2. Key light (warm directional from upper-right-front)
  const keyLight = new THREE.DirectionalLight(0xfff5e0, 1.6);
  keyLight.position.set(8, 10, 8);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.set(2048, 2048);
  keyLight.shadow.camera.near = 0.5;
  keyLight.shadow.camera.far = 50;
  keyLight.shadow.camera.left = -12;
  keyLight.shadow.camera.right = 12;
  keyLight.shadow.camera.top = 12;
  keyLight.shadow.camera.bottom = -12;
  keyLight.shadow.bias = -0.0005;
  scene.add(keyLight);

  // 3. Rim light (cool green from upper-left-back)
  const rimLight = new THREE.DirectionalLight(0x7fb89c, 0.7);
  rimLight.position.set(-8, 5, -5);
  scene.add(rimLight);

  // 4. Fill light (brass from below-front)
  const fillLight = new THREE.DirectionalLight(0xc9a96e, 0.45);
  fillLight.position.set(0, -6, 8);
  scene.add(fillLight);

  // 5. Center spot (warm gold, flickers in animation loop)
  const centerSpotLight = new THREE.PointLight(0xffe0a0, 1.8, 18, 1.4);
  centerSpotLight.position.set(0, 0.5, 5);
  scene.add(centerSpotLight);
  window.centerSpotLight = centerSpotLight;

  // 6. Accent brass (left)
  const accentBrass = new THREE.PointLight(0xc9a96e, 0.8, 10, 1.8);
  accentBrass.position.set(-3.5, 2, 2);
  scene.add(accentBrass);

  // 7. Accent green (right)
  const accentGreen = new THREE.PointLight(0x7fb89c, 0.6, 10, 1.8);
  accentGreen.position.set(3.5, -2, 2);
  scene.add(accentGreen);

  // POSTPROCESSING CHAIN
  const EffectComposer = POSTPROCESSING.EffectComposer;
  const RenderPass = POSTPROCESSING.RenderPass;
  const EffectPass = POSTPROCESSING.EffectPass;
  const BloomEffect = POSTPROCESSING.BloomEffect;
  const ChromaticAberrationEffect = POSTPROCESSING.ChromaticAberrationEffect;
  const VignetteEffect = POSTPROCESSING.VignetteEffect;

  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));

  const bloomEffect = new BloomEffect({
    intensity: 0.85,
    luminanceThreshold: 0.35,
    luminanceSmoothing: 0.4,
    radius: 0.7,
  });

  const chromAberration = new ChromaticAberrationEffect({
    offset: new THREE.Vector2(0.0008, 0.0008),
  });

  const vignetteEffect = new VignetteEffect({
    offset: 0.32,
    darkness: 0.6,
  });

  composer.addPass(new EffectPass(camera, bloomEffect, chromAberration, vignetteEffect));

  // RESIZE
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  });

  // Expose globals
  window.scene = scene;
  window.camera = camera;
  window.renderer = renderer;
  window.composer = composer;

  return { scene, camera, renderer, composer, lights: { ambientLight, keyLight, rimLight, fillLight, centerSpotLight, accentBrass, accentGreen } };
}


  // ─── logo-geometry.js ──────────────────────────────────────────────
function buildPCMLogo(THREE) {
  // ── MATERIALS ──────────────────────────────────────────────────────────────
  const matRing = new THREE.MeshPhysicalMaterial({
    color: 0x1a2520,
    metalness: 0.35,
    roughness: 0.38,
    clearcoat: 0.7,
    clearcoatRoughness: 0.22,
    envMapIntensity: 1.2
  });

  const matShadow = new THREE.MeshStandardMaterial({
    color: 0x0f1814,
    roughness: 0.8
  });

  const matBrass = new THREE.MeshPhysicalMaterial({
    color: 0xc9a96e,
    metalness: 0.82,
    roughness: 0.18,
    envMapIntensity: 1.5
  });

  const matCoin = new THREE.MeshPhysicalMaterial({
    color: 0xd9b97a,
    metalness: 0.92,
    roughness: 0.12,
    envMapIntensity: 2.0,
    clearcoat: 0.5
  });

  const matPerson = new THREE.MeshPhysicalMaterial({
    color: 0x1a2520,
    metalness: 0.3,
    roughness: 0.45,
    clearcoat: 0.4
  });

  const matCream = new THREE.MeshStandardMaterial({
    color: 0xe8dcc4,
    roughness: 0.7
  });

  // ── OUTER RING ─────────────────────────────────────────────────────────────
  const outerRing = new THREE.Mesh(
    new THREE.TorusGeometry(3.4, 0.24, 32, 128),
    matRing
  );
  outerRing.userData.partId = 'ringOuter';
  outerRing.castShadow = true;

  const shadowRing = new THREE.Mesh(
    new THREE.TorusGeometry(3.42, 0.27, 24, 96),
    matShadow
  );
  shadowRing.position.z = -0.04;

  const accentRing = new THREE.Mesh(
    new THREE.TorusGeometry(3.05, 0.045, 16, 96),
    matBrass
  );

  // ── TICK MARKS ─────────────────────────────────────────────────────────────
  const tickGroup = new THREE.Group();
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    const isMajor = i % 3 === 0;
    const geo = isMajor
      ? new THREE.CapsuleGeometry(0.04, 0.22, 8, 12)
      : new THREE.CapsuleGeometry(0.025, 0.14, 6, 8);
    const mat = isMajor ? matBrass : matCream;
    const tick = new THREE.Mesh(geo, mat);
    tick.position.set(Math.cos(a) * 3.68, Math.sin(a) * 3.68, 0);
    tick.rotation.z = a + Math.PI / 2;
    tickGroup.add(tick);
  }

  // ── LEVER GROUP ────────────────────────────────────────────────────────────
  const leverGroup = new THREE.Group();
  leverGroup.rotation.z = 0.16;
  leverGroup.userData.partId = 'lever';

  const leverBar = new THREE.Mesh(
    new THREE.BoxGeometry(4.5, 0.18, 0.22),
    matRing
  );
  leverGroup.add(leverBar);

  const capGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.24, 16);
  const leftCap = new THREE.Mesh(capGeo, matBrass);
  leftCap.position.set(-2.3, 0, 0);
  leftCap.rotation.x = Math.PI / 2;
  const rightCap = new THREE.Mesh(capGeo.clone(), matBrass);
  rightCap.position.set(2.3, 0, 0);
  rightCap.rotation.x = Math.PI / 2;
  leverGroup.add(leftCap, rightCap);

  // ── COIN GROUP ─────────────────────────────────────────────────────────────
  const coinGroup = new THREE.Group();
  coinGroup.position.set(-2.0, 0, 0);
  coinGroup.userData.partId = 'coin';

  const disc = new THREE.Mesh(
    new THREE.CylinderGeometry(0.58, 0.58, 0.16, 64),
    matCoin
  );
  disc.rotation.x = Math.PI / 2;
  coinGroup.add(disc);

  const rimGeo = new THREE.TorusGeometry(0.58, 0.025, 8, 64);
  const frontRim = new THREE.Mesh(rimGeo, matRing);
  frontRim.position.z = 0.08;
  const backRim = new THREE.Mesh(rimGeo.clone(), matRing);
  backRim.position.z = -0.08;
  coinGroup.add(frontRim, backRim);

  const dollarBar = new THREE.Mesh(
    new THREE.BoxGeometry(0.07, 0.72, 0.045),
    matBrass
  );
  dollarBar.position.z = 0.09;
  coinGroup.add(dollarBar);

  const upperArc = new THREE.Mesh(
    new THREE.TorusGeometry(0.16, 0.05, 10, 24, Math.PI * 1.05),
    matBrass
  );
  upperArc.position.set(0, 0.15, 0.09);
  coinGroup.add(upperArc);

  const lowerArc = new THREE.Mesh(
    new THREE.TorusGeometry(0.16, 0.05, 10, 24, Math.PI * 1.05),
    matBrass
  );
  lowerArc.position.set(0, -0.15, 0.09);
  lowerArc.rotation.y = Math.PI;
  coinGroup.add(lowerArc);

  leverGroup.add(coinGroup);

  // ── PERSON GROUP ───────────────────────────────────────────────────────────
  const personRoot = new THREE.Group();
  personRoot.position.set(2.0, 0.09, 0);
  personRoot.userData.partId = 'person';

  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.19, 28, 28),
    matPerson
  );
  head.position.y = 1.08;
  personRoot.add(head);

  const neck = new THREE.Mesh(
    new THREE.CylinderGeometry(0.065, 0.085, 0.12, 16),
    matPerson
  );
  neck.position.y = 0.91;
  personRoot.add(neck);

  const torso = new THREE.Mesh(
    new THREE.CylinderGeometry(0.17, 0.24, 0.54, 20),
    matPerson
  );
  torso.position.y = 0.58;
  personRoot.add(torso);

  const armGeo = new THREE.CapsuleGeometry(0.055, 0.46, 8, 14);
  const leftArm = new THREE.Mesh(armGeo, matPerson);
  leftArm.position.set(-0.24, 0.72, 0);
  leftArm.rotation.z = 0.4;
  const rightArm = new THREE.Mesh(armGeo.clone(), matPerson);
  rightArm.position.set(0.24, 0.72, 0);
  rightArm.rotation.z = -0.4;
  personRoot.add(leftArm, rightArm);

  const hips = new THREE.Mesh(
    new THREE.CylinderGeometry(0.24, 0.2, 0.13, 20),
    matPerson
  );
  hips.position.y = 0.28;
  personRoot.add(hips);

  const legGeo = new THREE.CapsuleGeometry(0.075, 0.34, 8, 14);
  const leftLeg = new THREE.Mesh(legGeo, matPerson);
  leftLeg.position.set(-0.1, 0.05, 0);
  const rightLeg = new THREE.Mesh(legGeo.clone(), matPerson);
  rightLeg.position.set(0.1, 0.05, 0);
  personRoot.add(leftLeg, rightLeg);

  const footGeo = new THREE.BoxGeometry(0.17, 0.07, 0.2);
  const leftFoot = new THREE.Mesh(footGeo, matPerson);
  leftFoot.position.set(-0.1, -0.14, 0.04);
  const rightFoot = new THREE.Mesh(footGeo.clone(), matPerson);
  rightFoot.position.set(0.1, -0.14, 0.04);
  personRoot.add(leftFoot, rightFoot);

  leverGroup.add(personRoot);

  // ── FULCRUM GROUP ──────────────────────────────────────────────────────────
  const fulcrumGroup = new THREE.Group();
  fulcrumGroup.position.set(0, -0.45, 0);
  fulcrumGroup.userData.partId = 'fulcrum';

  const pyramid = new THREE.Mesh(
    new THREE.ConeGeometry(0.22, 0.42, 4),
    matRing
  );
  pyramid.position.y = -0.08;
  pyramid.rotation.y = Math.PI / 4;
  fulcrumGroup.add(pyramid);

  const pivotDot = new THREE.Mesh(
    new THREE.SphereGeometry(0.085, 20, 20),
    matBrass
  );
  pivotDot.position.y = 0.2;
  fulcrumGroup.add(pivotDot);

  const glowRingMat = new THREE.MeshBasicMaterial({
    color: 0xc9a96e,
    transparent: true,
    opacity: 0.6,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  const glowRing = new THREE.Mesh(
    new THREE.RingGeometry(0.13, 0.22, 32),
    glowRingMat
  );
  glowRing.position.y = 0.2;
  glowRing.rotation.x = Math.PI / 2;
  fulcrumGroup.add(glowRing);

  // ── ICON ROW ───────────────────────────────────────────────────────────────
  const iconRow = new THREE.Group();

  // Up arrow
  const upArrowGroup = new THREE.Group();
  upArrowGroup.position.set(-1.15, -1.85, 0);
  upArrowGroup.userData.partId = 'upArrow';
  const upShaft = new THREE.Mesh(
    new THREE.CylinderGeometry(0.045, 0.045, 0.46, 16),
    matBrass
  );
  const upHead = new THREE.Mesh(
    new THREE.ConeGeometry(0.14, 0.24, 20),
    matBrass
  );
  upHead.position.y = 0.34;
  upArrowGroup.add(upShaft, upHead);

  // Refresh icon
  const refreshGroup = new THREE.Group();
  refreshGroup.position.set(0, -1.85, 0);
  const refreshArc = new THREE.Mesh(
    new THREE.TorusGeometry(0.25, 0.045, 12, 32, Math.PI * 1.55),
    matBrass
  );
  refreshArc.rotation.z = -0.4;
  const refreshTip = new THREE.Mesh(
    new THREE.ConeGeometry(0.09, 0.18, 14),
    matBrass
  );
  refreshTip.position.set(0.21, 0.16, 0);
  refreshTip.rotation.z = -1.0;
  refreshGroup.add(refreshArc, refreshTip);

  // Down arrow
  const downArrowGroup = new THREE.Group();
  downArrowGroup.position.set(1.15, -1.85, 0);
  downArrowGroup.userData.partId = 'downArrow';
  const downShaft = new THREE.Mesh(
    new THREE.CylinderGeometry(0.045, 0.045, 0.46, 16),
    matBrass
  );
  const downHead = new THREE.Mesh(
    new THREE.ConeGeometry(0.14, 0.24, 20),
    matBrass
  );
  downHead.position.y = -0.34;
  downHead.rotation.z = Math.PI;
  downArrowGroup.add(downShaft, downHead);

  iconRow.add(upArrowGroup, refreshGroup, downArrowGroup);

  // ── ORBITAL DOTS ───────────────────────────────────────────────────────────
  const orbitalDots = [];
  for (let i = 0; i < 10; i++) {
    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(0.055, 14, 14),
      matBrass.clone()
    );
    const phase = (i / 10) * Math.PI * 2;
    dot.userData.phase = phase;
    orbitalDots.push(dot);
  }

  // ── HALO DISC ──────────────────────────────────────────────────────────────
  const haloMat = new THREE.MeshBasicMaterial({
    color: 0x7fb89c,
    transparent: true,
    opacity: 0.07,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  const haloDisc = new THREE.Mesh(
    new THREE.CircleGeometry(4.8, 64),
    haloMat
  );
  haloDisc.position.z = -1.2;

  // ── PARTICLES ──────────────────────────────────────────────────────────────
  const particleCount = 240;
  const positions = new Float32Array(particleCount * 3);
  const phases = new Float32Array(particleCount);
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3]     = (Math.random() - 0.5) * 16;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 12;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
    phases[i] = Math.random() * Math.PI * 2;
  }
  const particleGeo = new THREE.BufferGeometry();
  particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const particleMat = new THREE.PointsMaterial({
    color: 0xc9a96e,
    size: 0.045,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.7
  });
  const particles = new THREE.Points(particleGeo, particleMat);
  particles.userData.phases = phases;

  // ── BACKGROUND GRADIENT PLANE ──────────────────────────────────────────────
  const bgPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 40),
    new THREE.ShaderMaterial({
      uniforms: { time: { value: 0 } },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform float time;
        void main() {
          vec3 top = vec3(0.04, 0.07, 0.06);
          vec3 mid = vec3(0.06, 0.10, 0.09);
          vec3 bot = vec3(0.02, 0.03, 0.03);
          vec3 col = mix(bot, mid, vUv.y * 1.5);
          col = mix(col, top, max(0.0, vUv.y - 0.5) * 2.0);
          col += 0.005 * sin(time * 0.3 + vUv.x * 8.0);
          gl_FragColor = vec4(col, 1.0);
        }
      `,
      depthWrite: false
    })
  );
  bgPlane.position.z = -8;

  // ── ASSEMBLE ROOT ──────────────────────────────────────────────────────────
  const root = new THREE.Group();
  root.add(outerRing, shadowRing, accentRing, tickGroup, leverGroup, fulcrumGroup, iconRow);
  orbitalDots.forEach(d => root.add(d));
  root.add(haloDisc, particles, bgPlane);

  return {
    root,
    leverGroup,
    coinGroup,
    personGroup: personRoot,
    fulcrumGroup,
    refreshGroup,
    outerRing,
    accentRingMesh: accentRing,
    tickGroup,
    orbitalDots,
    haloDisc,
    particles,
    bgPlane,
    glowRing,
    upArrowGroup,
    downArrowGroup
  };
}

  // Poetic block

  if (poeticEl) {

  const contactEl = el('copy-contact');
  if (contactEl) {
    contactEl.style.display = s.hasContact ? '' : 'none';

    document.body.style.cursor = 'none';

    const cursor = document.getElementById('pcm-cursor');
    const dot    = document.getElementById('pcm-cursor-dot');

    let mx = -200, my = -200; // start off-screen
    let cx = -200, cy = -200;
    let rafId = null;

    function lerp(a, b, t) { return a + (b - a) * t; }

    function animateCursor() {
      cx = lerp(cx, mx, 0.12);
      cy = lerp(cy, my, 0.12);
      cursor.style.transform = `translate(${cx}px, ${cy}px)`;
      dot.style.transform    = `translate(${mx}px, ${my}px)`;
      rafId = requestAnimationFrame(animateCursor);

    document.addEventListener('mousemove', (e) => {
      mx = e.clientX;
      my = e.clientY;

      cursor.style.opacity = '1';

    document.addEventListener('mouseover', (e) => {

    document.addEventListener('keydown', (e) => {
      // Ignore shortcuts when typing in a form field
      if (['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) return;

      switch (e.key.toUpperCase()) {
        case 'M':
          document.getElementById('btn-audio')?.click();
          break;
        case 'E':
          document.getElementById('btn-explode')?.click();
          break;
        case 'W':
          document.getElementById('btn-wire')?.click();
          break;
        case 'H': {
          const help = document.getElementById('kbd-help');
          if (help) help.classList.toggle('hidden');
          break;
        }
        case 'ARROWDOWN':
        case 'ARROWRIGHT': {
          e.preventDefault();
          const next = (window.activeIdx || 0) + 1;
          if (next < SECTION_NAMES.length && typeof window.goToSection === 'function') {
            window.goToSection(next, 1);
          }
          break;
        }
        case 'ARROWUP':
        case 'ARROWLEFT': {
          e.preventDefault();
          const prev = (window.activeIdx || 0) - 1;
          if (prev >= 0 && typeof window.goToSection === 'function') {
            window.goToSection(prev, -1);
          }
          break;
        }
        default:
          break;
      }
    });
  }

  // ---------------------------------------------------------------------------
  // Wheel / touch navigation
  // ---------------------------------------------------------------------------

  function wireScrollNavigation() {
    let lastWheelTime = 0;
    const WHEEL_COOLDOWN = 900; // ms between section jumps

    window.addEventListener('wheel', (e) => {
      const now = Date.now();
      if (now - lastWheelTime < WHEEL_COOLDOWN) return;
      lastWheelTime = now;

      if (typeof window.goToSection !== 'function') return;

      const dir = e.deltaY > 0 ? 1 : -1;
      const next = (window.activeIdx || 0) + dir;
      if (next >= 0 && next < SECTION_NAMES.length) {
        window.goToSection(next, dir);
        window.dismissScrollCue();
      }
    }, { passive: true });

    // Touch swipe
    let touchStartY = null;
    window.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchend', (e) => {
      if (touchStartY === null) return;
      const delta = touchStartY - e.changedTouches[0].clientY;
      touchStartY = null;
      if (Math.abs(delta) < 40) return; // swipe threshold

      const dir  = delta > 0 ? 1 : -1;
      const next = (window.activeIdx || 0) + dir;
      if (next >= 0 && next < SECTION_NAMES.length && typeof window.goToSection === 'function') {
        window.goToSection(next, dir);
        window.dismissScrollCue();
      }
    }, { passive: true });
  }

// ─── 4. HOVER SCALE-UP ───────────────────────────────────────────────────────

let hoveredPartId = null;
const baseScales = new Map();

function setPartScale(partId, scale) {
  const root = window.pcmRoot;
  if (!root) return;
  root.traverse(obj => {
    if (obj.userData.partId === partId) {
      if (!baseScales.has(obj.uuid)) baseScales.set(obj.uuid, obj.scale.clone());
      const base = baseScales.get(obj.uuid);
      obj.scale.lerp(base.clone().multiplyScalar(scale), 0.12);
    }
  });
}

const HOVER_SCALES = { coin: 1.08, person: 1.06, fulcrum: 1.2, upArrow: 1.15, downArrow: 1.15, ringOuter: 1.03 };

document.addEventListener('mousemove', e => {
  if (isDragging) return;
  mouse2D.x = (e.clientX / innerWidth) * 2 - 1;
  mouse2D.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2D, camera);
  const root = window.pcmRoot;
  if (!root) return;
  const hits = raycaster.intersectObjects(root.children, true);
  const newHover = hits.length > 0 ? getPartId(hits[0].object) : null;

  if (newHover !== hoveredPartId) {
    if (hoveredPartId) setPartScale(hoveredPartId, 1.0);
    hoveredPartId = newHover;
    if (cursor) {
      if (newHover) cursor.classList.add('cursor-hot');
      else cursor.classList.remove('cursor-hot');
    }
  }
  if (hoveredPartId && HOVER_SCALES[hoveredPartId]) {
    setPartScale(hoveredPartId, HOVER_SCALES[hoveredPartId]);
  }
});

// ─── 6. EXPLODE MODE ─────────────────────────────────────────────────────────

let exploded = false;
const explodeOffsets = new Map();

function toggleExplode() {
  exploded = !exploded;
  const root = window.pcmRoot;
  if (!root) return;
  root.children.forEach(child => {
    if (child === window.bgPlane || child === window.particles || child === window.haloDisc) return;
    if (!explodeOffsets.has(child.uuid)) {
      const dir = child.position.clone().normalize();
      if (dir.length() < 0.01) dir.set(Math.random()-0.5, Math.random()-0.5, 0.3).normalize();
      explodeOffsets.set(child.uuid, dir.multiplyScalar(1.5));
    }
    const offset = explodeOffsets.get(child.uuid);
    const target = exploded
      ? child.position.clone().add(offset)
      : child.position.clone().sub(offset);
    // Store in userData for lerp in animation loop
    child.userData.explodeTarget = target;
    child.userData.explodeBase = exploded ? child.position.clone() : child.position.clone().add(offset);
  });
  document.getElementById('btn-explode')?.classList.toggle('active', exploded);
}
window.toggleExplode = toggleExplode;
document.getElementById('btn-explode')?.addEventListener('click', toggleExplode);

let wireframe = false;
function toggleWireframe() {
  wireframe = !wireframe;
  const root = window.pcmRoot;
  if (!root) return;
  root.traverse(obj => {
    if (obj.isMesh && obj.material && obj.material !== window.bgPlane?.material) {
      if (Array.isArray(obj.material)) {
        obj.material.forEach(m => { m.wireframe = wireframe; });
      } else {
        obj.material.wireframe = wireframe;
      }
    }
  });
  document.getElementById('btn-wire')?.classList.toggle('active', wireframe);
}
window.toggleWireframe = toggleWireframe;
