/* =============================================================
   PCM CINEMATIC SITE — SUPPLEMENTAL COMPONENT STYLES
   Companion to styles.css — all additional component rules
   ============================================================= */

/* ─────────────────────────────────────────────
   1. MODES ROW
   ───────────────────────────────────────────── */

.modes-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin: 16px 0;
  position: relative;
  user-select: none;
  touch-action: pan-x;
}
.mode-drag-indicator {
  position: absolute;
  bottom: -4px;
  left: 0;
  height: 1px;
  background: var(--brass);
  box-shadow: 0 0 8px var(--brass);
  transition: left 0.3s ease, width 0.3s ease;
}

.mode-btn {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(201, 169, 110, 0.2);
  color: rgba(232,220,196,0.55);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.2em;
  padding: 6px 10px 8px;
  cursor: pointer;
  text-transform: uppercase;
  transition: color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
  position: relative;
}
.mode-btn::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--brass);
  transition: width 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.mode-btn.active {
  color: var(--brass);
  border-bottom-color: transparent;
}
.mode-btn.active::after {
  width: 100%;
  box-shadow: 0 0 10px rgba(201,169,110,0.5);
}
.mode-btn:hover:not(.active) {
  color: rgba(201,169,110,0.7);
  border-bottom-color: rgba(201,169,110,0.35);
}

.mode-body {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  line-height: 1.7;
  color: var(--ink);
  opacity: 0.88;
  margin: 10px 0;
  max-width: 460px;
  min-height: 48px;
  /* V21: cinematic mode transition — fade + Y-lift, matching seacat panel reveal */
  transition: opacity 0.28s ease, transform 0.28s cubic-bezier(0.215,0.61,0.355,1);
}
.mode-body.mode-exiting {
  opacity: 0;
  transform: translateY(-10px);
  pointer-events: none;
}
.mode-body.mode-entering {
  opacity: 0;
  transform: translateY(10px);
}
.mode-body.mode-visible {
  opacity: 0.85;
  transform: translateY(0);
}

.mode-stats {
  display: flex;
  gap: 24px;
  margin: 10px 0;
  /* V21: matched transition for the stats row */
  transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.215,0.61,0.355,1);
}

/* ─────────────────────────────────────────────
   2. STAT ITEMS
   ───────────────────────────────────────────── */

.stat-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.stat-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.4rem;
  color: var(--brass);
  letter-spacing: 0.05em;
  line-height: 1;
  font-weight: 300;
}

.stat-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--cream);
  opacity: 0.7;
  text-transform: uppercase;
}

/* ─────────────────────────────────────────────
   3. TAGS
   ───────────────────────────────────────────── */

.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
}

.tag {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.14em;
  color: rgba(201, 169, 110, 0.7);
  border: 1px solid rgba(201, 169, 110, 0.2);
  padding: 3px 10px;
  text-transform: uppercase;
}



/* ═══════════════════════════════════════════════════
   V23 — BLOCK GRID (Platform Edge 3-up feature cards)
   ═══════════════════════════════════════════════════ */
.block-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin: 16px 0 8px;
  max-width: 560px;
}
.block-grid-item {
  border: 1px solid rgba(201,169,110,0.18);
  background: rgba(201,169,110,0.04);
  padding: 14px 16px 16px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.35s ease, background 0.35s ease;
  cursor: default;
}
.block-grid-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,0.5), transparent);
  opacity: 0;
  transition: opacity 0.35s ease;
}
.block-grid-item:hover {
  border-color: rgba(201,169,110,0.4);
  background: rgba(201,169,110,0.07);
}
.block-grid-item:hover::before { opacity: 1; }
.block-grid-num {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.3em;
  color: rgba(201,169,110,0.55);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.block-grid-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.0rem;
  letter-spacing: 0.12em;
  color: var(--brass);
  text-transform: uppercase;
  margin-bottom: 6px;
  line-height: 1.2;
}
.block-grid-body {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  line-height: 1.55;
  color: var(--ink);
  opacity: 0.7;
}

/* ═══════════════════════════════════════════════════
   V23 — CONNECTOR LINE (Execution 5-stage process)
   ═══════════════════════════════════════════════════ */
.connector-stages {
  display: flex;
  flex-direction: column;
  gap: 0;
  max-width: 400px;
  margin: 18px 0;
}
.connector-stage {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  position: relative;
  padding-bottom: 20px;
  opacity: 0.25;
  transform: translateX(-16px);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
}
.connector-stage.revealed {
  opacity: 1;
  transform: translateX(0) !important;
  transform: translateX(0);
}
.connector-stage-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
}
.connector-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(201,169,110,0.3);
  border: 1px solid rgba(201,169,110,0.5);
  margin-top: 3px;
  flex-shrink: 0;
  transition: background 0.4s ease, box-shadow 0.4s ease;
}
.connector-stage.revealed .connector-dot {
  background: var(--brass);
  box-shadow: 0 0 8px rgba(201,169,110,0.6);
}
.connector-line-vert {
  width: 1px;
  flex: 1;
  background: linear-gradient(180deg, rgba(201,169,110,0.4), rgba(201,169,110,0.08));
  margin-top: 4px;
  min-height: 20px;
}
.connector-stage:last-child .connector-line-vert { display: none; }
.connector-stage-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.25rem;
  letter-spacing: 0.12em;
  color: rgba(232,220,196,0.85);
  font-style: italic;
  margin-bottom: 3px;
  line-height: 1.2;
}
.connector-stage-body {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  line-height: 1.5;
  color: var(--ink);
  opacity: 0.7;
}

/* ─────────────────────────────────────────────
   CALLOUT BLOCK (pull quote, Firm Overview etc)
   ───────────────────────────────────────────── */
.callout-block {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem;
  font-style: italic;
  line-height: 1.7;
  color: var(--brass);
  opacity: 0.92;
  max-width: 500px;
  margin: 18px 0 12px;
  padding: 16px 24px;
  border-left: 1px solid rgba(201,169,110,0.55);
  background: rgba(201,169,110,0.04);
  position: relative;
}
.callout-block::before {
  content: '"';
  position: absolute;
  top: 4px;
  left: 10px;
  font-size: 3rem;
  line-height: 1;
  color: rgba(201,169,110,0.22);
  font-style: normal;
}

/* ─────────────────────────────────────────────
   4. LONG BLOCK
   ───────────────────────────────────────────── */

.long-block {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem;
  line-height: 1.9;
  color: var(--ink);
  opacity: 0.8;
  max-width: 520px;
  margin: 16px 0;
  font-style: italic;
  border-left: 2px solid rgba(201, 169, 110, 0.4);
  padding-left: 20px;
}

/* ─────────────────────────────────────────────
   5. POETIC BLOCK
   ───────────────────────────────────────────── */

.poetic-block {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.25rem;
  line-height: 2.2;
  color: var(--brass);
  opacity: 0.9;
  max-width: 480px;
  margin: 20px 0;
  text-align: center;
  letter-spacing: 0.06em;
  font-style: italic;
}

/* ─────────────────────────────────────────────
   MASK LAYER — clip-path section reveal
   ───────────────────────────────────────────── */
.mask-layer {
  position: fixed;
  inset: 0;
  z-index: 88;
  pointer-events: none;
  background: var(--bg);
  clip-path: inset(0 0 100% 0);
  transition: clip-path 0.6s cubic-bezier(0.77, 0, 0.18, 1);
}
body.transitioning .mask-layer {
  clip-path: inset(0 0 0% 0);
}
body.transition-done .mask-layer {
  clip-path: inset(100% 0 0% 0);
  transition: clip-path 0.5s cubic-bezier(0.77, 0, 0.18, 1);
}

/* Body-level custom scrollbar */
body::-webkit-scrollbar { width: 2px; }
body::-webkit-scrollbar-track { background: transparent; }
body::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.35); border-radius: 2px; }
body::-webkit-scrollbar-thumb:hover { background: rgba(201,169,110,0.6); }

/* Poetic block animated lines */
.poetic-line {
  display: block;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.78s cubic-bezier(0.22, 1, 0.36, 1),
              transform 0.78s cubic-bezier(0.22, 1, 0.36, 1);
  font-style: italic;
  line-height: 1.85;
  border-left: 1px solid rgba(201,169,110,0.14);
  padding-left: 14px;
  margin-bottom: 5px;
}
.poetic-line.revealed {
  opacity: 1;
  transform: translateY(0);
}

/* ─────────────────────────────────────────────
   6. CONTACT FORM
   ───────────────────────────────────────────── */

.contact-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 380px;
  margin-top: 16px;
}

.pcm-input {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(201, 169, 110, 0.2);
  color: var(--ink);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.25s;
  width: 100%;
  box-sizing: border-box;
}

.pcm-input:focus {
  border-color: var(--brass);
  background: rgba(255, 255, 255, 0.06);
}

.pcm-input::placeholder {
  color: rgba(227, 238, 230, 0.3);
}

.pcm-textarea {
  resize: vertical;
  min-height: 90px;
  font-family: 'Space Grotesk', sans-serif;
}

select.pcm-input {
  cursor: pointer;
}

select.pcm-input option {
  background: #0f1814;
}

.pcm-submit {
  background: transparent;
  border: 1px solid var(--brass);
  color: var(--brass);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  padding: 12px 28px;
  cursor: pointer;
  transition: all 0.3s;
  text-transform: uppercase;
  align-self: flex-start;
}

.pcm-submit:hover {
  background: var(--brass);
  color: var(--bg);
}

.form-status {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  margin-top: 6px;
  min-height: 18px;
}

/* ─────────────────────────────────────────────
   7. HOME MARK
   ───────────────────────────────────────────── */

.home-mark {
  position: fixed;
  top: 28px;
  left: 40px;
  z-index: 20;
  opacity: 0;
  transition: opacity 0.8s;
  pointer-events: none;
}

.home-mark.visible {
  opacity: 1;
  pointer-events: auto;
}

.home-mark .wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  color: var(--ink);
  letter-spacing: 0.18em;
  font-weight: 500;
}

.home-mark .slogan {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.32em;
  color: var(--brass);
  text-transform: uppercase;
  margin-top: 4px;
}

.home-mark .brass-hairline {
  animation: hairlineGrow 1.2s var(--ease-cinema) both;
}
@keyframes hairlineGrow {
  from { transform: scaleX(0); transform-origin: left center; }
  to   { transform: scaleX(1); transform-origin: left center; }
}
/* The rule below (duplicated base) is intentionally kept for specificity: */
.home-mark .brass-hairline {
  width: 100%;
  height: 1px;
  background: var(--brass);
  margin-top: 8px;
  box-shadow: 0 0 8px rgba(201, 169, 110, 0.4);
}

/* ─────────────────────────────────────────────
   8. TOP META
   ───────────────────────────────────────────── */

.top-section-meta {
  position: fixed;
  top: 28px;
  right: 40px;
  z-index: 20;
  text-align: right;
}

.meta-num {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  color: var(--ink);
  letter-spacing: 0.18em;
}

.meta-cap {
  display: block;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--brass);
  text-transform: uppercase;
  margin-top: 3px;
  opacity: 0.7;
}

/* ─────────────────────────────────────────────
   9. BOTTOM MENU EXTRAS
   ───────────────────────────────────────────── */

.btn-num {
  display: block;
  font-family: 'Space Mono', monospace;
  font-size: 8.5px;
  letter-spacing: 0.28em;
  color: rgba(201, 169, 110, 0.55);
  margin-bottom: 4px;
}

.btn-name {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  white-space: nowrap;
  line-height: 1;
}

/* ─────────────────────────────────────────────
   10. INTRO LOADER EXTRAS
   ───────────────────────────────────────────── */

.loader-inner {
  text-align: center;
}

.loader-spinner {
  width: 36px;
  height: 36px;
  border: 2px solid rgba(201, 169, 110, 0.2);
  border-top-color: var(--brass);
  border-radius: 50%;
  animation: spinBrass 1s linear infinite;
  margin: 0 auto 20px;
}

.loader-wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem;
  color: var(--ink);
  letter-spacing: 0.22em;
  text-transform: uppercase;
}

.loader-status {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--brass);
  letter-spacing: 0.18em;
  margin-top: 12px;
  opacity: 0.7;
}

/* ─────────────────────────────────────────────
   11. MENU OVERLAY EXTRAS
   ───────────────────────────────────────────── */

.menu-close {
  position: absolute;
  top: 28px;
  right: 40px;
  background: transparent;
  border: none;
  color: var(--brass);
  font-size: 1.4rem;
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  z-index: 1;
}

.menu-overlay nav a {
  font-size: clamp(2.5rem, 5vw, 5rem);
  letter-spacing: 0.08em;
  text-decoration: none;
  opacity: 0.85;
  transition: all 0.3s;
  display: block;
  margin-bottom: 8px;
  border-bottom: 1px solid rgba(201, 169, 110, 0.08);
  padding-bottom: 12px;
}

.menu-overlay nav a:hover {
  opacity: 1;
  padding-left: 16px;
  color: var(--brass);
}

/* ─────────────────────────────────────────────
   12. CINEMA BARS
   ───────────────────────────────────────────── */

.cinema-bar {
  position: fixed;
  left: 0;
  right: 0;
  height: 0;
  background: #000;
  z-index: 45;
  transition: height 700ms cubic-bezier(0.83, 0, 0.17, 1);
  pointer-events: none;
}

.cinema-bar-top {
  top: 0;
}

.cinema-bar-bottom {
  bottom: 0;
}

body.transitioning .cinema-bar {
  height: 80px;
}

@media (prefers-reduced-motion: reduce) {
  body.transitioning .cinema-bar {
    transition-duration: 200ms;
    height: 40px;
  }
}

/* ─────────────────────────────────────────────
   13. PCM CURSOR
   ───────────────────────────────────────────── */

.pcm-cursor {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 9999;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(227, 238, 230, 0.45);
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s, border-color 0.2s, background 0.2s;
  will-change: transform;
}

.cursor-dot {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 4px;
  height: 4px;
  background: var(--ink);
  border-radius: 50%;
}

.pcm-cursor.cursor-hot {
  width: 64px;
  height: 64px;
  border-color: var(--brass);
  background: rgba(201, 169, 110, 0.08);
}

.pcm-cursor.cursor-drag {
  width: 20px;
  height: 20px;
  background: var(--brass);
  border-color: var(--brass);
}

body:has(.pcm-cursor) {
  cursor: none;
}

/* ─────────────────────────────────────────────
   14. CADENCE / CONNECTOR
   ───────────────────────────────────────────── */

.cadence-strip {
  display: flex;
  align-items: center;
  gap: 0;
  margin: 20px 0;
}

.cadence-stage {
  text-align: center;
  padding: 0 12px;
}

.cadence-num {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--brass);
  letter-spacing: 0.22em;
}

.cadence-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.95rem;
  color: var(--ink);
  margin-top: 4px;
}

.cadence-connector {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--brass), rgba(201, 169, 110, 0.2));
  min-width: 20px;
  box-shadow: 0 0 4px rgba(201, 169, 110, 0.3);
}

/* ─────────────────────────────────────────────
   15. SCROLL CUE
   ───────────────────────────────────────────── */

.scroll-cue {
  position: fixed;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--brass);
  text-transform: uppercase;
  text-align: center;
  animation: pulseBrass 2s ease-in-out infinite;
  z-index: 20;
  opacity: 0.7;
  pointer-events: none;
}

/* ─────────────────────────────────────────────
   16. SECTION COPY RESPONSIVE
   ───────────────────────────────────────────── */

@media (max-width: 900px) {
  .scene-copy {
    left: 50%;
    transform: translateX(-50%);
    width: 90vw;
  }

  .scene-copy.visible {
    transform: translateX(-50%) translateY(-50%);
  }

  .scene-copy.hidden {
    transform: translateX(-50%) translateY(-55%);
  }

  .copy-inner {
    padding: 0 16px;
  }

  .bottom-menu {
    padding: 10px 20px 14px;
  }

  .section-btn {
    padding: 0 6px;
  }

  .side-nav {
    right: 14px;
  }

  .home-mark {
    left: 20px;
  }

  .top-section-meta {
    right: 20px;
  }
}

/* ─────────────────────────────────────────────
   17. CANVAS HOST
   ───────────────────────────────────────────── */

#canvas-host {
  position: fixed;
  inset: 0;
  z-index: 0;
}

#canvas-host canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
  cursor: grab;
}
body.is-dragging #canvas-host canvas { cursor: grabbing; }

/* ─────────────────────────────────────────────
   18. DETAIL CARD TRANSITIONS
   ───────────────────────────────────────────── */

.detail-card {
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
}

.detail-card:not(.hidden) {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* ─────────────────────────────────────────────
   19. STATUS CONSOLE
   ───────────────────────────────────────────── */

.status-console div {
  animation: fadeInUp 0.3s ease both;
}

.status-console div:nth-child(1) { animation-delay: 0s; }
.status-console div:nth-child(2) { animation-delay: 0.1s; }
.status-console div:nth-child(3) { animation-delay: 0.25s; }
.status-console div:nth-child(4) { animation-delay: 0.45s; }
.status-console div:nth-child(5) { animation-delay: 0.7s; }
.status-console div:nth-child(6) { animation-delay: 0.95s; }
.status-console div:nth-child(7) { animation-delay: 1.2s; }
.status-console div:nth-child(8) { animation-delay: 1.5s; }

/* ─────────────────────────────────────────────
   20. FLASH OVERLAY
   ───────────────────────────────────────────── */

.flash-overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: white;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease;
}


/* === Fixes for late-inserted overlays === */
.hidden { display: none !important; }

/* ============================================================
   ═══════════════════════════════════════════════════════════════
   PCM v13 — SEACAT FEATURE-PARITY ADDITIONS
   Gap implementations for: loader, audio wave, menu rings,
   triangles, scrubber, belt-conveyor, drawer, footer, etc.
   ═══════════════════════════════════════════════════════════════
   ============================================================ */

/* ───────────────────────────────────────────────────────────────
   GAP 13 — Gradient progress loading bar (replaces spinner)
   ─────────────────────────────────────────────────────────────── */
.intro-loader__bar-wrap {
  width: 240px;
  height: 1px;
  background: rgba(201, 169, 110, 0.15);
  position: relative;
  overflow: visible;
  margin: 0 auto;
}
.intro-loader__bar-fill {
  height: 1px;
  width: 100%;                  /* seacat: always full-width, scaleX animates it */
  transform: scaleX(0);
  transform-origin: 0 0;
  background: linear-gradient(90deg,
    rgba(6,9,10,0) 0%,
    rgba(201, 169, 110, 0.5) 15%,
    #c9a96e 45%,
    #d9b97a 65%,
    rgba(201, 169, 110, 0.5) 85%,
    rgba(6,9,10,0) 100%);
  transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.intro-loader__bar-fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: -2px;
  width: 4px;
  height: 5px;
  background: var(--brass);
  box-shadow: 0 0 8px 2px var(--brass), 0 0 14px 4px rgba(201, 169, 110, 0.4);
}
.intro-loader__bar-fill::before {
  content: '';
  position: absolute;
  left: -20px;
  top: -1px;
  height: 3px;
  width: 20px;
  background: linear-gradient(90deg, transparent 0%, rgba(201, 169, 110, 0.4) 100%);
  filter: blur(1px);
}
.intro-loader__pct {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.32em;
  color: var(--brass);
  opacity: 0.5;
  margin-top: 12px;
  text-align: center;
}
.intro-loader__wordmark-loader {
  font-family: var(--font-serif);
  font-size: 18px;
  letter-spacing: 0.32em;
  color: var(--ink);
  text-transform: uppercase;
  opacity: 0.85;
  margin-bottom: 28px;
  text-align: center;
}
.intro-loader__hairline {
  width: 28px;
  height: 1px;
  background: var(--brass);
  margin: 6px auto 14px;
  opacity: 0.6;
}

/* ───────────────────────────────────────────────────────────────
   GAP 6 — SVG waveform audio button
   ─────────────────────────────────────────────────────────────── */
.audio-wave { display: block; overflow: visible; }
.audio-wave polyline {
  transition: stroke 0.3s ease, filter 0.3s ease;
}
#btn-audio { padding: 0; }
#btn-audio.active .audio-wave polyline {
  stroke: var(--brass);
  filter: drop-shadow(0 0 4px rgba(201, 169, 110, 0.6));
}
#btn-audio .audio-wave polyline {
  stroke: currentColor;
}

/* ───────────────────────────────────────────────────────────────
   GAP 8 — Rotating two-layer menu ring button
   ─────────────────────────────────────────────────────────────── */
@keyframes pcm-ring-cw  { from { transform: rotate(0deg); }   to { transform: rotate(360deg); } }
@keyframes pcm-ring-ccw { from { transform: rotate(0deg); }   to { transform: rotate(-360deg); } }

#btn-menu {
  position: relative;
  width: 44px;
  height: 44px;
  overflow: visible;
  background: transparent;
  border: none;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
@media (hover: hover) {
  #btn-menu:hover .pcm-ring-1 { animation-duration: 2.4s; }
  #btn-menu:hover .pcm-ring-2 { animation-duration: 1.8s; }
  #btn-menu:hover .pcm-menu-plus { color: var(--brass); }
}
.pcm-menu-rings {
  position: relative;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.pcm-ring {
  position: absolute;
  inset: 0;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
  transform-origin: center;
}
.pcm-ring-1 { animation: pcm-ring-cw  4s linear infinite; }
.pcm-ring-2 { animation: pcm-ring-ccw 3s linear infinite; }
.pcm-menu-plus {
  position: absolute;
  color: var(--ink);
  transition: transform 0.4s var(--ease-cinema), color 0.3s ease;
  pointer-events: none;
}
.pcm-menu-plus .plus-v,
.pcm-menu-plus .plus-h {
  transform-origin: center;
  transition: transform 0.4s var(--ease-cinema);
}
.menu-open .pcm-menu-plus { transform: rotate(135deg); color: var(--brass); }
.menu-open .pcm-menu-plus .plus-v { transform: rotate(45deg); }
.menu-open .pcm-menu-plus .plus-h { transform: rotate(45deg); }
@media (prefers-reduced-motion: reduce) {
  .pcm-ring-1, .pcm-ring-2 { animation: none; }
}

/* ───────────────────────────────────────────────────────────────
   GAP 11 — Triangular SVG corner masks
   ─────────────────────────────────────────────────────────────── */
.section-triangles {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.6s var(--ease-cinema);
  mix-blend-mode: normal;
}
.section-triangles.visible { opacity: 1; }
.section-triangles polygon {
  transition: opacity 0.6s var(--ease-cinema), points 0.6s var(--ease-cinema);
}

/* ───────────────────────────────────────────────────────────────
   GAP 7 — Belt-conveyor hover text on header links
   ─────────────────────────────────────────────────────────────── */
.belt-link {
  display: inline-block;
  overflow: hidden;
  vertical-align: top;
  position: relative;
  line-height: 1.1;
}
.belt-link-inner {
  display: flex;
  transition: transform 0.55s cubic-bezier(0.215, 0.61, 0.355, 1);
  white-space: nowrap;
  will-change: transform;
}
.belt-link-inner > span {
  flex-shrink: 0;
  display: inline-block;
  text-align: left;
}
.belt-link-inner > span + span {
  margin-left: 0;
}
@media (hover: hover) {
  .belt-link:hover .belt-link-inner {
    transform: translateX(-50%);
  }
  .belt-link:hover .belt-link-inner > span:first-child {
    opacity: 0.4;
  }
  .belt-link:hover .belt-link-inner > span:last-child {
    opacity: 1;
    color: var(--brass);
  }
}
.belt-link-inner > span {
  transition: opacity 0.4s ease, color 0.4s ease;
}
.belt-link-inner > span:last-child {
  opacity: 0.4;
  color: var(--brass);
}

/* GAP 15 — mix-blend-mode: screen on chrome wordmark */
.home-mark .wordmark { mix-blend-mode: screen; }

/* ───────────────────────────────────────────────────────────────
   GAP 27 — will-change on animated elements
   ─────────────────────────────────────────────────────────────── */
.home-mark      { will-change: transform; }
.scene-copy     { will-change: transform, opacity; }
.cinema-bar     { will-change: height; }
.intro-loader   { will-change: opacity; }
.side-nav-dot   { will-change: transform; }
.progress-bar-fill { will-change: width; }

/* ───────────────────────────────────────────────────────────────
   GAP 28 — overscroll-behavior: contain on overlays
   ─────────────────────────────────────────────────────────────── */
.detail-card     { overscroll-behavior: contain; }
#menu-overlay    { overscroll-behavior: contain; }
.kbd-help-overlay{ overscroll-behavior: contain; }
.credits-modal   { overscroll-behavior: contain; }

/* ───────────────────────────────────────────────────────────────
   GAP 20 — @media (hover: hover) guards
   These selectors override prior :hover rules so they apply only
   on hover-capable devices (no sticky-hover on touch).
   ─────────────────────────────────────────────────────────────── */
@media (hover: none) and (pointer: coarse) {
  .ctrl-btn:hover,
  .mode-btn:hover,
  .side-nav-dot:hover,
  .section-btn:hover,
  .menu-overlay nav a:hover,
  .detail-card .card-close:hover,
  .pcm-footer .footer-cta:hover {
    /* Reset accidental hover sticky on touch */
    border-color: inherit;
    box-shadow: none;
    color: inherit;
    opacity: 0.5;
  }
}
@media (hover: hover) {
  .ctrl-btn:hover {
    border-color: var(--brass);
    box-shadow: 0 0 14px rgba(201, 169, 110, 0.5);
  }
  .side-nav-dot:hover .nav-num { color: var(--ink); }
  .section-btn:hover { opacity: 0.95; }
  .menu-overlay nav a:hover { color: var(--brass); }
}

/* ═══════════════════════════════════════════════════════════════
   V22.A — BATTERY TOGGLE / LOW-POWER MODE
   Reduces visual intensity when battery < 20% or user opts in
   ═══════════════════════════════════════════════════════════════ */
.low-power-mode #pcm-grain     { opacity: 0.012 !important; }
.low-power-mode .pcm-ring-1,
.low-power-mode .pcm-ring-2    { animation: none !important; }
.low-power-mode .geo-ring-outer { animation: none !important; }
.low-power-mode .geo-ring-outer::before { animation: none !important; }
/* Particles will be paused by JS; bloom halved by JS */

/* Battery indicator pill — top-right next to meta */
.battery-indicator {
  position: fixed;
  top: 18px;
  right: 160px;
  z-index: 30;
  display: none;  /* JS shows when needed */
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.22em;
  color: rgba(201,169,110,0.55);
  background: rgba(6,9,10,0.85);
  border: 1px solid rgba(201,169,110,0.18);
  padding: 4px 8px;
  pointer-events: auto;
  cursor: pointer;
  transition: opacity 0.4s ease;
  user-select: none;
}
.battery-indicator.visible { display: flex; }
.battery-indicator:hover { color: var(--brass); border-color: rgba(201,169,110,0.4); }
.battery-icon {
  display: inline-block;
  width: 14px;
  height: 7px;
  border: 1px solid currentColor;
  border-radius: 1px;
  position: relative;
  vertical-align: middle;
}
.battery-icon::after {
  content: '';
  position: absolute;
  right: -4px;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 4px;
  background: currentColor;
  border-radius: 0 1px 1px 0;
}
.battery-fill {
  position: absolute;
  left: 1px;
  top: 1px;
  bottom: 1px;
  background: rgba(201,169,110,0.4);
  border-radius: 1px;
  transition: width 1s ease;
}
.battery-fill.critical { background: rgba(255,80,50,0.6); }
@media (max-width: 768px) {
  .battery-indicator { right: 100px; }
}

/* ═══════════════════════════════════════════════════════════════
   V22.B — SUBSTEP NAV (horizontal dash step indicators)
   Seacat-style 50px × 3px dash indicators for mode sections
   ═══════════════════════════════════════════════════════════════ */
.substep-nav {
  display: none;  /* JS shows when section has modes */
  align-items: center;
  gap: 6px;
  margin-bottom: 14px;
  margin-top: -4px;
}
.substep-nav.visible { display: flex; }
.substep-dash {
  width: 34px;
  height: 2.5px;
  background: rgba(201,169,110,0.18);
  border-radius: 1px;
  cursor: pointer;
  transition: background 0.4s ease, box-shadow 0.4s ease, width 0.35s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
  flex-shrink: 0;
}
.substep-dash.active {
  background: var(--brass);
  box-shadow: 0 0 8px rgba(201,169,110,0.6), 0 0 16px rgba(201,169,110,0.25);
  width: 52px;
}
.substep-dash:hover:not(.active) {
  background: rgba(201,169,110,0.35);
}
@media (prefers-reduced-motion: reduce) {
  .substep-dash, .substep-dash.active { transition: none; }
}

/* ═══════════════════════════════════════════════════════════════
   V22.C — AUDIO VOLUME PANEL (slide-out controller)
   Seacat-level: volume slider + section atmosphere label
   ═══════════════════════════════════════════════════════════════ */
#btn-audio { position: relative; }
.audio-vol-panel {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  width: 36px;
  padding: 12px 0;
  background: rgba(6,9,10,0.95);
  border: 1px solid rgba(201,169,110,0.22);
  border-radius: 2px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.28s ease, transform 0.28s cubic-bezier(0.215,0.61,0.355,1);
  z-index: 100;
}
.audio-vol-panel.open {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
}
.audio-vol-label {
  font-family: var(--font-mono);
  font-size: 7px;
  letter-spacing: 0.22em;
  color: rgba(201,169,110,0.4);
  text-transform: uppercase;
  writing-mode: horizontal-tb;
  text-align: center;
}
.audio-vol-track {
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 80px;
  position: relative;
}
/* Vertical range input */
input[type="range"].audio-vol-range {
  -webkit-appearance: slider-vertical;
  appearance: slider-vertical;
  writing-mode: vertical-lr;
  direction: rtl;
  width: 3px;
  height: 72px;
  cursor: pointer;
  background: transparent;
  padding: 0;
  margin: 0;
  outline: none;
  border: none;
}
input[type="range"].audio-vol-range::-webkit-slider-runnable-track {
  width: 2px;
  background: rgba(201,169,110,0.18);
  border-radius: 1px;
}
input[type="range"].audio-vol-range::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--brass);
  box-shadow: 0 0 6px rgba(201,169,110,0.5);
  margin-top: -4px;
}
input[type="range"].audio-vol-range::-moz-range-track {
  width: 2px;
  background: rgba(201,169,110,0.18);
  border-radius: 1px;
}
input[type="range"].audio-vol-range::-moz-range-thumb {
  width: 10px;
  height: 10px;
  border: none;
  border-radius: 50%;
  background: var(--brass);
  box-shadow: 0 0 6px rgba(201,169,110,0.5);
}
.audio-mute-micro {
  font-family: var(--font-mono);
  font-size: 9px;
  color: rgba(201,169,110,0.35);
  cursor: pointer;
  background: none;
  border: none;
  padding: 2px;
  transition: color 0.2s;
  line-height: 1;
}
@media (hover: hover) {
  .audio-mute-micro:hover { color: var(--brass); }
}

/* ───────────────────────────────────────────────────────────────
   GAP 2 — SVG drag-to-reveal scrubber (Senior Debt section)
   ─────────────────────────────────────────────────────────────── */
.scrub-swiper {
  position: fixed;
  bottom: 140px;
  left: 50%;
  transform: translateX(-50%);
  width: min(560px, 90vw);
  height: 60px;
  display: none;
  align-items: center;
  z-index: 15;
  pointer-events: none;
}
.scrub-swiper.visible {
  display: flex;
  pointer-events: auto;
}
.scrub-track {
  position: relative;
  flex: 1;
  height: 30px;
  margin: 0 24px;
  display: flex;
  align-items: center;
}
.scrub-track-line {
  width: 100%;
  height: 1px;
  background: rgba(201, 169, 110, 0.0);
  position: relative;
}
.scrub-svg-line {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 30px;
  top: 0;
  overflow: visible;
  pointer-events: none;
}
.scrub-drag-handle {
  position: absolute;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  touch-action: none;
  z-index: 5;
  top: 50%;
  left: 0;
  transform: translate(-50%, -50%);
  transition: filter 0.3s ease;
  user-select: none;
  -webkit-user-drag: none;
}
.scrub-drag-handle:hover {
  filter: drop-shadow(0 0 10px rgba(201, 169, 110, 0.6));
}
.scrub-drag-handle.dragging {
  cursor: grabbing;
  filter: drop-shadow(0 0 14px rgba(201, 169, 110, 0.8));
}
.scrub-end-dot {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}
.scrub-label {
  position: absolute;
  top: -28px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--brass);
  opacity: 0.6;
  white-space: nowrap;
  text-transform: uppercase;
  pointer-events: none;
}
.scrub-mask-wrap {
  position: fixed;
  bottom: 220px;
  left: 50%;
  transform: translateX(-50%);
  width: min(560px, 80vw);
  overflow: hidden;
  clip-path: inset(0 100% 0 0);
  transition: clip-path 0.05s linear;
  z-index: 14;
  pointer-events: none;
}
.scrub-mask-wrap.revealed {
  clip-path: inset(0 0% 0 0);
}
.scrub-content {
  padding: 20px 28px;
  background: rgba(26, 37, 32, 0.85);
  border: 1px solid rgba(201, 169, 110, 0.2);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.scrub-progress-readout {
  position: absolute;
  top: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--brass);
  opacity: 0.55;
}

/* ───────────────────────────────────────────────────────────────
   GAP 21 — Rich right-side detail drawer
   ─────────────────────────────────────────────────────────────── */
.detail-card {
  position: fixed;
  top: 0;
  right: 0;
  left: auto;
  bottom: auto;
  width: min(520px, 90vw);
  height: 100vh;
  height: calc(var(--vh) * 100);
  max-height: none;
  max-width: none;
  z-index: 40;
  background: rgba(6, 9, 10, 0.97);
  border: none;
  border-left: 1px solid rgba(201, 169, 110, 0.25);
  padding: 0;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transform: translateX(110%);
  transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  overscroll-behavior: contain;
}
.detail-card:not(.hidden) {
  transform: translateX(0);
  display: flex;
}
.detail-card.hidden {
  transform: translateX(110%);
  display: flex;        /* still flex; hide via translate to keep transition */
  pointer-events: none;
}
.detail-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(180deg, rgba(6,9,10,1) 0%, transparent 100%);
  z-index: 2;
  pointer-events: none;
}
.detail-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 40px; bottom: 0;
  background: linear-gradient(90deg, rgba(6,9,10,0.6) 0%, transparent 100%);
  z-index: 2;
  pointer-events: none;
}
.detail-card-scrollable {
  flex: 1;
  overflow-y: auto;
  padding: 80px 40px 80px 44px;
  scrollbar-width: none;
  -ms-overflow-style: none;
  position: relative;
  z-index: 3;
}
.detail-card-scrollable::-webkit-scrollbar { display: none; width: 0; height: 0; }
.detail-scrollbar {
  position: absolute;
  right: 8px;
  top: 80px;
  bottom: 80px;
  width: 1px;
  background: rgba(201, 169, 110, 0.1);
  z-index: 4;
}
.detail-scrollbar-thumb {
  position: absolute;
  width: 1px;
  background: var(--brass);
  min-height: 40px;
  top: 0;
  left: 0;
  transition: opacity 0.2s ease;
  box-shadow: 0 0 6px rgba(201, 169, 110, 0.4);
}
.detail-card .card-close,
.detail-card > .card-close {
  position: absolute;
  top: 24px;
  left: 20px;
  z-index: 10;
  color: rgba(201, 169, 110, 0.5);
  transition: color 0.2s, transform 0.3s;
  cursor: none;
  background: none;
  border: none;
  padding: 4px;
  font-size: 12px;
  line-height: 1;
}
@media (hover: hover) {
  .detail-card .card-close:hover {
    color: var(--brass);
    transform: scale(1.1) rotate(90deg);
  }
}
.detail-card .card-meta-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: rgba(232, 220, 196, 0.4);
}
.detail-card .card-meta-row::before {
  content: '';
  display: inline-block;
  width: 14px;
  height: 1px;
  background: var(--brass);
}
.detail-card .card-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.32em;
  color: var(--brass);
  text-transform: uppercase;
  display: block;
  margin-bottom: 14px;
}
.detail-card .card-title {
  font-family: var(--font-serif);
  font-size: 36px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 0.02em;
  line-height: 1.12;
  margin: 0 0 18px;
}
.detail-card .card-rule {
  display: block;
  width: 48px;
  height: 1px;
  background: var(--brass);
  border: none;
  margin: 22px 0;
}
.detail-card .card-body {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.78;
  color: rgba(227, 238, 230, 0.84);
  margin-bottom: 28px;
}
.detail-card .card-spec-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px 28px;
  margin: 22px 0 30px;
  padding: 22px 0;
  border-top: 1px solid rgba(201, 169, 110, 0.1);
  border-bottom: 1px solid rgba(201, 169, 110, 0.1);
}
.detail-card .card-spec-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.detail-card .card-spec-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.28em;
  color: rgba(232, 220, 196, 0.4);
  text-transform: uppercase;
}
.detail-card .card-spec-value {
  font-family: var(--font-serif);
  font-size: 22px;
  color: var(--brass);
  letter-spacing: 0.02em;
}
.detail-card .card-cta {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-top: 14px;
  padding: 12px 0;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.28em;
  color: var(--brass);
  text-transform: uppercase;
  border: none;
  background: transparent;
  cursor: none;
  position: relative;
}
.detail-card .card-cta::after {
  content: '';
  position: absolute;
  bottom: 4px; left: 0;
  width: 100%; height: 1px;
  background: var(--brass);
  transform: scaleX(0.4);
  transform-origin: 0% 50%;
  transition: transform 0.4s var(--ease-cinema);
}
@media (hover: hover) {
  .detail-card .card-cta:hover::after { transform: scaleX(1); }
}

/* ───────────────────────────────────────────────────────────────
   GAP 25 — V18 seacat-level footer
   Full expandable footer: thin strip in all sections, full
   content on Engage (section 9). Matches seacat height/layout.
   ─────────────────────────────────────────────────────────────── */
.pcm-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 18;
  height: 56px;
  background: linear-gradient(to top, rgba(6,9,10,0.94) 0%, rgba(6,9,10,0) 100%);
  pointer-events: none;
  overflow: hidden;
  transition: height 0.85s cubic-bezier(0.215,0.61,0.355,1),
              background-color 0.85s ease;
  will-change: height;
}
.pcm-footer.is-engage {
  height: 290px;
  background: rgba(6,9,10,0.97);
}

/* ── Thin strip — always at the bottom ─── */
.footer-strip {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 56px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 var(--margin,60px);
  pointer-events: auto;
  z-index: 2;
}
.footer-strip-left {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(227,238,230,0.28);
  text-transform: uppercase;
}
.footer-strip-left a {
  color: inherit;
  text-decoration: none;
  transition: color 0.3s;
}
@media (hover:hover) {
  .footer-strip-left a:hover { color: var(--brass); }
}
.footer-strip-center {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: rgba(201,169,110,0.5);
  text-transform: uppercase;
  text-align: center;
}
.footer-strip-right {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: rgba(201,169,110,0.35);
  text-transform: uppercase;
  text-align: right;
}

/* ── Full expanded area — visible only on Engage ─── */
.footer-full {
  position: absolute;
  top: 0; left: 0; right: 0;
  bottom: 56px; /* sits above the strip */
  padding: 36px var(--margin,60px) 22px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0s ease 0s, transform 0s ease 0s;
  pointer-events: none;
}
.pcm-footer.is-engage .footer-full {
  opacity: 1;
  transform: translateY(0);
  transition: opacity 0.6s ease 0.28s, transform 0.6s cubic-bezier(0.215,0.61,0.355,1) 0.28s;
  pointer-events: auto;
}

/* Top row: brand left, CTA right */
.footer-full-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 40px;
}
.footer-brand-block {
  flex: 0 0 auto;
}
.footer-brand-name {
  font-family: var(--font-serif);
  font-size: clamp(26px, 3.2vw, 42px);
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--ink);
  line-height: 1.05;
  margin-bottom: 9px;
}
.footer-brand-tagline {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.32em;
  color: rgba(201,169,110,0.48);
  text-transform: uppercase;
  line-height: 1.7;
}

/* Footer CTA block */
.footer-cta-block {
  text-align: right;
  flex: 0 0 auto;
  align-self: flex-end;
}
.footer-cta {
  font-family: var(--font-serif);
  font-size: clamp(20px, 2.4vw, 32px);
  letter-spacing: 0.08em;
  color: var(--brass);
  text-decoration: none;
  background: none;
  border: none;
  cursor: none;
  position: relative;
  display: inline-block;
  padding-bottom: 4px;
  transition: color 0.3s;
}
/* Dotted underline — always present */
.footer-cta::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  border-bottom: 1px dotted rgba(201,169,110,0.32);
}
/* Solid brass underline — slides in on hover */
.footer-cta::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: var(--brass);
  box-shadow: 0 0 10px rgba(201,169,110,0.45);
  transform: scaleX(0);
  transform-origin: 0% 50%;
  transition: transform 0.42s cubic-bezier(0.215,0.61,0.355,1);
}
@media (hover:hover) {
  .footer-cta:hover { color: var(--coin-gold); }
  .footer-cta:hover::after { transform: scaleX(1); }
}
.footer-cta-email {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.28em;
  color: rgba(201,169,110,0.38);
  text-transform: uppercase;
  margin-top: 9px;
  text-align: right;
}

/* Bottom row: copyright left, links right */
.footer-full-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid rgba(201,169,110,0.12);
  padding-top: 14px;
  margin-top: 12px;
}
.footer-copy {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: rgba(227,238,230,0.26);
  text-transform: uppercase;
  line-height: 1.6;
}
.footer-copy a {
  color: inherit;
  text-decoration: none;
  transition: color 0.3s;
}
@media (hover:hover) {
  .footer-copy a:hover { color: var(--brass); }
}
.footer-links {
  display: flex;
  gap: 24px;
  align-items: center;
}
.footer-social-link {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: rgba(201,169,110,0.42);
  text-transform: uppercase;
  text-decoration: none;
  cursor: none;
  transition: color 0.3s;
  position: relative;
}
.footer-social-link::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0; right: 0;
  height: 1px;
  background: var(--brass);
  transform: scaleX(0);
  transform-origin: 0% 50%;
  transition: transform 0.35s cubic-bezier(0.215,0.61,0.355,1);
}
@media (hover:hover) {
  .footer-social-link:hover { color: var(--brass); }
  .footer-social-link:hover::after { transform: scaleX(1); }
}
.footer-credits-btn {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: rgba(201,169,110,0.42);
  text-transform: uppercase;
  background: none;
  border: none;
  cursor: none;
  padding: 0;
  transition: color 0.3s;
}
@media (hover:hover) {
  .footer-credits-btn:hover { color: var(--brass); }
}

/* Responsive */
@media (max-width: 900px) {
  .pcm-footer.is-engage { height: 260px; }
  .footer-full { padding: 28px 32px 18px; }
  .footer-brand-name { font-size: 22px; }
  .footer-cta { font-size: 20px; }
  .footer-strip { padding: 0 32px; }
}
@media (max-width: 600px) {
  .pcm-footer.is-engage { height: 280px; }
  .footer-full-top { flex-direction: column; gap: 20px; }
  .footer-cta-block { text-align: left; align-self: auto; }
  .footer-cta-email { text-align: left; }
  .footer-full-bottom { flex-direction: column; gap: 12px; align-items: flex-start; }
  .footer-strip-center,
  .footer-strip-right { display: none; }
  .footer-strip { grid-template-columns: 1fr; }
}

/* ───────────────────────────────────────────────────────────────
   GAP 31 / supplemental — Make controls cluster horizontal at bottom
   and elevate the menu ring button distinctly
   ─────────────────────────────────────────────────────────────── */
.controls-cluster .ctrl-btn {
  width: 36px;
  height: 36px;
}
.controls-cluster #btn-menu {
  width: 44px;
  height: 44px;
  background: transparent;
  border: none;
}
@media (hover: hover) {
  .controls-cluster #btn-menu:hover {
    box-shadow: none;
    border: none;
  }
}

/* ───────────────────────────────────────────────────────────────
   GAP 30 — Cinema bar accents
   ─────────────────────────────────────────────────────────────── */
.cinema-bar {
  background:
    linear-gradient(180deg, rgba(6,9,10,1) 0%, rgba(6,9,10,0.85) 100%);
}
.cinema-bar--top::after,
.cinema-bar-top::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(201,169,110,0.4) 50%, transparent 100%);
  opacity: 0;
  transition: opacity 0.4s var(--ease-cinema);
}
.cinema-bar--bottom::before,
.cinema-bar-bottom::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(201,169,110,0.4) 50%, transparent 100%);
  opacity: 0;
  transition: opacity 0.4s var(--ease-cinema);
}
body.transitioning .cinema-bar--top::after,
body.transitioning .cinema-bar-top::after,
body.transitioning .cinema-bar--bottom::before,
body.transitioning .cinema-bar-bottom::before {
  opacity: 1;
}

/* ───────────────────────────────────────────────────────────────
   Mobile / Responsive
   ─────────────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .home-mark { top: 18px; left: var(--margin); }
  .top-section-meta { top: 18px; right: var(--margin); }
  .side-nav { right: 14px; gap: 10px; }
  .controls-cluster { right: 14px; bottom: 64px; gap: 8px; }
  .kbd-hints { display: none; }
  .scene-copy { padding: 0 var(--margin); }
  .scene-copy .main-title { font-size: clamp(2rem, 8vw, 3.4rem); }
  .detail-card { width: 100vw; max-width: 100vw; border-left: none; }
  .detail-card-scrollable { padding: 70px 24px 80px 28px; }
}

/* ───────────────────────────────────────────────────────────────
   Focus visibility (a11y)
   ─────────────────────────────────────────────────────────────── */
button:focus-visible,
a:focus-visible,
[role="button"]:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  outline: 2px solid var(--brass);
  outline-offset: 3px;
  box-shadow: 0 0 0 4px rgba(201, 169, 110, 0.15);
}

/* ───────────────────────────────────────────────────────────────
   Print
   ─────────────────────────────────────────────────────────────── */
@media print {
  body { background: white; color: black; }
  #canvas-host, .controls-cluster, .side-nav, .bottom-menu,
  .cinema-bar, .kbd-hints, .vignette, .section-triangles {
    display: none !important;
  }
}

/* ═══════════════════════════════════════════════════════════════
   V15 — REMAINING SEACAT GAPS: HYBRID SCROLL, SPLIT PANEL,
   EXECUTION STAGES, ENGAGE CINEMATIC, LANDSCAPE SVG
   ═══════════════════════════════════════════════════════════════ */

/* ───────────────────────────────────────────────────────────────
   GAP 5/23 — EXECUTION STAGES: Hybrid vertical-scroll section
   5 stages revealed sequentially as user scrolls within section
   ─────────────────────────────────────────────────────────────── */
.execution-stage-host {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: min(700px, 88vw);
  z-index: 14;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.7s var(--ease-cinema);
}
.execution-stage-host.visible {
  opacity: 1;
  pointer-events: auto;
}
.exec-stages-title {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.38em;
  color: rgba(201,169,110,0.45);
  text-transform: uppercase;
  margin-bottom: 28px;
  text-align: center;
}
.exec-stage-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.exec-stage-row {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  padding: 20px 0;
  border-top: 1px solid rgba(201,169,110,0.08);
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 0.65s cubic-bezier(0.16,1,0.3,1),
              transform 0.65s cubic-bezier(0.16,1,0.3,1),
              border-color 0.65s;
  position: relative;
}
.exec-stage-row:last-child {
  border-bottom: 1px solid rgba(201,169,110,0.08);
}
.exec-stage-row.revealed {
  opacity: 1;
  transform: translateY(0);
  border-top-color: rgba(201,169,110,0.18);
}
.exec-stage-row.revealed + .exec-stage-row {
  border-top-color: rgba(201,169,110,0.18);
}
.exec-stage-num-badge {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid rgba(201,169,110,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  color: rgba(201,169,110,0.5);
  transition: background 0.5s, border-color 0.5s, color 0.5s, box-shadow 0.5s;
}
.exec-stage-row.active .exec-stage-num-badge {
  background: var(--brass);
  border-color: var(--brass);
  color: #06090a;
  box-shadow: 0 0 14px var(--brass), 0 0 28px rgba(201,169,110,0.3);
}
.exec-stage-row.passed .exec-stage-num-badge {
  background: rgba(201,169,110,0.2);
  border-color: rgba(201,169,110,0.4);
  color: rgba(201,169,110,0.7);
}
.exec-stage-content h3 {
  font-family: var(--font-serif);
  font-size: clamp(1rem, 2vw, 1.35rem);
  font-weight: 400;
  color: rgba(227,238,230,0.5);
  letter-spacing: 0.1em;
  margin: 0 0 5px;
  transition: color 0.5s;
}
.exec-stage-row.active .exec-stage-content h3,
.exec-stage-row.passed .exec-stage-content h3 {
  color: var(--ink);
}
.exec-stage-content p {
  font-family: var(--font-body);
  font-size: 12px;
  color: rgba(227,238,230,0.35);
  line-height: 1.7;
  margin: 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.6s cubic-bezier(0.16,1,0.3,1),
              color 0.5s,
              opacity 0.5s;
  opacity: 0;
}
.exec-stage-row.active .exec-stage-content p,
.exec-stage-row.passed .exec-stage-content p {
  max-height: 80px;
  opacity: 1;
  color: rgba(227,238,230,0.6);
}
/* Connector line trace between stages */
.exec-stage-connector {
  position: absolute;
  left: 32px;
  top: 49px;
  width: 1px;
  height: calc(100% - 10px);
  background: rgba(201,169,110,0.08);
  overflow: hidden;
}
.exec-stage-connector::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 0%;
  background: linear-gradient(180deg, var(--brass), rgba(201,169,110,0.3));
  box-shadow: 0 0 6px rgba(201,169,110,0.4);
  transition: height 0.7s cubic-bezier(0.16,1,0.3,1);
}
.exec-stage-row.passed .exec-stage-connector::after,
.exec-stage-row.active .exec-stage-connector::after {
  height: 100%;
}

/* ─────────────────────────────────────────────
   CONNECTOR SVG — traveling brass trace
   ───────────────────────────────────────────── */
#exec-connector-svg {
  position: absolute;
  left: 0;
  top: 0;
  pointer-events: none;
  z-index: 3;
  overflow: visible;
}
/* Glow dot pulse */
@keyframes cvDotBreath {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.72; }
}
#exec-cv-dot-group circle {
  transform-box: fill-box;
  transform-origin: center;
  animation: cvDotBreath 2.4s ease-in-out infinite;
}
/* Pulse ring expand */
@keyframes cvRingExpand {
  0%   { transform: scale(1);   opacity: 0.45; }
  100% { transform: scale(2.2); opacity: 0; }
}
.cv-pulse-ring {
  transform-box: fill-box;
  transform-origin: center;
  animation: cvRingExpand 2s ease-out infinite;
}

/* ───────────────────────────────────────────────────────────────
   GAP 22 — SPLIT PANEL: Right-column visual for mode sections
   ─────────────────────────────────────────────────────────────── */
.section-visual-panel {
  position: fixed;
  right: 0;
  top: 0;
  bottom: 70px;
  width: 48%;
  z-index: 6;
  pointer-events: none;
  opacity: 0;
  transform: translateX(24px);
  transition: opacity 0.9s var(--ease-cinema), transform 0.9s var(--ease-cinema);
  display: flex;
  align-items: center;
  justify-content: center;
}
.section-visual-panel.visible {
  opacity: 1;
  transform: translateX(0);
}
/* Left-edge separator */
.section-visual-panel::before {
  content: '';
  position: absolute;
  left: 0; top: 15%; bottom: 15%;
  width: 1px;
  background: linear-gradient(180deg, transparent 0%, rgba(201,169,110,0.12) 50%, transparent 100%);
}
.visual-panel-inner {
  width: min(320px, 90%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}
.visual-panel-large-stat {
  text-align: center;
}
.vp-stat-val {
  font-family: var(--font-serif);
  font-size: clamp(3rem, 5vw, 5.5rem);
  font-weight: 300;
  color: var(--brass);
  letter-spacing: 0.05em;
  line-height: 1;
  opacity: 0.85;
}
.vp-stat-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.38em;
  color: rgba(232,220,196,0.35);
  text-transform: uppercase;
  margin-top: 8px;
}
.vp-divider {
  width: 1px;
  height: 40px;
  background: linear-gradient(180deg, rgba(201,169,110,0.3), transparent);
}
.vp-mode-indicator {
  display: flex;
  gap: 8px;
  align-items: center;
}
.vp-mode-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(201,169,110,0.2);
  border: 1px solid rgba(201,169,110,0.3);
  transition: all 0.4s;
}
.vp-mode-dot.active {
  background: var(--brass);
  box-shadow: 0 0 8px rgba(201,169,110,0.5);
  transform: scale(1.5);
}
.vp-geo-shape {
  width: 120px;
  height: 120px;
  border: 1px solid rgba(201,169,110,0.1);
  border-radius: 50%;
  position: relative;
  animation: slowSpin 18s linear infinite;
}
.vp-geo-shape::before {
  content: '';
  position: absolute;
  inset: 12px;
  border: 1px solid rgba(201,169,110,0.06);
  border-radius: 50%;
  animation: slowSpin 12s linear infinite reverse;
}
.vp-geo-shape::after {
  content: '';
  position: absolute;
  inset: 28px;
  border: 1px solid rgba(201,169,110,0.15);
  border-radius: 50%;
  animation: slowSpin 8s linear infinite;
}
@keyframes slowSpin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
/* Narrow viewport: hide split panel */
@media (max-width: 900px) {
  .section-visual-panel { display: none; }
}

/* ───────────────────────────────────────────────────────────────
   GAP 24 — LANDSCAPE GATE: SVG phone rotation graphic
   ─────────────────────────────────────────────────────────────── */
.landscape-gate__svg-wrap {
  position: relative;
  width: 140px;
  height: 140px;
  margin: 0 auto 20px;
}
.phone-svg-group {
  transform-origin: 70px 70px;
  animation: phoneRotateAnim 3.4s cubic-bezier(0.4,0,0.2,1) infinite;
}
@keyframes phoneRotateAnim {
  0%   { transform: rotate(0deg); }
  25%  { transform: rotate(0deg); }
  60%  { transform: rotate(-90deg); }
  85%  { transform: rotate(-90deg); }
  100% { transform: rotate(0deg); }
}
.rotate-arc {
  transform-origin: 70px 70px;
  animation: arcDashAnim 3.4s cubic-bezier(0.4,0,0.2,1) infinite;
}
@keyframes arcDashAnim {
  0%   { opacity: 0.3; }
  25%  { opacity: 0.3; }
  42%  { opacity: 1; }
  60%  { opacity: 0.3; }
  100% { opacity: 0.3; }
}

/* ───────────────────────────────────────────────────────────────
   GAP ENGAGE — Full cinematic contact experience
   ─────────────────────────────────────────────────────────────── */
.engage-cinematic {
  position: fixed;
  inset: 0;
  z-index: 13;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.8s var(--ease-cinema);
}
.engage-cinematic.visible {
  opacity: 1;
  pointer-events: auto;
}
.engage-two-col {
  display: flex;
  width: min(900px, 92vw);
  gap: 0;
  height: min(620px, 85vh);
}
.engage-left-col {
  flex: 0 0 42%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 48px 44px 48px 0;
  border-right: 1px solid rgba(201,169,110,0.12);
  position: relative;
}
.engage-right-col {
  flex: 1;
  padding: 48px 0 48px 44px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow-y: auto;
  /* Custom scrollbar */
  scrollbar-width: thin;
  scrollbar-color: rgba(201,169,110,0.3) transparent;
}
.engage-right-col::-webkit-scrollbar { width: 2px; }
.engage-right-col::-webkit-scrollbar-track { background: transparent; }
.engage-right-col::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.3); }
.engage-section-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.38em;
  color: rgba(201,169,110,0.45);
  text-transform: uppercase;
  margin-bottom: 18px;
}
.engage-headline {
  font-family: var(--font-serif);
  font-size: clamp(1.8rem, 3.5vw, 3rem);
  font-weight: 300;
  color: var(--ink);
  letter-spacing: 0.08em;
  line-height: 1.25;
  margin: 0 0 16px;
}
.engage-brass-rule {
  width: 28px;
  height: 1px;
  background: var(--brass);
  margin: 20px 0;
  box-shadow: 0 0 10px rgba(201,169,110,0.5);
}
.engage-descriptor {
  font-family: var(--font-body);
  font-size: 13px;
  color: rgba(227,238,230,0.5);
  line-height: 1.8;
  margin: 0 0 28px;
}
.engage-direct-contact {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.engage-direct-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.3em;
  color: rgba(201,169,110,0.35);
  text-transform: uppercase;
}
.engage-direct-email {
  font-family: var(--font-body);
  font-size: 13px;
  color: rgba(201,169,110,0.7);
  text-decoration: none;
  letter-spacing: 0.02em;
  position: relative;
  display: inline-block;
  transition: color 0.3s;
}
.engage-direct-email::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0; right: 0;
  height: 1px;
  background: var(--brass);
  transform: scaleX(0);
  transform-origin: 0%;
  transition: transform 0.4s cubic-bezier(0.215,0.61,0.355,1);
}
@media (hover: hover) {
  .engage-direct-email:hover { color: var(--brass); }
  .engage-direct-email:hover::after { transform: scaleX(1); }
}
/* Form within right col */
.engage-form-v2 {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.engage-field-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.3em;
  color: rgba(201,169,110,0.4);
  text-transform: uppercase;
  margin-bottom: 4px;
  display: block;
}
.engage-input-v2 {
  width: 100%;
  box-sizing: border-box;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(201,169,110,0.15);
  padding: 8px 0;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.3s;
}
.engage-input-v2:focus { border-bottom-color: rgba(201,169,110,0.5); }
.engage-input-v2::placeholder {
  color: rgba(227,238,230,0.2);
  font-family: var(--font-body);
  font-size: 12px;
}
select.engage-input-v2 option { background: #0f1814; color: var(--ink); }
textarea.engage-input-v2 { resize: none; line-height: 1.6; }
.engage-submit-v2 {
  margin-top: 4px;
  background: transparent;
  border: 1px solid rgba(201,169,110,0.25);
  padding: 13px 28px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--brass);
  text-transform: uppercase;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  align-self: flex-start;
  transition: border-color 0.3s, color 0.3s;
}
.engage-submit-v2::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(201,169,110,0.1);
  transform: scaleX(0);
  transform-origin: 0%;
  transition: transform 0.4s cubic-bezier(0.215,0.61,0.355,1);
  z-index: -1;
}
@media (hover: hover) {
  .engage-submit-v2:hover { border-color: rgba(201,169,110,0.5); }
  .engage-submit-v2:hover::after { transform: scaleX(1); }
}
.engage-status-v2 {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--brass);
  min-height: 18px;
}
@media (max-width: 700px) {
  .engage-two-col { flex-direction: column; height: auto; }
  .engage-left-col { flex: none; padding: 32px 0 24px; border-right: none; border-bottom: 1px solid rgba(201,169,110,0.12); }
  .engage-right-col { padding: 24px 0 32px; }
}

/* ───────────────────────────────────────────────────────────────
   GAP 17 — FIRM OVERVIEW: Parallax image reveal block
   ─────────────────────────────────────────────────────────────── */
.parallax-reveal-host {
  position: fixed;
  right: 60px;
  top: 50%;
  transform: translateY(-50%);
  width: 280px;
  z-index: 6;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.9s var(--ease-cinema);
}
.parallax-reveal-host.visible {
  opacity: 1;
}
.parallax-clip-wrap {
  width: 100%;
  overflow: hidden;
  position: relative;
  border-left: 1px solid rgba(201,169,110,0.12);
}
.parallax-inner {
  width: 100%;
  transform: translateY(0);
  transition: transform 0.1s linear;
  will-change: transform;
}
/* PCM brand illustration for Firm Overview */
.pcm-brand-geo {
  width: 100%;
  aspect-ratio: 3/4;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 32px;
  box-sizing: border-box;
  background:
    radial-gradient(ellipse 60% 40% at 50% 40%, rgba(45,62,54,0.4) 0%, transparent 70%),
    linear-gradient(180deg, rgba(15,24,20,0.6) 0%, rgba(6,9,10,0.2) 100%);
}
.geo-ring-outer {
  width: 140px;
  height: 140px;
  border: 1px solid rgba(201,169,110,0.2);
  border-radius: 50%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: slowSpin 20s linear infinite;
}
.geo-ring-outer::before {
  content: '';
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(201,169,110,0.08);
  border-radius: 50%;
  animation: slowSpin 14s linear infinite reverse;
}
.geo-pcm-monogram {
  position: absolute;
  font-family: var(--font-serif);
  font-size: 28px;
  font-weight: 400;
  letter-spacing: 0.3em;
  color: rgba(201,169,110,0.6);
  animation: none;
  transform: rotate(0deg);
}
/* Override parent spin for the monogram */
.geo-ring-outer .geo-pcm-monogram {
  animation: counterSpin 20s linear infinite;
}
@keyframes counterSpin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(-360deg); }
}
.geo-tagline {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.38em;
  color: rgba(201,169,110,0.3);
  text-transform: uppercase;
  text-align: center;
}
.geo-hairline {
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,0.3), transparent);
}
.geo-stats {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
}
.geo-stat-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid rgba(201,169,110,0.06);
}
.geo-stat-val {
  font-family: var(--font-serif);
  font-size: 15px;
  color: var(--brass);
  font-weight: 400;
}
.geo-stat-lbl {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.22em;
  color: rgba(227,238,230,0.35);
  text-transform: uppercase;
  align-self: center;
}
@media (max-width: 900px) {
  .parallax-reveal-host { display: none; }
}

/* ── Section End Indicator (v24) ─────────────────────────── */
.section-end-indicator {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.6s ease;
  z-index: 10;
}
.section-end-indicator.visible {
  opacity: 1;
}
.section-end-indicator .sei-label {
  font-family: var(--font-mono, 'Space Mono', monospace);
  font-size: 9px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: rgba(201,169,110,0.55);
}
.section-end-indicator .sei-arrow {
  width: 14px;
  height: 14px;
  animation: sei-pulse 1.6s ease-in-out infinite;
}
.section-end-indicator .sei-arrow path {
  fill: none;
  stroke: rgba(201,169,110,0.55);
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}
@keyframes sei-pulse {
  0%, 100% { transform: translateY(0); opacity: 0.55; }
  50%       { transform: translateY(3px); opacity: 1; }
}
/* ── Per-Section Geometric Accent (v24) ─────────────────── */

/* ═══════════════════════════════════════════════════
   V24 — CAPITAL STACK VISUALIZATION
   Fixed right-side panel, sections 3-5
   ═══════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════
   V24 — PCM DATA TICKER (horizontal scrolling strip)
   ═══════════════════════════════════════════════════ */
.pcm-data-ticker {
  position: fixed;
  bottom: 82px;       /* Above bottom menu */
  left: 0;
  right: 0;
  height: 22px;
  z-index: 18;
  overflow: hidden;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1.2s ease;
}
.pcm-data-ticker.visible {
  opacity: 1;
}
.ticker-track {
  display: flex;
  gap: 0;
  width: max-content;
  height: 100%;
  align-items: center;
  animation: tickerScroll 44s linear infinite;
}
@keyframes tickerScroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
.ticker-item {
  display: inline-flex;
  align-items: center;
  white-space: nowrap;
  padding: 0 28px;
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.22em;
  color: rgba(201,169,110,0.28);
  text-transform: uppercase;
}
.ticker-item strong {
  color: rgba(201,169,110,0.5);
  font-weight: 700;
  margin-right: 6px;
}
.ticker-sep {
  display: inline-block;
  width: 1px;
  height: 10px;
  background: rgba(201,169,110,0.12);
  margin: 0 2px;
  vertical-align: middle;
}
.ticker-hairline {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,0.08) 30%, rgba(201,169,110,0.08) 70%, transparent);
}
@media (max-width: 640px) {
  .pcm-data-ticker { display: none; }
}

.cap-stack-host {
  position: fixed;
  right: 48px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 8;
  width: 160px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.8s ease;
}
.cap-stack-host.visible {

  <!-- Geometric Accent Layer (v24) -->
  <svg id="geo-accent-svg" class="geo-accent" xmlns="http://www.w3.org/2000/svg"
    width="300" height="300" viewBox="0 0 300 300"
    aria-hidden="true" role="presentation">
    <g id="geo-accent-group"></g>
  </svg>
  <script>
  (function() {
    // Geometric patterns per section index
    // 0: Home     — concentric circles (top-right)
    // 3: Senior   — grid of dots (top-left)
    // 4: Sub Cap  — diagonal lines (bottom-right)
    // 5: Equity   — radial lines (top-left)
    var GEO_PATTERNS = {
      // 0: Home — concentric rings top-right (brass orbital resonance)
      0: {
        pos: { right:'0', top:'0', left:'', bottom:'' }, opacity: 0.10,
        render: function() {
          var s = '';
          for (var r = 20; r <= 180; r += 22) {
            var op = (0.5 - r/400).toFixed(2);
            s += '<circle cx="300" cy="0" r="' + r + '" fill="none" stroke="#C9A96E" stroke-width="0.8" opacity="' + op + '"/>';
          }
          return s;
        }
      },
      // 1: Firm Overview — diagonal cross-hatch bottom-left
      1: {
        pos: { left:'0', bottom:'0', right:'', top:'' }, opacity: 0.07,
        render: function() {
          var s = '';
          for (var i = -4; i < 14; i++) {
            var o = i * 22;
            s += '<line x1="' + o + '" y1="0" x2="' + (o + 220) + '" y2="220" stroke="#C9A96E" stroke-width="0.6"/>';
            s += '<line x1="' + (o + 220) + '" y1="0" x2="' + o + '" y2="220" stroke="#C9A96E" stroke-width="0.6"/>';
          }
          return s;
        }
      },
      // 2: Platform Edge — hex grid top-right
      2: {
        pos: { right:'0', top:'0', left:'', bottom:'' }, opacity: 0.08,
        render: function() {
          var s = '';
          var pi = Math.PI;
          function hex(cx, cy, r) {
            var pts = [];
            for (var a = 0; a < 6; a++) {
              var ang = (pi / 3) * a - pi / 6;
              pts.push((cx + r * Math.cos(ang)).toFixed(1) + ',' + (cy + r * Math.sin(ang)).toFixed(1));
            }
            return '<polygon points="' + pts.join(' ') + '" fill="none" stroke="#C9A96E" stroke-width="0.6"/>';
          }
          var rows = 5, cols = 5, r = 22;
          for (var row = 0; row < rows; row++) {
            for (var col = 0; col < cols; col++) {
              var cx = 20 + col * (r * 1.73);
              var cy = 20 + row * (r * 2) + (col % 2) * r;
              s += hex(cx, cy, r);
            }
          }
          return s;
        }
      },
      // 3: Senior Debt — dot grid top-left (existing, enhanced)
      3: {
        pos: { left:'0', top:'0', right:'', bottom:'' }, opacity: 0.08,
        render: function() {
          var s = '';
          for (var row = 0; row < 8; row++) {
            for (var col = 0; col < 8; col++) {
              var op = (1 - (row + col) / 16).toFixed(2);
              s += '<circle cx="' + (16 + col*28) + '" cy="' + (16 + row*28) + '" r="' + (row === 0 && col === 0 ? 3.5 : 2) + '" fill="#C9A96E" opacity="' + op + '"/>';
            }
          }
          return s;
        }
      },
      // 4: Sub Capital — diagonal lines bottom-right (existing, enhanced)
      4: {
        pos: { right:'0', bottom:'0', left:'', top:'' }, opacity: 0.09,
        render: function() {
          var s = '';
          for (var i = 0; i < 14; i++) {
            var offset = i * 22;
            var op = (0.8 - i * 0.04).toFixed(2);
            s += '<line x1="' + (offset - 20) + '" y1="300" x2="' + (offset + 130) + '" y2="0" stroke="#C9A96E" stroke-width="0.7" opacity="' + op + '"/>';
          }
          return s;
        }
      },
      // 5: Equity — radial spokes top-left (existing, enhanced)
      5: {
        pos: { left:'0', top:'0', right:'', bottom:'' }, opacity: 0.12,
        render: function() {
          var s = '';
          var pi = Math.PI;
          // Outer full-opacity ring
          s += '<circle cx="0" cy="0" r="180" fill="none" stroke="#C9A96E" stroke-width="0.5" opacity="0.2"/>';
          for (var a = 0; a < 360; a += 15) {
            var rad = a * pi / 180;
            var r1 = 30, r2 = 200;
            s += '<line x1="' + (r1*Math.cos(rad)).toFixed(1) + '" y1="' + (r1*Math.sin(rad)).toFixed(1) + '" x2="' + (r2*Math.cos(rad)).toFixed(1) + '" y2="' + (r2*Math.sin(rad)).toFixed(1) + '" stroke="#C9A96E" stroke-width="0.6"/>';
          }
          return s;
        }
      },
      // 6: Execution — flowing wave / process dots bottom-left
      6: {
        pos: { left:'0', bottom:'0', right:'', top:'' }, opacity: 0.09,
        render: function() {
          var s = '';
          var pi = Math.PI;
          for (var wave = 0; wave < 5; wave++) {
            var points = '';
            for (var x = 0; x <= 260; x += 8) {
              var y = 80 + wave * 18 + Math.sin(x / 36 + wave * 0.8) * 12;
              points += x + ',' + y.toFixed(1) + ' ';
            }
            s += '<polyline points="' + points.trim() + '" fill="none" stroke="#C9A96E" stroke-width="0.6" opacity="' + (0.5 - wave * 0.08).toFixed(2) + '"/>';
          }
          // Stage dots
          for (var d = 0; d < 5; d++) {
            s += '<circle cx="' + (30 + d * 50) + '" cy="' + (40 + Math.sin(d * 1.2) * 8) + '" r="3.5" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.6"/>';
          }
          return s;
        }
      },
      // 7: Underwriting — grid / data visualization top-right
      7: {
        pos: { right:'0', top:'0', left:'', bottom:'' }, opacity: 0.10,
        render: function() {
          var s = '';
          // Grid lines
          for (var gx = 0; gx < 260; gx += 26) {
            s += '<line x1="' + gx + '" y1="0" x2="' + gx + '" y2="260" stroke="#C9A96E" stroke-width="0.4" opacity="0.3"/>';
          }
          for (var gy = 0; gy < 260; gy += 26) {
            s += '<line x1="0" y1="' + gy + '" x2="260" y2="' + gy + '" stroke="#C9A96E" stroke-width="0.4" opacity="0.3"/>';
          }
          // Stress curve (parabolic arc)
          var pts = '';
          for (var xi = 0; xi <= 250; xi += 5) {
            var yi = 240 - (xi / 250) * (xi / 250) * 220;
            pts += xi + ',' + yi.toFixed(1) + ' ';
          }
          s += '<polyline points="' + pts.trim() + '" fill="none" stroke="#C9A96E" stroke-width="1.2" opacity="0.8"/>';
          // Threshold line
          s += '<line x1="0" y1="140" x2="260" y2="140" stroke="#C9A96E" stroke-width="0.7" stroke-dasharray="6 4" opacity="0.5"/>';
          s += '<text x="4" y="134" font-family="Space Mono" font-size="8" fill="#C9A96E" opacity="0.6">1.20×</text>';
          return s;
        }
      },
      // 8: Compliance — institutional seal / concentric squares bottom-right
      8: {
        pos: { right:'0', bottom:'0', left:'', top:'' }, opacity: 0.09,
        render: function() {
          var s = '';
          // Concentric squares
          for (var sq = 0; sq < 6; sq++) {
            var size = 40 + sq * 30;
            var x = 260 - size; var y = 260 - size;
            s += '<rect x="' + x + '" y="' + y + '" width="' + size + '" height="' + size + '" fill="none" stroke="#C9A96E" stroke-width="0.6" opacity="' + (0.6 - sq * 0.08).toFixed(2) + '"/>';
          }
          // Shield outline in center of squares
          s += '<path d="M 220,160 L 260,180 L 260,240 Q 240,260 220,260 Q 200,260 180,240 L 180,180 Z" fill="none" stroke="#C9A96E" stroke-width="0.8" opacity="0.5"/>';
          return s;
        }
      },
      // 9: Engage — radiating signal / broadcast top-left
      9: {
        pos: { left:'0', top:'0', right:'', bottom:'' }, opacity: 0.11,
        render: function() {
          var s = '';
          var pi = Math.PI;
          var cx = 0, cy = 0;
          // Radiating arcs
          for (var arc = 1; arc <= 6; arc++) {
            var r = arc * 30;
            var op = (0.7 - arc * 0.08).toFixed(2);
            s += '<path d="M ' + (cx + r * Math.cos(pi * 0.1)).toFixed(1) + ',' + (cy + r * Math.sin(pi * 0.1)).toFixed(1) + ' A ' + r + ',' + r + ' 0 0 1 ' + (cx + r * Math.cos(pi * 0.9)).toFixed(1) + ',' + (cy + r * Math.sin(pi * 0.9)).toFixed(1) + '" fill="none" stroke="#C9A96E" stroke-width="0.7" opacity="' + op + '"/>';
          }
          // Signal dot
          s += '<circle cx="' + cx + '" cy="' + cy + '" r="4" fill="#C9A96E" opacity="0.7"/>';
          return s;
        }
      }
    };

    window._updateGeoAccent = function(idx) {
      var svg = document.getElementById('geo-accent-svg');
      var grp = document.getElementById('geo-accent-group');
      if (!svg || !grp) return;

      var pat = GEO_PATTERNS[idx];
      if (!pat) {
        svg.classList.remove('visible');
        return;
      }

      // Apply position
      var pos = pat.pos;
      svg.style.right  = pos.right  !== undefined ? pos.right  : '';
      svg.style.left   = pos.left   !== undefined ? pos.left   : '';
      svg.style.top    = pos.top    !== undefined ? pos.top    : '';
      svg.style.bottom = pos.bottom !== undefined ? pos.bottom : '';

      // Render SVG pattern
      grp.innerHTML = pat.render();

      // Fade transition: remove visible, then re-add after a frame
      svg.classList.remove('visible');
      svg.style.opacity = '';
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          svg.style.opacity = pat.opacity;
          svg.classList.add('visible');
        });
      });
    };
  })();
  </script>
