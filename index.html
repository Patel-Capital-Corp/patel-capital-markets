  <script type="module">
  import * as THREE from 'three';
  import * as POSTPROCESSING from 'postprocessing';
  import gsap from 'gsap';
  window.gsap = gsap;

  // Expose as globals so the non-module scripts below can find them
  window.THREE = THREE;
  window.POSTPROCESSING = POSTPROCESSING;

  // Shared mutable state used across input.js / animation.js
  window.dragRotXTarget = 0;
  window.dragRotYTarget = 0;
  window.mouseTarget = { x: 0, y: 0 };
  window.activeIdx = 0;

  // ─── scene-setup.js ────────────────────────────────────────────────
function initScene() {
  // Canvas host must exist in HTML as: <div id="canvas-host"></div>

  // RENDERER
  const renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: false,
    powerPreference: 'high-performance',
    stencil: false
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.25;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('canvas-host').appendChild(renderer.domElement);

  // SCENE
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x06090a);
  scene.fog = new THREE.FogExp2(0x06090a, 0.018);

  // CAMERA
  const camera = new THREE.PerspectiveCamera(34, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 12, 22); // intro start position

  // PMREM (Room Environment for PBR reflections)
  // Using a manual IBL setup since RoomEnvironment import may not be available
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  // Create a simple bright env using a data texture
  try {
    // Try to load RoomEnvironment from esm.sh
    // Falls back gracefully
    const envData = new Float32Array(4 * 4 * 4 * 6);
    for (let i = 0; i < envData.length; i += 4) {
      envData[i] = 0.8; envData[i+1] = 0.85; envData[i+2] = 0.75; envData[i+3] = 1.0;
    }
    const envTex = new THREE.DataArrayTexture(envData, 4, 4, 6);
    envTex.type = THREE.FloatType;
    envTex.needsUpdate = true;
    // scene.environment will be set after PMREM processes
  } catch(e) {
    // graceful fallback
  }

  // 7-LIGHT RIG (exact values from spec)

  // 1. Ambient
  const ambientLight = new THREE.AmbientLight(0xb4c8be, 0.3);
  scene.add(ambientLight);

  // 2. Key light (warm directional from upper-right-front)
  const keyLight = new THREE.DirectionalLight(0xfff5e0, 1.6);
  keyLight.position.set(8, 10, 8);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.set(2048, 2048);
  keyLight.shadow.camera.near = 0.5;
  keyLight.shadow.camera.far = 50;
  keyLight.shadow.camera.left = -12;
  keyLight.shadow.camera.right = 12;
  keyLight.shadow.camera.top = 12;
  keyLight.shadow.camera.bottom = -12;
  keyLight.shadow.bias = -0.0005;
  scene.add(keyLight);

  // 3. Rim light (cool green from upper-left-back)
  const rimLight = new THREE.DirectionalLight(0x7fb89c, 0.7);
  rimLight.position.set(-8, 5, -5);
  scene.add(rimLight);

  // 4. Fill light (brass from below-front)
  const fillLight = new THREE.DirectionalLight(0xc9a96e, 0.45);
  fillLight.position.set(0, -6, 8);
  scene.add(fillLight);

  // 5. Center spot (warm gold, flickers in animation loop)
  const centerSpotLight = new THREE.PointLight(0xffe0a0, 1.8, 18, 1.4);
  centerSpotLight.position.set(0, 0.5, 5);
  scene.add(centerSpotLight);
  window.centerSpotLight = centerSpotLight;

  // 6. Accent brass (left)
  const accentBrass = new THREE.PointLight(0xc9a96e, 0.8, 10, 1.8);
  accentBrass.position.set(-3.5, 2, 2);
  scene.add(accentBrass);

  // 7. Accent green (right)
  const accentGreen = new THREE.PointLight(0x7fb89c, 0.6, 10, 1.8);
  accentGreen.position.set(3.5, -2, 2);
  scene.add(accentGreen);

  // POSTPROCESSING CHAIN
  const EffectComposer = POSTPROCESSING.EffectComposer;
  const RenderPass = POSTPROCESSING.RenderPass;
  const EffectPass = POSTPROCESSING.EffectPass;
  const BloomEffect = POSTPROCESSING.BloomEffect;
  const ChromaticAberrationEffect = POSTPROCESSING.ChromaticAberrationEffect;
  const VignetteEffect = POSTPROCESSING.VignetteEffect;

  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));

  const bloomEffect = new BloomEffect({
    intensity: 0.85,
    luminanceThreshold: 0.35,
    luminanceSmoothing: 0.4,
    radius: 0.7,
  });

  const chromAberration = new ChromaticAberrationEffect({
    offset: new THREE.Vector2(0.0008, 0.0008),
  });

  const vignetteEffect = new VignetteEffect({
    offset: 0.32,
    darkness: 0.6,
  });

  composer.addPass(new EffectPass(camera, bloomEffect, chromAberration, vignetteEffect));

  // RESIZE
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  });

  // Expose globals
  window.scene = scene;
  window.camera = camera;
  window.renderer = renderer;
  window.composer = composer;

  return { scene, camera, renderer, composer, lights: { ambientLight, keyLight, rimLight, fillLight, centerSpotLight, accentBrass, accentGreen } };
}


  // ─── logo-geometry.js ──────────────────────────────────────────────
function buildPCMLogo(THREE) {
  // ── MATERIALS ──────────────────────────────────────────────────────────────
  const matRing = new THREE.MeshPhysicalMaterial({
    color: 0x1a2520,
    metalness: 0.35,
    roughness: 0.38,
    clearcoat: 0.7,
    clearcoatRoughness: 0.22,
    envMapIntensity: 1.2
  });

  const matShadow = new THREE.MeshStandardMaterial({
    color: 0x0f1814,
    roughness: 0.8
  });

  const matBrass = new THREE.MeshPhysicalMaterial({
    color: 0xc9a96e,
    metalness: 0.82,
    roughness: 0.18,
    envMapIntensity: 1.5
  });

  const matCoin = new THREE.MeshPhysicalMaterial({
    color: 0xd9b97a,
    metalness: 0.92,
    roughness: 0.12,
    envMapIntensity: 2.0,
    clearcoat: 0.5
  });

  const matPerson = new THREE.MeshPhysicalMaterial({
    color: 0x1a2520,
    metalness: 0.3,
    roughness: 0.45,
    clearcoat: 0.4
  });

  const matCream = new THREE.MeshStandardMaterial({
    color: 0xe8dcc4,
    roughness: 0.7
  });

  // ── OUTER RING ─────────────────────────────────────────────────────────────
  const outerRing = new THREE.Mesh(
    new THREE.TorusGeometry(3.4, 0.24, 32, 128),
    matRing
  );
  outerRing.userData.partId = 'ringOuter';
  outerRing.castShadow = true;

  const shadowRing = new THREE.Mesh(
    new THREE.TorusGeometry(3.42, 0.27, 24, 96),
    matShadow
  );
  shadowRing.position.z = -0.04;

  const accentRing = new THREE.Mesh(
    new THREE.TorusGeometry(3.05, 0.045, 16, 96),
    matBrass
  );

  // ── TICK MARKS ─────────────────────────────────────────────────────────────
  const tickGroup = new THREE.Group();
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    const isMajor = i % 3 === 0;
    const geo = isMajor
      ? new THREE.CapsuleGeometry(0.04, 0.22, 8, 12)
      : new THREE.CapsuleGeometry(0.025, 0.14, 6, 8);
    const mat = isMajor ? matBrass : matCream;
    const tick = new THREE.Mesh(geo, mat);
    tick.position.set(Math.cos(a) * 3.68, Math.sin(a) * 3.68, 0);
    tick.rotation.z = a + Math.PI / 2;
    tickGroup.add(tick);
  }

  // ── LEVER GROUP ────────────────────────────────────────────────────────────
  const leverGroup = new THREE.Group();
  leverGroup.rotation.z = 0.16;
  leverGroup.userData.partId = 'lever';

  const leverBar = new THREE.Mesh(
    new THREE.BoxGeometry(4.5, 0.18, 0.22),
    matRing
  );
  leverGroup.add(leverBar);

  const capGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.24, 16);
  const leftCap = new THREE.Mesh(capGeo, matBrass);
  leftCap.position.set(-2.3, 0, 0);
  leftCap.rotation.x = Math.PI / 2;
  const rightCap = new THREE.Mesh(capGeo.clone(), matBrass);
  rightCap.position.set(2.3, 0, 0);
  rightCap.rotation.x = Math.PI / 2;
  leverGroup.add(leftCap, rightCap);

  // ── COIN GROUP ─────────────────────────────────────────────────────────────
  const coinGroup = new THREE.Group();
  coinGroup.position.set(-2.0, 0, 0);
  coinGroup.userData.partId = 'coin';

  const disc = new THREE.Mesh(
    new THREE.CylinderGeometry(0.58, 0.58, 0.16, 64),
    matCoin
  );
  disc.rotation.x = Math.PI / 2;
  coinGroup.add(disc);

  const rimGeo = new THREE.TorusGeometry(0.58, 0.025, 8, 64);
  const frontRim = new THREE.Mesh(rimGeo, matRing);
  frontRim.position.z = 0.08;
  const backRim = new THREE.Mesh(rimGeo.clone(), matRing);
  backRim.position.z = -0.08;
  coinGroup.add(frontRim, backRim);

  const dollarBar = new THREE.Mesh(
    new THREE.BoxGeometry(0.07, 0.72, 0.045),
    matBrass
  );
  dollarBar.position.z = 0.09;
  coinGroup.add(dollarBar);

  const upperArc = new THREE.Mesh(
    new THREE.TorusGeometry(0.16, 0.05, 10, 24, Math.PI * 1.05),
    matBrass
  );
  upperArc.position.set(0, 0.15, 0.09);
  coinGroup.add(upperArc);

  const lowerArc = new THREE.Mesh(
    new THREE.TorusGeometry(0.16, 0.05, 10, 24, Math.PI * 1.05),
    matBrass
  );
  lowerArc.position.set(0, -0.15, 0.09);
  lowerArc.rotation.y = Math.PI;
  coinGroup.add(lowerArc);

  leverGroup.add(coinGroup);

  // ── PERSON GROUP ───────────────────────────────────────────────────────────
  const personRoot = new THREE.Group();
  personRoot.position.set(2.0, 0.09, 0);
  personRoot.userData.partId = 'person';

  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.19, 28, 28),
    matPerson
  );
  head.position.y = 1.08;
  personRoot.add(head);

  const neck = new THREE.Mesh(
    new THREE.CylinderGeometry(0.065, 0.085, 0.12, 16),
    matPerson
  );
  neck.position.y = 0.91;
  personRoot.add(neck);

  const torso = new THREE.Mesh(
    new THREE.CylinderGeometry(0.17, 0.24, 0.54, 20),
    matPerson
  );
  torso.position.y = 0.58;
  personRoot.add(torso);

  const armGeo = new THREE.CapsuleGeometry(0.055, 0.46, 8, 14);
  const leftArm = new THREE.Mesh(armGeo, matPerson);
  leftArm.position.set(-0.24, 0.72, 0);
  leftArm.rotation.z = 0.4;
  const rightArm = new THREE.Mesh(armGeo.clone(), matPerson);
  rightArm.position.set(0.24, 0.72, 0);
  rightArm.rotation.z = -0.4;
  personRoot.add(leftArm, rightArm);

  const hips = new THREE.Mesh(
    new THREE.CylinderGeometry(0.24, 0.2, 0.13, 20),
    matPerson
  );
  hips.position.y = 0.28;
  personRoot.add(hips);

  const legGeo = new THREE.CapsuleGeometry(0.075, 0.34, 8, 14);
  const leftLeg = new THREE.Mesh(legGeo, matPerson);
  leftLeg.position.set(-0.1, 0.05, 0);
  const rightLeg = new THREE.Mesh(legGeo.clone(), matPerson);
  rightLeg.position.set(0.1, 0.05, 0);
  personRoot.add(leftLeg, rightLeg);

  const footGeo = new THREE.BoxGeometry(0.17, 0.07, 0.2);
  const leftFoot = new THREE.Mesh(footGeo, matPerson);
  leftFoot.position.set(-0.1, -0.14, 0.04);
  const rightFoot = new THREE.Mesh(footGeo.clone(), matPerson);
  rightFoot.position.set(0.1, -0.14, 0.04);
  personRoot.add(leftFoot, rightFoot);

  leverGroup.add(personRoot);

  // ── FULCRUM GROUP ──────────────────────────────────────────────────────────
  const fulcrumGroup = new THREE.Group();
  fulcrumGroup.position.set(0, -0.45, 0);
  fulcrumGroup.userData.partId = 'fulcrum';

  const pyramid = new THREE.Mesh(

  upArrowGroup.position.set(-1.15, -1.85, 0);

  const upShaft = new THREE.Mesh(
    new THREE.CylinderGeometry(0.045, 0.045, 0.46, 16),
    matBrass
  );
  const upHead = new THREE.Mesh(
    new THREE.ConeGeometry(0.14, 0.24, 20),

  refreshGroup.position.set(0, -1.85, 0);
  const refreshArc = new THREE.Mesh(
    new THREE.TorusGeometry(0.25, 0.045, 12, 32, Math.PI * 1.55),

  );
  refreshArc.rotation.z = -0.4;
  const refreshTip = new THREE.Mesh(
    new THREE.ConeGeometry(0.09, 0.18, 14),
    matBrass
  );
  refreshTip.position.set(0.21, 0.16, 0);
  refreshTip.rotation.z = -1.0;
  refreshGroup.add(refreshArc, refreshTip);

  downArrowGroup.position.set(1.15, -1.85, 0);

    new THREE.CylinderGeometry(0.045, 0.045, 0.46, 16),

  );
  const downHead = new THREE.Mesh(
    new THREE.ConeGeometry(0.14, 0.24, 20),
    matBrass
  );
  downHead.position.y = -0.34;
  downHead.rotation.z = Math.PI;
  downArrowGroup.add(downShaft, downHead);

  iconRow.add(upArrowGroup, refreshGroup, downArrowGroup);

  // ── ORBITAL DOTS ───────────────────────────────────────────────────────────
  const orbitalDots = [];
  for (let i = 0; i < 10; i++) {
    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(0.055, 14, 14),
      matBrass.clone()
    );
    const phase = (i / 10) * Math.PI * 2;
    dot.userData.phase = phase;
    orbitalDots.push(dot);

  // ── HALO DISC ──────────────────────────────────────────────────────────────
  const haloMat = new THREE.MeshBasicMaterial({
    color: 0x7fb89c,
    transparent: true,

  for (let i = 0; i < particleCount; i++) {
    positions[i * 3]     = (Math.random() - 0.5) * 16;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 12;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 10;

    color: 0xc9a96e,

  const bgPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 40),
    new THREE.ShaderMaterial({
      uniforms: { time: { value: 0 } },

        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform float time;
        void main() {
          vec3 top = vec3(0.04, 0.07, 0.06);
          vec3 mid = vec3(0.06, 0.10, 0.09);
          vec3 bot = vec3(0.02, 0.03, 0.03);
          vec3 col = mix(bot, mid, vUv.y * 1.5);
          col = mix(col, top, max(0.0, vUv.y - 0.5) * 2.0);
          col += 0.005 * sin(time * 0.3 + vUv.x * 8.0);
          gl_FragColor = vec4(col, 1.0);
        }
      `,
      depthWrite: false
    })
  );
  bgPlane.position.z = -8;

  // ── ASSEMBLE ROOT ──────────────────────────────────────────────────────────
  const root = new THREE.Group();
  root.add(outerRing, shadowRing, accentRing, tickGroup, leverGroup, fulcrumGroup, iconRow);
  orbitalDots.forEach(d => root.add(d));
  root.add(haloDisc, particles, bgPlane);

  return {
    root,
    leverGroup,
    coinGroup,
    personGroup: personRoot,
    fulcrumGroup,
    refreshGroup,
    outerRing,
    accentRingMesh: accentRing,
    tickGroup,
    orbitalDots,
    haloDisc,
    particles,
    bgPlane,
    glowRing,
    upArrowGroup,
    downArrowGroup
  };
}

function showModeContent(idx, section) {
  const s = section || (window.SECTIONS && window.SECTIONS[window.activeIdx || 0]);
  if (!s || !s.modes) return;
  const mode = s.modes[idx];
  if (!mode) return;
  const el = id => document.getElementById(id);
  if (el('mode-body')) el('mode-body').textContent = mode.body;
  const modeStats = el('mode-stats');
  if (modeStats && mode.stats) {
    modeStats.innerHTML = mode.stats.map(([v, l]) =>
      `<div class="stat-item"><span class="stat-val">${v}</span><span class="stat-label">${l}</span></div>`
    ).join('');
    modeStats.style.display = '';
  } else if (modeStats) {
    modeStats.style.display = 'none';
  }
  // Update active mode btn
  document.querySelectorAll('.mode-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  // Animate drag indicator (seacat swiper-style)
  if (typeof window.updateModeIndicator === 'function') {
    window.updateModeIndicator(idx);
  }
}

window.setMode = function(idx) {
  const s = window.SECTIONS?.[window.activeIdx || 0];
  showModeContent(idx, s);
  // Update visual panel mode dots
  if (typeof window._updateVisualPanel === 'function') {
    window._updateVisualPanel(window.activeIdx || 0, idx);
  }
};

function updateSectionUI(idx) {
  // Side nav dots + ring progress
  document.querySelectorAll('.side-nav-dot').forEach((dot, i) => {
    const fill = dot.querySelector('.nav-ring-fill');
    if (fill) {
      if (i < idx) {
        fill.style.strokeDashoffset = '0'; // completed
      } else if (i === idx) {
        fill.style.strokeDashoffset = '44'; // half-fill active
      } else {
        fill.style.strokeDashoffset = '88'; // empty
      }
    }
    dot.classList.toggle('active', i === idx);
  });
  // Bottom menu buttons
  document.querySelectorAll('.section-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });

  // Mode indicator
  if (typeof updateModeIndicator === 'function') {
    const activeBtn = document.querySelector('.mode-btn.active');
    if (activeBtn) {
      const allBtns = document.querySelectorAll('.mode-btn');
      const activeIdx = Array.from(allBtns).indexOf(activeBtn);
      updateModeIndicator(activeIdx >= 0 ? activeIdx : 0);
    }
  }

  // Circular progress arc
  const arc = document.getElementById('circ-arc');
  const circNum = document.getElementById('circ-num');
  if (arc) {
    const circumference = 2 * Math.PI * 36; // ~226.2
    const progress = idx / 9; // 0 to 1
    const dashoffset = circumference * (1 - progress);
    arc.style.strokeDashoffset = dashoffset.toFixed(1);
  }
  if (circNum) circNum.textContent = String(idx + 1).padStart(2, '0');

  // Section atmosphere
  const atm = document.getElementById('section-atmosphere');
  if (atm) {
    // Remove old atm class
    for (let i = 0; i < 10; i++) atm.classList.remove(`section-atm-${i}`);
    atm.classList.add(`section-atm-${idx}`);
  }

  window.activeIdx = idx;
}

// Mode drag indicator (seacat swiper-style)
function updateModeIndicator(idx) {
  const btns = document.querySelectorAll('.mode-btn');
  const indicator = document.querySelector('.mode-drag-indicator');
  if (!indicator || !btns[idx]) return;
  const btn = btns[idx];
  const row = document.querySelector('.modes-row');
  if (!row) return;
  const rowRect = row.getBoundingClientRect();
  const btnRect = btn.getBoundingClientRect();
  indicator.style.left = (btnRect.left - rowRect.left) + 'px';
  indicator.style.width = btnRect.width + 'px';
}
window.updateModeIndicator = updateModeIndicator;
window.updateSectionUI = updateSectionUI;
window.updateCopyContent = updateCopyContent;

    function animateCursor() {
      cx = lerp(cx, mx, 0.12);
      cy = lerp(cy, my, 0.12);
      cursor.style.transform = `translate(${cx}px, ${cy}px)`;
      dot.style.transform    = `translate(${mx}px, ${my}px)`;
      rafId = requestAnimationFrame(animateCursor);
    }

    document.addEventListener('mousemove', (e) => {
      mx = e.clientX;
      my = e.clientY;
    });

    document.addEventListener('mouseenter', () => {
      cursor.style.opacity = '1';
    });

    document.addEventListener('mouseleave', () => {
      cursor.style.opacity = '0';
    });

    // Pointer-down / up state for click feedback
    document.addEventListener('mousedown', () => {
      cursor.classList.add('pressing');
    });

    document.addEventListener('mouseup', () => {
      cursor.classList.remove('pressing');
    });

    // Hover state on interactive elements
    const interactiveSelector = 'a, button, [role="button"], input, select, textarea, label';
    document.addEventListener('mouseover', (e) => {
      if (e.target.closest(interactiveSelector)) {
        cursor.classList.add('hovering');
      }
    });
    document.addEventListener('mouseout', (e) => {
      if (e.target.closest(interactiveSelector)) {
        cursor.classList.remove('hovering');
      }
    });

    animateCursor();
  }

  function buildIntroLoader() {
    insertHTML('afterbegin', `
      <div id="intro-loader" class="intro-loader" role="status" aria-live="polite" aria-label="Loading Patel Capital Markets">
        <div class="loader-inner">
          <div class="intro-loader__wordmark-loader">Patel Capital Markets</div>
          <div class="intro-loader__hairline" aria-hidden="true"></div>
          <div class="loader-status intro-loader__text" id="loader-status">Initializing scene...</div>
          <div class="intro-loader__bar-wrap" aria-hidden="true">
            <div class="intro-loader__bar-fill" id="loader-bar"></div>
          </div>
          <div class="intro-loader__pct" id="loader-pct" aria-hidden="true">0%</div>
        </div>
      </div>
    `);

    // Loader percentage animation
    const loaderBar = document.getElementById('loader-bar');
    const loaderPct = document.getElementById('loader-pct');
    const loaderTextEl = document.getElementById('loader-status');
    const pctSteps  = [0, 12, 28, 46, 62, 78, 90, 96, 100];
    const pctLabels = [
      'Initializing...',
      'Loading assets...',
      'Three.js · r160',
      'Building scene...',
      'Calibrating structure...',
      'Configuring capital stack...',
      'Postprocessing online...',
      'Almost ready...',
      ''
    ];
    let pctIdx = 0;

    function advanceLoader() {
      if (pctIdx >= pctSteps.length) return;
      const pct = pctSteps[pctIdx];
      if (loaderBar) loaderBar.style.width = pct + '%';
      if (loaderPct) loaderPct.textContent = pct + '%';
      if (loaderTextEl && pctLabels[pctIdx] !== undefined && pctLabels[pctIdx] !== '') {
        loaderTextEl.textContent = pctLabels[pctIdx];
      }
      pctIdx++;
    }

    advanceLoader();
    const loaderInterval = setInterval(() => {
      advanceLoader();
      if (pctIdx >= pctSteps.length) clearInterval(loaderInterval);
    }, 280);

    // Dismiss loader after reaching 100%
    setTimeout(() => {
      const loader = document.getElementById('intro-loader');
      if (loader) loader.classList.add('done');
    }, 2400);
  }

  // ---------------------------------------------------------------------------
  // 14c. Execution Stages Host (Gap 5/23 — hybrid scroll reveal)
  // ---------------------------------------------------------------------------
  function buildExecutionStages() {
    const host = document.createElement('div');
    host.id = 'execution-stage-host';
    host.className = 'execution-stage-host';
    host.setAttribute('aria-hidden', 'true');
    const EXEC_STAGES = [
      { num: '01', title: 'Discovery', desc: 'Listening first. Sponsor memo, rent roll, business plan, market thesis — everything on the table before we form a view.' },
      { num: '02', title: 'Underwriting', desc: 'Stress-testing every assumption. DSCR, LTC, LTV, sensitivity scenarios. We model so the numbers hold under scrutiny.' },
      { num: '03', title: 'Structuring', desc: 'Engineering the capital stack. Covenant design, tranche sizing, conversion features — every degree of freedom explored.' },
      { num: '04', title: 'Term Sheet', desc: 'The test. Every structural decision lands on paper. Pricing, tenor, covenants, intercreditor — all negotiated before lender selection.' },
      { num: '05', title: 'Close', desc: 'The proof. We run the process from term sheet to funded in the time we promised. That is the product.' },
    ];
    host.innerHTML = `
      <div class="exec-stages-title">How We Work</div>
      <div class="exec-stage-list" id="exec-stage-list">
        ${EXEC_STAGES.map((s, i) => `
          <div class="exec-stage-row" id="exec-stage-${i}" data-idx="${i}">
            <div class="exec-stage-num-badge">${s.num}</div>
            <div class="exec-stage-content">
              <h3>${s.title}</h3>
              <p>${s.desc}</p>
            </div>
            ${i < EXEC_STAGES.length - 1 ? '<div class="exec-stage-connector"></div>' : ''}
          </div>
        `).join('')}
      </div>
    `;
    document.body.appendChild(host);

    // Scroll-driven reveal logic
    let execScrollAccum = 0;
    let activeStage = -1;
    let execVisible = false;

    window._execStageReveal = function(scrollDelta) {
      if (!execVisible) return false;
      execScrollAccum += scrollDelta;

      // Each stage needs ~120px of scroll to reveal
      const stageThreshold = 120;
      const newStage = Math.min(4, Math.floor(execScrollAccum / stageThreshold));

      if (newStage !== activeStage) {
        // Reveal all stages up to newStage
        for (let i = 0; i <= newStage; i++) {
          const row = document.getElementById(`exec-stage-${i}`);
          if (row) {
            row.classList.add('revealed');
            row.classList.toggle('active', i === newStage);
            row.classList.toggle('passed', i < newStage);
          }
        }
        // Un-active stages beyond newStage when scrolling back
        for (let i = newStage + 1; i < 5; i++) {
          const row = document.getElementById(`exec-stage-${i}`);
          if (row) {
            row.classList.remove('revealed', 'active', 'passed');
          }
        }
        activeStage = newStage;
      }

      // Consume scroll until all 5 stages revealed + small buffer; then pass through
      return execScrollAccum < (stageThreshold * 5 + 80);
    };

    window._setExecVisible = function(v) {
      execVisible = v;
      const h = document.getElementById('execution-stage-host');
      if (h) h.classList.toggle('visible', v);
      if (!v) {
        // Reset when leaving
        execScrollAccum = 0;
        activeStage = -1;
        document.querySelectorAll('.exec-stage-row').forEach(r => r.classList.remove('revealed','active','passed'));
      }
    };
  }

          if (next < SECTION_NAMES.length && typeof window.goToSection === 'function') {
            window.goToSection(next, 1);
          }
          break;
        }
        case 'ARROWUP':
        case 'ARROWLEFT': {
          e.preventDefault();
          const prev = (window.activeIdx || 0) - 1;
          if (prev >= 0 && typeof window.goToSection === 'function') {
            window.goToSection(prev, -1);
          }
          break;
        }
        default:
          break;
      }
    });

  // ---------------------------------------------------------------------------
  // Wheel / touch navigation
  // ---------------------------------------------------------------------------

  function wireScrollNavigation() {
    let lastWheelTime = 0;
    const WHEEL_COOLDOWN = 900; // ms between section jumps

    window.addEventListener('wheel', (e) => {
      const now = Date.now();
      const dir = e.deltaY > 0 ? 1 : -1;
      const curIdx = window.activeIdx || 0;

      // Hybrid scroll: section 6 (Execution) — consume scroll for stage reveals first
      if (curIdx === 6 && typeof window._execStageReveal === 'function') {
        const consumed = window._execStageReveal(Math.abs(e.deltaY) * dir);
        if (consumed) {
          lastWheelTime = now;
          window.dismissScrollCue();
          return; // Don't transition yet
        }
      }

      if (now - lastWheelTime < WHEEL_COOLDOWN) return;
      lastWheelTime = now;

      if (typeof window.goToSection !== 'function') return;

      const next = curIdx + dir;
      if (next >= 0 && next < SECTION_NAMES.length) {
        window.goToSection(next, dir);
        window.dismissScrollCue();
      }
    }, { passive: true });

    // Touch swipe
    let touchStartY = null;
    window.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchend', (e) => {
      if (touchStartY === null) return;
      const delta = touchStartY - e.changedTouches[0].clientY;
      touchStartY = null;
      if (Math.abs(delta) < 40) return; // swipe threshold

      const dir  = delta > 0 ? 1 : -1;
      const curIdx = window.activeIdx || 0;

      // Hybrid scroll for execution section
      if (curIdx === 6 && typeof window._execStageReveal === 'function') {
        const consumed = window._execStageReveal(Math.abs(delta) * dir);
        if (consumed) {
          window.dismissScrollCue();
          return;
        }
      }

      const next = curIdx + dir;
      if (next >= 0 && next < SECTION_NAMES.length && typeof window.goToSection === 'function') {
        window.goToSection(next, dir);
        window.dismissScrollCue();
      }
    }, { passive: true });
  }

  // ---------------------------------------------------------------------------
  // updateChrome — called by main.js each time the active section changes
  // ---------------------------------------------------------------------------

  /**
   * Sync all chrome elements to reflect the current active section index.
   * @param {number} idx - zero-based section index
   */
  window.updateChrome = function (idx) {
    const total = SECTION_NAMES.length;

    // Meta (top-right)
    const metaSection = document.getElementById('meta-section');
    const metaCaption = document.getElementById('meta-caption');
    if (metaSection) metaSection.textContent = `${String(idx + 1).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;
    if (metaCaption) metaCaption.textContent = SECTION_NAMES[idx] || '';

    // Footer section label + counter (new grid footer)
    const footerSection = document.getElementById('footer-section');
    if (footerSection) footerSection.textContent = SECTION_NAMES[idx] || '';
    const footerCounter = document.getElementById('footer-counter');
    if (footerCounter) footerCounter.textContent = `${String(idx + 1).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;

    // Triangle masks per section
    if (typeof window.applyTriangles === 'function') {
      window.applyTriangles(idx);
    }

    // Scrub swiper visibility (Senior Debt section)
    if (typeof window._syncScrubber === 'function') {
      window._syncScrubber(idx);
    }

    // Menu button aria-expanded state (in case it got out of sync)
    const menuOpen = document.body.classList.contains('menu-open');
    const btnMenu = document.getElementById('btn-menu');
    if (btnMenu) btnMenu.setAttribute('aria-expanded', String(menuOpen));

    // Side nav dots
    document.querySelectorAll('.side-nav-dot').forEach((dot, i) => {
      dot.classList.toggle('active', i === idx);
      dot.setAttribute('aria-current', i === idx ? 'page' : 'false');
    });

    // Bottom menu buttons
    document.querySelectorAll('.section-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === idx);
      btn.setAttribute('aria-current', i === idx ? 'page' : 'false');
    });

    // Progress bar
    const fill = document.querySelector('.progress-bar-fill');
    if (fill) fill.style.width = `${((idx) / (total - 1)) * 100}%`;

    // Dismiss scroll cue after the first navigation
    if (idx !== 0) window.dismissScrollCue();

    // Execution stages (idx=6)
    if (typeof window._setExecVisible === 'function') {
      window._setExecVisible(idx === 6);
    }

    // Engage cinematic (idx=9)
    if (typeof window._setEngageVisible === 'function') {
      window._setEngageVisible(idx === 9);
    }

    // Section visual panel (mode sections: 3,4,5,7)
    if (typeof window._updateVisualPanel === 'function') {
      window._updateVisualPanel(idx, 0);
    }

    // Parallax reveal (Firm Overview = idx 1)
    if (typeof window._updateParallaxReveal === 'function') {
      window._updateParallaxReveal(idx, 0);
    }

    // Hide scene-copy for engage and execution stages (they have their own full-screen UIs)
    const sceneCopy = document.getElementById('scene-copy');
    if (sceneCopy) {
      if (idx === 9) {
        // Engage: hide scene copy (engage-cinematic takes over)
        sceneCopy.classList.add('hidden');
        sceneCopy.classList.remove('visible');
      }
      if (idx === 6) {
        // Execution: also managed by execution-stage-host, but keep scene-copy for title reveal
        // Scene copy fades in from animation loop; leave it
      }
    }
  };

  // ---------------------------------------------------------------------------
  // initChrome — public entry point
  // ---------------------------------------------------------------------------

  /**
   * Creates and injects all persistent UI chrome elements, wires all
   * event handlers, and exposes `window.updateChrome` for section sync.
   * Must be called once after the DOM is ready.
   */
  window.initChrome = function () {
    // Insertion order matters: elements inserted afterbegin appear in
    // reverse-DOM order (last call ends up first), so we reverse-order
    // those calls deliberately.
    //
    // Elements that use 'beforeend' / appendChild stack naturally.

    // --- afterbegin (stacked bottom-up) ---
    buildCinemaBars();      // cinema bars are purely decorative, prepend first
    buildIntroLoader();     // loader overlaps everything, prepend last so it's on top
    buildCursor();          // cursor must be visually topmost; prepend very last

    // --- beforeend / appendChild ---
    buildHomeMark();
    buildTopMeta();
    buildSideNav();
    buildSceneCopy();
    buildScrollCue();
    buildBottomMenu();
    buildControlsCluster();
    buildKbdHints();
    buildStatusConsole();
    buildSectionTriangles();
    buildScrubSwiper();
    buildFooter();
    buildExecutionStages();
    buildSectionVisualPanel();
    buildParallaxReveal();
    buildEngageCinematic();

    // --- Logic / handlers (no DOM insertion) ---
    wireContactForm();
    wireKeyboard();
    wireScrollNavigation();

    // Sync chrome to initial section (0)
    window.updateChrome(0);
  };

  // Auto-init if the DOM is already ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', window.initChrome);
  } else {
    // DOMContentLoaded already fired (script loaded deferred / async)
    // Let the caller decide; auto-init only when this file is the entry point.
    // Exposed as window.initChrome so main.js can call it explicitly.
  }
}());

let cursorX = 0, cursorY = 0, cursorTargetX = 0, cursorTargetY = 0;

document.addEventListener('mousemove', e => {
  cursorTargetX = e.clientX;
  cursorTargetY = e.clientY;
  if (window.mouseTarget) {
    window.mouseTarget.x = (e.clientX / innerWidth) * 2 - 1;
    window.mouseTarget.y = -(e.clientY / innerHeight) * 2 + 1;
  }
});

function updateCursor() {
  requestAnimationFrame(updateCursor);
  cursorX = cursorX + (cursorTargetX - cursorX) * 0.18;
  cursorY = cursorY + (cursorTargetY - cursorY) * 0.18;
  if (cursor) {
    cursor.style.transform = `translate(${cursorX}px, ${cursorY}px) translate(-50%, -50%)`;
  }
}
updateCursor();

// Cursor trail
const trailDots = [];
for (let i = 0; i < 5; i++) {
  const dot = document.createElement('div');
  dot.style.cssText = `
    position:fixed;top:0;left:0;width:${4+i*2}px;height:${4+i*2}px;
    border-radius:50%;background:rgba(201,169,110,${0.06-i*0.01});
    pointer-events:none;z-index:9998;transform:translate(-50%,-50%);
    transition:transform 0.${3+i*2}s ease;will-change:transform;
  `;
  document.body.appendChild(dot);
  trailDots.push(dot);
}
document.addEventListener('mousemove', e => {
  trailDots.forEach((dot, i) => {
    setTimeout(() => {
      dot.style.transform = `translate(calc(${e.clientX}px - 50%), calc(${e.clientY}px - 50%))`;
    }, i * 30);
  });
});

let isDragging = false;

  dragStartX = e.clientX;
  dragStartY = e.clientY;
  document.body.style.cursor = 'none';
  cursor?.classList.add('cursor-drag');
});

document.addEventListener('pointermove', e => {
  if (!isDragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  window.dragRotYTarget = Math.max(-1.4, Math.min(1.4, (window.dragRotYTarget ?? 0) + dx * 0.005));
  window.dragRotXTarget = Math.max(-0.9, Math.min(0.9, (window.dragRotXTarget ?? 0) + dy * 0.005));
});

document.addEventListener('pointerup', () => {
  isDragging = false;
  cursor?.classList.remove('cursor-drag');
});

let hoveredPartId = null;
const baseScales = new Map();

function setPartScale(partId, scale) {
  const root = window.pcmRoot;
  if (!root) return;
  root.traverse(obj => {
    if (obj.userData.partId === partId) {
      if (!baseScales.has(obj.uuid)) baseScales.set(obj.uuid, obj.scale.clone());
      const base = baseScales.get(obj.uuid);
      obj.scale.lerp(base.clone().multiplyScalar(scale), 0.12);
    }
  });
}

let exploded = false;

function toggleExplode() {
  exploded = !exploded;
  const root = window.pcmRoot;
  if (!root) return;
  root.children.forEach(child => {
    if (child === window.bgPlane || child === window.particles || child === window.haloDisc) return;
    if (!explodeOffsets.has(child.uuid)) {
      const dir = child.position.clone().normalize();
      if (dir.length() < 0.01) dir.set(Math.random()-0.5, Math.random()-0.5, 0.3).normalize();
      explodeOffsets.set(child.uuid, dir.multiplyScalar(1.5));
    }
    const offset = explodeOffsets.get(child.uuid);
    const target = exploded
      ? child.position.clone().add(offset)
      : child.position.clone().sub(offset);
    // Store in userData for lerp in animation loop
    child.userData.explodeTarget = target;
    child.userData.explodeBase = exploded ? child.position.clone() : child.position.clone().add(offset);
  });
  document.getElementById('btn-explode')?.classList.toggle('active', exploded);
}

// Globals expected: THREE, camera, scene, composer, pcmRoot, leverGroup,

// tickGroup, fulcrumGlowRing, centerSpotLight, bgPlane

// ---------------------------------------------------------------------------
// 1. STATE VARIABLES
// ---------------------------------------------------------------------------
let t = 0;
let direction = 1; // +1 forward, -1 backward
let activeIdx = 0;
let motionScale = 1.0;
let dragRotX = 0, dragRotY = 0;

let lastScrollTime = 0;
let isTransitioning = false;
let introT = 0;
const INTRO_DUR = 2.5;
let introComplete = false;
let prevTime = performance.now();
const TRANS_DUR = 1.6;
let transT = 0;
let transFrom = null, transTo = null;

// ---------------------------------------------------------------------------
// 2. CAMERA PRESETS (10 sections)
// ---------------------------------------------------------------------------
const PRESETS = [
  { id: 'home',         cam: [0, 0.6, 11.5],   look: [0, 0, 0],      fov: 34, tilt:  0.16, zoomIn: 8.4 },
  { id: 'firm',         cam: [3.8, 0.8, 9.2],  look: [-0.5, 0, 0],   fov: 36, tilt:  0.14, zoomIn: 7.1 },
  { id: 'edge',         cam: [-3.5, 1.8, 9.2], look: [0.5, 0.2, 0],  fov: 38, tilt:  0.08, zoomIn: 7.1 },
  { id: 'senior',       cam: [0, -2.6, 6.8],   look: [0, 0.4, 0],    fov: 42, tilt:  0.22, zoomIn: 5.0 },
  { id: 'subordinate',  cam: [3.0, 0, 7.2],    look: [-1.8, 0, 0],   fov: 32, tilt:  0.05, zoomIn: 5.4 },
  { id: 'equity',       cam: [-3.0, 0, 7.2],   look: [1.8, 0, 0],    fov: 32, tilt: -0.06, zoomIn: 5.4 },
  { id: 'execution',    cam: [0, 4.8, 6.0],    look: [0, -0.6, 0],   fov: 44, tilt:  0.18, zoomIn: 4.4 },
  { id: 'underwriting', cam: [0, 0, 5.4],      look: [0, 0, 0],      fov: 28, tilt:  0.20, zoomIn: 3.6 },
  { id: 'compliance',   cam: [4.8, 3.0, 6.8],  look: [0, 0, 0],      fov: 38, tilt:  0.04, zoomIn: 5.2 },

// ---------------------------------------------------------------------------
// 3. LERP HELPERS
// ---------------------------------------------------------------------------
function lerp(a, b, t) { return a + (b - a) * t; }
function cubicEaseInOut(t) { return t < 0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
const camPos = new THREE.Vector3(0, 12, 22);
const camLook = new THREE.Vector3(0, 0, 0);
const camLookSmooth = new THREE.Vector3(0, 0, 0);
let camFov = 50;

// ---------------------------------------------------------------------------
// 4. TRANSITION FUNCTION
// ---------------------------------------------------------------------------
function goToSection(idx, dir) {
  if (isTransitioning || idx === activeIdx) return;
  direction = dir;
  transFrom = {
    cam: camPos.clone(),
    look: camLookSmooth.clone(),
    fov: camFov,
    tilt: leverGroup ? leverGroup.rotation.z : 0
  };
  transTo = PRESETS[idx];
  transT = 0;
  isTransitioning = true;
  activeIdx = idx;

  // Cinema bars
  document.body.classList.add('transitioning');
  setTimeout(() => document.body.classList.remove('transitioning'), 800);

  // Flash
  const flash = document.getElementById('flash-overlay');
  if (flash) {
    flash.style.opacity = '0.12';
    setTimeout(() => { flash.style.opacity = '0'; }, 150);
  }

  // Subtle logo impulse
  if (window.pcmRoot && window.gsap) {
    gsap.to(window.pcmRoot.scale, {
      x: 0.96, y: 0.96, z: 0.96,
      duration: 0.15,
      ease: 'power2.in',
      yoyo: true,
      repeat: 1,
      onComplete: () => { window.pcmRoot.scale.set(1,1,1); }
    });
  }

  // Hide copy during transition
  const copy = document.querySelector('.scene-copy');
  if (copy) copy.classList.remove('visible'), copy.classList.add('hidden');

  // Update UI
  updateSectionUI(idx);

  if (window.onSectionChange) window.onSectionChange(idx, dir);
}
window.goToSection = goToSection;

// ---------------------------------------------------------------------------
// 5. MAIN ANIMATION LOOP
// ---------------------------------------------------------------------------
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - prevTime) / 1000, 0.05);
  prevTime = now;
  t += dt;

  // INTRO SWOOP
  if (!introComplete) {
    introT += dt / INTRO_DUR;
    if (introT >= 1) { introT = 1; introComplete = true; showSectionCopy(0); }
    const ease = 1 - Math.pow(1 - Math.min(introT, 1), 3);
    const p = PRESETS[0];
    camPos.x = lerp(0, p.cam[0], ease);
    camPos.y = lerp(12, p.cam[1], ease);
    camPos.z = lerp(22, p.cam[2], ease);
    camFov = lerp(50, p.fov, ease);
    camLookSmooth.set(lerp(0, p.look[0], ease), lerp(0, p.look[1], ease), 0);
    camera.position.copy(camPos);
    camera.fov = camFov;
    camera.updateProjectionMatrix();
    camera.lookAt(camLookSmooth);
    if (leverGroup) leverGroup.rotation.z = lerp(0.16, p.tilt, ease);
  }

  // CINEMATIC TRANSITION
  else if (isTransitioning) {
    transT += dt / TRANS_DUR;
    if (transT >= 1) { transT = 1; isTransitioning = false; showSectionCopy(activeIdx); }
    const ease = cubicEaseInOut(Math.min(transT, 1));
    const tt = Math.min(transT, 1);
    const p = transTo;

    // Mid-flight arc lift + Z pullback
    const arcY = Math.sin(tt * Math.PI) * 0.6;
    const arcZ = Math.sin(tt * Math.PI) * 1.4;

    camPos.x = lerp(transFrom.cam.x, p.cam[0], ease);
    camPos.y = lerp(transFrom.cam.y, p.cam[1], ease) + arcY;
    camPos.z = lerp(transFrom.cam.z, p.cam[2], ease) + arcZ;
    camFov = lerp(transFrom.fov, p.fov, ease);

    camLookSmooth.x = lerp(transFrom.look.x, p.look[0], ease);
    camLookSmooth.y = lerp(transFrom.look.y, p.look[1], ease);
    camLookSmooth.z = 0;

    if (leverGroup) leverGroup.rotation.z = lerp(transFrom.tilt, p.tilt, ease);

    camera.position.copy(camPos);
    camera.fov = camFov;
    camera.updateProjectionMatrix();
    camera.lookAt(camLookSmooth);
  }

  // IDLE: scroll-zoom dolly + mouse parallax
  else {
    // Scroll accumulator decay
    const idleMs = now - lastScrollTime;
    if (idleMs > 200) {
      scrollAccum *= 0.92;
    }

    // Zoom dolly
    const p = PRESETS[activeIdx];
    const zoomT = Math.max(0, scrollAccum);
    const targetZ = lerp(p.cam[2], p.zoomIn, zoomT);
    camPos.x = lerp(camPos.x, p.cam[0] + dragRotY * 0.5 + mouse.x * 0.2 * motionScale, 0.06);
    camPos.y = lerp(camPos.y, p.cam[1] + dragRotX * 0.3 + mouse.y * 0.14 * motionScale, 0.06);
    camPos.z = lerp(camPos.z, targetZ, 0.08);

    camLook.set(p.look[0], p.look[1], 0);
    camLookSmooth.lerp(camLook, 0.06);
    camFov = lerp(camFov, p.fov, 0.05);

    camera.position.copy(camPos);
    camera.fov = camFov;
    camera.updateProjectionMatrix();
    camera.lookAt(camLookSmooth);

    // Drag rotation lerp
    dragRotX = lerp(dragRotX, window.dragRotXTarget || 0, 0.1);
    dragRotY = lerp(dragRotY, window.dragRotYTarget || 0, 0.1);
  }

  // Mouse lerp
  const _mt = _getMouseTarget();
  mouse.x = lerp(mouse.x, _mt.x, 0.08);
  mouse.y = lerp(mouse.y, _mt.y, 0.08);

  // ROOT ROTATION (drag + parallax)
  if (window.pcmRoot) {
    window.pcmRoot.rotation.y = dragRotY + mouse.x * 0.2 * motionScale;
    window.pcmRoot.rotation.x = dragRotX + mouse.y * 0.14 * motionScale;
  }

  // DIRECTION-AWARE LOGO ANIMATION
  if (window.outerRing) window.outerRing.rotation.z += 0.0015 * direction;
  if (window.accentRingMesh) window.accentRingMesh.rotation.z -= 0.0025 * direction;
  if (window.tickGroup) window.tickGroup.rotation.z += 0.0008 * direction;
  if (window.refreshGroup) window.refreshGroup.rotation.z = t * 0.5 * direction;

  // Orbital dots
  if (window.orbitalDots) {
    window.orbitalDots.forEach((dot, i) => {
      const phase = dot.userData.phase + t * 0.4 * direction;
      dot.position.set(Math.cos(phase) * 3.4, Math.sin(phase) * 3.4, 0);
      const pulse = 0.9 + Math.sin(t * 2 + i) * 0.4;
      dot.scale.setScalar(pulse);
    });
  }

  // Halo disc pulse
  if (window.haloDisc) {
    window.haloDisc.material.opacity = 0.04 + Math.sin(t * 0.8) * 0.03;
  }

  // Fulcrum glow ring oscillation
  if (window.fulcrumGlowRing) {
    window.fulcrumGlowRing.material.opacity = 0.4 + Math.sin(t * 2.4) * 0.2;
  }

  // Center spot flicker
  if (window.centerSpotLight) {
    window.centerSpotLight.intensity = 1.8 + Math.sin(t * 1.4) * 0.15;
  }

  // BG shader time
  if (window.bgPlane) {
    window.bgPlane.material.uniforms.time.value = t;
  }

  // Particles drift
  if (window.particles) {
    const pos = window.particles.geometry.attributes.position;
    const phases = window.particles.userData.phases;
    for (let i = 0; i < 240; i++) {
      pos.array[i * 3]     += Math.sin(t * 0.3 + phases[i]) * 0.002 * direction;
      pos.array[i * 3 + 1] += Math.cos(t * 0.2 + phases[i] * 1.3) * 0.001;
      pos.array[i * 3 + 2] += Math.sin(t * 0.15 + phases[i] * 0.7) * 0.0015;
      // Wrap
      if (pos.array[i * 3 + 1] >  8) pos.array[i * 3 + 1] = -8;
      if (pos.array[i * 3 + 1] < -8) pos.array[i * 3 + 1] =  8;
    }
    pos.needsUpdate = true;
  }

  // ───────────────────────────────────────────────
  // GAP 6 — SVG waveform animation for audio button
  // ───────────────────────────────────────────────
  const waveEl = document.getElementById('audio-wave-line');
  if (waveEl) {
    const isOn = !!(window.audioEngine && window.audioEngine.enabled);
    if (isOn) {
      const pts = [];
      const time = t;
      for (let i = 0; i <= 28; i += 2) {
        // Multi-frequency sine: warbling wave that feels musical
        const y = 9
          + Math.sin(i * 0.7 + time * 8) * 3.4
          + Math.sin(i * 1.3 + time * 5.2) * 1.6
          + Math.cos(i * 0.4 + time * 3.1) * 0.8;
        pts.push(i + ',' + y.toFixed(2));
      }
      waveEl.setAttribute('points', pts.join(' '));
    } else {
      // Resting flat line with subtle breathing
      const baseline = 9 + Math.sin(t * 0.6) * 0.15;
      waveEl.setAttribute(
        'points',
        `0,${baseline} 4,${baseline} 6,${baseline} 8,${baseline} 10,${baseline} 12,${baseline} 14,${baseline} 16,${baseline} 18,${baseline} 20,${baseline} 22,${baseline} 24,${baseline} 28,${baseline}`
      );
    }
  }

  // Render
  if (window.composer) window.composer.render();
  else if (window.renderer) window.renderer.render(scene, camera);
}

      { name: 'Bridge / Value-Add', label: 'Senior Debt · Bridge',

      { name: 'Construction Senior', label: 'Senior Debt · Construction',
        body: 'Ground-up and major reno. Often paired with mezz behind.',
        size: '$20M–$600M', spread: 'SOFR + 300–500', close: '8–14 weeks' },
    ];

    function getTrackWidth() { return track ? track.offsetWidth : 400; }
    function getTrackLeft()  { return track ? track.getBoundingClientRect().left : 0; }

    function updateProgress(p) {
      progress = Math.max(0, Math.min(1, p));
      const trackW = getTrackWidth();
      handle.style.left = (progress * trackW) + 'px';
      const insetPct = (1 - progress) * 100;
      mask.style.clipPath = `inset(0 ${insetPct.toFixed(2)}% 0 0)`;
      swiper.setAttribute('aria-valuenow', Math.round(progress * 100));
      if (readout) readout.textContent = Math.round(progress * 100) + '%';
      if (progress > 0.95) mask.classList.add('revealed');
      else mask.classList.remove('revealed');

      // Update mode content based on progress
      const modeIdx = Math.min(SCRUB_MODES.length - 1, Math.floor(progress * SCRUB_MODES.length));
      const mode = SCRUB_MODES[modeIdx];
      if (mode) {
        const el = (id) => document.getElementById(id);
        if (el('scrub-content-title')) el('scrub-content-title').textContent = mode.name;
        if (el('scrub-content-label')) el('scrub-content-label').textContent = mode.label;
        if (el('scrub-content-body'))  el('scrub-content-body').textContent  = mode.body;
        if (el('scrub-stat-size'))     el('scrub-stat-size').textContent     = mode.size;
        if (el('scrub-stat-spread'))   el('scrub-stat-spread').textContent   = mode.spread;
        if (el('scrub-stat-close'))    el('scrub-stat-close').textContent    = mode.close;
      }
    }

    // Pointer drag
    handle.addEventListener('pointerdown', e => {
      isDragging = true;
      handle.classList.add('dragging');
      const tx = e.clientX - getTrackLeft();
      startX = tx - (progress * getTrackWidth());
      try { handle.setPointerCapture(e.pointerId); } catch (_){}
      e.preventDefault();
    });
    handle.addEventListener('pointermove', e => {
      if (!isDragging) return;
      const tx = e.clientX - getTrackLeft();
      updateProgress((tx - startX) / getTrackWidth());
    });
    function endDrag() {
      isDragging = false;
      handle.classList.remove('dragging');
    }
    handle.addEventListener('pointerup', endDrag);
    handle.addEventListener('pointercancel', endDrag);
    handle.addEventListener('lostpointercapture', endDrag);

    // Click track to jump
    if (track) {
      track.addEventListener('pointerdown', e => {
        if (e.target.closest('.scrub-drag-handle')) return;
        const tx = e.clientX - getTrackLeft();
        updateProgress(tx / getTrackWidth());
      });
    }

    // Keyboard support
    handle.addEventListener('keydown', e => {
      let nudge = 0;
      if (e.key === 'ArrowRight' || e.key === 'ArrowUp') nudge = 0.05;
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') nudge = -0.05;
      else if (e.key === 'Home') { updateProgress(0); e.preventDefault(); return; }
      else if (e.key === 'End')  { updateProgress(1); e.preventDefault(); return; }
      else if (e.key === 'PageUp')   nudge = 0.25;
      else if (e.key === 'PageDown') nudge = -0.25;
      if (nudge !== 0) {
        updateProgress(progress + nudge);
        e.preventDefault();
      }
    });

    // Show/hide based on active section
    function syncScrubber(idx) {
      if (idx === 3) {
        swiper.classList.add('visible');
        swiper.setAttribute('aria-hidden', 'false');
        mask.style.display = 'block';
        mask.setAttribute('aria-hidden', 'false');
        // Reset to 0 progress each time we enter Senior Debt section
        updateProgress(0);
      } else {
        swiper.classList.remove('visible');
        swiper.setAttribute('aria-hidden', 'true');
        mask.style.display = 'none';
        mask.setAttribute('aria-hidden', 'true');
        updateProgress(0);
      }
    }
    window._syncScrubber = syncScrubber;

    // Initial state
    syncScrubber(window.activeIdx || 0);
  }
  attempt();
})();

function handleWheel(e) {
  if (!introComplete) return;
  e.preventDefault();
  lastScrollTime = performance.now();

  if (isTransitioning) return;

  const dir = e.deltaY > 0 ? 1 : -1;

  // ── HYBRID SCROLL: Section 6 (Execution) consumes scroll for stage reveals ──
  if (activeIdx === 6 && typeof window._execStageReveal === 'function') {
    const consumed = window._execStageReveal(Math.abs(e.deltaY) * dir);
    if (consumed) {
      scrollAccum = 0;
      return; // Don't process as section transition yet
    }
  }

  scrollAccum = Math.max(-1.2, Math.min(1.2, scrollAccum + e.deltaY * 0.0008));

  // Fast burst or threshold -> auto-transition
  if (Math.abs(e.deltaY) > 30 || Math.abs(scrollAccum) > 0.7) {
    const next = Math.max(0, Math.min(9, activeIdx + dir));
    if (next !== activeIdx) {
      scrollAccum = 0;
      goToSection(next, dir);
    }
  }
}
window.addEventListener('wheel', handleWheel, { passive: false });

window.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
window.addEventListener('touchend', e => {
  if (!introComplete || isTransitioning) return;
  const dy = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 40) {
    const dir = dy > 0 ? 1 : -1;
    // Hybrid scroll for execution section
    if (activeIdx === 6 && typeof window._execStageReveal === 'function') {
      const consumed = window._execStageReveal(Math.abs(dy) * dir);
      if (consumed) return;
    }
    const next = Math.max(0, Math.min(9, activeIdx + dir));
    if (next !== activeIdx) goToSection(next, dir);
  }
}, { passive: true });

  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    const next = Math.min(9, activeIdx + 1);
    if (next !== activeIdx) goToSection(next, 1);
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    const next = Math.max(0, activeIdx - 1);
    if (next !== activeIdx) goToSection(next, -1);
  } else if (e.key >= '1' && e.key <= '9') {

  // ─── audio.js ──────────────────────────────────────────────────────
/**
 * PCMAudioEngine — Patel Capital Markets
 * Cinematic ambient audio system built on the Web Audio API.
 *
 * Architecture:
 *   - Brass drone layer  : four detuned oscillators (sawtooth/triangle/sine)
 *                          routed through a resonant LPF and a hand-built
 *                          convolution reverb with a realistic IR.
 *   - Pink noise texture : Paul Kellet's pink-noise algorithm rendered into a
 *                          looping buffer, band-passed for a warm room feel.
 *   - Sub-bass pulse     : 32.7 Hz (C1) sine, felt rather than heard, with a
 *                          slow LFO tremolo for organic breathing.
 *   - High shimmer       : Sparse stochastic pings on brass harmonic series,
 *                          each with a quick attack / long exponential tail.
 *   - Stereo width       : A small allpass stereo widener sits on the master
 *                          bus before the final gain stage.
 *   - Per-section morph  : Ten section profiles drive smooth parameter
 *                          transitions via setTargetAtTime on every live node.
 */

class PCMAudioEngine {
  constructor() {
    this.ctx          = null;
    this.masterGain   = null;
    this.widener      = null;   // stereo width allpass pair
    this.enabled      = false;
    this.activeSection = 0;
    this.nodes        = new Map();
    this.initialized  = false;
    this._shimmerTimer = null;
    this._lfoTimer     = null;
    this._visibilityHandler = null;
  }

  /* ------------------------------------------------------------------ */
  /*  PUBLIC                                                              */
  /* ------------------------------------------------------------------ */

  init() {
    if (this.initialized) return;

    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = this.ctx;

    /* Master gain — starts silent, fades in on enable() */
    this.masterGain = ctx.createGain();
    this.masterGain.gain.setValueAtTime(0, ctx.currentTime);

    /* Stereo widener: two allpass filters at slightly different frequencies
       on L and R channels using a ChannelSplitter / ChannelMerger pair.      */
    this._buildWidener();

    /* Signal chain:
       [sources] → masterGain → widener → ctx.destination                      */
    this.masterGain.connect(this.widener.splitter);

    this._buildBrassDrone();
    this._buildWoodgrainNoise();
    this._buildSubBass();
    this._buildHighFreqShimmer();  // bootstraps scheduler; pings deferred
    this._buildSubLFO();           // low-frequency tremolo on sub-bass

    this.initialized = true;
  }

  enable() {
    if (!this.initialized) this.init();
    if (this.ctx.state === 'suspended') this.ctx.resume();
    this.enabled = true;

    const t = this.ctx.currentTime;
    this.masterGain.gain.cancelScheduledValues(t);
    this.masterGain.gain.setTargetAtTime(0.72, t, 1.8);

    /* Kick off stochastic schedulers */
    this._scheduleShimmer();
    this._startSubLFO();

    /* Mute / unmute on tab visibility */
    this._visibilityHandler = () => {
      if (!this.ctx) return;
      const now = this.ctx.currentTime;
      if (document.hidden) {
        this.masterGain.gain.setTargetAtTime(0, now, 0.4);
      } else if (this.enabled) {
        this.masterGain.gain.setTargetAtTime(0.72, now, 0.4);
      }
    };
    document.addEventListener('visibilitychange', this._visibilityHandler);

    document.getElementById('btn-audio')?.classList.add('active');
  }

  disable() {
    if (!this.initialized) return;
    this.enabled = false;

    const t = this.ctx.currentTime;
    this.masterGain.gain.cancelScheduledValues(t);
    this.masterGain.gain.setTargetAtTime(0, t, 1.5);

    clearTimeout(this._shimmerTimer);
    clearTimeout(this._lfoTimer);
    this._shimmerTimer = null;
    this._lfoTimer     = null;

    if (this._visibilityHandler) {
      document.removeEventListener('visibilitychange', this._visibilityHandler);
      this._visibilityHandler = null;
    }

    document.getElementById('btn-audio')?.classList.remove('active');
  }

  toggle() {
    if (this.enabled) this.disable();
    else this.enable();
  }

  /* Morph all live parameters toward the target section profile. */
  setSection(idx) {
    if (!this.initialized || !this.ctx) return;
    this.activeSection = idx;

    const profile = this.SECTION_PROFILES[idx] || this.SECTION_PROFILES[0];
    const ctx     = this.ctx;
    const t       = ctx.currentTime;
    const tau     = 2.2;   // time-constant (seconds) for smooth morphs

    /* --- Brass drone --- */
    const drone = this.nodes.get('brassDrone');
    if (drone) {
      const f = profile.droneFreq;
      drone.oscs[0].frequency.setTargetAtTime(f,              t, tau);
      drone.oscs[1].frequency.setTargetAtTime(f + 0.18,       t, tau);
      drone.oscs[2].frequency.setTargetAtTime(f * 1.5,        t, tau);
      drone.oscs[3].frequency.setTargetAtTime(f * 2.0,        t, tau);
      drone.lpf.frequency.setTargetAtTime(profile.lpfFreq,    t, tau * 0.8);
      drone.lpf.Q.setTargetAtTime(profile.lpfQ,               t, tau * 0.8);
      drone.gain.gain.setTargetAtTime(profile.droneGain,      t, tau);
      drone.convGain.gain.setTargetAtTime(profile.reverbMix,  t, tau);
    }

    /* --- Pink noise --- */
    const noise = this.nodes.get('noise');
    if (noise) {
      noise.gain.gain.setTargetAtTime(profile.noiseGain, t, tau * 0.7);
      noise.lpf.frequency.setTargetAtTime(profile.noiseCut, t, tau * 0.7);
    }

    /* --- Sub bass --- */
    const sub = this.nodes.get('sub');
    if (sub) {
      sub.osc.frequency.setTargetAtTime(profile.subFreq, t, tau * 1.5);
      sub.gain.gain.setTargetAtTime(profile.subGain,     t, tau);
    }

    /* --- LFO (sub tremolo depth) --- */
    const lfo = this.nodes.get('lfo');
    if (lfo) {
      lfo.depthGain.gain.setTargetAtTime(profile.lfoDepth, t, tau);
      lfo.osc.frequency.setTargetAtTime(profile.lfoRate,   t, tau * 1.5);
    }
  }

  /* ------------------------------------------------------------------ */
  /*  SECTION PROFILES                                                    */
  /* ------------------------------------------------------------------ */
  /*
   * Fields per profile:
   *   droneFreq  — fundamental Hz of brass drone
   *   droneGain  — dry drone level
   *   reverbMix  — send level into the convolution reverb
   *   lpfFreq    — drone LPF cutoff (Hz)
   *   lpfQ       — drone LPF resonance
   *   noiseGain  — pink noise level
   *   noiseCut   — pink noise LPF cutoff
   *   subFreq    — sub bass Hz
   *   subGain    — sub bass level
   *   lfoDepth   — sub tremolo amplitude gain
   *   lfoRate    — sub tremolo rate (Hz)
   */
  SECTION_PROFILES = [
    /* 0 — Hero / Home: full, weighty, centred */
    { droneFreq: 65.4,  droneGain: 0.13, reverbMix: 0.32, lpfFreq: 420,  lpfQ: 1.1,
      noiseGain: 0.024, noiseCut: 620,   subFreq: 32.7,   subGain: 0.065, lfoDepth: 0.018, lfoRate: 0.07 },

    /* 1 — The Firm: slightly darker, more intimate */
    { droneFreq: 58.3,  droneGain: 0.11, reverbMix: 0.28, lpfFreq: 360,  lpfQ: 0.9,
      noiseGain: 0.019, noiseCut: 540,   subFreq: 29.1,   subGain: 0.055, lfoDepth: 0.014, lfoRate: 0.06 },

    /* 2 — Edge / Advantage: brighter, slightly raised energy */
    { droneFreq: 73.4,  droneGain: 0.14, reverbMix: 0.36, lpfFreq: 520,  lpfQ: 1.3,
      noiseGain: 0.029, noiseCut: 700,   subFreq: 36.7,   subGain: 0.045, lfoDepth: 0.022, lfoRate: 0.09 },

    /* 3 — Senior Capital: deepest, most authoritative */
    { droneFreq: 55.0,  droneGain: 0.15, reverbMix: 0.40, lpfFreq: 310,  lpfQ: 1.5,
      noiseGain: 0.014, noiseCut: 450,   subFreq: 27.5,   subGain: 0.085, lfoDepth: 0.012, lfoRate: 0.05 },

    /* 4 — Sub Capital: close relative of Senior, slightly warmer */
    { droneFreq: 61.7,  droneGain: 0.12, reverbMix: 0.30, lpfFreq: 330,  lpfQ: 1.0,
      noiseGain: 0.017, noiseCut: 480,   subFreq: 30.9,   subGain: 0.072, lfoDepth: 0.016, lfoRate: 0.06 },

    /* 5 — Equity / Growth: mid-high brightness, forward */
    { droneFreq: 69.3,  droneGain: 0.13, reverbMix: 0.34, lpfFreq: 440,  lpfQ: 1.2,
      noiseGain: 0.021, noiseCut: 660,   subFreq: 34.6,   subGain: 0.052, lfoDepth: 0.020, lfoRate: 0.08 },

    /* 6 — Execution: crisper, more transient, higher shimmer activity */
    { droneFreq: 77.8,  droneGain: 0.11, reverbMix: 0.26, lpfFreq: 500,  lpfQ: 0.8,
      noiseGain: 0.027, noiseCut: 720,   subFreq: 38.9,   subGain: 0.038, lfoDepth: 0.025, lfoRate: 0.11 },

    /* 7 — Underwriting: deep and spacious */
    { droneFreq: 65.4,  droneGain: 0.14, reverbMix: 0.45, lpfFreq: 260,  lpfQ: 1.4,
      noiseGain: 0.011, noiseCut: 380,   subFreq: 32.7,   subGain: 0.094, lfoDepth: 0.010, lfoRate: 0.05 },

    /* 8 — Compliance / Governance: spare, restrained, low noise */
    { droneFreq: 58.3,  droneGain: 0.09, reverbMix: 0.22, lpfFreq: 210,  lpfQ: 0.7,
      noiseGain: 0.009, noiseCut: 320,   subFreq: 29.1,   subGain: 0.062, lfoDepth: 0.008, lfoRate: 0.04 },

    /* 9 — Engage / Contact: open, welcoming, highest shimmer density */
    { droneFreq: 87.3,  droneGain: 0.12, reverbMix: 0.38, lpfFreq: 620,  lpfQ: 1.0,
      noiseGain: 0.034, noiseCut: 800,   subFreq: 43.7,   subGain: 0.035, lfoDepth: 0.028, lfoRate: 0.13 },
  ];

  /* ------------------------------------------------------------------ */
  /*  PRIVATE — BUILDERS                                                  */
  /* ------------------------------------------------------------------ */

  /**
   * Stereo widener.
   * Uses a ChannelSplitter → two allpass filters at slightly different
   * frequencies (one per channel) → ChannelMerger.  The resulting phase
   * differential between L and R gives perceived width without resorting
   * to a Haas effect or mid-side matrix.
   */
  _buildWidener() {
    const ctx     = this.ctx;
    const splitter = ctx.createChannelSplitter(2);
    const merger   = ctx.createChannelMerger(2);

    const apL = ctx.createBiquadFilter();
    apL.type = 'allpass';
    apL.frequency.value = 620;
    apL.Q.value = 0.7;

    const apR = ctx.createBiquadFilter();
    apR.type = 'allpass';
    apR.frequency.value = 840;
    apR.Q.value = 0.7;

    splitter.connect(apL, 0);
    splitter.connect(apR, 1);
    apL.connect(merger, 0, 0);
    apR.connect(merger, 0, 1);
    merger.connect(ctx.destination);

    this.widener = { splitter, merger, apL, apR };
  }

  /**
   * Brass drone.
   *
   * Signal path:
   *   osc1 (saw, C2)  ─┐
   *   osc2 (saw, ~C2) ─┤
   *   osc3 (tri, G2)  ─┤→ LPF (resonant) → dryGain  → masterGain
   *   osc4 (sin, C3)  ─┘              └──→ conv IR → convGain → masterGain
   *
   * The convolution reverb uses a synthetically generated impulse response
   * that models a large stone hall: dense early reflections followed by an
   * exponentially decaying diffuse tail with mild random modulation.
   */
  _buildBrassDrone() {
    const ctx = this.ctx;

    /* --- Oscillators --- */
    const osc1 = ctx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.value = 65.4;   // C2 fundamental

    const osc2 = ctx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.value = 65.58;  // tiny detune for beating warmth

    const osc3 = ctx.createOscillator();
    osc3.type = 'triangle';        // 5th: G2
    osc3.frequency.value = 97.99;

    const osc4 = ctx.createOscillator();
    osc4.type = 'sine';            // octave: C3 — round low end
    osc4.frequency.value = 130.8;

    /* --- LPF: shapes the timbre, controlled per section --- */
    const lpf = ctx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = 420;
    lpf.Q.value = 1.1;

    /* --- Dry gain --- */
    const dg = ctx.createGain();
    dg.gain.value = 0.13;

    /* --- Convolution reverb (synthetic stone-hall IR) --- */
    const conv     = ctx.createConvolver();
    conv.buffer    = this._buildHallIR(2.6);   // 2.6-second tail

    const convGain = ctx.createGain();
    convGain.gain.value = 0.32;

    /* --- Wire --- */
    [osc1, osc2, osc3, osc4].forEach(o => {
      o.connect(lpf);
      o.start();
    });

    lpf.connect(dg);
    lpf.connect(conv);

    dg.connect(this.masterGain);
    conv.connect(convGain);
    convGain.connect(this.masterGain);

    this.nodes.set('brassDrone', {
      oscs: [osc1, osc2, osc3, osc4],
      gain: dg,
      lpf,
      conv,
      convGain,
    });
  }

  /**
   * Generates a synthetic hall impulse response.
   *
   * The IR has three phases:
   *   1. Pre-delay (2 ms silence)
   *   2. Early reflections: 12 discrete echoes at logarithmically spaced
   *      delays up to ~80 ms, each attenuated and slightly randomised.
   *   3. Diffuse tail: exponentially decaying coloured noise with a subtle
   *      per-sample modulation to avoid metallic resonance.
   *
   * @param {number} decaySec  Total IR length in seconds.
   * @returns {AudioBuffer}
   */
  _buildHallIR(decaySec) {
    const ctx    = this.ctx;
    const sr     = ctx.sampleRate;
    const len    = Math.ceil(sr * decaySec);
    const ir     = ctx.createBuffer(2, len, sr);
    const decay  = decaySec;

    /* Early reflections: 12 taps */
    const erTimes = [0.003, 0.007, 0.012, 0.019, 0.028, 0.040,
                     0.054, 0.071, 0.091, 0.115, 0.143, 0.178];

    for (let ch = 0; ch < 2; ch++) {
      const d    = ir.getChannelData(ch);
      const sign = ch === 0 ? 1 : -1;   // slight L/R difference

      /* --- Early reflections --- */
      erTimes.forEach((tSec, i) => {
        const samp = Math.floor(tSec * sr);
        if (samp < len) {
          const amp = Math.pow(0.70, i) * (1 + sign * 0.04 * (Math.random() - 0.5));
          d[samp] += amp;
        }
      });

      /* --- Diffuse tail: pink-ish noise with exponential envelope --- */
      /* We reuse a simplified pink-noise filter in-line here.          */
      let pn0 = 0, pn1 = 0, pn2 = 0, pn3 = 0, pn4 = 0, pn5 = 0;
      for (let i = Math.floor(0.002 * sr); i < len; i++) {
        const white = Math.random() * 2 - 1;
        pn0 = 0.99886 * pn0 + white * 0.0555179;
        pn1 = 0.99332 * pn1 + white * 0.0750759;
        pn2 = 0.96900 * pn2 + white * 0.1538520;
        pn3 = 0.86650 * pn3 + white * 0.3104856;
        pn4 = 0.55000 * pn4 + white * 0.5329522;
        pn5 = -0.7616 * pn5 - white * 0.0168980;
        const pink = (pn0 + pn1 + pn2 + pn3 + pn4 + pn5 + white * 0.5362) * 0.11;

        /* Exponential decay; steeper decay exponent than linear for
           realistic hall character (Sabine-ish model).                 */
        const env = Math.pow(1 - i / len, decay * 1.2);

        /* Mild tremolo prevents metallic ringing in the tail */
        const mod  = 1 + 0.015 * Math.sin(2 * Math.PI * 0.9 * i / sr);

        d[i] += pink * env * mod * 0.55;
      }
    }

    return ir;
  }

  /**
   * Pink noise texture — warm room ambience.
   *
   * Paul Kellet's 7-term pink-noise algorithm fills a 4-second looping
   * buffer.  The buffer is routed through a HPF (removes sub rumble) and
   * a gentle LPF so it sits between 80 Hz and ~620 Hz.
   */
  _buildWoodgrainNoise() {
    const ctx    = this.ctx;
    const bufLen = ctx.sampleRate * 4;
    const buf    = ctx.createBuffer(2, bufLen, ctx.sampleRate);

    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
      for (let i = 0; i < bufLen; i++) {
        const w = Math.random() * 2 - 1;
        b0 = 0.99886 * b0 + w * 0.0555179;
        b1 = 0.99332 * b1 + w * 0.0750759;
        b2 = 0.96900 * b2 + w * 0.1538520;
        b3 = 0.86650 * b3 + w * 0.3104856;
        b4 = 0.55000 * b4 + w * 0.5329522;
        b5 = -0.7616  * b5 - w * 0.0168980;
        d[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + w * 0.5362) * 0.11;
        b6 = w * 0.115926;
      }
    }

    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.loop   = true;

    /* Very slight playback-rate detune per channel for width */
    src.playbackRate.value = 1.0;

    const hpf = ctx.createBiquadFilter();
    hpf.type           = 'highpass';
    hpf.frequency.value = 80;
    hpf.Q.value         = 0.6;

    const lpf = ctx.createBiquadFilter();
    lpf.type           = 'lowpass';
    lpf.frequency.value = 620;
    lpf.Q.value         = 0.5;

    const ng = ctx.createGain();
    ng.gain.value = 0.024;

    src.connect(hpf);
    hpf.connect(lpf);
    lpf.connect(ng);
    ng.connect(this.masterGain);
    src.start();

    this.nodes.set('noise', { src, gain: ng, hpf, lpf });
  }

  /**
   * Sub-bass.
   *
   * A 32.7 Hz (C1) sine oscillator provides the tactile low-end foundation.
   * Its output runs through a dedicated gain node that is also the target
   * of the LFO depth gain (see _buildSubLFO), so the LFO tremolo modulates
   * the sub level rather than pitch — keeping tuning stable while adding
   * an organic breathing quality.
   */
  _buildSubBass() {
    const ctx = this.ctx;

    const osc = ctx.createOscillator();
    osc.type            = 'sine';
    osc.frequency.value = 32.7;

    /* Second-order Butterworth LPF to ensure sub remains clean */
    const lpf = ctx.createBiquadFilter();
    lpf.type            = 'lowpass';
    lpf.frequency.value = 80;
    lpf.Q.value         = 0.5;

    const g = ctx.createGain();
    g.gain.value = 0.065;

    osc.connect(lpf);
    lpf.connect(g);
    g.connect(this.masterGain);
    osc.start();

    this.nodes.set('sub', { osc, lpf, gain: g });
  }

  /**
   * Sub-bass LFO tremolo.
   *
   * A very slow (0.07 Hz) sine oscillator is scaled by a depth gain and
   * connected to the sub's gain AudioParam.  This gives the sub-bass the
   * slow "breathing" feel characteristic of large-room ambience.
   */
  _buildSubLFO() {
    const ctx = this.ctx;

    const lfoOsc = ctx.createOscillator();
    lfoOsc.type            = 'sine';
    lfoOsc.frequency.value = 0.07;

    /* The LFO outputs −1…+1; scale it to a small amplitude */
    const depthGain = ctx.createGain();
    depthGain.gain.value = 0.018;

    const sub = this.nodes.get('sub');
    lfoOsc.connect(depthGain);
    if (sub) depthGain.connect(sub.gain.gain);

    /* Store but do NOT start yet — start in _startSubLFO() on enable() */
    this.nodes.set('lfo', { osc: lfoOsc, depthGain });
  }

  _startSubLFO() {
    const lfo = this.nodes.get('lfo');
    if (lfo && !lfo._started) {
      lfo.osc.start();
      lfo._started = true;
    }
  }

  /* ------------------------------------------------------------------ */
  /*  HIGH-FREQ SHIMMER — stochastic brass-harmonic pings               */
  /* ------------------------------------------------------------------ */

  _buildHighFreqShimmer() {
    /*
     * No persistent nodes here — each ping is a self-contained subgraph
     * that is created, scheduled, and garbage-collected by the browser.
     * _scheduleShimmer() is called from enable() to start the scheduler.
     */
  }

  /**
   * Schedules a single shimmer ping and then reschedules itself.
   *
   * Each ping:
   *   • Picks a frequency from the brass overtone series (C major harmonics).
   *   • Creates an oscillator + amplitude envelope.
   *   • Applies a short allpass smear for shimmer-like sustain.
   *   • Connects directly to masterGain (bypasses sub bus).
   *   • Self-destructs after its envelope completes.
   *
   * The inter-ping interval is randomised (0.8 – 4.2 s) so the density
   * feels organic rather than metronomic.
   */
  _scheduleShimmer() {
    if (!this.enabled || !this.ctx) return;

    const ctx      = this.ctx;
    const profile  = this.SECTION_PROFILES[this.activeSection] || this.SECTION_PROFILES[0];

    /* Density: higher lfoRate sections get slightly more shimmer */
    const minGap   = 0.6;
    const maxGap   = 4.5 - profile.lfoRate * 15;  // section-aware density
    const gapSec   = Math.random() * (maxGap - minGap) + minGap;
    const gapMs    = gapSec * 1000;

    /* Schedule the actual audio event slightly into the future so it is
       always ahead of the currentTime by the time it fires.              */
    const offset  = Math.random() * 0.4 + 0.05;   // 50–450 ms ahead
    const t       = ctx.currentTime + offset;

    /*
     * Brass overtone series above the current drone fundamental.
     * Partials: 4f, 5f, 6f, 7f, 8f, 10f — avoiding 9f (minor 7th clash).
     */
    const f0       = profile.droneFreq;
    const partials = [4, 5, 6, 7, 8, 10];
    const mult     = partials[Math.floor(Math.random() * partials.length)];
    const freq     = f0 * mult;

    /* Amplitude: quieter for lower sections, slightly louder for Edge/Engage */
    const peakAmp  = 0.012 + profile.noiseGain * 0.6;

    /* --- Oscillator + envelope --- */
    const osc = ctx.createOscillator();
    osc.type            = 'sine';
    osc.frequency.value = freq;

    /* Tiny frequency wobble for breath */
    osc.frequency.setValueAtTime(freq,          t);
    osc.frequency.linearRampToValueAtTime(freq * 1.0008, t + 0.08);
    osc.frequency.linearRampToValueAtTime(freq,          t + 0.4);

    const env = ctx.createGain();
    env.gain.setValueAtTime(0,        t);
    env.gain.linearRampToValueAtTime(peakAmp,   t + 0.018);  // fast attack
    env.gain.setValueAtTime(peakAmp,            t + 0.025);
    env.gain.exponentialRampToValueAtTime(0.0001, t + 1.6);  // long tail

    /* Allpass "smear" for that bell/shimmer quality */
    const ap = ctx.createBiquadFilter();
    ap.type             = 'allpass';
    ap.frequency.value  = freq * 0.5;
    ap.Q.value          = 8.0;

    osc.connect(ap);
    ap.connect(env);
    env.connect(this.masterGain);

    osc.start(t);
    osc.stop(t + 1.7);

    /* Reschedule */
    this._shimmerTimer = setTimeout(() => this._scheduleShimmer(), gapMs);
  }

  /* ------------------------------------------------------------------ */
  /*  CONVENIENCE GETTERS (diagnostics / external query)                 */
  /* ------------------------------------------------------------------ */

  get currentProfile() {
    return this.SECTION_PROFILES[this.activeSection] || this.SECTION_PROFILES[0];
  }

  get contextState() {
    return this.ctx ? this.ctx.state : 'uninitialized';
  }
}

/* -------------------------------------------------------------------- */
/*  Singleton + global wiring                                            */
/* -------------------------------------------------------------------- */

const audioEngine = new PCMAudioEngine();
window.audioEngine = audioEngine;

/* Toggle button */
document.getElementById('btn-audio')?.addEventListener('click', () => audioEngine.toggle());

/* Section change hook — called by scroll observer in main.js */
window.onSectionChange = function(idx) {
  audioEngine.setSection(idx);
};

/* Keyboard shortcut: M */
window.addEventListener('keydown', e => {
  if ((e.key === 'm' || e.key === 'M') && !e.ctrlKey && !e.metaKey) {
    audioEngine.toggle();
  }
});


  // ═══════ INIT SEQUENCE ═══════════════════════════════════════════
  // Chrome auto-initializes on DOMContentLoaded; if it already fired we call manually.
  try { window.initChrome(); } catch(err) { console.error('initChrome', err); }

  if (window.gsap) {
    // Loader wordmark + hairline + bar wrap reveal
    gsap.from('.intro-loader__wordmark-loader', { opacity: 0, y: 12, duration: 0.9, ease: 'expo.out' });
    gsap.from('.intro-loader__hairline', { scaleX: 0, duration: 0.7, ease: 'power3.inOut', delay: 0.2, transformOrigin: 'center' });
    gsap.from('.intro-loader__bar-wrap', { opacity: 0, y: 8, duration: 0.6, ease: 'power2.out', delay: 0.3 });
    gsap.from('.intro-loader__pct', { opacity: 0, duration: 0.6, ease: 'power2.out', delay: 0.5 });
  }

  if (window.gsap) {
    setTimeout(() => {
      const wordmark = document.querySelector('.home-mark .wordmark');
      const slogan = document.querySelector('.home-mark .slogan');
      const hairline = document.querySelector('.home-mark .brass-hairline');
      if (wordmark) {
        gsap.fromTo(wordmark,
          { opacity: 0, x: -20 },
          { opacity: 1, x: 0, duration: 1.2, ease: 'expo.out', delay: 2.4 }
        );
      }
      if (slogan) {
        gsap.fromTo(slogan,
          { opacity: 0 },
          { opacity: 1, duration: 0.8, ease: 'power2.out', delay: 2.8 }
        );
      }
      if (hairline) {
        gsap.fromTo(hairline,
          { scaleX: 0 },
          { scaleX: 1, duration: 1.0, ease: 'power3.inOut', delay: 3.0, transformOrigin: 'left' }
        );
      }
    }, 100);
  }

  // Overlays
  try { initOverlays(); } catch(err) { console.error('initOverlays', err); }

  // Scene
  const { scene, camera, renderer, composer } = initScene();

  // Logo
  const logoRefs = buildPCMLogo(THREE);
  scene.add(logoRefs.root);
  window.pcmRoot          = logoRefs.root;
  window.leverGroup       = logoRefs.leverGroup;
  window.refreshGroup     = logoRefs.refreshGroup;
  window.orbitalDots      = logoRefs.orbitalDots;
  window.haloDisc         = logoRefs.haloDisc;
  window.particles        = logoRefs.particles;
  window.outerRing        = logoRefs.outerRing;
  window.accentRingMesh   = logoRefs.accentRingMesh;
  window.tickGroup        = logoRefs.tickGroup;
  window.fulcrumGlowRing  = logoRefs.glowRing;
  window.bgPlane          = logoRefs.bgPlane;

  // Make leverGroup and friends accessible as bare names where animation.js expects them
  // (the script is concatenated so its top-level `let` declarations are in module scope —
  //  we shadow them by writing to window as the source of truth.)

  // Dismiss intro loader after a beat
  setTimeout(() => {
    const loader = document.getElementById('intro-loader');
    if (loader) loader.classList.add('done');
    setTimeout(() => loader && loader.remove(), 1000);
  }, 2200);

  // Initial UI sync
  if (typeof updateCopyContent === 'function') updateCopyContent(0);
  if (typeof updateSectionUI === 'function') updateSectionUI(0);
  if (typeof window.updateChrome === 'function') window.updateChrome(0);

  </script>
</body>
