// ────────────────────────────────────────────────
// GAP 2 — SVG drag-to-reveal scrubber (Senior Debt)
// ────────────────────────────────────────────────
(function initScrubSwiper() {
  function attempt() {
    const swiper = document.getElementById('scrub-swiper');
    const handle = document.getElementById('scrub-handle');
    const mask   = document.getElementById('scrub-mask');
    if (!swiper || !handle || !mask) {
      // Element may not exist yet — retry shortly
      return setTimeout(attempt, 200);
    }

    const track = swiper.querySelector('.scrub-track');
    const readout = document.getElementById('scrub-progress-readout');
    let progress = 0;     // 0..1
    let isDragging = false;
    let startX = 0;

    // Mode-specific content (matches SECTIONS[3].modes)
    const SCRUB_MODES = [
      { name: 'Acquisition Financing', label: 'Senior Debt · Acquisition',
        body: '$15M–$500M · SOFR + 175–275 bps · 6–10 week close',
        size: '$15M–$500M', spread: 'SOFR + 175–275', close: '6–10 weeks' },
      { name: 'Refinance Execution', label: 'Senior Debt · Refinance',
        body: 'Rate-and-term and cash-out. Reset basis, lock in tenor.',
        size: '$25M–$400M', spread: 'SOFR + 165–250', close: '4–8 weeks' },
      { name: 'Bridge / Value-Add', label: 'Senior Debt · Bridge',
        body: 'Short-duration value-add. Lease-up, repositioning, repricing.',
        size: '$10M–$250M', spread: 'SOFR + 275–450', close: '3–6 weeks' },
      { name: 'Construction Senior', label: 'Senior Debt · Construction',
        body: 'Ground-up and major reno. Often paired with mezz behind.',
        size: '$20M–$600M', spread: 'SOFR + 300–500', close: '8–14 weeks' },
    ];

    function getTrackWidth() { return track ? track.offsetWidth : 400; }
    function getTrackLeft()  { return track ? track.getBoundingClientRect().left : 0; }

    function updateProgress(p) {
      progress = Math.max(0, Math.min(1, p));
      const trackW = getTrackWidth();
      handle.style.left = (progress * trackW) + 'px';
      const insetPct = (1 - progress) * 100;
      mask.style.clipPath = `inset(0 ${insetPct.toFixed(2)}% 0 0)`;
      swiper.setAttribute('aria-valuenow', Math.round(progress * 100));
      if (readout) readout.textContent = Math.round(progress * 100) + '%';
      if (progress > 0.95) mask.classList.add('revealed');
      else mask.classList.remove('revealed');

      // Update mode content based on progress
      const modeIdx = Math.min(SCRUB_MODES.length - 1, Math.floor(progress * SCRUB_MODES.length));
      const mode = SCRUB_MODES[modeIdx];
      if (mode) {
        const el = (id) => document.getElementById(id);
        if (el('scrub-content-title')) el('scrub-content-title').textContent = mode.name;
        if (el('scrub-content-label')) el('scrub-content-label').textContent = mode.label;
        if (el('scrub-content-body'))  el('scrub-content-body').textContent  = mode.body;
        if (el('scrub-stat-size'))     el('scrub-stat-size').textContent     = mode.size;
        if (el('scrub-stat-spread'))   el('scrub-stat-spread').textContent   = mode.spread;
        if (el('scrub-stat-close'))    el('scrub-stat-close').textContent    = mode.close;
      }
    }

    // Pointer drag
    handle.addEventListener('pointerdown', e => {
      isDragging = true;
      handle.classList.add('dragging');
      const tx = e.clientX - getTrackLeft();
      startX = tx - (progress * getTrackWidth());
      try { handle.setPointerCapture(e.pointerId); } catch (_){}
      e.preventDefault();
    });
    handle.addEventListener('pointermove', e => {
      if (!isDragging) return;
      const tx = e.clientX - getTrackLeft();
      updateProgress((tx - startX) / getTrackWidth());
    });
    function endDrag() {
      isDragging = false;
      handle.classList.remove('dragging');
    }
    handle.addEventListener('pointerup', endDrag);
    handle.addEventListener('pointercancel', endDrag);
    handle.addEventListener('lostpointercapture', endDrag);

    // Click track to jump
    if (track) {
      track.addEventListener('pointerdown', e => {
        if (e.target.closest('.scrub-drag-handle')) return;
        const tx = e.clientX - getTrackLeft();
        updateProgress(tx / getTrackWidth());
      });
    }

    // Keyboard support
    handle.addEventListener('keydown', e => {
      let nudge = 0;
      if (e.key === 'ArrowRight' || e.key === 'ArrowUp') nudge = 0.05;
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') nudge = -0.05;
      else if (e.key === 'Home') { updateProgress(0); e.preventDefault(); return; }
      else if (e.key === 'End')  { updateProgress(1); e.preventDefault(); return; }
      else if (e.key === 'PageUp')   nudge = 0.25;
      else if (e.key === 'PageDown') nudge = -0.25;
      if (nudge !== 0) {
        updateProgress(progress + nudge);
        e.preventDefault();
      }
    });

    // Show/hide based on active section
    function syncScrubber(idx) {
      if (idx === 3) {
        swiper.classList.add('visible');
        swiper.setAttribute('aria-hidden', 'false');
        mask.style.display = 'block';
        mask.setAttribute('aria-hidden', 'false');
        // Reset to 0 progress each time we enter Senior Debt section
        updateProgress(0);
      } else {
        swiper.classList.remove('visible');
        swiper.setAttribute('aria-hidden', 'true');
        mask.style.display = 'none';
        mask.setAttribute('aria-hidden', 'true');
        updateProgress(0);
      }
    }
    window._syncScrubber = syncScrubber;

    // Initial state
    syncScrubber(window.activeIdx || 0);
  }
  attempt();
})();

// ═══════════════════════════════════════════════════════════════════════════
// V22.A — BATTERY TOGGLE (Battery Status API + manual override)
// Detects low battery (<20%) and activates low-power mode, which reduces
// grain, disables ring animations, and halves bloom intensity.
// ═══════════════════════════════════════════════════════════════════════════
(function initBatteryToggle() {
  let lowPowerActive = false;

  function activateLowPower(level) {
    if (lowPowerActive) return;
    lowPowerActive = true;
    document.body.classList.add('low-power-mode');
    window.lowPowerMode = true;

    // Halve bloom intensity
    if (window.bloom) {
      window.bloom.intensity = Math.min(window.bloom.intensity, 0.45);
    }

    // Update battery fill visual
    const fill = document.getElementById('battery-fill');
    if (fill) {
      const pct = Math.round((level || 0.18) * 100);
      fill.style.width = pct + '%';
      if (pct <= 10) fill.classList.add('critical');
    }

    // Show indicator
    const ind = document.getElementById('battery-indicator');
    if (ind) {
      ind.classList.add('visible');
      const lbl = document.getElementById('battery-label');
      if (lbl) lbl.textContent = 'POWER SAVER';
    }
  }

  function deactivateLowPower() {
    if (!lowPowerActive) return;
    lowPowerActive = false;
    document.body.classList.remove('low-power-mode');
    window.lowPowerMode = false;

    // Restore bloom
    if (window.bloom) window.bloom.intensity = 0.85;

    // Hide indicator
    const ind = document.getElementById('battery-indicator');
    if (ind) ind.classList.remove('visible');
  }

  // Battery Status API
  if ('getBattery' in navigator) {
    navigator.getBattery().then(battery => {
      function check() {
        if (battery.level <= 0.20 && !battery.charging) {
          activateLowPower(battery.level);
        } else if (battery.charging || battery.level > 0.25) {
          deactivateLowPower();
        }
        // Update fill without activating mode (for indicator only)
        const fill = document.getElementById('battery-fill');
        if (fill && lowPowerActive) {
          fill.style.width = Math.round(battery.level * 100) + '%';
          fill.classList.toggle('critical', battery.level <= 0.10);
        }
      }
      check();
      battery.addEventListener('levelchange',  check);
      battery.addEventListener('chargingchange', check);
    }).catch(() => {});
  }

  // Manual toggle via battery-indicator click
  const ind = document.getElementById('battery-indicator');
  if (ind) {
    ind.addEventListener('click', () => {
      if (lowPowerActive) deactivateLowPower();
      else activateLowPower(0.15);
    });
  }

  // Expose for keyboard shortcut if desired
  window.pcmToggleLowPower = () => lowPowerActive ? deactivateLowPower() : activateLowPower(0.15);
})();


// ═══════════════════════════════════════════════════════════════════════════
// V22.B — SUBSTEP NAV (horizontal dash step indicators)
// Syncs with mode buttons to show seacat-style 50px × 3px dashes
// ═══════════════════════════════════════════════════════════════════════════
(function initSubStepNav() {
  // Called every time the section copy is updated with new mode data
  window.updateSubStepNav = function(count, activeIdx) {
    const nav = document.getElementById('substep-nav');
    if (!nav) return;

    if (!count || count <= 1) {
      nav.classList.remove('visible');
      nav.innerHTML = '';
      return;
    }

    // Build dashes if count changed
    if (nav.children.length !== count) {
      nav.innerHTML = Array.from({ length: count }, (_, i) => `
        <button class="substep-dash${i === activeIdx ? ' active' : ''}"
          aria-label="Go to step ${i + 1}" data-step="${i}"
          onclick="window.setMode&&window.setMode(${i})">
        </button>
      `).join('');
    }
    nav.classList.add('visible');
    nav.querySelectorAll('.substep-dash').forEach((d, i) => {
      d.classList.toggle('active', i === activeIdx);
    });
  };

  // Patch setMode to also update substep nav
  const _origSetMode = window.setMode;
  window.setMode = function(idx) {
    if (_origSetMode) _origSetMode(idx);
    // Count dashes from current mode buttons
    const btns = document.querySelectorAll('.mode-btn');
    window.updateSubStepNav(btns.length, idx);
  };
})();


// ═══════════════════════════════════════════════════════════════════════════
// V22.C — AUDIO VOLUME PANEL (slide-out volume controller)
// Long-press or right-click audio button to open; slider controls masterGain
// ═══════════════════════════════════════════════════════════════════════════
(function initAudioVolPanel() {
  const btn  = document.getElementById('btn-audio');
  const panel = document.getElementById('audio-vol-panel');
  const slider = document.getElementById('audio-vol-slider');
  if (!btn || !panel || !slider) return;

  let panelOpen = false;
  let holdTimer = null;
  const HOLD_MS = 400;

  function openPanel() {
    panelOpen = true;
    panel.classList.add('open');
    panel.setAttribute('aria-hidden', 'false');
  }

  function closePanel() {
    panelOpen = false;
    panel.classList.remove('open');
    panel.setAttribute('aria-hidden', 'true');
  }

  // Long-press to reveal volume panel (toggle on short click handled by existing audio toggle)
  btn.addEventListener('pointerdown', (e) => {
    holdTimer = setTimeout(() => {
      holdTimer = null;
      if (panelOpen) closePanel(); else openPanel();
    }, HOLD_MS);
  });
  btn.addEventListener('pointerup', () => {
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
  });
  btn.addEventListener('pointercancel', () => {
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
  });

  // Close when clicking outside
  document.addEventListener('pointerdown', (e) => {
    if (panelOpen && !btn.contains(e.target)) closePanel();
  }, { passive: true });

  // Keyboard: Escape closes
  document.addEventListener('keydown', (e) => {
    if (panelOpen && e.key === 'Escape') closePanel();
  });

  // Volume slider → audio engine master gain
  window.pcmSetVolume = function(val) {
    // val is 0..1
    const v = Math.max(0, Math.min(1, val));
    if (window.audioEngine && window.audioEngine.ctx && window.audioEngine.masterGain) {
      const now = window.audioEngine.ctx.currentTime;
      window.audioEngine.masterGain.gain.setTargetAtTime(v * 0.72, now, 0.08);
    }
    // Update slider if called externally
    if (slider) slider.value = Math.round(v * 100);
  };

  // Stop short click from propagating to btn toggle when coming from panel
  panel.addEventListener('click', (e) => e.stopPropagation());

  // Mark initial state
  panel.setAttribute('aria-hidden', 'true');
})();

function showSectionCopy(idx) {
  const copy = document.querySelector('.scene-copy');
  if (!copy) return;

  // Set backdrop text for this section (staggered letter reveal)
  const backdropEl = document.getElementById('section-title-backdrop');
  if (backdropEl) {
    const _bdTitles = [
      'Home','Firm Overview','Platform Edge','Senior Debt',
      'Sub Capital','Equity','Execution','Underwriting','Compliance','Engage'
    ];
    const _bdTitle = (_bdTitles[idx] || '').toUpperCase();
    const _bdLetters = _bdTitle.split('').map(function(ch, j) {
      return '<span class="bd-letter" style="display:inline-block;opacity:0;transform:translateY(12px);transition:opacity 0.5s ease '
        + (j * 0.042 + 0.06).toFixed(3) + 's,transform 0.5s ease '
        + (j * 0.042 + 0.06).toFixed(3) + 's">'
        + (ch === ' ' ? '&nbsp;' : ch) + '</span>';
    }).join('');
    backdropEl.innerHTML = _bdLetters;
    backdropEl.classList.add('visible');
    backdropEl.classList.remove('hidden');
    setTimeout(function() {
      backdropEl.querySelectorAll('.bd-letter').forEach(function(span) {
        span.style.opacity = '1';
        span.style.transform = 'translateY(0)';
      });
    }, 650);
  }

  // Hide section-end indicator on every section show
  if (typeof window._hideSectionEndIndicator === 'function') window._hideSectionEndIndicator();

  // Section 9 (Engage): engage-cinematic takes over — don't show scene-copy
  // Section 6 (Execution): execution-stage-host takes over — don't show scene-copy
  if (idx === 9 || idx === 6) {
    copy.classList.add('hidden');
    copy.classList.remove('visible');
    updateCopyContent(idx); // still updates chrome meta
    return;
  }

  copy.classList.remove('hidden');
  copy.classList.add('visible');
  updateCopyContent(idx);
  // Update section title backdrop
  const backdrop = document.getElementById('section-title-backdrop');
  if (backdrop) {
    const BACKDROP_NAMES = ['PATEL','FIRM','PLATFORM','SENIOR','SUBORDINATE','EQUITY','EXECUTION','UNDERWRITING','COMPLIANCE','ENGAGE'];
    backdrop.textContent = BACKDROP_NAMES[idx] || '';
    backdrop.classList.remove('hidden');
    backdrop.classList.add('visible');
  }
  // For sections without modes: show section-end indicator after 2s
  {
    const _seiSec = window.SECTIONS && window.SECTIONS[idx];
    if (_seiSec && (!_seiSec.modes || _seiSec.modes.length === 0)) {
      clearTimeout(window._seiTimer);
      window._seiTimer = setTimeout(function() {
        if (typeof window._showSectionEndIndicator === 'function') window._showSectionEndIndicator();
      }, 2000);
    }
  }

  if (window.gsap) {
    gsap.killTweensOf('.reveal-inner, .pre-title, .body-text, .stat-item, .tag, .mode-btn, .title-rule, .sub-title');

    // Word-by-word title reveal (seacat style)
    gsap.fromTo('.reveal-inner',
      { yPercent: 105 },
      { yPercent: 0, duration: 0.9, stagger: 0.06, ease: 'expo.out', delay: 0.1 }
    );

    // Pre-title
    gsap.fromTo(document.querySelector('.pre-title'),
      { opacity: 0, x: -20 },
      { opacity: 1, x: 0, duration: 0.7, ease: 'power3.out', delay: 0.05 }
    );

    // Rule expands from left
    gsap.fromTo(document.querySelector('.title-rule'),
      { scaleX: 0, transformOrigin: 'left center' },
      { scaleX: 1, duration: 0.8, ease: 'power3.inOut', delay: 0.45 }
    );

    // Body text
    gsap.fromTo(document.querySelector('.body-text'),
      { opacity: 0, y: 18 },
      { opacity: 1, y: 0, duration: 0.9, ease: 'power2.out', delay: 0.55 }
    );

    // Stats
    gsap.fromTo(document.querySelectorAll('.stat-item'),
      { opacity: 0, y: 24 },
      { opacity: 1, y: 0, duration: 0.7, stagger: 0.1, ease: 'back.out(1.8)', delay: 0.65 }
    );

    // Tags
    gsap.fromTo(document.querySelectorAll('.tag'),
      { opacity: 0, scale: 0.75 },
      { opacity: 1, scale: 1, duration: 0.5, stagger: 0.04, ease: 'back.out(2.5)', delay: 0.75 }
    );

    // Mode buttons
    gsap.fromTo(document.querySelectorAll('.mode-btn'),
      { opacity: 0, x: -20 },
      { opacity: 1, x: 0, duration: 0.5, stagger: 0.07, ease: 'power2.out', delay: 0.8 }
    );

    // Sub-title
    gsap.fromTo(document.querySelector('.sub-title'),
      { opacity: 0, y: 10 },
      { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out', delay: 0.38 }
    );

    // Count-up animation for stat numbers
    setTimeout(function() {
      document.querySelectorAll('.stat-num, .vp-stat-val').forEach(function(el) {
        const raw = el.getAttribute('data-raw') || el.textContent || '';
        // Extract numeric portion
        const numMatch = raw.match(/[\d,.]+/);
        if (!numMatch) return;
        const numStr = numMatch[0].replace(/,/g, '');
        const num = parseFloat(numStr);
        if (isNaN(num) || num <= 0) return;
        const prefix = raw.slice(0, raw.indexOf(numMatch[0]));
        const suffix = raw.slice(raw.indexOf(numMatch[0]) + numMatch[0].length);
        const isInt = !numStr.includes('.');
        const counter = { val: 0 };
        gsap.to(counter, {
          val: num,
          duration: 1.4,
          ease: 'power2.out',
          onUpdate: function() {
            const v = isInt ? Math.round(counter.val) : counter.val.toFixed(1);
            const formatted = isInt && v >= 1000 ? v.toLocaleString() : v;
            el.textContent = prefix + formatted + suffix;
          },
          onComplete: function() { el.textContent = raw; }
        });
      });
    }, 680);

    // V23 — Callout block reveal
    const calloutReveal = document.getElementById('copy-callout');
    if (calloutReveal && calloutReveal.style.display !== 'none') {
      gsap.fromTo(calloutReveal,

        { opacity: 0, x: -10 },
        { opacity: 0.35, x: 0, duration: 0.5, ease: 'power2.out', stagger: 0.08, delay: 0.55 }
      );
    }
  }

  window.showSectionCopy = showSectionCopy;
}

// ---------------------------------------------------------------------------
// 7. SCROLL HANDLING
// ---------------------------------------------------------------------------
function handleWheel(e) {
  if (!introComplete) return;
  e.preventDefault();
  lastScrollTime = performance.now();

  if (isTransitioning) return;

  const dir = e.deltaY > 0 ? 1 : -1;

  // ── HYBRID SCROLL: Section 6 (Execution) consumes scroll for stage reveals ──
  if (activeIdx === 6 && typeof window._execStageReveal === 'function') {
    const consumed = window._execStageReveal(Math.abs(e.deltaY) * dir);
    if (consumed) {
      scrollAccum = 0;
      return; // Don't process as section transition yet
    }
  }

  scrollAccum = Math.max(-1.2, Math.min(1.2, scrollAccum + e.deltaY * 0.0008));

  // Fast burst or threshold -> auto-transition
  if (Math.abs(e.deltaY) > 30 || Math.abs(scrollAccum) > 0.7) {
    const next = Math.max(0, Math.min(9, activeIdx + dir));
    if (next !== activeIdx) {
      scrollAccum = 0;
      goToSection(next, dir);
    }
  }
}
window.addEventListener('wheel', handleWheel, { passive: false });

// ---------------------------------------------------------------------------
// 8. TOUCH HANDLING (40px threshold)
// ---------------------------------------------------------------------------
let touchStartY = 0;
let touchCurY = 0;
let touchFired = false;

window.addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
  touchCurY = touchStartY;
  touchFired = false;
}, { passive: true });

window.addEventListener('touchmove', e => {
  if (!introComplete || isTransitioning || touchFired) return;
  touchCurY = e.touches[0].clientY;
  const dy = touchStartY - touchCurY;
  if (Math.abs(dy) > 40) {
    touchFired = true;
    const dir = dy > 0 ? 1 : -1;
    if (activeIdx === 6 && typeof window._execStageReveal === 'function') {
      const consumed = window._execStageReveal(Math.abs(dy) * dir);
      if (consumed) return;
    }
    const next = Math.max(0, Math.min(9, activeIdx + dir));
    if (next !== activeIdx) { scrollAccum = 0; goToSection(next, dir); }
  }
}, { passive: true });

window.addEventListener('touchend', e => {
  if (!introComplete || isTransitioning || touchFired) return;
  const dy = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 40) {
    const dir = dy > 0 ? 1 : -1;
    if (activeIdx === 6 && typeof window._execStageReveal === 'function') {
      const consumed = window._execStageReveal(Math.abs(dy) * dir);
      if (consumed) return;
    }
    const next = Math.max(0, Math.min(9, activeIdx + dir));
    if (next !== activeIdx) { scrollAccum = 0; goToSection(next, dir); }
  }
}, { passive: true });

// ---------------------------------------------------------------------------
// 9. KEYBOARD
// ---------------------------------------------------------------------------
window.addEventListener('keydown', e => {
  if (!introComplete) return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    const next = Math.min(9, activeIdx + 1);
    if (next !== activeIdx) goToSection(next, 1);
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    const next = Math.max(0, activeIdx - 1);
    if (next !== activeIdx) goToSection(next, -1);
  } else if (e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    goToSection(idx, idx > activeIdx ? 1 : -1);
  } else if (e.key === '0') {
    goToSection(9, 9 > activeIdx ? 1 : -1);
  } else if (e.key === 'r' || e.key === 'R') {
    goToSection(0, -1);
  } else if (e.key === 'h' || e.key === 'H') {
    document.getElementById('kbd-help')?.classList.toggle('hidden');
  } else if (e.key === 'Escape') {
    document.getElementById('kbd-help')?.classList.add('hidden');
    document.getElementById('menu-overlay')?.classList.remove('open');
    document.getElementById('detail-card')?.classList.add('hidden');
    document.getElementById('credits-modal')?.classList.add('hidden');
  }
});

  // ─── audio.js ──────────────────────────────────────────────────────
/**
 * PCMAudioEngine — Patel Capital Markets
 * Cinematic ambient audio system built on the Web Audio API.
 *
 * Architecture:
 *   - Brass drone layer  : four detuned oscillators (sawtooth/triangle/sine)
 *                          routed through a resonant LPF and a hand-built
 *                          convolution reverb with a realistic IR.
 *   - Pink noise texture : Paul Kellet's pink-noise algorithm rendered into a
 *                          looping buffer, band-passed for a warm room feel.
 *   - Sub-bass pulse     : 32.7 Hz (C1) sine, felt rather than heard, with a
 *                          slow LFO tremolo for organic breathing.
 *   - High shimmer       : Sparse stochastic pings on brass harmonic series,
 *                          each with a quick attack / long exponential tail.
 *   - Stereo width       : A small allpass stereo widener sits on the master
 *                          bus before the final gain stage.
 *   - Per-section morph  : Ten section profiles drive smooth parameter
 *                          transitions via setTargetAtTime on every live node.
 */

class PCMAudioEngine {
  constructor() {
    this.ctx          = null;
    this.masterGain   = null;
    this.widener      = null;   // stereo width allpass pair
    this.enabled      = false;
    this.activeSection = 0;
    this.nodes        = new Map();
    this.initialized  = false;
    this._shimmerTimer = null;
    this._lfoTimer     = null;
    this._visibilityHandler = null;
  }

  /* ------------------------------------------------------------------ */
  /*  PUBLIC                                                              */
  /* ------------------------------------------------------------------ */

  init() {
    if (this.initialized) return;

    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = this.ctx;

    /* Master gain — starts silent, fades in on enable() */
    this.masterGain = ctx.createGain();
    this.masterGain.gain.setValueAtTime(0, ctx.currentTime);

    /* Stereo widener: two allpass filters at slightly different frequencies
       on L and R channels using a ChannelSplitter / ChannelMerger pair.      */
    this._buildWidener();

    /* Signal chain:
       [sources] → masterGain → widener → ctx.destination                      */
    this.masterGain.connect(this.widener.splitter);

    this._buildBrassDrone();
    this._buildWoodgrainNoise();
    this._buildSubBass();
    this._buildHighFreqShimmer();  // bootstraps scheduler; pings deferred
    this._buildSubLFO();           // low-frequency tremolo on sub-bass

    this.initialized = true;
  }

  enable() {
    if (!this.initialized) this.init();
    if (this.ctx.state === 'suspended') this.ctx.resume();
    this.enabled = true;

    const t = this.ctx.currentTime;
    this.masterGain.gain.cancelScheduledValues(t);
    this.masterGain.gain.setTargetAtTime(0.72, t, 1.8);

    /* Kick off stochastic schedulers */
    this._scheduleShimmer();
    this._startSubLFO();

    /* Mute / unmute on tab visibility */
    this._visibilityHandler = () => {
      if (!this.ctx) return;
      const now = this.ctx.currentTime;
      if (document.hidden) {
        this.masterGain.gain.setTargetAtTime(0, now, 0.4);
      } else if (this.enabled) {
        this.masterGain.gain.setTargetAtTime(0.72, now, 0.4);
      }
    };
    document.addEventListener('visibilitychange', this._visibilityHandler);

    document.getElementById('btn-audio')?.classList.add('active');
  }

  disable() {
    if (!this.initialized) return;
    this.enabled = false;

    const t = this.ctx.currentTime;
    this.masterGain.gain.cancelScheduledValues(t);
    this.masterGain.gain.setTargetAtTime(0, t, 1.5);

    clearTimeout(this._shimmerTimer);
    clearTimeout(this._lfoTimer);
    this._shimmerTimer = null;
    this._lfoTimer     = null;

    if (this._visibilityHandler) {
      document.removeEventListener('visibilitychange', this._visibilityHandler);
      this._visibilityHandler = null;
    }

    document.getElementById('btn-audio')?.classList.remove('active');
  }

  toggle() {
    if (this.enabled) this.disable();
    else this.enable();
  }

  /* Morph all live parameters toward the target section profile. */
  setSection(idx) {
    if (!this.initialized || !this.ctx) return;
    this.activeSection = idx;

    const profile = this.SECTION_PROFILES[idx] || this.SECTION_PROFILES[0];
    const ctx     = this.ctx;
    const t       = ctx.currentTime;
    const tau     = 2.2;   // time-constant (seconds) for smooth morphs

    /* --- Brass drone --- */
    const drone = this.nodes.get('brassDrone');
    if (drone) {
      const f = profile.droneFreq;
      drone.oscs[0].frequency.setTargetAtTime(f,              t, tau);
      drone.oscs[1].frequency.setTargetAtTime(f + 0.18,       t, tau);
      drone.oscs[2].frequency.setTargetAtTime(f * 1.5,        t, tau);
      drone.oscs[3].frequency.setTargetAtTime(f * 2.0,        t, tau);
      drone.lpf.frequency.setTargetAtTime(profile.lpfFreq,    t, tau * 0.8);
      drone.lpf.Q.setTargetAtTime(profile.lpfQ,               t, tau * 0.8);
      drone.gain.gain.setTargetAtTime(profile.droneGain,      t, tau);
      drone.convGain.gain.setTargetAtTime(profile.reverbMix,  t, tau);
    }

    /* --- Pink noise --- */
    const noise = this.nodes.get('noise');
    if (noise) {
      noise.gain.gain.setTargetAtTime(profile.noiseGain, t, tau * 0.7);
      noise.lpf.frequency.setTargetAtTime(profile.noiseCut, t, tau * 0.7);
    }

    /* --- Sub bass --- */
    const sub = this.nodes.get('sub');
    if (sub) {
      sub.osc.frequency.setTargetAtTime(profile.subFreq, t, tau * 1.5);
      sub.gain.gain.setTargetAtTime(profile.subGain,     t, tau);
    }

    /* --- LFO (sub tremolo depth) --- */
    const lfo = this.nodes.get('lfo');
    if (lfo) {
      lfo.depthGain.gain.setTargetAtTime(profile.lfoDepth, t, tau);
      lfo.osc.frequency.setTargetAtTime(profile.lfoRate,   t, tau * 1.5);
    }
  }

  /* ------------------------------------------------------------------ */
  /*  SECTION PROFILES                                                    */
  /* ------------------------------------------------------------------ */
  /*
   * Fields per profile:
   *   droneFreq  — fundamental Hz of brass drone
   *   droneGain  — dry drone level
   *   reverbMix  — send level into the convolution reverb
   *   lpfFreq    — drone LPF cutoff (Hz)
   *   lpfQ       — drone LPF resonance
   *   noiseGain  — pink noise level
   *   noiseCut   — pink noise LPF cutoff
   *   subFreq    — sub bass Hz
   *   subGain    — sub bass level
   *   lfoDepth   — sub tremolo amplitude gain
   *   lfoRate    — sub tremolo rate (Hz)
   */
  SECTION_PROFILES = [
    /* 0 — Hero / Home: full, weighty, centred */
    { droneFreq: 65.4,  droneGain: 0.13, reverbMix: 0.32, lpfFreq: 420,  lpfQ: 1.1,
      noiseGain: 0.024, noiseCut: 620,   subFreq: 32.7,   subGain: 0.065, lfoDepth: 0.018, lfoRate: 0.07 },

    /* 1 — The Firm: slightly darker, more intimate */
    { droneFreq: 58.3,  droneGain: 0.11, reverbMix: 0.28, lpfFreq: 360,  lpfQ: 0.9,
      noiseGain: 0.019, noiseCut: 540,   subFreq: 29.1,   subGain: 0.055, lfoDepth: 0.014, lfoRate: 0.06 },

    /* 2 — Edge / Advantage: brighter, slightly raised energy */
    { droneFreq: 73.4,  droneGain: 0.14, reverbMix: 0.36, lpfFreq: 520,  lpfQ: 1.3,
      noiseGain: 0.029, noiseCut: 700,   subFreq: 36.7,   subGain: 0.045, lfoDepth: 0.022, lfoRate: 0.09 },

    /* 3 — Senior Capital: deepest, most authoritative */
    { droneFreq: 55.0,  droneGain: 0.15, reverbMix: 0.40, lpfFreq: 310,  lpfQ: 1.5,
      noiseGain: 0.014, noiseCut: 450,   subFreq: 27.5,   subGain: 0.085, lfoDepth: 0.012, lfoRate: 0.05 },

    /* 4 — Sub Capital: close relative of Senior, slightly warmer */
    { droneFreq: 61.7,  droneGain: 0.12, reverbMix: 0.30, lpfFreq: 330,  lpfQ: 1.0,
      noiseGain: 0.017, noiseCut: 480,   subFreq: 30.9,   subGain: 0.072, lfoDepth: 0.016, lfoRate: 0.06 },

    /* 5 — Equity / Growth: mid-high brightness, forward */
    { droneFreq: 69.3,  droneGain: 0.13, reverbMix: 0.34, lpfFreq: 440,  lpfQ: 1.2,
      noiseGain: 0.021, noiseCut: 660,   subFreq: 34.6,   subGain: 0.052, lfoDepth: 0.020, lfoRate: 0.08 },

    /* 6 — Execution: crisper, more transient, higher shimmer activity */
    { droneFreq: 77.8,  droneGain: 0.11, reverbMix: 0.26, lpfFreq: 500,  lpfQ: 0.8,
      noiseGain: 0.027, noiseCut: 720,   subFreq: 38.9,   subGain: 0.038, lfoDepth: 0.025, lfoRate: 0.11 },

    /* 7 — Underwriting: deep and spacious */
    { droneFreq: 65.4,  droneGain: 0.14, reverbMix: 0.45, lpfFreq: 260,  lpfQ: 1.4,
      noiseGain: 0.011, noiseCut: 380,   subFreq: 32.7,   subGain: 0.094, lfoDepth: 0.010, lfoRate: 0.05 },

    /* 8 — Compliance / Governance: spare, restrained, low noise */
    { droneFreq: 58.3,  droneGain: 0.09, reverbMix: 0.22, lpfFreq: 210,  lpfQ: 0.7,
      noiseGain: 0.009, noiseCut: 320,   subFreq: 29.1,   subGain: 0.062, lfoDepth: 0.008, lfoRate: 0.04 },

    /* 9 — Engage / Contact: open, welcoming, highest shimmer density */
    { droneFreq: 87.3,  droneGain: 0.12, reverbMix: 0.38, lpfFreq: 620,  lpfQ: 1.0,
      noiseGain: 0.034, noiseCut: 800,   subFreq: 43.7,   subGain: 0.035, lfoDepth: 0.028, lfoRate: 0.13 },
  ];

  /* ------------------------------------------------------------------ */
  /*  PRIVATE — BUILDERS                                                  */
  /* ------------------------------------------------------------------ */

  /**
   * Stereo widener.
   * Uses a ChannelSplitter → two allpass filters at slightly different
   * frequencies (one per channel) → ChannelMerger.  The resulting phase
   * differential between L and R gives perceived width without resorting
   * to a Haas effect or mid-side matrix.
   */
  _buildWidener() {
    const ctx     = this.ctx;
    const splitter = ctx.createChannelSplitter(2);
    const merger   = ctx.createChannelMerger(2);

    const apL = ctx.createBiquadFilter();
    apL.type = 'allpass';
    apL.frequency.value = 620;
    apL.Q.value = 0.7;

    const apR = ctx.createBiquadFilter();
    apR.type = 'allpass';
    apR.frequency.value = 840;
    apR.Q.value = 0.7;

    splitter.connect(apL, 0);
    splitter.connect(apR, 1);
    apL.connect(merger, 0, 0);
    apR.connect(merger, 0, 1);
    merger.connect(ctx.destination);

    this.widener = { splitter, merger, apL, apR };
  }

  /**
   * Brass drone.
   *
   * Signal path:
   *   osc1 (saw, C2)  ─┐
   *   osc2 (saw, ~C2) ─┤
   *   osc3 (tri, G2)  ─┤→ LPF (resonant) → dryGain  → masterGain
   *   osc4 (sin, C3)  ─┘              └──→ conv IR → convGain → masterGain
   *
   * The convolution reverb uses a synthetically generated impulse response
   * that models a large stone hall: dense early reflections followed by an
   * exponentially decaying diffuse tail with mild random modulation.
   */
  _buildBrassDrone() {
    const ctx = this.ctx;

    /* --- Oscillators --- */
    const osc1 = ctx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.value = 65.4;   // C2 fundamental

    const osc2 = ctx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.value = 65.58;  // tiny detune for beating warmth

    const osc3 = ctx.createOscillator();
    osc3.type = 'triangle';        // 5th: G2
    osc3.frequency.value = 97.99;

    const osc4 = ctx.createOscillator();
    osc4.type = 'sine';            // octave: C3 — round low end
    osc4.frequency.value = 130.8;

    /* --- LPF: shapes the timbre, controlled per section --- */
    const lpf = ctx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = 420;
    lpf.Q.value = 1.1;

    /* --- Dry gain --- */
    const dg = ctx.createGain();
    dg.gain.value = 0.13;

    /* --- Convolution reverb (synthetic stone-hall IR) --- */
    const conv     = ctx.createConvolver();
    conv.buffer    = this._buildHallIR(2.6);   // 2.6-second tail

    const convGain = ctx.createGain();
    convGain.gain.value = 0.32;

    /* --- Wire --- */
    [osc1, osc2, osc3, osc4].forEach(o => {
      o.connect(lpf);
      o.start();
    });

    lpf.connect(dg);
    lpf.connect(conv);

    dg.connect(this.masterGain);
    conv.connect(convGain);
    convGain.connect(this.masterGain);

    this.nodes.set('brassDrone', {
      oscs: [osc1, osc2, osc3, osc4],
      gain: dg,
      lpf,
      conv,
      convGain,
    });
  }

  /**
   * Generates a synthetic hall impulse response.
   *
   * The IR has three phases:
   *   1. Pre-delay (2 ms silence)
   *   2. Early reflections: 12 discrete echoes at logarithmically spaced
   *      delays up to ~80 ms, each attenuated and slightly randomised.
   *   3. Diffuse tail: exponentially decaying coloured noise with a subtle
   *      per-sample modulation to avoid metallic resonance.
   *
   * @param {number} decaySec  Total IR length in seconds.
   * @returns {AudioBuffer}
   */
  _buildHallIR(decaySec) {
    const ctx    = this.ctx;
    const sr     = ctx.sampleRate;
    const len    = Math.ceil(sr * decaySec);
    const ir     = ctx.createBuffer(2, len, sr);
    const decay  = decaySec;

    /* Early reflections: 12 taps */
    const erTimes = [0.003, 0.007, 0.012, 0.019, 0.028, 0.040,
                     0.054, 0.071, 0.091, 0.115, 0.143, 0.178];

    for (let ch = 0; ch < 2; ch++) {
      const d    = ir.getChannelData(ch);
      const sign = ch === 0 ? 1 : -1;   // slight L/R difference

      /* --- Early reflections --- */
      erTimes.forEach((tSec, i) => {
        const samp = Math.floor(tSec * sr);
        if (samp < len) {
          const amp = Math.pow(0.70, i) * (1 + sign * 0.04 * (Math.random() - 0.5));
          d[samp] += amp;
        }
      });

      /* --- Diffuse tail: pink-ish noise with exponential envelope --- */
      /* We reuse a simplified pink-noise filter in-line here.          */
      let pn0 = 0, pn1 = 0, pn2 = 0, pn3 = 0, pn4 = 0, pn5 = 0;
      for (let i = Math.floor(0.002 * sr); i < len; i++) {
        const white = Math.random() * 2 - 1;
        pn0 = 0.99886 * pn0 + white * 0.0555179;
        pn1 = 0.99332 * pn1 + white * 0.0750759;
        pn2 = 0.96900 * pn2 + white * 0.1538520;
        pn3 = 0.86650 * pn3 + white * 0.3104856;
        pn4 = 0.55000 * pn4 + white * 0.5329522;
        pn5 = -0.7616 * pn5 - white * 0.0168980;
        const pink = (pn0 + pn1 + pn2 + pn3 + pn4 + pn5 + white * 0.5362) * 0.11;

        /* Exponential decay; steeper decay exponent than linear for
           realistic hall character (Sabine-ish model).                 */
        const env = Math.pow(1 - i / len, decay * 1.2);

        /* Mild tremolo prevents metallic ringing in the tail */
        const mod  = 1 + 0.015 * Math.sin(2 * Math.PI * 0.9 * i / sr);

        d[i] += pink * env * mod * 0.55;
      }
    }

    return ir;
  }

  /**
   * Pink noise texture — warm room ambience.
   *
   * Paul Kellet's 7-term pink-noise algorithm fills a 4-second looping
   * buffer.  The buffer is routed through a HPF (removes sub rumble) and
   * a gentle LPF so it sits between 80 Hz and ~620 Hz.
   */
  _buildWoodgrainNoise() {
    const ctx    = this.ctx;
    const bufLen = ctx.sampleRate * 4;
    const buf    = ctx.createBuffer(2, bufLen, ctx.sampleRate);

    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
      for (let i = 0; i < bufLen; i++) {
        const w = Math.random() * 2 - 1;
        b0 = 0.99886 * b0 + w * 0.0555179;
        b1 = 0.99332 * b1 + w * 0.0750759;
        b2 = 0.96900 * b2 + w * 0.1538520;
        b3 = 0.86650 * b3 + w * 0.3104856;
        b4 = 0.55000 * b4 + w * 0.5329522;
        b5 = -0.7616  * b5 - w * 0.0168980;
        d[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + w * 0.5362) * 0.11;
        b6 = w * 0.115926;
      }
    }

    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.loop   = true;

    /* Very slight playback-rate detune per channel for width */
    src.playbackRate.value = 1.0;

    const hpf = ctx.createBiquadFilter();
    hpf.type           = 'highpass';
    hpf.frequency.value = 80;
    hpf.Q.value         = 0.6;

    const lpf = ctx.createBiquadFilter();
    lpf.type           = 'lowpass';
    lpf.frequency.value = 620;
    lpf.Q.value         = 0.5;

    const ng = ctx.createGain();
    ng.gain.value = 0.024;

    src.connect(hpf);
    hpf.connect(lpf);
    lpf.connect(ng);
    ng.connect(this.masterGain);
    src.start();

    this.nodes.set('noise', { src, gain: ng, hpf, lpf });
  }

  /**
   * Sub-bass.
   *
   * A 32.7 Hz (C1) sine oscillator provides the tactile low-end foundation.
   * Its output runs through a dedicated gain node that is also the target
   * of the LFO depth gain (see _buildSubLFO), so the LFO tremolo modulates
   * the sub level rather than pitch — keeping tuning stable while adding
   * an organic breathing quality.
   */
  _buildSubBass() {
    const ctx = this.ctx;

    const osc = ctx.createOscillator();
    osc.type            = 'sine';
    osc.frequency.value = 32.7;

    /* Second-order Butterworth LPF to ensure sub remains clean */
    const lpf = ctx.createBiquadFilter();
    lpf.type            = 'lowpass';
    lpf.frequency.value = 80;
    lpf.Q.value         = 0.5;

    const g = ctx.createGain();
    g.gain.value = 0.065;

    osc.connect(lpf);
    lpf.connect(g);
    g.connect(this.masterGain);
    osc.start();

    this.nodes.set('sub', { osc, lpf, gain: g });
  }

  /**
   * Sub-bass LFO tremolo.
   *
   * A very slow (0.07 Hz) sine oscillator is scaled by a depth gain and
   * connected to the sub's gain AudioParam.  This gives the sub-bass the
   * slow "breathing" feel characteristic of large-room ambience.
   */
  _buildSubLFO() {
    const ctx = this.ctx;

    const lfoOsc = ctx.createOscillator();
    lfoOsc.type            = 'sine';
    lfoOsc.frequency.value = 0.07;

    /* The LFO outputs −1…+1; scale it to a small amplitude */
    const depthGain = ctx.createGain();
    depthGain.gain.value = 0.018;

    const sub = this.nodes.get('sub');
    lfoOsc.connect(depthGain);
    if (sub) depthGain.connect(sub.gain.gain);

    /* Store but do NOT start yet — start in _startSubLFO() on enable() */
    this.nodes.set('lfo', { osc: lfoOsc, depthGain });
  }

  _startSubLFO() {
    const lfo = this.nodes.get('lfo');
    if (lfo && !lfo._started) {
      lfo.osc.start();
      lfo._started = true;
    }
  }

  /* ------------------------------------------------------------------ */
  /*  HIGH-FREQ SHIMMER — stochastic brass-harmonic pings               */
  /* ------------------------------------------------------------------ */

  _buildHighFreqShimmer() {
    /*
     * No persistent nodes here — each ping is a self-contained subgraph
     * that is created, scheduled, and garbage-collected by the browser.
     * _scheduleShimmer() is called from enable() to start the scheduler.
     */
  }

  /**
   * Schedules a single shimmer ping and then reschedules itself.
   *
   * Each ping:
   *   • Picks a frequency from the brass overtone series (C major harmonics).
   *   • Creates an oscillator + amplitude envelope.
   *   • Applies a short allpass smear for shimmer-like sustain.
   *   • Connects directly to masterGain (bypasses sub bus).
   *   • Self-destructs after its envelope completes.
   *
   * The inter-ping interval is randomised (0.8 – 4.2 s) so the density
   * feels organic rather than metronomic.
   */
  _scheduleShimmer() {
    if (!this.enabled || !this.ctx) return;

    const ctx      = this.ctx;
    const profile  = this.SECTION_PROFILES[this.activeSection] || this.SECTION_PROFILES[0];

    /* Density: higher lfoRate sections get slightly more shimmer */
    const minGap   = 0.6;
    const maxGap   = 4.5 - profile.lfoRate * 15;  // section-aware density
    const gapSec   = Math.random() * (maxGap - minGap) + minGap;
    const gapMs    = gapSec * 1000;

    /* Schedule the actual audio event slightly into the future so it is
       always ahead of the currentTime by the time it fires.              */
    const offset  = Math.random() * 0.4 + 0.05;   // 50–450 ms ahead
    const t       = ctx.currentTime + offset;

    /*
     * Brass overtone series above the current drone fundamental.
     * Partials: 4f, 5f, 6f, 7f, 8f, 10f — avoiding 9f (minor 7th clash).
     */
    const f0       = profile.droneFreq;
    const partials = [4, 5, 6, 7, 8, 10];
    const mult     = partials[Math.floor(Math.random() * partials.length)];
    const freq     = f0 * mult;

    /* Amplitude: quieter for lower sections, slightly louder for Edge/Engage */
    const peakAmp  = 0.012 + profile.noiseGain * 0.6;

    /* --- Oscillator + envelope --- */
    const osc = ctx.createOscillator();
    osc.type            = 'sine';
    osc.frequency.value = freq;

    /* Tiny frequency wobble for breath */
    osc.frequency.setValueAtTime(freq,          t);
    osc.frequency.linearRampToValueAtTime(freq * 1.0008, t + 0.08);
    osc.frequency.linearRampToValueAtTime(freq,          t + 0.4);

    const env = ctx.createGain();
    env.gain.setValueAtTime(0,        t);
    env.gain.linearRampToValueAtTime(peakAmp,   t + 0.018);  // fast attack
    env.gain.setValueAtTime(peakAmp,            t + 0.025);
    env.gain.exponentialRampToValueAtTime(0.0001, t + 1.6);  // long tail

    /* Allpass "smear" for that bell/shimmer quality */
    const ap = ctx.createBiquadFilter();
    ap.type             = 'allpass';
    ap.frequency.value  = freq * 0.5;
    ap.Q.value          = 8.0;

    osc.connect(ap);
    ap.connect(env);
    env.connect(this.masterGain);

    osc.start(t);
    osc.stop(t + 1.7);

    /* Reschedule */
    this._shimmerTimer = setTimeout(() => this._scheduleShimmer(), gapMs);
  }

  /* ------------------------------------------------------------------ */
  /*  CONVENIENCE GETTERS (diagnostics / external query)                 */
  /* ------------------------------------------------------------------ */

  get currentProfile() {
    return this.SECTION_PROFILES[this.activeSection] || this.SECTION_PROFILES[0];
  }

  get contextState() {
    return this.ctx ? this.ctx.state : 'uninitialized';
  }
}

const audioEngine = new PCMAudioEngine();
window.audioEngine = audioEngine;

/* Toggle button */
document.getElementById('btn-audio')?.addEventListener('click', () => audioEngine.toggle());

/* Auto-enable audio on first meaningful user interaction (scroll / click / key) */
(function() {
  let audioStarted = false;
  function startAudioOnce() {
    if (audioStarted) return;
    audioStarted = true;
    // Only auto-start if user hasn't explicitly muted
    const btn = document.getElementById('btn-audio');
    if (btn && !btn.classList.contains('muted')) {
      audioEngine.enable();
      btn.setAttribute('aria-pressed', 'false');
    }
    window.removeEventListener('click', startAudioOnce, true);
    window.removeEventListener('keydown', startAudioOnce, true);
    window.removeEventListener('wheel', startAudioOnce, true);
    window.removeEventListener('touchstart', startAudioOnce, true);
  }
  window.addEventListener('click',      startAudioOnce, { once: true, capture: true });
  window.addEventListener('keydown',    startAudioOnce, { once: true });
  window.addEventListener('wheel',      startAudioOnce, { once: true });
  window.addEventListener('touchstart', startAudioOnce, { once: true, passive: true });
})();

/* Section change hook — called by scroll observer in main.js */
window.onSectionChange = function(idx) {
  audioEngine.setSection(idx);
  // Sync all chrome state (exec stages, engage, visual panel, parallax, etc.)
  if (typeof window.updateChrome === 'function') window.updateChrome(idx);
  // Update geometric accent layer (v24)
  if (typeof window._updateGeoAccent === 'function') window._updateGeoAccent(idx);
  // Hide section-end indicator on section change (v24)
  if (typeof window._hideSectionEndIndicator === 'function') window._hideSectionEndIndicator();
};

/* Keyboard shortcut: M */
window.addEventListener('keydown', e => {
  if ((e.key === 'm' || e.key === 'M') && !e.ctrlKey && !e.metaKey) {
    audioEngine.toggle();
  }
});

        var capAlpha = 0.4 + Math.sin(t * 0.55 + i * 1.1) * 0.15;
        var grad2 = c.createRadialGradient(x, baseY - barH, 0, x, baseY - barH, 8);
        grad2.addColorStop(0, 'rgba(' + p.r + ',' + p.g + ',' + p.b + ',' + capAlpha + ')');
        grad2.addColorStop(1, 'rgba(' + p.r + ',' + p.g + ',' + p.b + ',0)');
        c.beginPath();
        c.arc(x, baseY - barH, 8, 0, Math.PI * 2);
        c.fillStyle = grad2;
        c.fill();
      });
      // Ground baseline
      c.beginPath();
      c.moveTo(cx - W * 0.22, baseY);
      c.lineTo(cx + W * 0.22, baseY);
      c.strokeStyle = 'rgba(201,169,110,0.07)';
      c.lineWidth = 0.8;
      c.stroke();
    },
    // Section 3: Senior Debt — flowing horizontal data lines
    3: function(t, W, H, c) {
      c.clearRect(0, 0, W, H);
      for (let i = 0; i < 5; i++) {
        const y = H * (0.3 + i * 0.1);
        const phase = (t * 0.12 + i * 0.2) % 1;
        const len = W * 0.6;
        const startX = phase * (W + len) - len;
        const grd = c.createLinearGradient(startX, 0, startX + len, 0);
        grd.addColorStop(0, 'rgba(201,169,110,0)');
        grd.addColorStop(0.5, 'rgba(201,169,110,' + (0.025 - i * 0.004) + ')');
        grd.addColorStop(1, 'rgba(201,169,110,0)');
        c.fillStyle = grd;
        c.fillRect(startX, y - 1, len, 2);
      }
    },
    // Section 4: Subordinate Capital — yield curve animation
    4: function(t, W, H, c) {
      c.clearRect(0, 0, W, H);
      // Three animated tranche yield curves
      var tranches = [
        { steepness: 0.82, lift: 0,   speed: 0.22, amp: 3.8, r: 201, g: 169, b: 110, lw: 1.8 },
        { steepness: 0.58, lift: 22,  speed: 0.17, amp: 2.6, r: 201, g: 169, b: 110, lw: 1.2 },
        { steepness: 0.38, lift: 38,  speed: 0.28, amp: 1.8, r: 127, g: 184, b: 156, lw: 1.0 },
      ];
      var cy = H * 0.56;
      tranches.forEach(function(cv, ci) {
        c.beginPath();
        for (var x = 0; x <= W; x += 2) {
          var norm = x / W;
          var y = cy + cv.lift - (norm * cv.steepness + Math.pow(norm, 2) * 0.35) * 70
                + Math.sin(t * cv.speed + norm * 3.5 + ci * 1.1) * cv.amp;
          x === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
        }
        var alpha = 0.10 + Math.sin(t * 0.4 + ci * 0.9) * 0.035;
        var grad = c.createLinearGradient(0, 0, W, 0);
        grad.addColorStop(0, 'rgba(' + cv.r + ',' + cv.g + ',' + cv.b + ',0)');
        grad.addColorStop(0.18, 'rgba(' + cv.r + ',' + cv.g + ',' + cv.b + ',' + alpha + ')');
        grad.addColorStop(0.82, 'rgba(' + cv.r + ',' + cv.g + ',' + cv.b + ',' + alpha + ')');
        grad.addColorStop(1, 'rgba(' + cv.r + ',' + cv.g + ',' + cv.b + ',0)');
        c.strokeStyle = grad;
        c.lineWidth = cv.lw;
        c.stroke();
      });
      // x-axis baseline
      c.beginPath();
      c.moveTo(W * 0.08, cy + 44);
      c.lineTo(W * 0.92, cy + 44);
      c.strokeStyle = 'rgba(201,169,110,0.06)';
      c.lineWidth = 0.7;
      c.stroke();
    },
    // Section 5: Equity — animated waterfall stack bars
    5: function(t, W, H, c) {
      c.clearRect(0, 0, W, H);
      const cx = W / 2;
      const baseY = H * 0.78;
      const layers = [
        { label: 'SENIOR', h: 0.12, color: 'rgba(127,184,156,' },
        { label: 'MEZZ',   h: 0.10, color: 'rgba(201,169,110,' },
        { label: 'PREF',   h: 0.09, color: 'rgba(201,169,110,' },
        { label: 'EQUITY', h: 0.18, color: 'rgba(201,169,110,' }
      ];
      let cumY = baseY;
      const barW = 80;
      layers.forEach(function(lay, i) {
        const barH = H * lay.h;
        const pulse = Math.sin(t * 0.5 + i * 0.8) * 0.01;
        const y = cumY - barH * (1 + pulse);
        const alpha = 0.08 - i * 0.008;
        c.fillStyle = lay.color + alpha + ')';
        c.fillRect(cx - barW/2, y, barW, barH);
        // Top line
        c.fillStyle = lay.color + (alpha * 2.5) + ')';
        c.fillRect(cx - barW/2, y, barW, 1);
        cumY = y;
      });
    },
    // Section 7: Underwriting — stress-test grid scan
    7: function(t, W, H, c) {
      c.clearRect(0, 0, W, H);
      // Grid lines
      const gridCols = 8, gridRows = 5;
      for (let col = 0; col <= gridCols; col++) {
        const x = W * 0.1 + (W * 0.8) * col / gridCols;
        c.fillStyle = 'rgba(201,169,110,0.025)';
        c.fillRect(x - 0.5, H * 0.2, 1, H * 0.6);
      }
      for (let row = 0; row <= gridRows; row++) {
        const y = H * 0.2 + (H * 0.6) * row / gridRows;
        c.fillStyle = 'rgba(201,169,110,0.025)';
        c.fillRect(W * 0.1, y - 0.5, W * 0.8, 1);
      }
      // Scanning cursor
      const scanX = W * 0.1 + ((t * 0.15) % 1) * W * 0.8;
      const grd = c.createLinearGradient(scanX - 20, 0, scanX + 20, 0);
      grd.addColorStop(0, 'rgba(201,169,110,0)');
      grd.addColorStop(0.5, 'rgba(201,169,110,0.06)');
      grd.addColorStop(1, 'rgba(201,169,110,0)');
      c.fillStyle = grd;
      c.fillRect(scanX - 20, H * 0.2, 40, H * 0.6);
    },
    // Section 8: Compliance — concentric shield pulse
    8: function(t, W, H, c) {
      c.clearRect(0, 0, W, H);
      for (let ring = 0; ring < 4; ring++) {
        const phase = (t * 0.18 + ring * 0.25) % 1;
        const r = 60 + phase * Math.min(W, H) * 0.35;
        const alpha = (1 - phase) * 0.04;
        c.beginPath();
        c.arc(W / 2, H / 2 - H * 0.05, r, 0, Math.PI * 2);
        c.strokeStyle = 'rgba(201,169,110,' + alpha.toFixed(3) + ')';
        c.lineWidth = 1.5;
        c.stroke();
      }
    },
    // Section 9: Engage — subtle radial pulse from center
    9: function(t, W, H, c) {
      c.clearRect(0, 0, W, H);
      for (let ring = 0; ring < 3; ring++) {
        const phase = (t * 0.25 + ring * 0.33) % 1;
        const r = phase * Math.min(W, H) * 0.6;
        const alpha = (1 - phase) * 0.03;
        c.beginPath();
        c.arc(W/2, H/2, r, 0, Math.PI * 2);
        c.strokeStyle = `rgba(201,169,110,${alpha.toFixed(3)})`;
        c.lineWidth = 1;
        c.stroke();
      }
    }
  };

  function tick(timestamp) {
    animFrame = requestAnimationFrame(tick);
    stubT = timestamp / 1000;
    const W = canvas.width, H = canvas.height;
    const fn = DRAWFNS[currentSection];
    if (fn) fn(stubT, W, H, ctx);
    else ctx.clearRect(0, 0, W, H);
  }

  // Start the loop
  animFrame = requestAnimationFrame(tick);

  // Hook into section changes
  const origOnChange = window.onSectionChange;
  window.onSectionChange = function(idx, dir) {
    currentSection = idx;
    // Only show stub for sections with a draw function
    const stub = document.getElementById('chained-video-stub');
    if (stub) stub.classList.toggle('visible', DRAWFNS[idx] !== undefined && idx !== 0);
    if (origOnChange) origOnChange(idx, dir);
  };
})();

// ─── HOTPOINTS ────────────────────────────────────────────────────────────────
(function buildHotPoints() {
  const layer = document.createElement('div');
  layer.className = 'hotpoints-layer';
  layer.id = 'hotpoints-layer';
  document.body.appendChild(layer);

  // Per-section hotpoints: [sectionIdx, x%, y%, label, description]
  const HOTPOINTS = [
    [3, '72%', '42%', 'LTV',     'Loan-to-Value ratio constraints across the stack'],
    [3, '28%', '58%', 'DSCR',    '1.20x minimum debt-service coverage at stress'],
    [4, '68%', '38%', 'MEZZ',    'Intercreditor-subordinated mezzanine layer'],
    [4, '32%', '62%', 'PREF EQ', 'Cumulative preferred with redemption rights'],
    [5, '70%', '40%', 'IRR',     '12–20% target internal rate of return'],
    [5, '30%', '60%', 'MOIC',    '1.6×–2.4× target multiple on invested capital'],
    [7, '65%', '35%', '50+',     'Fifty-plus sensitivity scenarios modeled per deal'],
    [7, '35%', '65%', '1.20×',   'Minimum DSCR stress hurdle underwritten to'],
  ];

  window._updateHotPoints = function(sectionIdx) {
    layer.innerHTML = '';
    const pts = HOTPOINTS.filter(p => p[0] === sectionIdx);
    if (!pts.length) return;
    pts.forEach(([,x,y,label,desc]) => {
      const hp = document.createElement('div');
      hp.className = 'hotpoint';
      hp.style.cssText = `left:${x};top:${y}`;
      hp.setAttribute('aria-label', `${label}: ${desc}`);
      hp.setAttribute('tabindex', '0');
      hp.innerHTML = `<div class="hotpoint-dot"></div><div class="hotpoint-label">${label}</div>`;
      hp.addEventListener('click', () => {
        // Show a brief detail toast
        const toast = document.getElementById('detail-card');
        if (toast) {
          toast.querySelector('.detail-label') && (toast.querySelector('.detail-label').textContent = label);
          toast.querySelector('.detail-title') && (toast.querySelector('.detail-title').textContent = label);
          toast.querySelector('.detail-body') && (toast.querySelector('.detail-body').textContent = desc);
          toast.style.left = x; toast.style.top = `calc(${y} - 60px)`;
          toast.classList.remove('hidden');
        }
      });
      layer.appendChild(hp);
    });
  };

  // Wire to section changes
  const origOnChange = window.onSectionChange;
  window.onSectionChange = function(idx, dir) {
    window._updateHotPoints(idx);
    if (origOnChange) origOnChange(idx, dir);
  };
})();

  // ═══════ INIT SEQUENCE ═══════════════════════════════════════════
  // Chrome auto-initializes on DOMContentLoaded; if it already fired we call manually.
  try { window.initChrome(); } catch(err) { console.error('initChrome', err); }

  if (window.gsap) {
    // Loader wordmark + hairline + bar wrap reveal
    gsap.from('.intro-loader__wordmark-loader', { opacity: 0, y: 12, duration: 0.9, ease: 'expo.out' });
    gsap.from('.intro-loader__hairline', { scaleX: 0, duration: 0.7, ease: 'power3.inOut', delay: 0.2, transformOrigin: 'center' });
    gsap.from('.intro-loader__bar-wrap', { opacity: 0, y: 8, duration: 0.6, ease: 'power2.out', delay: 0.3 });
    gsap.from('.intro-loader__pct', { opacity: 0, duration: 0.6, ease: 'power2.out', delay: 0.5 });
  }

  if (window.gsap) {
    setTimeout(() => {
      const wordmark = document.querySelector('.home-mark .wordmark');
      const slogan = document.querySelector('.home-mark .slogan');
      const hairline = document.querySelector('.home-mark .brass-hairline');
      if (wordmark) {
        gsap.fromTo(wordmark,
          { opacity: 0, x: -20 },
          { opacity: 1, x: 0, duration: 1.2, ease: 'expo.out', delay: 2.4 }
        );
      }
      if (slogan) {
        gsap.fromTo(slogan,
          { opacity: 0 },
          { opacity: 1, duration: 0.8, ease: 'power2.out', delay: 2.8 }
        );
      }
      if (hairline) {
        gsap.fromTo(hairline,
          { scaleX: 0 },
          { scaleX: 1, duration: 1.0, ease: 'power3.inOut', delay: 3.0, transformOrigin: 'left' }
        );
      }
    }, 100);
  }

  // Overlays
  try { initOverlays(); } catch(err) { console.error('initOverlays', err); }

  // Scene — assign to pre-declared let vars (avoids const TDZ in animate())
  ({ scene, camera, renderer, composer } = initScene());

  // Logo
  const logoRefs = buildPCMLogo(THREE);
  scene.add(logoRefs.root);
  window.pcmRoot          = logoRefs.root;
  window.leverGroup       = logoRefs.leverGroup;
  window.refreshGroup     = logoRefs.refreshGroup;
  window.orbitalDots      = logoRefs.orbitalDots;
  window.haloDisc         = logoRefs.haloDisc;
  window.particles        = logoRefs.particles;
  window.outerRing        = logoRefs.outerRing;
  window.accentRingMesh   = logoRefs.accentRingMesh;
  window.tickGroup        = logoRefs.tickGroup;
  window.fulcrumGlowRing  = logoRefs.glowRing;
  window.bgPlane          = logoRefs.bgPlane;

  // Make leverGroup and friends accessible as bare names where animation.js expects them
  // (the script is concatenated so its top-level `let` declarations are in module scope —
  //  we shadow them by writing to window as the source of truth.)

  // Dismiss intro loader after a beat
  setTimeout(() => {
    const loader = document.getElementById('intro-loader');
    if (loader) loader.classList.add('done');
    setTimeout(() => loader && loader.remove(), 1000);
  }, 2200);

  // Initial UI sync
  if (typeof updateCopyContent === 'function') updateCopyContent(0);
  if (typeof updateSectionUI === 'function') updateSectionUI(0);
  if (typeof window.updateChrome === 'function') window.updateChrome(0);

  // ── SERVICE WORKER REGISTRATION (PWA offline support) ─────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .then(reg => {
          // Auto-update: when a new SW is waiting, activate it immediately
          reg.addEventListener('updatefound', () => {
            const sw = reg.installing;
            if (!sw) return;
            sw.addEventListener('statechange', () => {
              if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                // A new version is available — silently reload for seamless update
                sw.postMessage({ type: 'SKIP_WAITING' });
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                  window.location.reload();
                }, { once: true });
              }
            });
          });
        })
        .catch(err => {
          // SW registration failure is non-fatal — the site still works online
          console.warn('[PCM] Service worker registration failed:', err.message);
        });
    });
  }

  </script>
</body>
