/* ============================================================
   PCM — Cinematic Site Stylesheet
   Parts 1 & 2 | Bespoke craft, no boilerplate
   ============================================================ */

/* ------------------------------------------------------------
   1. CUSTOM PROPERTIES
   ------------------------------------------------------------ */
:root {
  --bg:          #06090a;
  --forest:      #1a2520;
  --forest-mid:  #2d3e36;
  --brass:       #c9a96e;
  --coin-gold:   #d9b97a;
  --cream:       #e8dcc4;
  --ink-green:   #0f1814;
  --accent-glow: #7fb89c;
  --ink:         #e3eee6;

  --font-serif:  'Cormorant Garamond', Georgia, serif;
  --font-body:   'Space Grotesk', system-ui, sans-serif;
  --font-mono:   'Space Mono', 'Courier New', monospace;

  --ease-cinema: cubic-bezier(0.77, 0, 0.175, 1);
  --ease-soft:   cubic-bezier(0.4, 0, 0.2, 1);

  /* Foundational layout vars — match seacat reference */
  --margin: 60px;
  --vh: 1vh;
  --chrome-z: 20;
  --overlay-z: 50;
  --cursor-z: 9999;
}

@media (max-width: 1024px) {
  :root { --margin: 40px; }
}
@media (max-width: 768px) {
  :root { --margin: 30px; }
}
@media (max-width: 480px) {
  :root { --margin: 20px; }
}

/* ------------------------------------------------------------
   2. RESET + BASE
   ------------------------------------------------------------ */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  cursor: none;
  position: relative;
}

a {
  color: inherit;
  text-decoration: none;
}

button {
  font-family: inherit;
  background: none;
  border: none;
  cursor: none;
}

ul,
ol {
  list-style: none;
}

img,
video {
  display: block;
  max-width: 100%;
}

/* ------------------------------------------------------------
   3. CANVAS HOST
   ------------------------------------------------------------ */
#canvas-host {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* ------------------------------------------------------------
   4. CUSTOM CURSOR
   ------------------------------------------------------------ */
#pcm-cursor {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 9999;
  pointer-events: none;
  will-change: transform;
}

#pcm-cursor::before {
  content: '';
  display: block;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(227, 238, 230, 0.45);
  transform: translate(-50%, -50%);
  transition: width 0.2s var(--ease-soft),
              height 0.2s var(--ease-soft),
              border-color 0.2s var(--ease-soft),
              background 0.2s var(--ease-soft);
}

#pcm-cursor::after {
  content: '';
  display: block;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--ink);
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  transition: opacity 0.2s var(--ease-soft);
}

#pcm-cursor.cursor-hot::before {
  width: 64px;
  height: 64px;
  border: 1px solid var(--brass);
  background: rgba(201, 169, 110, 0.08);
}

#pcm-cursor.cursor-drag::before {
  width: 20px;
  height: 20px;
  border: 2px solid var(--brass);
  background: transparent;
}

/* ------------------------------------------------------------
   5. CINEMA BARS
   ------------------------------------------------------------ */
.cinema-bar {
  position: fixed;
  left: 0;
  right: 0;
  z-index: 30;
  height: 0;
  background: var(--bg);
  transition: height 700ms var(--ease-cinema);
  pointer-events: none;
}

.cinema-bar--top {
  top: 0;
}

.cinema-bar--bottom {
  bottom: 0;
}

body.transitioning .cinema-bar {
  height: 80px;
}

/* ------------------------------------------------------------
   6. FLASH OVERLAY
   ------------------------------------------------------------ */
.flash-overlay {
  position: fixed;
  inset: 0;
  background: #ffffff;
  opacity: 0;
  pointer-events: none;
  z-index: 100;
  transition: opacity 0.15s linear;
}

/* ------------------------------------------------------------
   7. INTRO LOADER
   ------------------------------------------------------------ */
.intro-loader {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  transition: opacity 0.8s var(--ease-soft);
}

.intro-loader__spinner {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid rgba(201, 169, 110, 0.2);
  border-top-color: var(--brass);
  animation: spinBrass 1.2s linear infinite;
}

.intro-loader__text {
  font-family: var(--font-serif);
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.32em;
  color: var(--brass);
  text-transform: uppercase;
  opacity: 0.7;
}

.intro-loader.done {
  opacity: 0;
  pointer-events: none;
}

/* ------------------------------------------------------------
   8–10. SCENE COPY
   ------------------------------------------------------------ */
.scene-copy {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translateX(-50%) translateY(-50%);
  z-index: 10;
  text-align: center;
  width: 100%;
  max-width: 680px;
  padding: 0 24px;
  transition: opacity 0.8s var(--ease-soft),
              transform 0.8s var(--ease-soft);
}

.scene-copy.hidden {
  opacity: 0;
  transform: translateX(-50%) translateY(-55%);
  pointer-events: none;
}

.scene-copy.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(-50%);
  pointer-events: auto;
}

/* ------------------------------------------------------------
   11. SCENE COPY — PRE-TITLE
   ------------------------------------------------------------ */
.scene-copy .pre-title {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.32em;
  color: var(--brass);
  text-transform: uppercase;
  display: block;
  margin-bottom: 14px;
}

/* ------------------------------------------------------------
   12. SCENE COPY — MAIN TITLE
   ------------------------------------------------------------ */
.scene-copy .main-title {
  font-family: var(--font-serif);
  font-size: clamp(2.8rem, 5vw, 5.5rem);
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.18em;
  line-height: 1.1;
}

/* ─── REVEAL TEXT (seacat-style line reveal) ─── */
.reveal-wrap {
  overflow: hidden;
  display: block;
}
.reveal-inner {
  display: block;
  transform: translateY(105%);
  transition: transform 0s; /* GSAP handles this */
}
.scene-copy .main-title .reveal-wrap,
.scene-copy .main-title .reveal-inner {
  display: inline-block;
}

/* ------------------------------------------------------------
   13. SCENE COPY — TITLE RULE
   ------------------------------------------------------------ */
.scene-copy .title-rule {
  display: block;
  width: 40px;
  height: 1px;
  background: var(--brass);
  margin: 1rem auto;
  border: none;
}

/* ------------------------------------------------------------
   14. SCENE COPY — BODY TEXT
   ------------------------------------------------------------ */
.scene-copy .body-text {
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink);
  max-width: 540px;
  margin: 0 auto;
}

/* ------------------------------------------------------------
   15. SCENE COPY — STAT ROW
   ------------------------------------------------------------ */
.scene-copy .stat-row {
  display: flex;
  flex-direction: row;
  gap: 32px;
  justify-content: center;
  align-items: baseline;
  margin-top: 20px;
}

.scene-copy .stat-row .stat-number {
  font-family: var(--font-mono);
  font-size: 22px;
  color: var(--brass);
  line-height: 1;
}

.scene-copy .stat-row .stat-label {
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--cream);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.scene-copy .stat-row .stat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

/* ------------------------------------------------------------
   16. SCENE COPY — TAG ROW
   ------------------------------------------------------------ */
.scene-copy .tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 16px;
}

.scene-copy .tag-row .tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--brass);
  border: 1px solid var(--brass);
  padding: 4px 10px;
  text-transform: uppercase;
}

/* ------------------------------------------------------------
   17. HOME MARK
   ------------------------------------------------------------ */
.home-mark {
  position: fixed;
  top: 28px;
  left: 40px;
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 4px;
  cursor: none;
}

.home-mark__wordmark {
  font-family: var(--font-serif);
  font-size: 28px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.12em;
  line-height: 1;
}

.home-mark__slogan {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--brass);
  text-transform: uppercase;
}

/* ------------------------------------------------------------
   18. TOP SECTION META
   ------------------------------------------------------------ */
.top-section-meta {
  position: fixed;
  top: 28px;
  right: 40px;
  z-index: 20;
  text-align: right;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.top-section-meta__counter {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--brass);
  letter-spacing: 0.16em;
}

.top-section-meta__caption {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: rgba(232, 220, 196, 0.5);
  text-transform: uppercase;
}

/* ------------------------------------------------------------
   19. SIDE NAV
   ------------------------------------------------------------ */
.side-nav {
  position: fixed;
  right: 28px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
}

/* ------------------------------------------------------------
   20–22. SIDE NAV DOTS (seacat-style ring progress)
   ------------------------------------------------------------ */
.side-nav-dot {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  cursor: pointer;
  width: 36px;
  height: 36px;
  flex-shrink: 0;
}
.nav-ring { position: absolute; top: 0; left: 0; }
.nav-ring-fill { transition: stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1); }
.nav-num {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  color: rgba(227,238,230,0.3);
  letter-spacing: 0.05em;
  z-index: 1;
  transition: color 0.3s;
}
.side-nav-dot.active .nav-num { color: var(--brass); }
.side-nav-dot.active .nav-ring-fill { stroke-dashoffset: 0; }
.side-nav-dot:hover .nav-num { color: var(--ink); }
/* Tooltip */
.side-nav-dot::after {
  content: attr(data-tooltip);
  position: absolute;
  right: calc(100% + 12px);
  top: 50%;
  transform: translateY(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--brass);
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  background: rgba(6,9,10,0.85);
  padding: 3px 8px;
  border: 1px solid rgba(201,169,110,0.2);
}
.side-nav-dot:hover::after { opacity: 1; }

/* ------------------------------------------------------------
   23. BOTTOM MENU
   ------------------------------------------------------------ */
.bottom-menu {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 20;
  background: linear-gradient(
    to top,
    rgba(6, 9, 10, 0.85) 0%,
    transparent 100%
  );
  padding: 14px 40px 18px;
}

/* ------------------------------------------------------------
   24. BOTTOM MENU INNER
   ------------------------------------------------------------ */
.bottom-menu-inner {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: center;
}

/* ------------------------------------------------------------
   25–26. SECTION BUTTON
   ------------------------------------------------------------ */
.section-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: none;
  opacity: 0.5;
  transition: opacity 0.3s var(--ease-soft),
              color 0.3s var(--ease-soft),
              border-color 0.3s var(--ease-soft),
              box-shadow 0.3s var(--ease-soft);
  padding: 4px 0 6px;
}

.section-btn:hover {
  opacity: 0.9;
}

.section-btn__number {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: inherit;
}

.section-btn__label {
  font-family: var(--font-serif);
  font-size: 15px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: inherit;
  line-height: 1;
}

.section-btn.active {
  color: var(--brass);
  opacity: 1;
  border-bottom: 2px solid var(--brass);
  box-shadow: 0 0 12px rgba(201, 169, 110, 0.4);
}

.section-btn { position: relative; overflow: hidden; }

.section-btn::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--brass);
  box-shadow: 0 0 10px var(--brass);
  transition: width 0.3s ease;
}
.section-btn:hover::after,
.section-btn.active::after {
  width: 100%;
}

/* ------------------------------------------------------------
   27. PROGRESS BAR WRAP
   ------------------------------------------------------------ */
.progress-bar-wrap {
  position: relative;
  height: 1px;
  width: 100%;
  background: rgba(201, 169, 110, 0.15);
  margin-top: 8px;
  overflow: visible;
}

/* ------------------------------------------------------------
   28. PROGRESS BAR FILL
   ------------------------------------------------------------ */
.progress-bar-fill {
  height: 1px;
  background: var(--brass);
  box-shadow: 0 0 12px var(--brass);
  transition: width 1.4s var(--ease-cinema);
  position: absolute;
  top: 0;
  left: 0;
}

/* ------------------------------------------------------------
   29. CONTROLS CLUSTER
   ------------------------------------------------------------ */
.controls-cluster {
  position: fixed;
  bottom: 80px;
  right: 28px;
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: center;
}

/* ------------------------------------------------------------
   30–31. CTRL BUTTON
   ------------------------------------------------------------ */
.ctrl-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(201, 169, 110, 0.3);
  background: rgba(6, 9, 10, 0.7);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink);
  cursor: none;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.25s var(--ease-soft),
              box-shadow 0.25s var(--ease-soft),
              background 0.25s var(--ease-soft),
              color 0.25s var(--ease-soft);
  flex-shrink: 0;
}

.ctrl-btn:hover {
  border-color: var(--brass);
  box-shadow: 0 0 10px rgba(201, 169, 110, 0.4);
}

.ctrl-btn.active {
  background: var(--brass);
  color: var(--bg);
  border-color: var(--brass);
}

/* ------------------------------------------------------------
   32. KEYBOARD HINTS
   ------------------------------------------------------------ */
.kbd-hints {
  position: fixed;
  bottom: 80px;
  left: 28px;
  z-index: 20;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--ink);
  opacity: 0.35;
  line-height: 1.8;
  pointer-events: none;
}

/* ------------------------------------------------------------
   33–34. STATUS CONSOLE
   ------------------------------------------------------------ */
.status-console {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 30;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--brass);
  background: rgba(6, 9, 10, 0.8);
  padding: 8px 14px;
  max-width: 600px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border: 1px solid rgba(201, 169, 110, 0.2);
}

.status-console.done {
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s var(--ease-soft);
}

/* ------------------------------------------------------------
   35–40. DETAIL CARD
   ------------------------------------------------------------ */
.detail-card {
  position: fixed;
  z-index: 40;
  background: rgba(10, 14, 12, 0.96);
  border: 1px solid var(--brass);
  padding: 24px 28px;
  max-width: 320px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  overflow-y: auto;
  max-height: 320px;
  scrollbar-width: thin;
  scrollbar-color: rgba(201,169,110,0.4) transparent;
}
.detail-card::-webkit-scrollbar { width: 3px; }
.detail-card::-webkit-scrollbar-track { background: transparent; }
.detail-card::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.4); border-radius: 2px; }
.detail-card::-webkit-scrollbar-thumb:hover { background: rgba(201,169,110,0.8); }

/* ─── BURGER MENU ICON (seacat-style animated burger) ─── */
.pcm-burger .burger-svg { display: block; }
.pcm-burger .burger-line { transition: transform 0.3s ease, opacity 0.3s ease; transform-origin: center; }
.menu-open .pcm-burger .line1 { transform: rotate(45deg) translate(4px, 4px); }
.menu-open .pcm-burger .line2 { opacity: 0; transform: scaleX(0); }
.menu-open .pcm-burger .line3 { transform: rotate(-45deg) translate(4px, -4px); }

.detail-card .card-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.32em;
  color: var(--brass);
  text-transform: uppercase;
  display: block;
}

.detail-card .card-title {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
  margin: 6px 0;
  line-height: 1.2;
}

.detail-card .card-rule {
  display: block;
  width: 100%;
  height: 1px;
  background: var(--brass);
  border: none;
  margin: 10px 0;
}

.detail-card .card-body {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.7;
  color: var(--ink);
}

.detail-card .card-close {
  position: absolute;
  top: 10px;
  right: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--brass);
  cursor: none;
  opacity: 0.7;
  transition: opacity 0.2s var(--ease-soft);
  line-height: 1;
}

.detail-card .card-close:hover {
  opacity: 1;
}

/* ------------------------------------------------------------
   41. KEYBOARD HELP OVERLAY
   ------------------------------------------------------------ */
.kbd-help-overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(6, 9, 10, 0.9);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ------------------------------------------------------------
   42. KEYBOARD HELP PANEL
   ------------------------------------------------------------ */
.kbd-help-panel {
  background: var(--ink-green);
  border: 1px solid var(--brass);
  padding: 36px 40px;
  max-width: 500px;
  width: 100%;
}

/* ------------------------------------------------------------
   43. KBD HELP PANEL — H2
   ------------------------------------------------------------ */
.kbd-help-panel h2 {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 500;
  color: var(--brass);
  letter-spacing: 0.12em;
  margin-bottom: 20px;
}

/* ------------------------------------------------------------
   44–45. KBD HELP PANEL — TABLE
   ------------------------------------------------------------ */
.kbd-help-panel table {
  font-family: var(--font-mono);
  font-size: 11px;
  width: 100%;
  line-height: 2;
  border-collapse: collapse;
  color: var(--ink);
}

.kbd-help-panel td:first-child {
  color: var(--brass);
  width: 120px;
  vertical-align: top;
  letter-spacing: 0.1em;
}

/* ------------------------------------------------------------
   46–47. MENU OVERLAY (seacat-style dual-column with parallax)
   ------------------------------------------------------------ */
.menu-overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(6,9,10,0.98);
  transform: translateX(100%);
  transition: transform 0.7s var(--ease-cinema);
  overflow: hidden;
  overscroll-behavior: contain;
}
.menu-overlay.open { transform: translateX(0); }

.menu-layout {
  display: flex;
  height: 100%;
  width: 100%;
}
.menu-image-col {
  flex: 0 0 45%;
  position: relative;
  overflow: hidden;
}
.menu-back-image {
  position: absolute;
  inset: -30px;
  transition: transform 0.1s linear;
  background: radial-gradient(ellipse 60% 70% at 50% 50%, rgba(45,62,54,0.8) 0%, rgba(6,9,10,0) 70%);
}
.menu-front-image {
  position: absolute;
  inset: 0;
  transition: transform 0.1s linear;
  display: flex;
  align-items: center;
  justify-content: center;
}
.menu-front-image::before {
  content: '';
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: 1px solid rgba(201,169,110,0.2);
  background: radial-gradient(circle, rgba(45,62,54,0.6) 0%, transparent 70%);
}
.menu-img-label {
  position: absolute;
  bottom: 40px;
  left: 40px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.35em;
  color: rgba(201,169,110,0.3);
  text-transform: uppercase;
}
/* Per-section back-image gradients */
.menu-back-image[data-section="0"] { background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(26,37,32,0.9) 0%, rgba(6,9,10,0) 70%); }
.menu-back-image[data-section="1"] { background: radial-gradient(ellipse 80% 60% at 40% 60%, rgba(45,62,54,0.7) 0%, rgba(6,9,10,0) 70%); }
.menu-back-image[data-section="2"] { background: radial-gradient(ellipse 60% 80% at 60% 40%, rgba(26,37,32,0.8) 0%, rgba(6,9,10,0) 70%); }
.menu-back-image[data-section="3"] { background: radial-gradient(ellipse 90% 50% at 50% 70%, rgba(15,24,20,0.95) 0%, rgba(45,62,54,0.3) 50%, rgba(6,9,10,0) 100%); }
.menu-back-image[data-section="4"] { background: radial-gradient(ellipse 70% 70% at 60% 50%, rgba(26,37,32,0.85) 0%, rgba(6,9,10,0) 70%); }
.menu-back-image[data-section="5"] { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(201,169,110,0.07) 0%, rgba(26,37,32,0.6) 40%, rgba(6,9,10,0) 80%); }
.menu-back-image[data-section="6"] { background: radial-gradient(ellipse 60% 90% at 40% 50%, rgba(45,62,54,0.75) 0%, rgba(6,9,10,0) 70%); }
.menu-back-image[data-section="7"] { background: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(26,37,32,0.9) 0%, rgba(6,9,10,0) 70%); }
.menu-back-image[data-section="8"] { background: radial-gradient(ellipse 70% 60% at 60% 60%, rgba(15,24,20,0.85) 0%, rgba(6,9,10,0) 70%); }
.menu-back-image[data-section="9"] { background: radial-gradient(ellipse 80% 70% at 50% 50%, rgba(201,169,110,0.1) 0%, rgba(26,37,32,0.5) 50%, rgba(6,9,10,0) 80%); }

.menu-nav-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px var(--margin, 60px) 60px 50px;
  overflow-y: auto;
  overscroll-behavior: contain;
}
.menu-nav { display: flex; flex-direction: column; gap: 2px; }
.menu-link {
  display: block;
  padding: 8px 0;
  text-decoration: none;
  overflow: hidden;
}
.menu-link-inner {
  display: flex;
  align-items: baseline;
  gap: 18px;
  transition: transform 0.5s cubic-bezier(0.215, 0.61, 0.355, 1);
}
@media (hover: hover) {
  .menu-link:hover .menu-link-inner { transform: translateX(12px); }
  .menu-link:hover .menu-link-num { color: var(--brass); }
  .menu-link:hover .menu-link-text > span:first-child { opacity: 0; }
  .menu-link:hover .menu-link-dup { opacity: 0.6; transform: none; }
}
.menu-link-num {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(201,169,110,0.3);
  flex-shrink: 0;
  transition: color 0.3s ease;
}
.menu-link-text {
  position: relative;
  overflow: hidden;
  font-family: var(--font-serif);
  font-size: clamp(1.8rem, 3.5vw, 3.2rem);
  color: var(--ink);
  letter-spacing: 0.05em;
  line-height: 1.1;
}
.menu-link-text > span { display: block; transition: opacity 0.3s, transform 0.5s cubic-bezier(0.215, 0.61, 0.355, 1); }
.menu-link-dup {
  position: absolute !important;
  top: 0; left: 0;
  opacity: 0.3;
  color: var(--brass);
}
.menu-footer-info {
  margin-top: 48px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.menu-tagline {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.3em;
  color: rgba(201,169,110,0.3);
  text-transform: uppercase;
}
.menu-email {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: rgba(201,169,110,0.5);
  text-decoration: none;
  transition: color 0.25s ease;
}
@media (hover: hover) {
  .menu-email:hover { color: var(--brass); }
}
@media (max-width: 768px) {
  .menu-layout { flex-direction: column; }
  .menu-image-col { display: none; }
  .menu-nav-col { padding: 60px 30px; }
  .menu-link-text { font-size: 2.2rem; }
}

/* ─── CIRCULAR PROGRESS INDICATOR ─── */
.circular-progress {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 18;
  pointer-events: none;
  opacity: 0.6;
  transition: opacity 0.4s ease;
}
.circular-progress:hover { opacity: 1; }
.circular-progress svg {
  display: block;
}
.circ-static { stroke: rgba(201,169,110,0.12); fill: none; }
.circ-dashed { stroke: rgba(201,169,110,0.08); fill: none; stroke-dasharray: 1 4; }
.circ-progress-arc { fill: none; stroke: var(--brass); transition: stroke-dashoffset 1.4s cubic-bezier(0.77,0,0.175,1); }
.circ-section-num {
  font-family: var(--font-mono);
  font-size: 11px;
  fill: var(--brass);
  text-anchor: middle;
  dominant-baseline: central;
  letter-spacing: 0.15em;
}

/* ─── VIDEO SCALE-IN TRANSITION (seacat-style) ─── */
.section-video {
  transform: scale(0.85);
  transition: transform 2.2s cubic-bezier(0.76, 0, 0.24, 1);
  transition-delay: 0.8s;
}
.section-video.active {
  transform: scale(1);
}
/* Section background video elements */
.section-bg-video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.8s ease, transform 2s cubic-bezier(0.76, 0, 0.24, 1);
  transform: scale(1.05);
}
.section-bg-video.active {
  opacity: 1;
  transform: scale(1);
  transition-delay: 0.4s;
}

/* ─── SECTION BACKGROUND ATMOSPHERE ─── */
.section-atmosphere {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1.2s var(--ease-cinema);
}
.section-atmosphere.visible { opacity: 1; }
/* Per-section background gradients */
.section-atm-0 { background: radial-gradient(ellipse 70% 50% at 50% 50%, rgba(26,37,32,0.15) 0%, transparent 70%); }
.section-atm-1 { background: radial-gradient(ellipse 80% 60% at 40% 60%, rgba(45,62,54,0.12) 0%, transparent 70%); }
.section-atm-2 { background: radial-gradient(ellipse 60% 70% at 60% 40%, rgba(26,37,32,0.1) 0%, transparent 70%); }
.section-atm-3 { background: linear-gradient(155deg, rgba(15,24,20,0.2) 0%, rgba(45,62,54,0.08) 50%, transparent 100%); }
.section-atm-4 { background: linear-gradient(155deg, rgba(6,9,10,0.3) 0%, rgba(26,37,32,0.15) 100%); }
.section-atm-5 { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(201,169,110,0.04) 0%, rgba(26,37,32,0.1) 50%, transparent 80%); }
.section-atm-6 { background: linear-gradient(200deg, rgba(15,24,20,0.25) 0%, transparent 60%); }
.section-atm-7 { background: radial-gradient(ellipse 90% 70% at 50% 50%, rgba(26,37,32,0.2) 0%, transparent 70%); }
.section-atm-8 { background: linear-gradient(140deg, rgba(15,24,20,0.18) 0%, transparent 50%); }
.section-atm-9 { background: radial-gradient(ellipse 70% 80% at 50% 60%, rgba(201,169,110,0.06) 0%, rgba(26,37,32,0.08) 50%, transparent 80%); }

/* ─── HORIZONTAL MODE CAROUSEL (seacat Inside-the-heart style) ─── */
.modes-carousel {
  display: flex;
  flex-wrap: nowrap;
  gap: 0;
  overflow: hidden;
  position: relative;
  margin-top: 20px;
  width: 100%;
}
.mode-panel {
  flex: 0 0 100%;
  padding: 0 4px;
  opacity: 0.08;
  transition: opacity 2.5s ease-out;
  pointer-events: none;
}
.mode-panel.active {
  opacity: 1;
  pointer-events: auto;
}
.mode-panel-name {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.25em;
  color: var(--brass);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.mode-panel-body {
  font-family: var(--font-body);
  font-size: 13px;
  line-height: 1.7;
  color: rgba(227,238,230,0.75);
}
/* Step dash indicators (seacat buttons-0-2-55 style) */
.mode-steps {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
}
.mode-step-dash {
  width: 40px;
  height: 2px;
  background: rgba(201,169,110,0.25);
  transition: background 0.4s ease, width 0.4s ease;
  cursor: pointer;
}
.mode-step-dash.active {
  background: var(--brass);
  box-shadow: 0 0 6px rgba(201,169,110,0.5);
  width: 56px;
}
@media (hover: hover) {
  .mode-step-dash:hover { background: rgba(201,169,110,0.5); }
}

/* ------------------------------------------------------------
   50–51. COOKIE NOTICE
   ------------------------------------------------------------ */
.cookie-notice {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 50;
  background: var(--ink-green);
  border: 1px solid rgba(201, 169, 110, 0.4);
  padding: 20px 24px;
  max-width: 340px;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink);
  line-height: 1.6;
}

.cookie-notice .cookie-accept {
  display: inline-block;
  background: var(--brass);
  color: var(--ink-green);
  padding: 8px 20px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  cursor: none;
  border: none;
  margin-top: 14px;
  transition: background 0.2s var(--ease-soft),
              box-shadow 0.2s var(--ease-soft);
  text-transform: uppercase;
}

.cookie-notice .cookie-accept:hover {
  background: var(--coin-gold);
  box-shadow: 0 0 14px rgba(201, 169, 110, 0.4);
}

/* ------------------------------------------------------------
   52–53. CREDITS MODAL
   ------------------------------------------------------------ */
.credits-modal {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(6, 9, 10, 0.95);
  display: flex;
  align-items: center;
  justify-content: center;
}

.credits-modal-inner {
  background: var(--ink-green);
  border: 1px solid var(--brass);
  padding: 40px;
  max-width: 500px;
  width: 100%;
}

/* ------------------------------------------------------------
   54. SCROLL CUE
   ------------------------------------------------------------ */
.scroll-cue {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--brass);
  opacity: 0.6;
  text-transform: uppercase;
  animation: pulseBrass 2s ease-in-out infinite;
  white-space: nowrap;
  pointer-events: none;
}

/* ------------------------------------------------------------
   55. VIGNETTE
   ------------------------------------------------------------ */
.vignette {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  background: radial-gradient(
    ellipse at center,
    transparent 40%,
    rgba(6, 9, 10, 0.7) 100%
  );
}

/* ------------------------------------------------------------
   56–57. LANDSCAPE GATE
   ------------------------------------------------------------ */
.landscape-gate {
  position: fixed;
  inset: 0;
  z-index: 60;
  background: var(--bg);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 40px;
  text-align: center;
}

.landscape-gate__icon {
  font-family: var(--font-mono);
  font-size: 32px;
  color: var(--brass);
  opacity: 0.6;
}

.landscape-gate__text {
  font-family: var(--font-serif);
  font-size: 22px;
  color: var(--ink);
  letter-spacing: 0.12em;
}

.landscape-gate__sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--cream);
  opacity: 0.6;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

@media screen and (orientation: portrait) and (max-width: 768px) {
  .landscape-gate {
    display: flex;
  }
}

/* ------------------------------------------------------------
   58. PWA PROMPT
   ------------------------------------------------------------ */
.pwa-prompt {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 50;
  background: var(--ink-green);
  border: 1px solid rgba(201, 169, 110, 0.4);
  padding: 20px 24px;
  max-width: 340px;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink);
  line-height: 1.6;
}

.pwa-prompt .pwa-install {
  display: inline-block;
  background: var(--brass);
  color: var(--ink-green);
  padding: 8px 20px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  cursor: none;
  border: none;
  margin-top: 14px;
  text-transform: uppercase;
  transition: background 0.2s var(--ease-soft),
              box-shadow 0.2s var(--ease-soft);
}

.pwa-prompt .pwa-install:hover {
  background: var(--coin-gold);
  box-shadow: 0 0 14px rgba(201, 169, 110, 0.4);
}

.pwa-prompt .pwa-dismiss {
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(232, 220, 196, 0.5);
  cursor: none;
  border: none;
  background: none;
  margin-top: 10px;
  display: block;
  letter-spacing: 0.12em;
  transition: color 0.2s var(--ease-soft);
}

.pwa-prompt .pwa-dismiss:hover {
  color: var(--cream);
}

/* ------------------------------------------------------------
   59. SKIP TO CONTENT
   ------------------------------------------------------------ */
.skip-to-content {
  position: absolute;
  top: -100%;
  left: 0;
  z-index: 50;
  background: var(--brass);
  color: var(--bg);
  padding: 8px 16px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-decoration: none;
  transition: top 0.2s var(--ease-soft);
}

.skip-to-content:focus {
  top: 0;
}

/* ------------------------------------------------------------
   60. PCM FOOTER
   ------------------------------------------------------------ */
.pcm-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  z-index: 10;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink);
  opacity: 0.4;
  padding: 0 40px 6px;
  pointer-events: none;
}

/* ------------------------------------------------------------
   61. SCROLLBAR
   ------------------------------------------------------------ */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: rgba(201, 169, 110, 0.3);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(201, 169, 110, 0.6);
}

/* Firefox */
* {
  scrollbar-width: thin;
  scrollbar-color: rgba(201, 169, 110, 0.3) transparent;
}

/* ------------------------------------------------------------
   62. @KEYFRAMES — PULSE BRASS
   ------------------------------------------------------------ */
@keyframes pulseBrass {
  0% {
    opacity: 0.4;
    transform: translateX(-50%) scale(0.95);
  }
  50% {
    opacity: 1;
    transform: translateX(-50%) scale(1.05);
  }
  100% {
    opacity: 0.4;
    transform: translateX(-50%) scale(0.95);
  }
}

/* Variant for elements not using translateX(-50%) */
@keyframes pulseBrassSimple {
  0% {
    opacity: 0.4;
    transform: scale(0.95);
  }
  50% {
    opacity: 1;
    transform: scale(1.05);
  }
  100% {
    opacity: 0.4;
    transform: scale(0.95);
  }
}

/* ------------------------------------------------------------
   63. @KEYFRAMES — SPIN BRASS
   ------------------------------------------------------------ */
@keyframes spinBrass {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}

/* ------------------------------------------------------------
   64. @KEYFRAMES — FADE IN UP
   ------------------------------------------------------------ */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ------------------------------------------------------------
   65. REDUCED MOTION
   ------------------------------------------------------------ */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.3s !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.3s !important;
  }

  .cinema-bar {
    transition: height 0.3s linear;
  }

  .flash-overlay {
    transition: opacity 0.3s linear;
  }

  .intro-loader {
    transition: opacity 0.3s linear;
  }

  .intro-loader__spinner {
    animation: none;
    border-color: var(--brass);
  }

  .scene-copy {
    transition: opacity 0.3s linear,
                transform 0.3s linear;
  }

  .menu-overlay {
    transition: transform 0.3s linear;
  }

  .progress-bar-fill {
    transition: width 0.3s linear;
  }

  .scroll-cue {
    animation: none;
  }

  .status-console.done {
    transition: opacity 0.3s linear;
  }
}


/* === Supplemental component styles === */
/* =============================================================
   PCM CINEMATIC SITE — SUPPLEMENTAL COMPONENT STYLES
   Companion to styles.css — all additional component rules
   ============================================================= */

/* ─────────────────────────────────────────────
   1. MODES ROW
   ───────────────────────────────────────────── */

.modes-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin: 16px 0;
  position: relative;
  user-select: none;
  touch-action: pan-x;
}
.mode-drag-indicator {
  position: absolute;
  bottom: -4px;
  left: 0;
  height: 1px;
  background: var(--brass);
  box-shadow: 0 0 8px var(--brass);
  transition: left 0.3s ease, width 0.3s ease;
}

.mode-btn {
  background: transparent;
  border: 1px solid rgba(201, 169, 110, 0.25);
  color: var(--cream);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  padding: 6px 14px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.3s;
}

.mode-btn.active {
  background: var(--brass);
  color: var(--bg);
  border-color: var(--brass);
}

.mode-btn:hover:not(.active) {
  border-color: var(--brass);
  color: var(--brass);
}

.mode-body {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  line-height: 1.7;
  color: var(--ink);
  opacity: 0.85;
  margin: 10px 0;
  max-width: 420px;
  min-height: 48px;
  transition: opacity 0.3s;
}

.mode-stats {
  display: flex;
  gap: 24px;
  margin: 10px 0;
}

/* ─────────────────────────────────────────────
   2. STAT ITEMS
   ───────────────────────────────────────────── */

.stat-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.stat-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  color: var(--brass);
  letter-spacing: 0.05em;
  line-height: 1;
}

.stat-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--cream);
  opacity: 0.7;
  text-transform: uppercase;
}

/* ─────────────────────────────────────────────
   3. TAGS
   ───────────────────────────────────────────── */

.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
}

.tag {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.14em;
  color: rgba(201, 169, 110, 0.7);
  border: 1px solid rgba(201, 169, 110, 0.2);
  padding: 3px 10px;
  text-transform: uppercase;
}

/* ─────────────────────────────────────────────
   4. LONG BLOCK
   ───────────────────────────────────────────── */

.long-block {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem;
  line-height: 1.9;
  color: var(--ink);
  opacity: 0.8;
  max-width: 520px;
  margin: 16px 0;
  font-style: italic;
  border-left: 2px solid rgba(201, 169, 110, 0.4);
  padding-left: 20px;
}

/* ─────────────────────────────────────────────
   5. POETIC BLOCK
   ───────────────────────────────────────────── */

.poetic-block {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  line-height: 2.2;
  color: var(--brass);
  opacity: 0.9;
  max-width: 480px;
  margin: 20px 0;
  text-align: center;
  letter-spacing: 0.06em;
  font-style: italic;
}

/* ─────────────────────────────────────────────
   6. CONTACT FORM
   ───────────────────────────────────────────── */

.contact-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 380px;
  margin-top: 16px;
}

.pcm-input {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(201, 169, 110, 0.2);
  color: var(--ink);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.25s;
  width: 100%;
  box-sizing: border-box;
}

.pcm-input:focus {
  border-color: var(--brass);
  background: rgba(255, 255, 255, 0.06);
}

.pcm-input::placeholder {
  color: rgba(227, 238, 230, 0.3);
}

.pcm-textarea {
  resize: vertical;
  min-height: 90px;
  font-family: 'Space Grotesk', sans-serif;
}

select.pcm-input {
  cursor: pointer;
}

select.pcm-input option {
  background: #0f1814;
}

.pcm-submit {
  background: transparent;
  border: 1px solid var(--brass);
  color: var(--brass);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  padding: 12px 28px;
  cursor: pointer;
  transition: all 0.3s;
  text-transform: uppercase;
  align-self: flex-start;
}

.pcm-submit:hover {
  background: var(--brass);
  color: var(--bg);
}

.form-status {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  margin-top: 6px;
  min-height: 18px;
}

/* ─────────────────────────────────────────────
   7. HOME MARK
   ───────────────────────────────────────────── */

.home-mark {
  position: fixed;
  top: 28px;
  left: 40px;
  z-index: 20;
  opacity: 0;
  transition: opacity 0.8s;
  pointer-events: none;
}

.home-mark.visible {
  opacity: 1;
  pointer-events: auto;
}

.home-mark .wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  color: var(--ink);
  letter-spacing: 0.18em;
  font-weight: 500;
}

.home-mark .slogan {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.32em;
  color: var(--brass);
  text-transform: uppercase;
  margin-top: 4px;
}

.home-mark .brass-hairline {
  width: 100%;
  height: 1px;
  background: var(--brass);
  margin-top: 8px;
  box-shadow: 0 0 8px rgba(201, 169, 110, 0.4);
}

/* ─────────────────────────────────────────────
   8. TOP META
   ───────────────────────────────────────────── */

.top-section-meta {
  position: fixed;
  top: 28px;
  right: 40px;
  z-index: 20;
  text-align: right;
}

.meta-num {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  color: var(--ink);
  letter-spacing: 0.18em;
}

.meta-cap {
  display: block;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--brass);
  text-transform: uppercase;
  margin-top: 3px;
  opacity: 0.7;
}

/* ─────────────────────────────────────────────
   9. BOTTOM MENU EXTRAS
   ───────────────────────────────────────────── */

.btn-num {
  display: block;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  color: rgba(201, 169, 110, 0.5);
  margin-bottom: 3px;
}

.btn-name {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

/* ─────────────────────────────────────────────
   10. INTRO LOADER EXTRAS
   ───────────────────────────────────────────── */

.loader-inner {
  text-align: center;
}

.loader-spinner {
  width: 36px;
  height: 36px;
  border: 2px solid rgba(201, 169, 110, 0.2);
  border-top-color: var(--brass);
  border-radius: 50%;
  animation: spinBrass 1s linear infinite;
  margin: 0 auto 20px;
}

.loader-wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem;
  color: var(--ink);
  letter-spacing: 0.22em;
  text-transform: uppercase;
}

.loader-status {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--brass);
  letter-spacing: 0.18em;
  margin-top: 12px;
  opacity: 0.7;
}

/* ─────────────────────────────────────────────
   11. MENU OVERLAY EXTRAS
   ───────────────────────────────────────────── */

.menu-close {
  position: absolute;
  top: 28px;
  right: 40px;
  background: transparent;
  border: none;
  color: var(--brass);
  font-size: 1.4rem;
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  z-index: 1;
}

.menu-overlay nav a {
  font-size: clamp(2.5rem, 5vw, 5rem);
  letter-spacing: 0.08em;
  text-decoration: none;
  opacity: 0.85;
  transition: all 0.3s;
  display: block;
  margin-bottom: 8px;
  border-bottom: 1px solid rgba(201, 169, 110, 0.08);
  padding-bottom: 12px;
}

.menu-overlay nav a:hover {
  opacity: 1;
  padding-left: 16px;
  color: var(--brass);
}

/* ─────────────────────────────────────────────
   12. CINEMA BARS
   ───────────────────────────────────────────── */

.cinema-bar {
  position: fixed;
  left: 0;
  right: 0;
  height: 0;
  background: #000;
  z-index: 45;
  transition: height 700ms cubic-bezier(0.83, 0, 0.17, 1);
  pointer-events: none;
}

.cinema-bar-top {
  top: 0;
}

.cinema-bar-bottom {
  bottom: 0;
}

body.transitioning .cinema-bar {
  height: 80px;
}

@media (prefers-reduced-motion: reduce) {
  body.transitioning .cinema-bar {
    transition-duration: 200ms;
    height: 40px;
  }
}

/* ─────────────────────────────────────────────
   13. PCM CURSOR
   ───────────────────────────────────────────── */

.pcm-cursor {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 9999;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(227, 238, 230, 0.45);
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s, border-color 0.2s, background 0.2s;
  will-change: transform;
}

.cursor-dot {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 4px;
  height: 4px;
  background: var(--ink);
  border-radius: 50%;
}

.pcm-cursor.cursor-hot {
  width: 64px;
  height: 64px;
  border-color: var(--brass);
  background: rgba(201, 169, 110, 0.08);
}

.pcm-cursor.cursor-drag {
  width: 20px;
  height: 20px;
  background: var(--brass);
  border-color: var(--brass);
}

body:has(.pcm-cursor) {
  cursor: none;
}

/* ─────────────────────────────────────────────
   14. CADENCE / CONNECTOR
   ───────────────────────────────────────────── */

.cadence-strip {
  display: flex;
  align-items: center;
  gap: 0;
  margin: 20px 0;
}

.cadence-stage {
  text-align: center;
  padding: 0 12px;
}

.cadence-num {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--brass);
  letter-spacing: 0.22em;
}

.cadence-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.95rem;
  color: var(--ink);
  margin-top: 4px;
}

.cadence-connector {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--brass), rgba(201, 169, 110, 0.2));
  min-width: 20px;
  box-shadow: 0 0 4px rgba(201, 169, 110, 0.3);
}

/* ─────────────────────────────────────────────
   15. SCROLL CUE
   ───────────────────────────────────────────── */

.scroll-cue {
  position: fixed;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.22em;
  color: var(--brass);
  text-transform: uppercase;
  text-align: center;
  animation: pulseBrass 2s ease-in-out infinite;
  z-index: 20;
  opacity: 0.7;
  pointer-events: none;
}

/* ─────────────────────────────────────────────
   16. SECTION COPY RESPONSIVE
   ───────────────────────────────────────────── */

@media (max-width: 900px) {
  .scene-copy {
    left: 50%;
    transform: translateX(-50%);
    width: 90vw;
  }

  .scene-copy.visible {
    transform: translateX(-50%) translateY(-50%);
  }

  .scene-copy.hidden {
    transform: translateX(-50%) translateY(-55%);
  }

  .copy-inner {
    padding: 0 16px;
  }

  .bottom-menu {
    padding: 10px 20px 14px;
  }

  .section-btn {
    padding: 0 6px;
  }

  .side-nav {
    right: 14px;
  }

  .home-mark {
    left: 20px;
  }

  .top-section-meta {
    right: 20px;
  }
}

/* ─────────────────────────────────────────────
   17. CANVAS HOST
   ───────────────────────────────────────────── */

#canvas-host {
  position: fixed;
  inset: 0;
  z-index: 0;
}

#canvas-host canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
}

/* ─────────────────────────────────────────────
   18. DETAIL CARD TRANSITIONS
   ───────────────────────────────────────────── */

.detail-card {
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
}

.detail-card:not(.hidden) {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* ─────────────────────────────────────────────
   19. STATUS CONSOLE
   ───────────────────────────────────────────── */

.status-console div {
  animation: fadeInUp 0.3s ease both;
}

.status-console div:nth-child(1) { animation-delay: 0s; }
.status-console div:nth-child(2) { animation-delay: 0.1s; }
.status-console div:nth-child(3) { animation-delay: 0.25s; }
.status-console div:nth-child(4) { animation-delay: 0.45s; }
.status-console div:nth-child(5) { animation-delay: 0.7s; }
.status-console div:nth-child(6) { animation-delay: 0.95s; }
.status-console div:nth-child(7) { animation-delay: 1.2s; }
.status-console div:nth-child(8) { animation-delay: 1.5s; }

/* ─────────────────────────────────────────────
   20. FLASH OVERLAY
   ───────────────────────────────────────────── */

.flash-overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: white;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease;
}


/* === Fixes for late-inserted overlays === */
.hidden { display: none !important; }

/* ============================================================
   ═══════════════════════════════════════════════════════════════
   PCM v13 — SEACAT FEATURE-PARITY ADDITIONS
   Gap implementations for: loader, audio wave, menu rings,
   triangles, scrubber, belt-conveyor, drawer, footer, etc.
   ═══════════════════════════════════════════════════════════════
   ============================================================ */

/* ───────────────────────────────────────────────────────────────
   GAP 13 — Gradient progress loading bar (replaces spinner)
   ─────────────────────────────────────────────────────────────── */
.intro-loader__bar-wrap {
  width: 240px;
  height: 1px;
  background: rgba(201, 169, 110, 0.15);
  position: relative;
  overflow: visible;
  margin: 0 auto;
}
.intro-loader__bar-fill {
  height: 1px;
  width: 0%;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(201, 169, 110, 0.6) 20%,
    #c9a96e 50%,
    #d9b97a 75%,
    transparent 100%);
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.intro-loader__bar-fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: -2px;
  width: 4px;
  height: 5px;
  background: var(--brass);
  box-shadow: 0 0 8px 2px var(--brass), 0 0 14px 4px rgba(201, 169, 110, 0.4);
}
.intro-loader__bar-fill::before {
  content: '';
  position: absolute;
  left: -20px;
  top: -1px;
  height: 3px;
  width: 20px;
  background: linear-gradient(90deg, transparent 0%, rgba(201, 169, 110, 0.4) 100%);
  filter: blur(1px);
}
.intro-loader__pct {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.32em;
  color: var(--brass);
  opacity: 0.5;
  margin-top: 12px;
  text-align: center;
}
.intro-loader__wordmark-loader {
  font-family: var(--font-serif);
  font-size: 18px;
  letter-spacing: 0.32em;
  color: var(--ink);
  text-transform: uppercase;
  opacity: 0.85;
  margin-bottom: 28px;
  text-align: center;
}
.intro-loader__hairline {
  width: 28px;
  height: 1px;
  background: var(--brass);
  margin: 6px auto 14px;
  opacity: 0.6;
}

/* ───────────────────────────────────────────────────────────────
   GAP 6 — SVG waveform audio button
   ─────────────────────────────────────────────────────────────── */
.audio-wave { display: block; overflow: visible; }
.audio-wave polyline {
  transition: stroke 0.3s ease, filter 0.3s ease;
}
#btn-audio { padding: 0; }
#btn-audio.active .audio-wave polyline {
  stroke: var(--brass);
  filter: drop-shadow(0 0 4px rgba(201, 169, 110, 0.6));
}
#btn-audio .audio-wave polyline {
  stroke: currentColor;
}

/* ───────────────────────────────────────────────────────────────
   GAP 8 — Rotating two-layer menu ring button
   ─────────────────────────────────────────────────────────────── */
@keyframes pcm-ring-cw  { from { transform: rotate(0deg); }   to { transform: rotate(360deg); } }
@keyframes pcm-ring-ccw { from { transform: rotate(0deg); }   to { transform: rotate(-360deg); } }

#btn-menu {
  position: relative;
  width: 44px;
  height: 44px;
  overflow: visible;
  background: transparent;
  border: none;
}
@media (hover: hover) {
  #btn-menu:hover .pcm-ring-1 { animation-duration: 2.4s; }
  #btn-menu:hover .pcm-ring-2 { animation-duration: 1.8s; }
  #btn-menu:hover .pcm-menu-plus { color: var(--brass); }
}
.pcm-menu-rings {
  position: relative;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.pcm-ring {
  position: absolute;
  inset: 0;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
  transform-origin: center;
}
.pcm-ring-1 { animation: pcm-ring-cw  4s linear infinite; }
.pcm-ring-2 { animation: pcm-ring-ccw 3s linear infinite; }
.pcm-menu-plus {
  position: absolute;
  color: var(--ink);
  transition: transform 0.4s var(--ease-cinema), color 0.3s ease;
  pointer-events: none;
}
.pcm-menu-plus .plus-v,
.pcm-menu-plus .plus-h {
  transform-origin: center;
  transition: transform 0.4s var(--ease-cinema);
}
.menu-open .pcm-menu-plus { transform: rotate(135deg); color: var(--brass); }
.menu-open .pcm-menu-plus .plus-v { transform: rotate(45deg); }
.menu-open .pcm-menu-plus .plus-h { transform: rotate(45deg); }
@media (prefers-reduced-motion: reduce) {
  .pcm-ring-1, .pcm-ring-2 { animation: none; }
}

/* ───────────────────────────────────────────────────────────────
   GAP 11 — Triangular SVG corner masks
   ─────────────────────────────────────────────────────────────── */
.section-triangles {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.6s var(--ease-cinema);
  mix-blend-mode: normal;
}
.section-triangles.visible { opacity: 1; }
.section-triangles polygon {
  transition: opacity 0.6s var(--ease-cinema), points 0.6s var(--ease-cinema);
}

/* ───────────────────────────────────────────────────────────────
   GAP 7 — Belt-conveyor hover text on header links
   ─────────────────────────────────────────────────────────────── */
.belt-link {
  display: inline-block;
  overflow: hidden;
  vertical-align: top;
  position: relative;
  line-height: 1.1;
}
.belt-link-inner {
  display: flex;
  transition: transform 0.55s cubic-bezier(0.215, 0.61, 0.355, 1);
  white-space: nowrap;
  will-change: transform;
}
.belt-link-inner > span {
  flex-shrink: 0;
  display: inline-block;
  text-align: left;
}
.belt-link-inner > span + span {
  margin-left: 0;
}
@media (hover: hover) {
  .belt-link:hover .belt-link-inner {
    transform: translateX(-50%);
  }
  .belt-link:hover .belt-link-inner > span:first-child {
    opacity: 0.4;
  }
  .belt-link:hover .belt-link-inner > span:last-child {
    opacity: 1;
    color: var(--brass);
  }
}
.belt-link-inner > span {
  transition: opacity 0.4s ease, color 0.4s ease;
}
.belt-link-inner > span:last-child {
  opacity: 0.4;
  color: var(--brass);
}

/* GAP 15 — mix-blend-mode: screen on chrome wordmark */
.home-mark .wordmark { mix-blend-mode: screen; }

/* ───────────────────────────────────────────────────────────────
   GAP 27 — will-change on animated elements
   ─────────────────────────────────────────────────────────────── */
.home-mark      { will-change: transform; }
.scene-copy     { will-change: transform, opacity; }
.cinema-bar     { will-change: height; }
.intro-loader   { will-change: opacity; }
.side-nav-dot   { will-change: transform; }
.progress-bar-fill { will-change: width; }

/* ───────────────────────────────────────────────────────────────
   GAP 28 — overscroll-behavior: contain on overlays
   ─────────────────────────────────────────────────────────────── */
.detail-card     { overscroll-behavior: contain; }
#menu-overlay    { overscroll-behavior: contain; }
.kbd-help-overlay{ overscroll-behavior: contain; }
.credits-modal   { overscroll-behavior: contain; }

/* ───────────────────────────────────────────────────────────────
   GAP 20 — @media (hover: hover) guards
   These selectors override prior :hover rules so they apply only
   on hover-capable devices (no sticky-hover on touch).
   ─────────────────────────────────────────────────────────────── */
@media (hover: none) and (pointer: coarse) {
  .ctrl-btn:hover,
  .mode-btn:hover,
  .side-nav-dot:hover,
  .section-btn:hover,
  .menu-overlay nav a:hover,
  .detail-card .card-close:hover,
  .pcm-footer .footer-cta:hover {
    /* Reset accidental hover sticky on touch */
    border-color: inherit;
    box-shadow: none;
    color: inherit;
    opacity: 0.5;
  }
}
@media (hover: hover) {
  .ctrl-btn:hover {
    border-color: var(--brass);
    box-shadow: 0 0 14px rgba(201, 169, 110, 0.5);
  }
  .side-nav-dot:hover .nav-num { color: var(--ink); }
  .section-btn:hover { opacity: 0.95; }
  .menu-overlay nav a:hover { color: var(--brass); }
}

/* ───────────────────────────────────────────────────────────────
   GAP 2 — SVG drag-to-reveal scrubber (Senior Debt section)
   ─────────────────────────────────────────────────────────────── */
.scrub-swiper {
  position: fixed;
  bottom: 140px;
  left: 50%;
  transform: translateX(-50%);
  width: min(560px, 90vw);
  height: 60px;
  display: none;
  align-items: center;
  z-index: 15;
  pointer-events: none;
}
.scrub-swiper.visible {
  display: flex;
  pointer-events: auto;
}
.scrub-track {
  position: relative;
  flex: 1;
  height: 30px;
  margin: 0 24px;
  display: flex;
  align-items: center;
}
.scrub-track-line {
  width: 100%;
  height: 1px;
  background: rgba(201, 169, 110, 0.0);
  position: relative;
}
.scrub-svg-line {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 30px;
  top: 0;
  overflow: visible;
  pointer-events: none;
}
.scrub-drag-handle {
  position: absolute;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  touch-action: none;
  z-index: 5;
  top: 50%;
  left: 0;
  transform: translate(-50%, -50%);
  transition: filter 0.3s ease;
  user-select: none;
  -webkit-user-drag: none;
}
.scrub-drag-handle:hover {
  filter: drop-shadow(0 0 10px rgba(201, 169, 110, 0.6));
}
.scrub-drag-handle.dragging {
  cursor: grabbing;
  filter: drop-shadow(0 0 14px rgba(201, 169, 110, 0.8));
}
.scrub-end-dot {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}
.scrub-label {
  position: absolute;
  top: -28px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--brass);
  opacity: 0.6;
  white-space: nowrap;
  text-transform: uppercase;
  pointer-events: none;
}
.scrub-mask-wrap {
  position: fixed;
  bottom: 220px;
  left: 50%;
  transform: translateX(-50%);
  width: min(560px, 80vw);
  overflow: hidden;
  clip-path: inset(0 100% 0 0);
  transition: clip-path 0.05s linear;
  z-index: 14;
  pointer-events: none;
}
.scrub-mask-wrap.revealed {
  clip-path: inset(0 0% 0 0);
}
.scrub-content {
  padding: 20px 28px;
  background: rgba(26, 37, 32, 0.85);
  border: 1px solid rgba(201, 169, 110, 0.2);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.scrub-progress-readout {
  position: absolute;
  top: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--brass);
  opacity: 0.55;
}

/* ───────────────────────────────────────────────────────────────
   GAP 21 — Rich right-side detail drawer
   ─────────────────────────────────────────────────────────────── */
.detail-card {
  position: fixed;
  top: 0;
  right: 0;
  left: auto;
  bottom: auto;
  width: min(520px, 90vw);
  height: 100vh;
  height: calc(var(--vh) * 100);
  max-height: none;
  max-width: none;
  z-index: 40;
  background: rgba(6, 9, 10, 0.97);
  border: none;
  border-left: 1px solid rgba(201, 169, 110, 0.25);
  padding: 0;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transform: translateX(110%);
  transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  overscroll-behavior: contain;
}
.detail-card:not(.hidden) {
  transform: translateX(0);
  display: flex;
}
.detail-card.hidden {
  transform: translateX(110%);
  display: flex;        /* still flex; hide via translate to keep transition */
  pointer-events: none;
}
.detail-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(180deg, rgba(6,9,10,1) 0%, transparent 100%);
  z-index: 2;
  pointer-events: none;
}
.detail-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 40px; bottom: 0;
  background: linear-gradient(90deg, rgba(6,9,10,0.6) 0%, transparent 100%);
  z-index: 2;
  pointer-events: none;
}
.detail-card-scrollable {
  flex: 1;
  overflow-y: auto;
  padding: 80px 40px 80px 44px;
  scrollbar-width: none;
  -ms-overflow-style: none;
  position: relative;
  z-index: 3;
}
.detail-card-scrollable::-webkit-scrollbar { display: none; width: 0; height: 0; }
.detail-scrollbar {
  position: absolute;
  right: 8px;
  top: 80px;
  bottom: 80px;
  width: 1px;
  background: rgba(201, 169, 110, 0.1);
  z-index: 4;
}
.detail-scrollbar-thumb {
  position: absolute;
  width: 1px;
  background: var(--brass);
  min-height: 40px;
  top: 0;
  left: 0;
  transition: opacity 0.2s ease;
  box-shadow: 0 0 6px rgba(201, 169, 110, 0.4);
}
.detail-card .card-close,
.detail-card > .card-close {
  position: absolute;
  top: 24px;
  left: 20px;
  z-index: 10;
  color: rgba(201, 169, 110, 0.5);
  transition: color 0.2s, transform 0.3s;
  cursor: none;
  background: none;
  border: none;
  padding: 4px;
  font-size: 12px;
  line-height: 1;
}
@media (hover: hover) {
  .detail-card .card-close:hover {
    color: var(--brass);
    transform: scale(1.1) rotate(90deg);
  }
}
.detail-card .card-meta-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: rgba(232, 220, 196, 0.4);
}
.detail-card .card-meta-row::before {
  content: '';
  display: inline-block;
  width: 14px;
  height: 1px;
  background: var(--brass);
}
.detail-card .card-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.32em;
  color: var(--brass);
  text-transform: uppercase;
  display: block;
  margin-bottom: 14px;
}
.detail-card .card-title {
  font-family: var(--font-serif);
  font-size: 36px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 0.02em;
  line-height: 1.12;
  margin: 0 0 18px;
}
.detail-card .card-rule {
  display: block;
  width: 48px;
  height: 1px;
  background: var(--brass);
  border: none;
  margin: 22px 0;
}
.detail-card .card-body {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.78;
  color: rgba(227, 238, 230, 0.84);
  margin-bottom: 28px;
}
.detail-card .card-spec-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px 28px;
  margin: 22px 0 30px;
  padding: 22px 0;
  border-top: 1px solid rgba(201, 169, 110, 0.1);
  border-bottom: 1px solid rgba(201, 169, 110, 0.1);
}
.detail-card .card-spec-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.detail-card .card-spec-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.28em;
  color: rgba(232, 220, 196, 0.4);
  text-transform: uppercase;
}
.detail-card .card-spec-value {
  font-family: var(--font-serif);
  font-size: 22px;
  color: var(--brass);
  letter-spacing: 0.02em;
}
.detail-card .card-cta {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-top: 14px;
  padding: 12px 0;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.28em;
  color: var(--brass);
  text-transform: uppercase;
  border: none;
  background: transparent;
  cursor: none;
  position: relative;
}
.detail-card .card-cta::after {
  content: '';
  position: absolute;
  bottom: 4px; left: 0;
  width: 100%; height: 1px;
  background: var(--brass);
  transform: scaleX(0.4);
  transform-origin: 0% 50%;
  transition: transform 0.4s var(--ease-cinema);
}
@media (hover: hover) {
  .detail-card .card-cta:hover::after { transform: scaleX(1); }
}

/* ───────────────────────────────────────────────────────────────
   GAP 25 — Grid-layout footer (replaces old footer)
   ─────────────────────────────────────────────────────────────── */
.pcm-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 48px;
  z-index: 18;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 var(--margin, 60px);
  background: linear-gradient(0deg, rgba(6, 9, 10, 0.9) 0%, transparent 100%);
  pointer-events: none;
  opacity: 1;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(227, 238, 230, 0.3);
}
.pcm-footer .footer-left {
  text-align: left;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(227, 238, 230, 0.3);
  text-transform: uppercase;
  pointer-events: auto;
}
.pcm-footer .footer-center {
  text-align: center;
}
.pcm-footer .footer-cta {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--brass);
  text-transform: uppercase;
  position: relative;
  pointer-events: auto;
  cursor: none;
  text-decoration: none;
  background: none;
  border: none;
  padding: 4px 2px;
}
.pcm-footer .footer-cta::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0; right: 0;
  height: 1px;
  background: var(--brass);
  transform: scaleX(0);
  transform-origin: 0% 50%;
  transition: transform 0.4s cubic-bezier(0.215, 0.61, 0.355, 1);
}
@media (hover: hover) {
  .pcm-footer .footer-cta:hover::after { transform: scaleX(1); }
}
.pcm-footer .footer-right {
  text-align: right;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: rgba(201, 169, 110, 0.4);
  pointer-events: auto;
}
.pcm-footer .footer-credits-link {
  background: none;
  border: none;
  color: rgba(201, 169, 110, 0.5);
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: none;
  padding: 4px 6px;
  margin-left: 10px;
  transition: color 0.3s;
}
@media (hover: hover) {
  .pcm-footer .footer-credits-link:hover { color: var(--brass); }
}
@media (max-width: 768px) {
  .pcm-footer {
    height: 38px;
    grid-template-columns: 1fr;
    text-align: center;
  }
  .pcm-footer .footer-center,
  .pcm-footer .footer-right { display: none; }
}

/* ───────────────────────────────────────────────────────────────
   GAP 31 / supplemental — Make controls cluster horizontal at bottom
   and elevate the menu ring button distinctly
   ─────────────────────────────────────────────────────────────── */
.controls-cluster .ctrl-btn {
  width: 36px;
  height: 36px;
}
.controls-cluster #btn-menu {
  width: 44px;
  height: 44px;
  background: transparent;
  border: none;
}
@media (hover: hover) {
  .controls-cluster #btn-menu:hover {
    box-shadow: none;
    border: none;
  }
}

/* ───────────────────────────────────────────────────────────────
   GAP 30 — Cinema bar accents
   ─────────────────────────────────────────────────────────────── */
.cinema-bar {
  background:
    linear-gradient(180deg, rgba(6,9,10,1) 0%, rgba(6,9,10,0.85) 100%);
}
.cinema-bar--top::after,
.cinema-bar-top::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(201,169,110,0.4) 50%, transparent 100%);
  opacity: 0;
  transition: opacity 0.4s var(--ease-cinema);
}
.cinema-bar--bottom::before,
.cinema-bar-bottom::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(201,169,110,0.4) 50%, transparent 100%);
  opacity: 0;
  transition: opacity 0.4s var(--ease-cinema);
}
body.transitioning .cinema-bar--top::after,
body.transitioning .cinema-bar-top::after,
body.transitioning .cinema-bar--bottom::before,
body.transitioning .cinema-bar-bottom::before {
  opacity: 1;
}

/* ───────────────────────────────────────────────────────────────
   Mobile / Responsive
   ─────────────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .home-mark { top: 18px; left: var(--margin); }
  .top-section-meta { top: 18px; right: var(--margin); }
  .side-nav { right: 14px; gap: 10px; }
  .controls-cluster { right: 14px; bottom: 64px; gap: 8px; }
  .kbd-hints { display: none; }
  .scene-copy { padding: 0 var(--margin); }
  .scene-copy .main-title { font-size: clamp(2rem, 8vw, 3.4rem); }
  .detail-card { width: 100vw; max-width: 100vw; border-left: none; }
  .detail-card-scrollable { padding: 70px 24px 80px 28px; }
}

/* ───────────────────────────────────────────────────────────────
   Focus visibility (a11y)
   ─────────────────────────────────────────────────────────────── */
button:focus-visible,
a:focus-visible,
[role="button"]:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  outline: 2px solid var(--brass);
  outline-offset: 3px;
  box-shadow: 0 0 0 4px rgba(201, 169, 110, 0.15);
}

/* ───────────────────────────────────────────────────────────────
   Print
   ─────────────────────────────────────────────────────────────── */
@media print {
  body { background: white; color: black; }
  #canvas-host, .controls-cluster, .side-nav, .bottom-menu,
  .cinema-bar, .kbd-hints, .vignette, .section-triangles {
    display: none !important;
  }
}

/* ═══════════════════════════════════════════════════════════════
   V15 — REMAINING SEACAT GAPS: HYBRID SCROLL, SPLIT PANEL,
   EXECUTION STAGES, ENGAGE CINEMATIC, LANDSCAPE SVG
   ═══════════════════════════════════════════════════════════════ */

/* ───────────────────────────────────────────────────────────────
   GAP 5/23 — EXECUTION STAGES: Hybrid vertical-scroll section
   5 stages revealed sequentially as user scrolls within section
   ─────────────────────────────────────────────────────────────── */
.execution-stage-host {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: min(700px, 88vw);
  z-index: 14;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.7s var(--ease-cinema);
}
.execution-stage-host.visible {
  opacity: 1;
  pointer-events: auto;
}
.exec-stages-title {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.35em;
  color: rgba(201,169,110,0.45);
  text-transform: uppercase;
  margin-bottom: 28px;
  text-align: center;
}
.exec-stage-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.exec-stage-row {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  padding: 20px 0;
  border-top: 1px solid rgba(201,169,110,0.08);
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 0.65s cubic-bezier(0.16,1,0.3,1),
              transform 0.65s cubic-bezier(0.16,1,0.3,1),
              border-color 0.65s;
  position: relative;
}
.exec-stage-row:last-child {
  border-bottom: 1px solid rgba(201,169,110,0.08);
}
.exec-stage-row.revealed {
  opacity: 1;
  transform: translateY(0);
  border-top-color: rgba(201,169,110,0.18);
}
.exec-stage-row.revealed + .exec-stage-row {
  border-top-color: rgba(201,169,110,0.18);
}
.exec-stage-num-badge {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid rgba(201,169,110,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  color: rgba(201,169,110,0.5);
  transition: background 0.5s, border-color 0.5s, color 0.5s, box-shadow 0.5s;
}
.exec-stage-row.active .exec-stage-num-badge {
  background: var(--brass);
  border-color: var(--brass);
  color: #06090a;
  box-shadow: 0 0 14px var(--brass), 0 0 28px rgba(201,169,110,0.3);
}
.exec-stage-row.passed .exec-stage-num-badge {
  background: rgba(201,169,110,0.2);
  border-color: rgba(201,169,110,0.4);
  color: rgba(201,169,110,0.7);
}
.exec-stage-content h3 {
  font-family: var(--font-serif);
  font-size: clamp(1rem, 2vw, 1.35rem);
  font-weight: 400;
  color: rgba(227,238,230,0.5);
  letter-spacing: 0.1em;
  margin: 0 0 5px;
  transition: color 0.5s;
}
.exec-stage-row.active .exec-stage-content h3,
.exec-stage-row.passed .exec-stage-content h3 {
  color: var(--ink);
}
.exec-stage-content p {
  font-family: var(--font-body);
  font-size: 12px;
  color: rgba(227,238,230,0.35);
  line-height: 1.7;
  margin: 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.6s cubic-bezier(0.16,1,0.3,1),
              color 0.5s,
              opacity 0.5s;
  opacity: 0;
}
.exec-stage-row.active .exec-stage-content p,
.exec-stage-row.passed .exec-stage-content p {
  max-height: 80px;
  opacity: 1;
  color: rgba(227,238,230,0.6);
}
/* Connector line trace between stages */
.exec-stage-connector {
  position: absolute;
  left: 32px;
  top: 49px;
  width: 1px;
  height: calc(100% - 10px);
  background: rgba(201,169,110,0.08);
  overflow: hidden;
}
.exec-stage-connector::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 0%;
  background: linear-gradient(180deg, var(--brass), rgba(201,169,110,0.3));
  box-shadow: 0 0 6px rgba(201,169,110,0.4);
  transition: height 0.7s cubic-bezier(0.16,1,0.3,1);
}
.exec-stage-row.passed .exec-stage-connector::after,
.exec-stage-row.active .exec-stage-connector::after {
  height: 100%;
}

/* ───────────────────────────────────────────────────────────────
   GAP 22 — SPLIT PANEL: Right-column visual for mode sections
   ─────────────────────────────────────────────────────────────── */
.section-visual-panel {
  position: fixed;
  right: 0;
  top: 0;
  bottom: 70px;
  width: 48%;
  z-index: 6;
  pointer-events: none;
  opacity: 0;
  transform: translateX(24px);
  transition: opacity 0.9s var(--ease-cinema), transform 0.9s var(--ease-cinema);
  display: flex;
  align-items: center;
  justify-content: center;
}
.section-visual-panel.visible {
  opacity: 1;
  transform: translateX(0);
}
/* Left-edge separator */
.section-visual-panel::before {
  content: '';
  position: absolute;
  left: 0; top: 15%; bottom: 15%;
  width: 1px;
  background: linear-gradient(180deg, transparent 0%, rgba(201,169,110,0.12) 50%, transparent 100%);
}
.visual-panel-inner {
  width: min(320px, 90%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}
.visual-panel-large-stat {
  text-align: center;
}
.vp-stat-val {
  font-family: var(--font-serif);
  font-size: clamp(3rem, 5vw, 5.5rem);
  font-weight: 300;
  color: var(--brass);
  letter-spacing: 0.05em;
  line-height: 1;
  opacity: 0.85;
}
.vp-stat-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.38em;
  color: rgba(232,220,196,0.35);
  text-transform: uppercase;
  margin-top: 8px;
}
.vp-divider {
  width: 1px;
  height: 40px;
  background: linear-gradient(180deg, rgba(201,169,110,0.3), transparent);
}
.vp-mode-indicator {
  display: flex;
  gap: 8px;
  align-items: center;
}
.vp-mode-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(201,169,110,0.2);
  border: 1px solid rgba(201,169,110,0.3);
  transition: all 0.4s;
}
.vp-mode-dot.active {
  background: var(--brass);
  box-shadow: 0 0 8px rgba(201,169,110,0.5);
  transform: scale(1.5);
}
.vp-geo-shape {
  width: 120px;
  height: 120px;
  border: 1px solid rgba(201,169,110,0.1);
  border-radius: 50%;
  position: relative;
  animation: slowSpin 18s linear infinite;
}
.vp-geo-shape::before {
  content: '';
  position: absolute;
  inset: 12px;
  border: 1px solid rgba(201,169,110,0.06);
  border-radius: 50%;
  animation: slowSpin 12s linear infinite reverse;
}
.vp-geo-shape::after {
  content: '';
  position: absolute;
  inset: 28px;
  border: 1px solid rgba(201,169,110,0.15);
  border-radius: 50%;
  animation: slowSpin 8s linear infinite;
}
@keyframes slowSpin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
/* Narrow viewport: hide split panel */
@media (max-width: 900px) {
  .section-visual-panel { display: none; }
}

/* ───────────────────────────────────────────────────────────────
   GAP 24 — LANDSCAPE GATE: SVG phone rotation graphic
   ─────────────────────────────────────────────────────────────── */
.landscape-gate__svg-wrap {
  position: relative;
  width: 140px;
  height: 140px;
  margin: 0 auto 20px;
}
.phone-svg-group {
  transform-origin: 70px 70px;
  animation: phoneRotateAnim 3.4s cubic-bezier(0.4,0,0.2,1) infinite;
}
@keyframes phoneRotateAnim {
  0%   { transform: rotate(0deg); }
  25%  { transform: rotate(0deg); }
  60%  { transform: rotate(-90deg); }
  85%  { transform: rotate(-90deg); }
  100% { transform: rotate(0deg); }
}
.rotate-arc {
  transform-origin: 70px 70px;
  animation: arcDashAnim 3.4s cubic-bezier(0.4,0,0.2,1) infinite;
}
@keyframes arcDashAnim {
  0%   { opacity: 0.3; }
  25%  { opacity: 0.3; }
  42%  { opacity: 1; }
  60%  { opacity: 0.3; }
  100% { opacity: 0.3; }
}

/* ───────────────────────────────────────────────────────────────
   GAP ENGAGE — Full cinematic contact experience
   ─────────────────────────────────────────────────────────────── */
.engage-cinematic {
  position: fixed;
  inset: 0;
  z-index: 13;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.8s var(--ease-cinema);
}
.engage-cinematic.visible {
  opacity: 1;
  pointer-events: auto;
}
.engage-two-col {
  display: flex;
  width: min(900px, 92vw);
  gap: 0;
  height: min(620px, 85vh);
}
.engage-left-col {
  flex: 0 0 42%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 48px 44px 48px 0;
  border-right: 1px solid rgba(201,169,110,0.12);
  position: relative;
}
.engage-right-col {
  flex: 1;

    }
