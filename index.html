/* ============================================================
   PCM — Cinematic Site Stylesheet
   Parts 1 & 2 | Bespoke craft, no boilerplate
   ============================================================ */

/* ------------------------------------------------------------
   1. CUSTOM PROPERTIES
   ------------------------------------------------------------ */
:root {
  --bg:          #06090a;
  --forest:      #1a2520;
  --forest-mid:  #2d3e36;
  --brass:       #c9a96e;
  --coin-gold:   #d9b97a;
  --cream:       #e8dcc4;
  --ink-green:   #0f1814;
  --accent-glow: #7fb89c;
  --ink:         #e3eee6;

  --font-serif:  'Cormorant Garamond', Georgia, serif;
  --font-body:   'Space Grotesk', system-ui, sans-serif;
  --font-mono:   'Space Mono', 'Courier New', monospace;

  --ease-cinema: cubic-bezier(0.77, 0, 0.175, 1);
  --ease-soft:   cubic-bezier(0.4, 0, 0.2, 1);

  /* Foundational layout vars — match seacat reference */
  --margin: 60px;
  --vh: 1vh;
  --chrome-z: 20;
  --overlay-z: 50;
  --cursor-z: 9999;
}

@media (max-width: 1024px) {
  :root { --margin: 40px; }
}
@media (max-width: 768px) {
  :root { --margin: 30px; }
}
@media (max-width: 480px) {
  :root { --margin: 20px; }
}

/* ------------------------------------------------------------
   2. RESET + BASE
   ------------------------------------------------------------ */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  cursor: none;
  position: relative;
}

a {
  color: inherit;
  text-decoration: none;
}

button {
  font-family: inherit;
  background: none;
  border: none;
  cursor: none;
}

ul,
ol {
  list-style: none;
}

img,
video {
  display: block;
  max-width: 100%;
}

/* ------------------------------------------------------------
   3. CANVAS HOST
   ------------------------------------------------------------ */
#canvas-host {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* ------------------------------------------------------------
   4. CUSTOM CURSOR
   ------------------------------------------------------------ */
#pcm-cursor {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 9999;
  pointer-events: none;
  will-change: transform;
}

#pcm-cursor::before {
  content: '';
  display: block;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(227, 238, 230, 0.45);
  transform: translate(-50%, -50%);
  transition: width 0.2s var(--ease-soft),
              height 0.2s var(--ease-soft),
              border-color 0.2s var(--ease-soft),
              background 0.2s var(--ease-soft);
}

#pcm-cursor::after {
  content: '';
  display: block;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--ink);
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  transition: opacity 0.2s var(--ease-soft);
}

#pcm-cursor.cursor-hot::before {
  width: 64px;
  height: 64px;
  border: 1px solid var(--brass);
  background: rgba(201, 169, 110, 0.08);
}

#pcm-cursor.cursor-drag::before {
  width: 20px;
  height: 20px;
  border: 2px solid var(--brass);
  background: transparent;
}

/* ------------------------------------------------------------
   4b. CUSTOM SCROLLBAR
   ------------------------------------------------------------ */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: rgba(6,9,10,0.5); }
::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.22); border-radius: 2px; transition: background 0.3s; }
::-webkit-scrollbar-thumb:hover { background: rgba(201,169,110,0.42); }
* { scrollbar-width: thin; scrollbar-color: rgba(201,169,110,0.22) rgba(6,9,10,0.4); }

/* ------------------------------------------------------------
   5. CINEMA BARS
   ------------------------------------------------------------ */
.cinema-bar {
  position: fixed;
  left: 0;
  right: 0;
  z-index: 30;
  height: 0;
  background: var(--bg);
  transition: height 700ms var(--ease-cinema);
  pointer-events: none;
}

.cinema-bar--top {
  top: 0;
}

.cinema-bar--bottom {
  bottom: 0;
}

body.transitioning .cinema-bar {
  height: 80px;
}

/* ------------------------------------------------------------
   6. FLASH OVERLAY
   ------------------------------------------------------------ */
.flash-overlay {
  position: fixed;
  inset: 0;
  background: #ffffff;
  opacity: 0;
  pointer-events: none;
  z-index: 100;
  transition: opacity 0.15s linear;
}

/* ------------------------------------------------------------
   7. INTRO LOADER
   ------------------------------------------------------------ */
.intro-loader {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  transition: opacity 0.8s var(--ease-soft);
}

.intro-loader__spinner {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid rgba(201, 169, 110, 0.2);
  border-top-color: var(--brass);
  animation: spinBrass 1.2s linear infinite;
}

.intro-loader__text {
  font-family: var(--font-serif);
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.32em;
  color: var(--brass);
  text-transform: uppercase;
  opacity: 0.7;
}

.intro-loader.done {
  opacity: 0;
  pointer-events: none;
}

/* ------------------------------------------------------------
   8–10. SCENE COPY
   ------------------------------------------------------------ */
.scene-copy {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translateX(-50%) translateY(-50%);
  z-index: 10;
  text-align: center;
  width: 100%;
  max-width: 680px;
  padding: 0 24px;
  /* V20: Added scale to transition — content scales from 0.96 to 1 on reveal,
     matching seacat's Gap-14 scale-in unveil pattern. Combined with the
     translateY lift, this gives a genuine 3D-depth reveal feel. */
  transition: opacity 0.8s var(--ease-soft),
              transform 0.8s var(--ease-soft);
}

.scene-copy.hidden {
  opacity: 0;
  /* scale(0.97): content appears to emerge from depth as it reveals */
  transform: translateX(-50%) translateY(-53%) scale(0.97);
  pointer-events: none;
  transition: opacity 0.52s cubic-bezier(0.4,0,0.2,1),
              transform 0.52s cubic-bezier(0.4,0,0.2,1);
}

.scene-copy.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(-50%) scale(1);
  pointer-events: auto;
}

/* Split-layout: scene-copy shifts to left column when right visual panel is visible */
.scene-copy.split-layout {
  left: 26%;
  max-width: 42vw;
  text-align: left;
  transition: opacity 0.8s var(--ease-soft),
              transform 0.8s var(--ease-soft),
              left 0.9s var(--ease-cinema),
              max-width 0.9s var(--ease-cinema);
}
.scene-copy.split-layout.hidden {
  transform: translateX(-50%) translateY(-55%) scale(0.96);
  opacity: 0;
  pointer-events: none;
}
.scene-copy.split-layout.visible {
  transform: translateX(-50%) translateY(-50%) scale(1);
  opacity: 1;
  pointer-events: auto;
}
/* ── SECTION TITLE BACKDROP ─────────────────────────────────────────── */
.section-title-backdrop {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translateX(-50%) translateY(-50%);
  animation: backdropFloat 8s ease-in-out infinite;
  user-select: none;
  letter-spacing: -0.02em;
  z-index: 2;
  pointer-events: none;
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(5.5rem, 16vw, 18rem);
  font-weight: 300;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(201, 169, 110, 0.035);
  white-space: nowrap;
  user-select: none;
  transition: opacity 1.2s ease, color 1.2s ease;
  line-height: 1;
}
.section-title-backdrop.hidden { opacity: 0; }
.section-title-backdrop.visible { opacity: 1; }
@keyframes backdropFloat {
  0%   { transform: translateX(-50%) translateY(-50%) rotate(-0.3deg); }
  33%  { transform: translateX(-50%) translateY(-51.5%) rotate(0.3deg); }
  66%  { transform: translateX(-50%) translateY(-49%) rotate(-0.2deg); }
  100% { transform: translateX(-50%) translateY(-50%) rotate(-0.3deg); }
}
/* ── CHAINED VIDEO STUB (atmospheric SVG animation) ─────────────────── */
.chained-video-stub {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1.4s ease;
  overflow: hidden;
}
.chained-video-stub.visible { opacity: 1; }
.cvs-canvas {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
}
/* ── LIFESTYLE GALLERY ───────────────────────────────────────────────── */
.lifestyle-gallery {
  position: relative;
  width: 100%;
  max-width: 560px;
  margin: 28px auto 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 140px 140px;
  gap: 6px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s ease 0.4s, transform 0.8s ease 0.4s;
}
.lifestyle-gallery.visible {
  opacity: 1;
  transform: translateY(0);
}
.lsg-cell {
  background: var(--ink-green);
  border: 1px solid rgba(201,169,110,0.12);
  position: relative;
  overflow: hidden;
}
.lsg-cell:first-child {
  grid-row: 1 / 3;
  background: linear-gradient(135deg, rgba(26,37,32,0.9) 0%, rgba(15,24,20,1) 100%);
}
.lsg-cell::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(201,169,110,0.08) 0%, transparent 60%);
}
.lsg-cell-label {
  position: absolute;
  bottom: 12px;
  left: 14px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.28em;
  color: rgba(201,169,110,0.5);
  text-transform: uppercase;
}
.lsg-cell-svg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.18;
}
/* ── HOTPOINTS ───────────────────────────────────────────────────────── */
.hotpoints-layer {
  position: fixed;
  inset: 0;
  z-index: 6;
  pointer-events: none;
}
.hotpoint {
  position: absolute;
  width: 28px;
  height: 28px;
  pointer-events: auto;
  cursor: none;
}
.hotpoint-dot {
  position: absolute;
  top: 50%; left: 50%;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--brass);
  transform: translate(-50%, -50%);
  box-shadow: 0 0 0 0 rgba(201,169,110,0.4);
  animation: hotpointPulse 2.4s ease-out infinite;
}
.hotpoint-dot::before {
  content: '';
  position: absolute;
  inset: -5px;
  border-radius: 50%;
  border: 1px solid rgba(201,169,110,0.28);
  animation: dotRingPulse 2.8s ease-in-out infinite;
}
@keyframes dotRingPulse {
  0%   { transform: scale(1);   opacity: 0.6; }
  55%  { transform: scale(2.0); opacity: 0; }
  100% { transform: scale(1);   opacity: 0.6; }
}
@keyframes hotpointPulse {
  0%   { box-shadow: 0 0 0 0 rgba(201,169,110,0.4); }
  70%  { box-shadow: 0 0 0 12px rgba(201,169,110,0); }
  100% { box-shadow: 0 0 0 0 rgba(201,169,110,0); }
}
.hotpoint-label {
  position: absolute;
  white-space: nowrap;
  max-width: 180px;
  white-space: normal;
  word-wrap: break-word;
  left: 100%;
  top: 50%;
  transform: translateY(-50%);
  margin-left: 10px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--brass);
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.3s ease;
  text-transform: uppercase;
  background: rgba(6,9,10,0.8);
  padding: 3px 8px;
  border-left: 1px solid rgba(201,169,110,0.3);
  pointer-events: none;
}
.hotpoint:hover .hotpoint-label { opacity: 1; }
/* Center text alignment overrides for split */
.scene-copy.split-layout .stat-row,
.scene-copy.split-layout .tag-row,
.scene-copy.split-layout .mode-btn {
  position: relative;
  overflow: hidden;
}
.mode-btn::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0%;
  height: 1px;
  background: var(--brass);
  transition: width 0.3s ease;
}
.mode-btn.active::before,
.mode-btn:hover::before {
  width: 100%;
}

.modes-row {
  justify-content: flex-start;
}
.scene-copy.split-layout .title-rule {
  margin-left: 0;
}
@media (max-width: 900px) {
  .scene-copy.split-layout {
    left: 50%;
    max-width: 90vw;
    text-align: center;
  }
  .scene-copy.split-layout .stat-row,
  .scene-copy.split-layout .tag-row,
  .scene-copy.split-layout .modes-row {
    justify-content: center;
  }
  .scene-copy.split-layout .title-rule {
    margin: 1rem auto;
  }
}

/* ------------------------------------------------------------
   11. SCENE COPY — PRE-TITLE
   ------------------------------------------------------------ */
.scene-copy .pre-title {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.32em;
  color: var(--brass);
  text-transform: uppercase;
  display: block;
  margin-bottom: 14px;
  overflow: hidden;
  clip-path: inset(0 105% 0 0);
  transition: clip-path 0.72s cubic-bezier(0.22, 1, 0.36, 1) 0.12s;
}
.scene-copy.visible .pre-title {
  clip-path: inset(0 0% 0 0);
}

/* ------------------------------------------------------------
   12. SCENE COPY — MAIN TITLE
   ------------------------------------------------------------ */
.scene-copy .main-title {
  font-family: var(--font-serif);
  font-size: clamp(2.8rem, 5vw, 5.6rem);
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.18em;
  line-height: 1.1;
  position: relative;
}
.scene-copy.visible .main-title::after {
  content: '';
  position: absolute;
  bottom: -7px;
  left: 50%;
  transform: translateX(-50%);
  height: 1px;
  background: var(--brass);
  opacity: 0.35;
  width: 0;
  animation: titleUnderline 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.7s forwards;
}
@keyframes titleUnderline {
  from { width: 0; }
  to   { width: 56px; }
}

/* ─── REVEAL TEXT (seacat-style line reveal) ─── */
.reveal-wrap {
  overflow: hidden;
  display: block;
}
.reveal-inner {
  display: block;
  transform: translateY(105%);
  transition: transform 0s; /* GSAP handles this */
}
.scene-copy .main-title .reveal-wrap,
.scene-copy .main-title .reveal-inner {
  display: inline-block;
}

/* ------------------------------------------------------------
   13. SCENE COPY — TITLE RULE
   ------------------------------------------------------------ */
.scene-copy .title-rule {
  display: block;
  width: 40px;
  height: 1px;
  background: var(--brass);
  margin: 1rem auto;
  border: none;
}

/* ------------------------------------------------------------
   14. SCENE COPY — BODY TEXT
   ------------------------------------------------------------ */
.scene-copy .body-text {
  font-family: var(--font-body);
  font-size: 15.5px;
  line-height: 1.72;
  color: var(--ink);
  max-width: 540px;
  margin: 0 auto;
}

/* ------------------------------------------------------------
   15. SCENE COPY — STAT ROW
   ------------------------------------------------------------ */
.scene-copy .stat-row {
  display: flex;
  flex-direction: row;
  gap: 32px;
  justify-content: center;
  align-items: baseline;
  margin-top: 20px;
}

.scene-copy .stat-row .stat-number {
  font-family: var(--font-mono);
  font-size: 24px;
  color: var(--brass);
  line-height: 1;
  text-shadow: 0 0 18px rgba(201,169,110,0.2);
}

.scene-copy .stat-row .stat-label {
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--cream);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.scene-copy .stat-row .stat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

/* ------------------------------------------------------------
   16. SCENE COPY — TAG ROW
   ------------------------------------------------------------ */
.scene-copy .tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 16px;
}

.scene-copy .tag-row .tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--brass);
  border: 1px solid var(--brass);
  padding: 4px 10px;
  text-transform: uppercase;
}

/* ------------------------------------------------------------
   17. HOME MARK
   ------------------------------------------------------------ */
.home-mark {
  position: fixed;
  top: 28px;
  left: 40px;
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 4px;
  cursor: none;
}

.home-mark__wordmark {
  font-family: var(--font-serif);
  font-size: 28px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.12em;
  line-height: 1;
}

.home-mark__slogan {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--brass);
  text-transform: uppercase;
}

/* ------------------------------------------------------------
   18. TOP SECTION META
   ------------------------------------------------------------ */
.top-section-meta {
  position: fixed;
  top: 28px;
  right: 40px;
  z-index: 20;
  text-align: right;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.top-section-meta__counter {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--brass);
  letter-spacing: 0.16em;
}

.top-section-meta__caption {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  color: rgba(232, 220, 196, 0.5);
  text-transform: uppercase;
}

/* ------------------------------------------------------------
   19. SIDE NAV
   ------------------------------------------------------------ */
.side-nav {
  position: fixed;
  right: 28px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
}

/* ------------------------------------------------------------
   20–22. SIDE NAV DOTS (seacat-style ring progress)
   ------------------------------------------------------------ */
.side-nav-dot {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  cursor: pointer;
  width: 36px;
  height: 36px;
  flex-shrink: 0;
}
.nav-ring { position: absolute; top: 0; left: 0; }
.nav-ring-fill { transition: stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1); }
.nav-num {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  color: rgba(227,238,230,0.3);
  letter-spacing: 0.05em;
  z-index: 1;
  transition: color 0.3s;
}
.side-nav-dot.active .nav-num { color: var(--brass); }
.side-nav-dot.active .nav-ring-fill { stroke-dashoffset: 0; }
.side-nav-dot:hover .nav-num { color: var(--ink); }
/* Tooltip */
.side-nav-dot::after {
  content: attr(data-tooltip);
  position: absolute;
  right: calc(100% + 12px);
  top: 50%;
  transform: translateY(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--brass);
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  background: rgba(6,9,10,0.85);
  padding: 3px 8px;
  border: 1px solid rgba(201,169,110,0.2);
}
.side-nav-dot:hover::after { opacity: 1; }

/* ------------------------------------------------------------
   23. BOTTOM MENU
   ------------------------------------------------------------ */
.bottom-menu {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 20;
  background: linear-gradient(
    to top,
    rgba(6, 9, 10, 0.92) 0%,
    rgba(6, 9, 10, 0.6) 60%,
    transparent 100%
  );
  padding: 16px 36px 20px;
}

/* ------------------------------------------------------------
   24. BOTTOM MENU INNER
   ------------------------------------------------------------ */
.bottom-menu-inner {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: center;
}

/* ------------------------------------------------------------
   25–26. SECTION BUTTON
   ------------------------------------------------------------ */
.section-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: none;
  opacity: 0.65;
  transition: color 0.3s ease, opacity 0.3s ease, transform 0.3s ease;
  transition: opacity 0.3s var(--ease-soft),
              color 0.3s var(--ease-soft),
              border-color 0.3s var(--ease-soft),
              box-shadow 0.3s var(--ease-soft);
  padding: 4px 0 6px;
}

.section-btn:hover {
  opacity: 0.9;
  transform: translateY(-1px);
}

.section-btn__number {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: inherit;
}

.section-btn__label {
  font-family: var(--font-serif);
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: inherit;
  line-height: 1;
  transition: letter-spacing 0.4s ease, color 0.3s ease;
}

.section-btn.active {
  color: var(--brass);
  opacity: 1;
  border-bottom: 2px solid var(--brass);
  box-shadow: 0 2px 20px rgba(201, 169, 110, 0.55), 0 0 30px rgba(201, 169, 110, 0.22);
}
.section-btn.active .section-btn__label {
  letter-spacing: 0.24em;
  font-weight: 600;
  text-shadow: 0 0 18px rgba(201,169,110,0.4);
}
.section-btn.active .btn-num {
  color: rgba(201, 169, 110, 0.85);
}
.section-btn.active .btn-name {
  letter-spacing: 0.12em;
}

.section-btn { position: relative; overflow: hidden; }

.section-btn::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--brass);
  box-shadow: 0 0 10px var(--brass);
  transition: width 0.3s ease;
}
.section-btn:hover::after,
.section-btn.active::after {
  width: 100%;
}

/* ------------------------------------------------------------
   27. PROGRESS BAR WRAP
   ------------------------------------------------------------ */
.progress-bar-wrap {
  position: relative;
  height: 1px;
  width: 100%;
  background: rgba(201, 169, 110, 0.15);
  margin-top: 8px;
  overflow: visible;
}

/* ------------------------------------------------------------
   28. PROGRESS BAR FILL
   ------------------------------------------------------------ */
.progress-bar-fill {
  height: 1px;
  background: var(--brass);
  box-shadow: 0 0 12px var(--brass);
  transition: width 1.4s var(--ease-cinema);
  position: absolute;
  top: 0;
  left: 0;
}

/* ------------------------------------------------------------
   29. CONTROLS CLUSTER
   ------------------------------------------------------------ */
.controls-cluster {
  position: fixed;
  bottom: 80px;
  right: 28px;
  z-index: 20;
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: center;
}

/* ------------------------------------------------------------
   30–31. CTRL BUTTON
   ------------------------------------------------------------ */
.ctrl-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(201, 169, 110, 0.3);
  background: rgba(6, 9, 10, 0.7);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink);
  cursor: none;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.25s var(--ease-soft),
              box-shadow 0.25s var(--ease-soft),
              background 0.25s var(--ease-soft),
              color 0.25s var(--ease-soft);
  flex-shrink: 0;
}

.ctrl-btn:hover {
  border-color: var(--brass);
  box-shadow: 0 0 10px rgba(201, 169, 110, 0.4);
}

.ctrl-btn.active {
  background: var(--brass);
  color: var(--bg);
  border-color: var(--brass);
}

/* ------------------------------------------------------------
   32. KEYBOARD HINTS
   ------------------------------------------------------------ */
.kbd-hints {
  position: fixed;
  bottom: 80px;
  left: 28px;
  z-index: 20;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--ink);
  opacity: 0.35;
  line-height: 1.8;
  pointer-events: none;
}

/* ------------------------------------------------------------
   33–34. STATUS CONSOLE
   ------------------------------------------------------------ */
.status-console {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 30;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--brass);
  background: rgba(6, 9, 10, 0.8);
  padding: 8px 14px;
  max-width: 600px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border: 1px solid rgba(201, 169, 110, 0.2);
}

.status-console.done {
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s var(--ease-soft);
}

/* ------------------------------------------------------------
   35–40. DETAIL CARD
   ------------------------------------------------------------ */
.detail-card {
  position: fixed;
  z-index: 40;
  background: rgba(10, 14, 12, 0.96);
  border: 1px solid var(--brass);
  padding: 24px 28px;
  max-width: 320px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  overflow-y: auto;
  max-height: 320px;
  scrollbar-width: thin;
  scrollbar-color: rgba(201,169,110,0.4) transparent;
}
.detail-card::-webkit-scrollbar { width: 2px; }
body::-webkit-scrollbar { width: 2px; }
body::-webkit-scrollbar-track { background: rgba(6,9,10,0.5); }
body::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.3); border-radius: 2px; }
body::-webkit-scrollbar-thumb:hover { background: rgba(201,169,110,0.55); }
.detail-card::-webkit-scrollbar-track { background: transparent; }
.detail-card::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.4); border-radius: 2px; }
.detail-card::-webkit-scrollbar-thumb:hover { background: rgba(201,169,110,0.8); }

/* ─── BURGER MENU ICON (seacat-style animated burger) ─── */
.pcm-burger .burger-svg { display: block; }
.pcm-burger .burger-line { transition: transform 0.3s ease, opacity 0.3s ease; transform-origin: center; }
.menu-open .pcm-burger .line1 { transform: rotate(45deg) translate(4px, 4px); }
.menu-open .pcm-burger .line2 { opacity: 0; transform: scaleX(0); }
.menu-open .pcm-burger .line3 { transform: rotate(-45deg) translate(4px, -4px); }

.detail-card .card-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.32em;
  color: var(--brass);
  text-transform: uppercase;
  display: block;
}

.detail-card .card-title {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
  margin: 6px 0;
  line-height: 1.2;
}

.detail-card .card-rule {
  display: block;
  width: 100%;
  height: 1px;
  background: var(--brass);
  border: none;
  margin: 10px 0;
}

.detail-card .card-body {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.7;
  color: var(--ink);
}

.detail-card .card-close {
  position: absolute;
  top: 10px;
  right: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--brass);
  cursor: none;
  opacity: 0.7;
  transition: opacity 0.2s var(--ease-soft);
  line-height: 1;
}

.detail-card .card-close:hover {
  opacity: 1;
}

/* ------------------------------------------------------------
   41. KEYBOARD HELP OVERLAY
   ------------------------------------------------------------ */
.kbd-help-overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(6, 9, 10, 0.9);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ------------------------------------------------------------
   42. KEYBOARD HELP PANEL
   ------------------------------------------------------------ */
.kbd-help-panel {
  background: var(--ink-green);
  border: 1px solid var(--brass);
  padding: 36px 40px;
  max-width: 500px;
  width: 100%;
}

/* ------------------------------------------------------------
   43. KBD HELP PANEL — H2
   ------------------------------------------------------------ */
.kbd-help-panel h2 {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 500;
  color: var(--brass);
  letter-spacing: 0.12em;
  margin-bottom: 20px;
}

/* ------------------------------------------------------------
   44–45. KBD HELP PANEL — TABLE
   ------------------------------------------------------------ */
.kbd-help-panel table {
  font-family: var(--font-mono);
  font-size: 11px;
  width: 100%;
  line-height: 2;
  border-collapse: collapse;
  color: var(--ink);
}

.kbd-help-panel td:first-child {
  color: var(--brass);
  width: 120px;
  vertical-align: top;
  letter-spacing: 0.1em;
}

/* ------------------------------------------------------------
   46–47. MENU OVERLAY (seacat-style dual-column with parallax)
   ------------------------------------------------------------ */
.menu-overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(6,9,10,0.98);
  transform: translateX(100%);
  transition: transform 0.7s var(--ease-cinema);
  overflow: hidden;
  overscroll-behavior: contain;
}
.menu-overlay.open { transform: translateX(0); }

.menu-layout {
  display: flex;
  height: 100%;
  width: 100%;
}
.menu-image-col {
  flex: 0 0 45%;
  position: relative;
  overflow: hidden;
}
.menu-back-image {
  position: absolute;
  inset: -30px;
  transition: transform 0.1s linear;
  background: radial-gradient(ellipse 60% 70% at 50% 50%, rgba(45,62,54,0.8) 0%, rgba(6,9,10,0) 70%);
}
.menu-front-image {
  position: absolute;
  inset: 0;
  transition: transform 0.1s linear, opacity 0.15s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
/* menu-front-image content is injected as inline SVG per section */
.menu-img-label {
  position: absolute;
  bottom: 40px;
  left: 40px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.35em;
  color: rgba(201,169,110,0.3);
  text-transform: uppercase;
}
/* Per-section back-image gradients */
.menu-back-image[data-section="0"] { background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(26,37,32,0.9) 0%, rgba(6,9,10,0) 70%); }
.menu-back-image[data-section="1"] { background: radial-gradient(ellipse 80% 60% at 40% 60%, rgba(45,62,54,0.7) 0%, rgba(6,9,10,0) 70%); }
.menu-back-image[data-section="2"] { background: radial-gradient(ellipse 60% 80% at 60% 40%, rgba(26,37,32,0.8) 0%, rgba(6,9,10,0) 70%); }
.menu-back-image[data-section="3"] { background: radial-gradient(ellipse 90% 50% at 50% 70%, rgba(15,24,20,0.95) 0%, rgba(45,62,54,0.3) 50%, rgba(6,9,10,0) 100%); }
.menu-back-image[data-section="4"] { background: radial-gradient(ellipse 70% 70% at 60% 50%, rgba(26,37,32,0.85) 0%, rgba(6,9,10,0) 70%); }
.menu-back-image[data-section="5"] { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(201,169,110,0.07) 0%, rgba(26,37,32,0.6) 40%, rgba(6,9,10,0) 80%); }
.menu-back-image[data-section="6"] { background: radial-gradient(ellipse 60% 90% at 40% 50%, rgba(45,62,54,0.75) 0%, rgba(6,9,10,0) 70%); }
.menu-back-image[data-section="7"] { background: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(26,37,32,0.9) 0%, rgba(6,9,10,0) 70%); }
.menu-back-image[data-section="8"] { background: radial-gradient(ellipse 70% 60% at 60% 60%, rgba(15,24,20,0.85) 0%, rgba(6,9,10,0) 70%); }
.menu-back-image[data-section="9"] { background: radial-gradient(ellipse 80% 70% at 50% 50%, rgba(201,169,110,0.1) 0%, rgba(26,37,32,0.5) 50%, rgba(6,9,10,0) 80%); }

.menu-nav-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px var(--margin, 60px) 60px 50px;
  overflow-y: auto;
  overscroll-behavior: contain;
}
.menu-nav { display: flex; flex-direction: column; gap: 2px; }
.menu-link {
  display: block;
  padding: 8px 0;
  text-decoration: none;
  overflow: hidden;
}
.menu-link-inner {
  display: flex;
  align-items: baseline;
  gap: 18px;
  transition: transform 0.5s cubic-bezier(0.215, 0.61, 0.355, 1);
}
@media (hover: hover) {
  .menu-link:hover .menu-link-inner { transform: translateX(10px); }
  .menu-link:hover .menu-link-num { color: var(--brass); }
  /* Belt-conveyor: first text exits left, dup slides in from right */
  .menu-link:hover .menu-link-text > span:first-child { transform: translateX(-100%); opacity: 0; }
  .menu-link:hover .menu-link-dup { transform: translateX(-100%); }
}
.menu-link-num {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: rgba(201,169,110,0.3);
  flex-shrink: 0;
  transition: color 0.3s ease;
}
.menu-link-text {
  position: relative;
  overflow: hidden;
  display: inline-block;     /* fits the text width for correct overflow clip */
  font-family: var(--font-serif);
  font-size: clamp(1.8rem, 3.5vw, 3.2rem);
  color: var(--ink);
  letter-spacing: 0.05em;
  line-height: 1.1;
  vertical-align: middle;
}
.menu-link-text > span {
  display: block;
  white-space: nowrap;
  transition: transform 0.52s cubic-bezier(0.215, 0.61, 0.355, 1),
              opacity  0.28s ease;
}
.menu-link-dup {
  position: absolute !important;
  top: 0; left: 100%;          /* starts to the RIGHT, outside the overflow:hidden */
  width: 100%;
  white-space: nowrap;
  opacity: 0.55;
  color: var(--brass);
  transform: translateX(0);   /* starts at left:100% (off-screen right) */
  transition: transform 0.52s cubic-bezier(0.215, 0.61, 0.355, 1) !important;
}
.menu-footer-info {
  margin-top: 48px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.menu-tagline {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.3em;
  color: rgba(201,169,110,0.3);
  text-transform: uppercase;
}
.menu-email {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: rgba(201,169,110,0.5);
  text-decoration: none;
  transition: color 0.25s ease;
}
@media (hover: hover) {
  .menu-email:hover { color: var(--brass); }
}
@media (max-width: 768px) {
  .menu-layout { flex-direction: column; }
  .menu-image-col { display: none; }
  .menu-nav-col { padding: 60px 30px; }
  .menu-link-text { font-size: 2.2rem; }
}

/* ─── CIRCULAR PROGRESS INDICATOR ─── */
/* ── Circular progress nav (V19 — seacat-style dual ring, clickable ticks) ── */
.circular-progress {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 18;
  pointer-events: auto; /* container allows events; circ-tick-hit elements are clickable */
  opacity: 0.55;
  transition: opacity 0.4s ease;
  cursor: none;
}
@media (hover: hover) {
  .circular-progress:hover { opacity: 1; }
}
.circular-progress svg { display: block; overflow: visible; }

/* Rings */
.circ-outer-static {
  stroke: rgba(201,169,110,0.1); fill: none;
  stroke-width: 0.6;
}
.circ-outer-dashed {
  stroke: rgba(201,169,110,0.06); fill: none;
  stroke-dasharray: 2 2;
  stroke-width: 0.5;
}
.circ-inner-static {
  stroke: rgba(201,169,110,0.08); fill: none;
  stroke-width: 0.5;
}
.circ-inner-dashed {
  stroke: rgba(201,169,110,0.05); fill: none;
  stroke-dasharray: 1 4;
  stroke-width: 0.5;
}
/* Progress arc */
.circ-progress-arc {
  fill: none; stroke: var(--brass);
  stroke-width: 1.2;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.4s cubic-bezier(0.77,0,0.175,1),
              stroke-dasharray 1.4s cubic-bezier(0.77,0,0.175,1);
}
/* Outer selection ring — dashed halo */
.circ-selection-ring {
  fill: none; stroke: rgba(201,169,110,0.18);
  stroke-dasharray: 6 2;
  stroke-width: 0.5;
  transform-origin: 50px 50px;
  animation: circ-selection-spin 18s linear infinite;
}
@keyframes circ-selection-spin {
  to { transform: rotate(360deg); }
}
/* Tick marks */
.circ-tick {
  stroke: rgba(201,169,110,0.2);
  stroke-linecap: round;
  transition: stroke 0.3s ease;
}
.circ-tick.active { stroke: var(--brass); }
/* Section number readout */
.circ-section-num {
  font-family: var(--font-mono);
  font-size: 10px;
  fill: var(--brass);
  text-anchor: middle;
  dominant-baseline: central;
  letter-spacing: 0.15em;
  transition: opacity 0.3s ease;
}
/* Clickable tick hit-targets (invisible, for UX) */
.circ-tick-hit {
  fill: transparent;
  cursor: none;
  pointer-events: auto; /* works even when parent has pointer-events: none */
}
@media (hover: hover) {
  .circ-tick-hit:hover + line.circ-tick { stroke: rgba(201,169,110,0.5); }
}

/* ─── VIDEO SCALE-IN TRANSITION (seacat-style) ─── */
.section-video {
  transform: scale(0.85);
  transition: transform 2.2s cubic-bezier(0.76, 0, 0.24, 1);
  transition-delay: 0.8s;
}
.section-video.active {
  transform: scale(1);
}
/* Section background video elements */
.section-bg-video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.8s ease, transform 2s cubic-bezier(0.76, 0, 0.24, 1);
  transform: scale(1.05);
}
.section-bg-video.active {
  opacity: 1;
  transform: scale(1);
  transition-delay: 0.4s;
}

/* ─── SECTION BACKGROUND ATMOSPHERE ─── */
.section-atmosphere {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1.2s var(--ease-cinema);
}
.section-atmosphere.visible { opacity: 1; }
/* Per-section background gradients */
/* V20: Enhanced per-section atmospheric color temperatures — each section has a
   distinct cinematic mood. The atmosphere div cross-fades between these
   gradients over 1.2s as sections transition.
   Opacity base: ~0.22–0.35 — enough to read against the dark bg shader,
   subtle enough to never overpower the 3D centerpiece. */
.section-atm-0 {
  /* Home — deep forest green radial bloom, centered, draws eye to logo */
  background: radial-gradient(ellipse 75% 55% at 50% 52%, rgba(26,37,32,0.32) 0%, rgba(15,24,20,0.12) 55%, transparent 80%);
}
.section-atm-1 {
  /* Firm Overview — broad warm-left pull, founder warmth */
  background: radial-gradient(ellipse 90% 65% at 35% 58%, rgba(45,62,54,0.28) 0%, rgba(26,37,32,0.08) 60%, transparent 85%);
}
.section-atm-2 {
  /* Platform Edge — sharp upper-right origin, three-pillar energy */
  background: conic-gradient(from 140deg at 65% 38%, rgba(26,37,32,0.22) 0deg, transparent 80deg, rgba(45,62,54,0.14) 180deg, transparent 240deg);
}
.section-atm-3 {
  /* Senior Debt — horizontal band of cool green-black, institutional weight */
  background: linear-gradient(175deg, rgba(15,24,20,0.38) 0%, rgba(45,62,54,0.16) 40%, transparent 75%);
}
.section-atm-4 {
  /* Sub Capital — deep risk-tranche tilt, darker lower half */
  background: linear-gradient(165deg, transparent 0%, rgba(15,24,20,0.28) 45%, rgba(6,9,10,0.42) 100%);
}
.section-atm-5 {
  /* Equity — warmest section: brass echo blooms at top-center */
  background: radial-gradient(ellipse 80% 65% at 50% 35%, rgba(201,169,110,0.07) 0%, rgba(45,62,54,0.18) 45%, transparent 80%);
}
.section-atm-6 {
  /* Execution — cinematic left-sweep, process energy */
  background: linear-gradient(210deg, rgba(15,24,20,0.35) 0%, rgba(26,37,32,0.12) 45%, transparent 70%);
}
.section-atm-7 {
  /* Underwriting — deep center bloom, analytical focus */
  background: radial-gradient(ellipse 85% 75% at 50% 50%, rgba(26,37,32,0.30) 0%, rgba(15,24,20,0.08) 60%, transparent 85%);
}
.section-atm-8 {
  /* Compliance — tight upper-left institutional corner */
  background: linear-gradient(145deg, rgba(15,24,20,0.32) 0%, rgba(26,37,32,0.10) 40%, transparent 65%);
}
.section-atm-9 {
  /* Engage — warmest close: brass radiance at center, invitation energy */
  background: radial-gradient(ellipse 75% 85% at 50% 58%, rgba(201,169,110,0.09) 0%, rgba(45,62,54,0.20) 40%, rgba(26,37,32,0.06) 65%, transparent 85%);
}

/* ─── HORIZONTAL MODE CAROUSEL (seacat Inside-the-heart style) ─── */
.modes-carousel {
  display: flex;
  flex-wrap: nowrap;
  gap: 0;
  overflow: hidden;
  position: relative;
  margin-top: 20px;
  width: 100%;
}
.mode-panel {
  flex: 0 0 100%;
  padding: 0 4px;
  opacity: 0.08;
  transition: opacity 2.5s ease-out;
  pointer-events: none;
}
.mode-panel.active {
  opacity: 1;
  pointer-events: auto;
}
.mode-panel-name {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.25em;
  color: var(--brass);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.mode-panel-body {
  font-family: var(--font-body);
  font-size: 13px;
  line-height: 1.7;
  color: rgba(227,238,230,0.75);
}
/* Step dash indicators (seacat buttons-0-2-55 style) */
.mode-steps {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
}
.mode-step-dash {
  width: 40px;
  height: 2px;
  background: rgba(201,169,110,0.25);
  transition: background 0.4s ease, width 0.4s ease;
  cursor: pointer;
}
.mode-step-dash.active {
  background: var(--brass);
  box-shadow: 0 0 6px rgba(201,169,110,0.5);
  width: 56px;
}
@media (hover: hover) {
  .mode-step-dash:hover { background: rgba(201,169,110,0.5); }
}

/* ------------------------------------------------------------
   50–51. COOKIE NOTICE
   ------------------------------------------------------------ */
.cookie-notice {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 50;
  background: var(--ink-green);
  border: 1px solid rgba(201, 169, 110, 0.4);
  padding: 20px 24px;
  max-width: 340px;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink);
  line-height: 1.6;
}

.cookie-notice .cookie-accept {
  display: inline-block;
  background: var(--brass);
  color: var(--ink-green);
  padding: 8px 20px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  cursor: none;
  border: none;
  margin-top: 14px;
  transition: background 0.2s var(--ease-soft),
              box-shadow 0.2s var(--ease-soft);
  text-transform: uppercase;
}

.cookie-notice .cookie-accept:hover {
  background: var(--coin-gold);
  box-shadow: 0 0 14px rgba(201, 169, 110, 0.4);
}

/* ------------------------------------------------------------
   52–53. CREDITS MODAL
   ------------------------------------------------------------ */
.credits-modal {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(6, 9, 10, 0.95);
  display: flex;
  align-items: center;
  justify-content: center;
}

.credits-modal-inner {
  background: var(--ink-green);
  border: 1px solid var(--brass);
  padding: 40px;
  max-width: 500px;
  width: 100%;
}

/* ------------------------------------------------------------
   54. SCROLL CUE
   ------------------------------------------------------------ */
.scroll-cue {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--brass);
  opacity: 0.6;
  text-transform: uppercase;
  animation: pulseBrass 2s ease-in-out infinite;
  white-space: nowrap;
  pointer-events: none;
}

/* ------------------------------------------------------------
   55. VIGNETTE
   ------------------------------------------------------------ */
.vignette {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  background: radial-gradient(
    ellipse at center,
    transparent 40%,
    rgba(6, 9, 10, 0.7) 100%
  );
}

/* ------------------------------------------------------------
   55b. FILM GRAIN OVERLAY (V20 — cinematic noise texture)
   Canvas element at 40% resolution, CSS-scaled to full viewport.
   mix-blend-mode: overlay adds both light and dark grain on the
   dark scene background — genuine procedural LCG noise, updated
   every other animation frame for authentic film-grain motion.
   ------------------------------------------------------------ */
#pcm-grain {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  /* CSS dimensions stretch the low-res canvas to full viewport.
     No image-rendering: pixelated — bilinear blur gives softer, more
     film-like grain rather than digital pixel noise. */
  width: 100% !important;
  height: 100% !important;
  opacity: 0.042;
  mix-blend-mode: overlay;
  will-change: opacity;
}
/* Reduced-motion: freeze grain at one frame (static but present) */
@media (prefers-reduced-motion: reduce) {
  #pcm-grain { animation: none; opacity: 0.022; }
}

/* ------------------------------------------------------------
   56–57. LANDSCAPE GATE
   ------------------------------------------------------------ */
.landscape-gate {
  position: fixed;
  inset: 0;
  z-index: 60;
  background: var(--bg);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 40px;
  text-align: center;
}

.landscape-gate__icon {
  font-family: var(--font-mono);
  font-size: 32px;
  color: var(--brass);
  opacity: 0.6;
}

.landscape-gate__text {
  font-family: var(--font-serif);
  font-size: 22px;
  color: var(--ink);
  letter-spacing: 0.12em;
}

.landscape-gate__sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--cream);
  opacity: 0.6;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

@media screen and (orientation: portrait) and (max-width: 768px) {
  .landscape-gate {
    display: flex;
  }
}

/* ------------------------------------------------------------
   58. PWA PROMPT
   ------------------------------------------------------------ */
.pwa-prompt {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 50;
  background: var(--ink-green);
  border: 1px solid rgba(201, 169, 110, 0.4);
  padding: 20px 24px;
  max-width: 340px;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink);
  line-height: 1.6;
}

.pwa-prompt .pwa-install {
  display: inline-block;
  background: var(--brass);
  color: var(--ink-green);
  padding: 8px 20px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  cursor: none;
  border: none;
  margin-top: 14px;
  text-transform: uppercase;
  transition: background 0.2s var(--ease-soft),
              box-shadow 0.2s var(--ease-soft);
}

.pwa-prompt .pwa-install:hover {
  background: var(--coin-gold);
  box-shadow: 0 0 14px rgba(201, 169, 110, 0.4);
}

.pwa-prompt .pwa-dismiss {
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(232, 220, 196, 0.5);
  cursor: none;
  border: none;
  background: none;
  margin-top: 10px;
  display: block;
  letter-spacing: 0.12em;
  transition: color 0.2s var(--ease-soft);
}

.pwa-prompt .pwa-dismiss:hover {
  color: var(--cream);
}

/* ------------------------------------------------------------
   59. SKIP TO CONTENT
   ------------------------------------------------------------ */
.skip-to-content {
  position: absolute;
  top: -100%;
  left: 0;
  z-index: 50;
  background: var(--brass);
  color: var(--bg);
  padding: 8px 16px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-decoration: none;
  transition: top 0.2s var(--ease-soft);
}

.skip-to-content:focus {
  top: 0;
}

/* ------------------------------------------------------------
   60. PCM FOOTER — see GAP 25 block below for the full spec
   ------------------------------------------------------------ */

/* ------------------------------------------------------------
   61. SCROLLBAR
   ------------------------------------------------------------ */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: rgba(201, 169, 110, 0.3);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(201, 169, 110, 0.6);
}

/* Firefox */
* {
  scrollbar-width: thin;
  scrollbar-color: rgba(201, 169, 110, 0.3) transparent;
}

/* ------------------------------------------------------------
   62. @KEYFRAMES — PULSE BRASS
   ------------------------------------------------------------ */
@keyframes pulseBrass {
  0% {
    opacity: 0.4;
    transform: translateX(-50%) scale(0.95);
  }
  50% {
    opacity: 1;
    transform: translateX(-50%) scale(1.05);
  }
  100% {
    opacity: 0.4;
    transform: translateX(-50%) scale(0.95);
  }
}

/* Variant for elements not using translateX(-50%) */
@keyframes pulseBrassSimple {
  0% {
    opacity: 0.4;
    transform: scale(0.95);
  }
  50% {
    opacity: 1;
    transform: scale(1.05);
  }
  100% {
    opacity: 0.4;
    transform: scale(0.95);
  }
}

/* ------------------------------------------------------------
   63. @KEYFRAMES — SPIN BRASS
   ------------------------------------------------------------ */
@keyframes spinBrass {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}

/* ------------------------------------------------------------
   64. @KEYFRAMES — FADE IN UP
   ------------------------------------------------------------ */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ------------------------------------------------------------
   65. REDUCED MOTION
   ------------------------------------------------------------ */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.3s !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.3s !important;
  }

  .cinema-bar {
    transition: height 0.3s linear;
  }

  .flash-overlay {
    transition: opacity 0.3s linear;
  }

  .intro-loader {
    transition: opacity 0.3s linear;
  }

  .intro-loader__spinner {
    animation: none;
    border-color: var(--brass);
  }

  .scene-copy {
    transition: opacity 0.3s linear,
                transform 0.3s linear;
  }

  .menu-overlay {
    transition: transform 0.3s linear;
  }

  .progress-bar-fill {
    transition: width 0.3s linear;
  }

  .scroll-cue {
    animation: none;
  }

  .status-console.done {
    transition: opacity 0.3s linear;
  }
}
