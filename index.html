  <script type="module">
  /* ── Dynamic imports — no importmap needed, works in all sandboxed iframes ── */
  const [THREE, POSTPROCESSING, gsapMod] = await Promise.all([
    import('https://esm.sh/three@0.160.0'),
    import('https://esm.sh/postprocessing@6.36.4?deps=three@0.160.0'),
    import('https://esm.sh/gsap@3.12.7'),
  ]);
  const gsap = gsapMod.default ?? gsapMod;

  // Expose as globals so inline script blocks can reach them
  window.THREE = THREE;
  window.POSTPROCESSING = POSTPROCESSING;
  window.gsap = gsap;

  // Pre-declare module-level camera/scene/renderer/composer as let — prevents TDZ errors
  // when animate() runs before initScene() is called.
  let scene, camera, renderer, composer;

  // Shared mutable state used across input.js / animation.js
  window.dragRotXTarget = 0;
  window.dragRotYTarget = 0;
  window.mouseTarget = { x: 0, y: 0 };
  window.activeIdx = 0;

  // ─── scene-setup.js ────────────────────────────────────────────────
function initScene() {
  // Canvas host must exist in HTML as: <div id="canvas-host"></div>

  // RENDERER
  const renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: false,
    powerPreference: 'high-performance',
    stencil: false
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.25;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('canvas-host').appendChild(renderer.domElement);

  // SCENE
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x06090a);
  scene.fog = new THREE.FogExp2(0x06090a, 0.018);

  // CAMERA
  const camera = new THREE.PerspectiveCamera(34, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 12, 22); // intro start position

  // PMREM (Room Environment for PBR reflections)
  // Using a manual IBL setup since RoomEnvironment import may not be available
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  // Create a simple bright env using a data texture
  try {
    // Try to load RoomEnvironment from esm.sh
    // Falls back gracefully
    const envData = new Float32Array(4 * 4 * 4 * 6);
    for (let i = 0; i < envData.length; i += 4) {
      envData[i] = 0.8; envData[i+1] = 0.85; envData[i+2] = 0.75; envData[i+3] = 1.0;
    }
    const envTex = new THREE.DataArrayTexture(envData, 4, 4, 6);
    envTex.type = THREE.FloatType;
    envTex.needsUpdate = true;
    // scene.environment will be set after PMREM processes
  } catch(e) {
    // graceful fallback
  }

  // 7-LIGHT RIG (exact values from spec)

  // 1. Ambient
  const ambientLight = new THREE.AmbientLight(0xb4c8be, 0.3);
  scene.add(ambientLight);

  // 2. Key light (warm directional from upper-right-front)
  const keyLight = new THREE.DirectionalLight(0xfff8e8, 1.75);
  keyLight.position.set(8, 10, 8);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.set(2048, 2048);
  keyLight.shadow.camera.near = 0.5;
  keyLight.shadow.camera.far = 50;
  keyLight.shadow.camera.left = -12;
  keyLight.shadow.camera.right = 12;
  keyLight.shadow.camera.top = 12;
  keyLight.shadow.camera.bottom = -12;
  keyLight.shadow.bias = -0.0005;
  scene.add(keyLight);

  // 3. Rim light (cool green from upper-left-back)
  const rimLight = new THREE.DirectionalLight(0x7fb89c, 0.7);
  rimLight.position.set(-8, 5, -5);
  scene.add(rimLight);

  // 4. Fill light (brass from below-front)
  const fillLight = new THREE.DirectionalLight(0xc9a96e, 0.45);
  fillLight.position.set(0, -6, 8);
  scene.add(fillLight);

  // 5. Center spot (warm gold, flickers in animation loop)
  const centerSpotLight = new THREE.PointLight(0xffe0a0, 1.8, 18, 1.4);
  centerSpotLight.position.set(0, 0.5, 5);
  scene.add(centerSpotLight);
  window.centerSpotLight = centerSpotLight;

  // 6. Accent brass (left)
  const accentBrass = new THREE.PointLight(0xc9a96e, 0.8, 10, 1.8);
  accentBrass.position.set(-3.5, 2, 2);
  scene.add(accentBrass);

  // 7. Accent green (right)
  const accentGreen = new THREE.PointLight(0x7fb89c, 0.6, 10, 1.8);
  accentGreen.position.set(3.5, -2, 2);
  scene.add(accentGreen);

  // POSTPROCESSING CHAIN
  const EffectComposer = POSTPROCESSING.EffectComposer;
  const RenderPass = POSTPROCESSING.RenderPass;
  const EffectPass = POSTPROCESSING.EffectPass;
  const BloomEffect = POSTPROCESSING.BloomEffect;
  const ChromaticAberrationEffect = POSTPROCESSING.ChromaticAberrationEffect;
  const VignetteEffect = POSTPROCESSING.VignetteEffect;

  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));

  const bloomEffect = new BloomEffect({
    intensity: 0.95,
    luminanceThreshold: 0.30,
    luminanceSmoothing: 0.42,
    radius: 0.72,
  });

  const chromAberration = new ChromaticAberrationEffect({
    offset: new THREE.Vector2(0.0008, 0.0008),
  });

  const vignetteEffect = new VignetteEffect({
    offset: 0.32,
    darkness: 0.6,
  });

  composer.addPass(new EffectPass(camera, bloomEffect, chromAberration, vignetteEffect));

  // RESIZE
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  });

  // Expose globals
  window.scene = scene;
  window.camera = camera;
  window.renderer = renderer;
  window.composer = composer;

  return { scene, camera, renderer, composer, lights: { ambientLight, keyLight, rimLight, fillLight, centerSpotLight, accentBrass, accentGreen } };
}


  // ─── logo-geometry.js ──────────────────────────────────────────────
function buildPCMLogo(THREE) {
  // ── MATERIALS ──────────────────────────────────────────────────────────────
  const matRing = new THREE.MeshPhysicalMaterial({
    color: 0x1a2520,
    metalness: 0.38,
    roughness: 0.35,
    clearcoat: 0.75,
    clearcoatRoughness: 0.20,
    envMapIntensity: 1.4,
    emissive: new THREE.Color(0x070f0c),
    emissiveIntensity: 0.08
  });

  const matShadow = new THREE.MeshStandardMaterial({
    color: 0x0f1814,
    roughness: 0.8
  });

  const matBrass = new THREE.MeshPhysicalMaterial({
    color: 0xc9a96e,
    metalness: 0.84,
    roughness: 0.16,
    envMapIntensity: 1.8,
    emissive: new THREE.Color(0x1a0e00),
    emissiveIntensity: 0.05
  });

  const matCoin = new THREE.MeshPhysicalMaterial({
    color: 0xd9b97a,
    metalness: 0.94,
    roughness: 0.10,
    envMapIntensity: 2.4,
    clearcoat: 0.65,
    clearcoatRoughness: 0.10,
    emissive: new THREE.Color(0x0d0800),
    emissiveIntensity: 0.04
  });

  const matPerson = new THREE.MeshPhysicalMaterial({
    color: 0x1a2520,
    metalness: 0.3,
    roughness: 0.45,
    clearcoat: 0.4,
    emissive: new THREE.Color(0x0a1210),
    emissiveIntensity: 0.12
  });

  const matCream = new THREE.MeshStandardMaterial({
    color: 0xe8dcc4,
    roughness: 0.7
  });

  // ── OUTER RING ─────────────────────────────────────────────────────────────
  const outerRing = new THREE.Mesh(
    new THREE.TorusGeometry(3.4, 0.24, 32, 128),
    matRing
  );
  outerRing.userData.partId = 'ringOuter';
  outerRing.castShadow = true;

  const shadowRing = new THREE.Mesh(
    new THREE.TorusGeometry(3.42, 0.27, 24, 96),
    matShadow
  );
  shadowRing.position.z = -0.04;

  const accentRing = new THREE.Mesh(
    new THREE.TorusGeometry(3.05, 0.045, 16, 96),
    matBrass
  );

  // ── TICK MARKS ─────────────────────────────────────────────────────────────
  const tickGroup = new THREE.Group();
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    const isMajor = i % 3 === 0;
    const geo = isMajor
      ? new THREE.CapsuleGeometry(0.04, 0.22, 8, 12)
      : new THREE.CapsuleGeometry(0.025, 0.14, 6, 8);
    const mat = isMajor ? matBrass : matCream;
    const tick = new THREE.Mesh(geo, mat);
    tick.position.set(Math.cos(a) * 3.68, Math.sin(a) * 3.68, 0);
    tick.rotation.z = a + Math.PI / 2;
    tickGroup.add(tick);
  }

  // ── LEVER GROUP ────────────────────────────────────────────────────────────
  const leverGroup = new THREE.Group();
  leverGroup.rotation.z = 0.16;
  leverGroup.userData.partId = 'lever';

  const leverBar = new THREE.Mesh(
    new THREE.BoxGeometry(4.5, 0.18, 0.22),
    matRing
  );
  leverGroup.add(leverBar);

  const capGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.24, 16);
  const leftCap = new THREE.Mesh(capGeo, matBrass);
  leftCap.position.set(-2.3, 0, 0);
  leftCap.rotation.x = Math.PI / 2;
  const rightCap = new THREE.Mesh(capGeo.clone(), matBrass);
  rightCap.position.set(2.3, 0, 0);
  rightCap.rotation.x = Math.PI / 2;
  leverGroup.add(leftCap, rightCap);

  // ── COIN GROUP ─────────────────────────────────────────────────────────────
  const coinGroup = new THREE.Group();
  coinGroup.position.set(-2.0, 0, 0);
  coinGroup.userData.partId = 'coin';

  const disc = new THREE.Mesh(
    new THREE.CylinderGeometry(0.58, 0.58, 0.16, 64),
    matCoin
  );
  disc.rotation.x = Math.PI / 2;
  coinGroup.add(disc);

  const rimGeo = new THREE.TorusGeometry(0.58, 0.025, 8, 64);
  const frontRim = new THREE.Mesh(rimGeo, matRing);
  frontRim.position.z = 0.08;
  const backRim = new THREE.Mesh(rimGeo.clone(), matRing);
  backRim.position.z = -0.08;
  coinGroup.add(frontRim, backRim);

  // ── Enhanced $ glyph — wider, taller, proud z-offset
  const dollarBar = new THREE.Mesh(
    new THREE.BoxGeometry(0.095, 0.82, 0.065),
    matBrass
  );
  dollarBar.position.z = 0.115;
  coinGroup.add(dollarBar);

  const upperArc = new THREE.Mesh(
    new THREE.TorusGeometry(0.205, 0.062, 10, 24, Math.PI * 1.12),
    matBrass
  );
  upperArc.position.set(0, 0.185, 0.115);
  coinGroup.add(upperArc);

  const lowerArc = new THREE.Mesh(
    new THREE.TorusGeometry(0.205, 0.062, 10, 24, Math.PI * 1.12),
    matBrass
  );
  lowerArc.position.set(0, -0.185, 0.115);
  lowerArc.rotation.y = Math.PI;
  coinGroup.add(lowerArc);
  // ── Canvas coin face — sharp $ symbol as texture
  (function() {
    const cc = document.createElement('canvas');
    cc.width = 512; cc.height = 512;
    const cx = cc.getContext('2d');
    // Base gold gradient
    const grd = cx.createRadialGradient(256,256,40, 256,256,248);
    grd.addColorStop(0, '#e8c97e');
    grd.addColorStop(0.6, '#d4a84e');
    grd.addColorStop(1, '#9e7228');
    cx.fillStyle = grd;
    cx.beginPath(); cx.arc(256,256,248,0,Math.PI*2); cx.fill();
    // Engraved rim
    cx.strokeStyle = 'rgba(26,37,32,0.55)';
    cx.lineWidth = 14;
    cx.beginPath(); cx.arc(256,256,240,0,Math.PI*2); cx.stroke();
    cx.strokeStyle = 'rgba(26,37,32,0.3)';
    cx.lineWidth = 5;
    cx.beginPath(); cx.arc(256,256,224,0,Math.PI*2); cx.stroke();
    // $ symbol — deeply engraved dark-green
    cx.font = 'bold 238px Georgia,serif';
    cx.fillStyle = 'rgba(15,24,20,0.88)';
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText('$', 256, 264);
    // Highlight pass (slight metallic sheen)
    const shine = cx.createLinearGradient(80,80,440,440);
    shine.addColorStop(0, 'rgba(255,240,200,0.18)');
    shine.addColorStop(1, 'rgba(255,240,200,0)');
    cx.fillStyle = shine;
    cx.beginPath(); cx.arc(256,256,248,0,Math.PI*2); cx.fill();

    const tex = new THREE.CanvasTexture(cc);
    const faceMat = new THREE.MeshBasicMaterial({
      map: tex, transparent: true, opacity: 0.96,
      depthWrite: false, side: THREE.FrontSide
    });
    const faceMesh = new THREE.Mesh(new THREE.CircleGeometry(0.555, 64), faceMat);
    faceMesh.position.z = 0.082; // just in front of coin disc front face
    coinGroup.add(faceMesh);
    window.coinFaceMesh = faceMesh;
  })();


  leverGroup.add(coinGroup);

  // ── PERSON GROUP ───────────────────────────────────────────────────────────
  const personRoot = new THREE.Group();
  personRoot.position.set(2.0, 0.09, 0);
  personRoot.userData.partId = 'person';

  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.19, 28, 28),
    matPerson
  );
  head.position.y = 1.08;
  personRoot.add(head);

  const neck = new THREE.Mesh(
    new THREE.CylinderGeometry(0.065, 0.085, 0.12, 16),
    matPerson
  );
  neck.position.y = 0.91;
  personRoot.add(neck);

  const torso = new THREE.Mesh(
    new THREE.CylinderGeometry(0.17, 0.24, 0.54, 20),
    matPerson
  );
  torso.position.y = 0.58;
  personRoot.add(torso);

  const armGeo = new THREE.CapsuleGeometry(0.055, 0.46, 8, 14);
  const leftArm = new THREE.Mesh(armGeo, matPerson);
  leftArm.position.set(-0.24, 0.72, 0);
  leftArm.rotation.z = 0.4;
  const rightArm = new THREE.Mesh(armGeo.clone(), matPerson);
  rightArm.position.set(0.24, 0.72, 0);
  rightArm.rotation.z = -0.4;
  personRoot.add(leftArm, rightArm);

  const hips = new THREE.Mesh(
    new THREE.CylinderGeometry(0.24, 0.2, 0.13, 20),
    matPerson
  );
  hips.position.y = 0.28;
  personRoot.add(hips);

  const legGeo = new THREE.CapsuleGeometry(0.075, 0.34, 8, 14);
  const leftLeg = new THREE.Mesh(legGeo, matPerson);
  leftLeg.position.set(-0.1, 0.05, 0);
  const rightLeg = new THREE.Mesh(legGeo.clone(), matPerson);
  rightLeg.position.set(0.1, 0.05, 0);
  personRoot.add(leftLeg, rightLeg);

  const footGeo = new THREE.BoxGeometry(0.17, 0.07, 0.2);
  const leftFoot = new THREE.Mesh(footGeo, matPerson);
  leftFoot.position.set(-0.1, -0.14, 0.04);
  const rightFoot = new THREE.Mesh(footGeo.clone(), matPerson);
  rightFoot.position.set(0.1, -0.14, 0.04);
  personRoot.add(leftFoot, rightFoot);

  leverGroup.add(personRoot);

  // ── FULCRUM GROUP ──────────────────────────────────────────────────────────
  const fulcrumGroup = new THREE.Group();
  fulcrumGroup.position.set(0, -0.45, 0);
  fulcrumGroup.userData.partId = 'fulcrum';

  const pyramid = new THREE.Mesh(
    new THREE.ConeGeometry(0.22, 0.42, 4),
    matRing
  );
  pyramid.position.y = -0.08;
  pyramid.rotation.y = Math.PI / 4;
  fulcrumGroup.add(pyramid);

  const pivotDot = new THREE.Mesh(
    new THREE.SphereGeometry(0.085, 20, 20),
    matBrass
  );
  pivotDot.position.y = 0.2;
  fulcrumGroup.add(pivotDot);

  const glowRingMat = new THREE.MeshBasicMaterial({
    color: 0xc9a96e,
    transparent: true,
    opacity: 0.6,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  const glowRing = new THREE.Mesh(
    new THREE.RingGeometry(0.13, 0.22, 32),
    glowRingMat
  );
  glowRing.position.y = 0.2;
  glowRing.rotation.x = Math.PI / 2;
  fulcrumGroup.add(glowRing);

  // ── ICON ROW ───────────────────────────────────────────────────────────────
  const iconRow = new THREE.Group();

  // Up arrow
  const upArrowGroup = new THREE.Group();
  upArrowGroup.position.set(-1.15, -1.85, 0);
  upArrowGroup.userData.partId = 'upArrow';
  const upShaft = new THREE.Mesh(
    new THREE.CylinderGeometry(0.045, 0.045, 0.46, 16),
    matBrass
  );
  const upHead = new THREE.Mesh(
    new THREE.ConeGeometry(0.14, 0.24, 20),
    matBrass
  );
  upHead.position.y = 0.34;
  upArrowGroup.add(upShaft, upHead);

  // Refresh icon
  const refreshGroup = new THREE.Group();
  refreshGroup.position.set(0, -1.85, 0);
  const refreshArc = new THREE.Mesh(
    new THREE.TorusGeometry(0.25, 0.045, 12, 32, Math.PI * 1.55),
    matBrass
  );
  refreshArc.rotation.z = -0.4;
  const refreshTip = new THREE.Mesh(
    new THREE.ConeGeometry(0.09, 0.18, 14),
    matBrass
  );
  refreshTip.position.set(0.21, 0.16, 0);
  refreshTip.rotation.z = -1.0;
  refreshGroup.add(refreshArc, refreshTip);

  // Down arrow
  const downArrowGroup = new THREE.Group();
  downArrowGroup.position.set(1.15, -1.85, 0);
  downArrowGroup.userData.partId = 'downArrow';
  const downShaft = new THREE.Mesh(
    new THREE.CylinderGeometry(0.045, 0.045, 0.46, 16),
    matBrass
  );
  const downHead = new THREE.Mesh(
    new THREE.ConeGeometry(0.14, 0.24, 20),
    matBrass
  );
  downHead.position.y = -0.34;
  downHead.rotation.z = Math.PI;
  downArrowGroup.add(downShaft, downHead);

  iconRow.add(upArrowGroup, refreshGroup, downArrowGroup);

  // ── ORBITAL DOTS ───────────────────────────────────────────────────────────
  const orbitalDots = [];
  for (let i = 0; i < 10; i++) {
    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(0.055, 14, 14),
      matBrass.clone()
    );
    const phase = (i / 10) * Math.PI * 2;
    dot.userData.phase = phase;
    orbitalDots.push(dot);
  }

  // ── HALO DISC ──────────────────────────────────────────────────────────────
  const haloMat = new THREE.MeshBasicMaterial({
    color: 0x7fb89c,
    transparent: true,
    opacity: 0.07,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  const haloDisc = new THREE.Mesh(
    new THREE.CircleGeometry(4.8, 64),
    haloMat
  );
  haloDisc.position.z = -1.2;

  // ── PARTICLES ──────────────────────────────────────────────────────────────
  const particleCount = 320; // v33: denser mote field
  const positions = new Float32Array(particleCount * 3);
  const phases    = new Float32Array(particleCount);
  const velocities = new Float32Array(particleCount * 3);  // persistent drift velocities
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3]     = (Math.random() - 0.5) * 16;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 12;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
    phases[i] = Math.random() * Math.PI * 2;
    velocities[i * 3]     = (Math.random() - 0.5) * 0.0006;
    velocities[i * 3 + 1] = (Math.random() - 0.5) * 0.0004;
    velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.0003;
  }
  const particleGeo = new THREE.BufferGeometry();
  particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const particleMat = new THREE.PointsMaterial({
    color: 0xc9a96e,
    size: 0.045,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.72
  });
  const particles = new THREE.Points(particleGeo, particleMat);
  particles.userData.phases = phases;
  particles.userData.velocities = velocities;

  // Boss particles — 24 larger motes for depth layering
  const bossCount = 24;
  const bossPos  = new Float32Array(bossCount * 3);
  const bossPhase = new Float32Array(bossCount);
  for (let i = 0; i < bossCount; i++) {
    bossPos[i * 3]     = (Math.random() - 0.5) * 20;
    bossPos[i * 3 + 1] = (Math.random() - 0.5) * 14;
    bossPos[i * 3 + 2] = (Math.random() - 0.5) * 8 - 2;
    bossPhase[i] = Math.random() * Math.PI * 2;
  }
  const bossGeo = new THREE.BufferGeometry();
  bossGeo.setAttribute('position', new THREE.BufferAttribute(bossPos, 3));
  const bossMat = new THREE.PointsMaterial({
    color: 0xd9b97a,
    size: 0.13,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.28
  });
  const bossParticles = new THREE.Points(bossGeo, bossMat);
  bossParticles.userData.phases = bossPhase;
  scene.add(bossParticles);
  window.bossParticles = bossParticles;

  // ── BACKGROUND GRADIENT PLANE ──────────────────────────────────────────────
  const bgPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 40),
    new THREE.ShaderMaterial({
      uniforms: {
        time:        { value: 0 },
        uSectionTint:{ value: new THREE.Vector3(0.0, 0.0, 0.0) }, // per-section color lift
        uTintStrength: { value: 0.0 }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform float time;
        uniform vec3 uSectionTint;
        uniform float uTintStrength;
        void main() {
          vec3 top = vec3(0.04, 0.07, 0.06);
          vec3 mid = vec3(0.06, 0.10, 0.09);
          vec3 bot = vec3(0.02, 0.03, 0.03);
          vec3 col = mix(bot, mid, vUv.y * 1.5);
          col = mix(col, top, max(0.0, vUv.y - 0.5) * 2.0);
          col += 0.005 * sin(time * 0.3 + vUv.x * 8.0);
          // Section-specific atmospheric tint (very subtle, max 0.018)
          float radDist = length(vUv - vec2(0.5)) * 1.4;
          float vignetted = 1.0 - clamp(radDist, 0.0, 1.0);
          col += uSectionTint * uTintStrength * vignetted * 0.018;
          gl_FragColor = vec4(col, 1.0);
        }
      `,
      depthWrite: false
    })
  );
  bgPlane.position.z = -8;

  // ── ASSEMBLE ROOT ──────────────────────────────────────────────────────────
  const root = new THREE.Group();
  root.add(outerRing, shadowRing, accentRing, tickGroup, leverGroup, fulcrumGroup, iconRow);
  orbitalDots.forEach(d => root.add(d));
  root.add(haloDisc, particles, bgPlane);

  return {
    root,
    leverGroup,
    coinGroup,
    personGroup: personRoot,
    fulcrumGroup,
    refreshGroup,
    outerRing,
    accentRingMesh: accentRing,
    tickGroup,
    orbitalDots,
    haloDisc,
    particles,
    bgPlane,

// Track last mode idx for direction-aware transitions
let _lastModeIdx = 0;

function showModeContent(idx, section) {
  const s = section || (window.SECTIONS && window.SECTIONS[window.activeIdx || 0]);
  if (!s || !s.modes) return;
  const mode = s.modes[idx];
  if (!mode) return;
  const el = id => document.getElementById(id);
  const modeBody  = el('mode-body');
  const modeStats = el('mode-stats');

  // V21: Cinematic directional transition — exit current content up or down
  // depending on which direction the mode index is moving.
  const dir = idx >= _lastModeIdx ? 1 : -1; // +1 = forward (exit up), -1 = backward (exit down)
  _lastModeIdx = idx;

  function applyContent() {
    if (modeBody) modeBody.textContent = mode.body;
    if (modeStats && mode.stats) {
      modeStats.innerHTML = mode.stats.map(([v, l]) =>
        `<div class="stat-item"><span class="stat-val">${v}</span><span class="stat-label">${l}</span></div>`
      ).join('');
      modeStats.style.display = '';
    } else if (modeStats) {
      modeStats.style.display = 'none';
    }
  }

  if (modeBody) {
    // Phase 1: exit current content (fade + slide in exit direction)
    modeBody.classList.remove('mode-visible', 'mode-entering');
    modeBody.classList.add('mode-exiting');
    if (modeStats) {
      modeStats.style.opacity = '0';
      modeStats.style.transition = 'opacity 0.18s ease';
      modeStats.style.transform = `translateY(${-6 * dir}px)`;
    }
    setTimeout(() => {
      // Phase 2: swap content, place entering from opposite end
      applyContent();
      modeBody.classList.remove('mode-exiting');
      modeBody.classList.add('mode-entering');
      // entering: start below if going forward, above if going back
      modeBody.style.transform = `translateY(${12 * dir}px)`;
      // Trigger reflow so the transition fires
      void modeBody.offsetHeight;
      // Phase 3: animate into visible position
      requestAnimationFrame(() => {
        modeBody.classList.remove('mode-entering');
        modeBody.classList.add('mode-visible');
        modeBody.style.transform = '';
        if (modeStats) {
          modeStats.style.opacity = '1';
          modeStats.style.transform = 'translateY(0)';
        }
      });
    }, 190);
  } else {
    applyContent();
  }

  // Update active mode btn
  document.querySelectorAll('.mode-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  // Animate drag indicator (seacat swiper-style)
  if (typeof window.updateModeIndicator === 'function') {
    window.updateModeIndicator(idx);
  }
}

window.setMode = function(idx) {
  const s = window.SECTIONS?.[window.activeIdx || 0];
  showModeContent(idx, s);
  // Update visual panel mode dots
  if (typeof window._updateVisualPanel === 'function') {
    window._updateVisualPanel(window.activeIdx || 0, idx);
  }
  // Show section-end indicator when last mode reached
  if (s && s.modes && idx === s.modes.length - 1) {
    clearTimeout(window._seiTimer);
    window._seiTimer = setTimeout(function() {
      if (typeof window._showSectionEndIndicator === 'function') window._showSectionEndIndicator();
    }, 800);
  } else {
    if (typeof window._hideSectionEndIndicator === 'function') window._hideSectionEndIndicator();
  }
};

function updateSectionUI(idx) {
  // Side nav dots + ring progress
  document.querySelectorAll('.side-nav-dot').forEach((dot, i) => {
    const fill = dot.querySelector('.nav-ring-fill');
    if (fill) {
      if (i < idx) {
        fill.style.strokeDashoffset = '0'; // completed
      } else if (i === idx) {
        fill.style.strokeDashoffset = '44'; // half-fill active
      } else {
        fill.style.strokeDashoffset = '88'; // empty
      }
    }
    dot.classList.toggle('active', i === idx);
  });
  // Bottom menu buttons
  document.querySelectorAll('.section-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });

  // Mode indicator
  if (typeof updateModeIndicator === 'function') {
    const activeBtn = document.querySelector('.mode-btn.active');
    if (activeBtn) {
      const allBtns = document.querySelectorAll('.mode-btn');
      const activeIdx = Array.from(allBtns).indexOf(activeBtn);
      updateModeIndicator(activeIdx >= 0 ? activeIdx : 0);
    }
  }

  // Circular progress arc
  const arc = document.getElementById('circ-arc');
  const circNum = document.getElementById('circ-num');
  if (arc) {
    // V19: r=41, circumference = 2*PI*41 = ~257.6
    const circumference = 2 * Math.PI * 41;
    const progress = idx / 9; // 0 (home) to 1 (engage)
    const dashoffset = circumference * (1 - progress);
    arc.style.strokeDashoffset = dashoffset.toFixed(1);
  }
  if (circNum) circNum.textContent = String(idx + 1).padStart(2, '0');

  // V19: Update tick marks — active tick = current section, all others muted
  for (let ti = 0; ti < 10; ti++) {
    const tick = document.getElementById('circ-tick-' + ti);
    if (!tick) continue;
    if (ti === idx) {
      tick.classList.add('active');
    } else {
      tick.classList.remove('active');
    }
  }

  // Section atmosphere
  const atm = document.getElementById('section-atmosphere');
  if (atm) {
    // Remove old atm class
    for (let i = 0; i < 10; i++) atm.classList.remove(`section-atm-${i}`);
    atm.classList.add(`section-atm-${idx}`);
  }

  window.activeIdx = idx;
}

// Mode drag indicator (seacat swiper-style)
function updateModeIndicator(idx) {
  const btns = document.querySelectorAll('.mode-btn');
  const indicator = document.querySelector('.mode-drag-indicator');
  if (!indicator || !btns[idx]) return;
  const btn = btns[idx];
  const row = document.querySelector('.modes-row');
  if (!row) return;
  const rowRect = row.getBoundingClientRect();
  const btnRect = btn.getBoundingClientRect();
  indicator.style.left = (btnRect.left - rowRect.left) + 'px';
  indicator.style.width = btnRect.width + 'px';
}
window.updateModeIndicator = updateModeIndicator;
window.updateSectionUI = updateSectionUI;
window.updateCopyContent = updateCopyContent;

// ─── V18: Touch swipe on modes-row ──────────────────────────────────────────
// Horizontal swipe (≥40px) on the mode buttons row cycles modes left/right.
// Prevents the global section-transition swipe from triggering during mode swipes.
(function wireModesSwipe() {
  let _sx = 0, _sy = 0, _swipeActive = false;
  const THRESHOLD = 40;
  const VERTICAL_CANCEL = 30; // abort if vertical drift is too large

  function getModeCount() {
    return document.querySelectorAll('.mode-btn').length;
  }
  function getActiveMode() {
    const btns = document.querySelectorAll('.mode-btn');
    for (let i = 0; i < btns.length; i++) {
      if (btns[i].classList.contains('active')) return i;
    }
    return 0;
  }

  document.addEventListener('touchstart', (e) => {
    const row = e.target.closest('.modes-row');
    if (!row) return;
    const t = e.touches[0];
    _sx = t.clientX;
    _sy = t.clientY;
    _swipeActive = true;
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!_swipeActive) return;
    const row = e.target.closest('.modes-row');
    if (!row) { _swipeActive = false; return; }
    const t = e.touches[0];
    const dx = t.clientX - _sx;
    const dy = t.clientY - _sy;
    // Cancel if predominantly vertical (user is probably trying to scroll sections)
    if (Math.abs(dy) > VERTICAL_CANCEL && Math.abs(dy) > Math.abs(dx)) {
      _swipeActive = false;
    }
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (!_swipeActive) return;
    _swipeActive = false;

    const changedTouch = e.changedTouches[0];
    const dx = changedTouch.clientX - _sx;
    const dy = changedTouch.clientY - _sy;

    // Require horizontal dominance and sufficient distance
    if (Math.abs(dx) < THRESHOLD || Math.abs(dy) > Math.abs(dx) * 0.8) return;

    const count = getModeCount();
    if (count <= 1) return;

    const current = getActiveMode();
    let next = current;
    if (dx < 0) {
      // Swipe left → next mode
      next = Math.min(current + 1, count - 1);
    } else {
      // Swipe right → prev mode
      next = Math.max(current - 1, 0);
    }

    if (next !== current && typeof window.setMode === 'function') {
      window.setMode(next);
    }
  }, { passive: true });
})();

    document.body.style.cursor = 'none';

    const cursor = document.getElementById('pcm-cursor');
    const dot    = document.getElementById('pcm-cursor-dot');

    let mx = -200, my = -200; // start off-screen
    let cx = -200, cy = -200;
    let rafId = null;

    function lerp(a, b, t) { return a + (b - a) * t; }

    function animateCursor() {
      cx = lerp(cx, mx, 0.12);
      cy = lerp(cy, my, 0.12);
      cursor.style.transform = `translate(${cx}px, ${cy}px)`;
      dot.style.transform    = `translate(${mx}px, ${my}px)`;
      rafId = requestAnimationFrame(animateCursor);
    }

    document.addEventListener('mousemove', (e) => {
      mx = e.clientX;
      my = e.clientY;
    });

    document.addEventListener('mouseenter', () => {
      cursor.style.opacity = '1';
    });

    document.addEventListener('mouseleave', () => {
      cursor.style.opacity = '0';
    });

    // Pointer-down / up state for click feedback
    document.addEventListener('mousedown', () => {
      cursor.classList.add('pressing');
    });

    document.addEventListener('mouseup', () => {
      cursor.classList.remove('pressing');
    });

    // Hover state on interactive elements
    const interactiveSelector = 'a, button, [role="button"], input, select, textarea, label';
    document.addEventListener('mouseover', (e) => {
      if (e.target.closest(interactiveSelector)) {
        cursor.classList.add('hovering');
      }
    });
    document.addEventListener('mouseout', (e) => {
      if (e.target.closest(interactiveSelector)) {

    });

  // ---------------------------------------------------------------------------
  // 14c. Execution Stages Host (Gap 5/23 — hybrid scroll reveal)
  // ---------------------------------------------------------------------------
  function buildExecutionStages() {
    const host = document.createElement('div');
    host.id = 'execution-stage-host';
    host.className = 'execution-stage-host';
    host.setAttribute('aria-hidden', 'true');
    const EXEC_STAGES = [
      { num: '01', title: 'Discovery', desc: 'Listening first. Sponsor memo, rent roll, business plan, market thesis — everything on the table before we form a view.' },
      { num: '02', title: 'Underwriting', desc: 'Stress-testing every assumption. DSCR, LTC, LTV, sensitivity scenarios. We model so the numbers hold under scrutiny.' },
      { num: '03', title: 'Structuring', desc: 'Engineering the capital stack. Covenant design, tranche sizing, conversion features — every degree of freedom explored.' },
      { num: '04', title: 'Term Sheet', desc: 'The test. Every structural decision lands on paper. Pricing, tenor, covenants, intercreditor — all negotiated before lender selection.' },
      { num: '05', title: 'Close', desc: 'The proof. We run the process from term sheet to funded in the time we promised. That is the product.' },
    ];
    host.innerHTML = `
      <div style="margin-bottom:20px;text-align:center;">
        <div class="exec-stages-title">How We Work</div>
        <div style="font-family:var(--font-serif);font-size:clamp(1.4rem,2.5vw,2.2rem);font-weight:300;color:var(--ink);letter-spacing:0.1em;line-height:1.3;margin-top:6px;">The Cadence Is The Product</div>
        <div style="width:28px;height:1px;background:var(--brass);margin:14px auto 0;box-shadow:0 0 8px rgba(201,169,110,0.4);"></div>
      </div>
      <div class="exec-stage-list" id="exec-stage-list">
        ${EXEC_STAGES.map((s, i) => `
          <div class="exec-stage-row" id="exec-stage-${i}" data-idx="${i}">
            <div class="exec-stage-num-badge">${s.num}</div>
            <div class="exec-stage-content">
              <h3>${s.title}</h3>
              <p>${s.desc}</p>
            </div>
            ${i < EXEC_STAGES.length - 1 ? '<div class="exec-stage-connector"></div>' : ''}
          </div>
        `).join('')}
      </div>
    `;
    document.body.appendChild(host);

    // Scroll-driven reveal logic
    let execScrollAccum = 0;
    let activeStage = -1;
    let execVisible = false;
    let svgBuilt = false;

    window._execStageReveal = function(scrollDelta) {
      // Update connector stages as exec scroll progresses
      if (typeof window._updateConnectorStages === 'function') {
        const revealed = Math.min(5, Math.floor(execScrollAccum / 120) + 1);
        window._updateConnectorStages(revealed);
      }
      if (!execVisible) return false;
      execScrollAccum += scrollDelta;

      // Each stage needs ~120px of scroll to reveal
      const stageThreshold = 120;
      const newStage = Math.min(4, Math.floor(execScrollAccum / stageThreshold));

      if (newStage !== activeStage) {
        // Reveal all stages up to newStage
        for (let i = 0; i <= newStage; i++) {
          const row = document.getElementById(`exec-stage-${i}`);
          if (row) {
            row.classList.add('revealed');
            row.classList.toggle('active', i === newStage);
            row.classList.toggle('passed', i < newStage);
          }
        }
        // Un-active stages beyond newStage when scrolling back
        for (let i = newStage + 1; i < 5; i++) {
          const row = document.getElementById(`exec-stage-${i}`);
          if (row) {
            row.classList.remove('revealed', 'active', 'passed');
          }
        }
        activeStage = newStage;
        // Drive the SVG connector trace
        if (typeof window._updateConnectorSVG === 'function') window._updateConnectorSVG(newStage);
      }

      // Consume scroll until all 5 stages revealed + small buffer; then pass through
      return execScrollAccum < (stageThreshold * 5 + 80);
    };

    // ---- SVG connector builder (called on first section show, post-layout) ----
    function _buildConnectorSVG() {
      const list = document.getElementById('exec-stage-list');
      if (!list) return;
      list.style.position = 'relative';

      const listRect = list.getBoundingClientRect();
      const badgeEls = Array.from(list.querySelectorAll('.exec-stage-num-badge'));
      if (badgeEls.length < 2) return;

      const positions = badgeEls.map(b => {
        const r = b.getBoundingClientRect();
        return {
          cx: r.left + r.width * 0.5 - listRect.left,
          cy: r.top  + r.height * 0.5 - listRect.top,
        };
      });

      const cx     = positions[0].cx;
      const startY = positions[0].cy;
      const endY   = positions[positions.length - 1].cy;
      const svgW   = Math.ceil(cx * 2 + 10);
      const svgH   = Math.ceil(listRect.height);
      const pathD  = `M ${cx.toFixed(1)} ${startY.toFixed(1)} L ${cx.toFixed(1)} ${endY.toFixed(1)}`;

      const NS  = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(NS, 'svg');
      svg.id = 'exec-connector-svg';
      svg.setAttribute('width',   svgW);
      svg.setAttribute('height',  svgH);
      svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);

      // Defs — glow filters
      const defs = document.createElementNS(NS, 'defs');
      defs.innerHTML = `
        <filter id="cvGlow" x="-600%" y="-120%" width="1300%" height="340%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.8" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="cvNodeGlow" x="-400%" y="-400%" width="900%" height="900%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      `;
      svg.appendChild(defs);

      // Dashed dim track
      const track = document.createElementNS(NS, 'path');
      track.setAttribute('d', pathD);
      track.setAttribute('stroke', 'rgba(201,169,110,0.1)');
      track.setAttribute('stroke-width', '1');
      track.setAttribute('fill', 'none');
      track.setAttribute('stroke-dasharray', '3 6');
      svg.appendChild(track);

      // Brass fill trace — draws downward via stroke-dashoffset
      const fill = document.createElementNS(NS, 'path');
      fill.id = 'exec-cv-fill';
      fill.setAttribute('d', pathD);
      fill.setAttribute('stroke', '#c9a96e');
      fill.setAttribute('stroke-width', '1.5');
      fill.setAttribute('fill', 'none');
      fill.setAttribute('stroke-linecap', 'round');
      fill.setAttribute('filter', 'url(#cvGlow)');
      svg.appendChild(fill);
      list.appendChild(svg); // Must be in DOM before getTotalLength

      const totalLen = fill.getTotalLength ? fill.getTotalLength() : Math.abs(endY - startY);
      fill.setAttribute('stroke-dasharray',  String(totalLen));
      fill.setAttribute('stroke-dashoffset', String(totalLen));
      fill.style.transition = 'stroke-dashoffset 0.8s cubic-bezier(0.16,1,0.3,1)';

      // Stage node circles
      positions.forEach((pos, i) => {
        const n = document.createElementNS(NS, 'circle');
        n.id = `exec-cv-node-${i}`;
        n.setAttribute('cx', cx);
        n.setAttribute('cy', pos.cy);
        n.setAttribute('r',  '3.5');
        n.setAttribute('fill',         'rgba(201,169,110,0.07)');
        n.setAttribute('stroke',       'rgba(201,169,110,0.18)');
        n.setAttribute('stroke-width', '1');
        n.style.transition = 'fill 0.5s, stroke 0.5s';
        svg.appendChild(n);
      });

      // Traveling glow dot — wrapped in <g> so CSS transform works cross-browser
      const dotG = document.createElementNS(NS, 'g');
      dotG.id = 'exec-cv-dot-group';
      dotG.style.cssText = `transform:translateY(${startY.toFixed(1)}px);
        transition:transform 0.8s cubic-bezier(0.16,1,0.3,1),opacity 0.45s;
        opacity:0;`;
      const dot = document.createElementNS(NS, 'circle');
      dot.setAttribute('cx', cx);
      dot.setAttribute('cy', '0');
      dot.setAttribute('r',  '5');
      dot.setAttribute('fill',   '#c9a96e');
      dot.setAttribute('filter', 'url(#cvNodeGlow)');
      dotG.appendChild(dot);
      svg.appendChild(dotG);

      // Pulse ring — also in group for transform
      const pulseG = document.createElementNS(NS, 'g');
      pulseG.id = 'exec-cv-pulse-group';
      pulseG.style.cssText = `transform:translateY(${startY.toFixed(1)}px);
        transition:transform 0.8s cubic-bezier(0.16,1,0.3,1),opacity 0.45s;
        opacity:0;`;
      const ring = document.createElementNS(NS, 'circle');
      ring.setAttribute('cx', cx);
      ring.setAttribute('cy', '0');
      ring.setAttribute('r',  '8');
      ring.setAttribute('fill',         'none');
      ring.setAttribute('stroke',       'rgba(201,169,110,0.4)');
      ring.setAttribute('stroke-width', '1');
      ring.setAttribute('class',        'cv-pulse-ring');
      pulseG.appendChild(ring);
      svg.appendChild(pulseG);

      // Hide CSS pseudo-element connectors — SVG takes ownership of the trace
      list.querySelectorAll('.exec-stage-connector').forEach(c => {
        c.style.display = 'none';
      });

      // Stash measurement data on the SVG element itself
      svg._positions = positions;
      svg._totalLen  = totalLen;
      svg._startY    = startY;
      svg._endY      = endY;
      svg._cx        = cx;

      // ---- Update function: drives all SVG elements ----
      window._updateConnectorSVG = function(stageIdx) {
        const sv = document.getElementById('exec-connector-svg');
        if (!sv) return;
        const pos = sv._positions, tl = sv._totalLen;
        const sy  = sv._startY,   ey = sv._endY;
        if (!pos || !tl) return;

        const fp  = document.getElementById('exec-cv-fill');
        const dg  = document.getElementById('exec-cv-dot-group');
        const pg  = document.getElementById('exec-cv-pulse-group');

        if (stageIdx < 0) {
          // Full reset — no transition on dashoffset to snap back
          if (fp) {
            fp.style.transition = 'none';
            fp.setAttribute('stroke-dashoffset', String(tl));
            requestAnimationFrame(() => {
              fp.style.transition = 'stroke-dashoffset 0.8s cubic-bezier(0.16,1,0.3,1)';
            });
          }
          if (dg) { dg.style.opacity = '0'; dg.style.transform = `translateY(${sy.toFixed(1)}px)`; }
          if (pg) { pg.style.opacity = '0'; pg.style.transform = `translateY(${sy.toFixed(1)}px)`; }
          pos.forEach((_, i) => {
            const n = document.getElementById(`exec-cv-node-${i}`);
            if (n) { n.setAttribute('fill', 'rgba(201,169,110,0.07)'); n.setAttribute('stroke', 'rgba(201,169,110,0.18)'); n.setAttribute('r', '3.5'); }
          });
          return;
        }

        // Stroke-dashoffset: reveal down to stageIdx position
        // Path is a straight vertical line so length = y-span
        const activeCY = pos[stageIdx].cy;
        const lineLen  = activeCY - sy;                     // portion traced
        const offset   = Math.max(0, tl - lineLen);
        if (fp) fp.setAttribute('stroke-dashoffset', String(offset));

        // Move glow dot and pulse ring
        const ty = activeCY.toFixed(1);
        if (dg) { dg.style.opacity = '1'; dg.style.transform = `translateY(${ty}px)`; }
        if (pg) { pg.style.opacity = '1'; pg.style.transform = `translateY(${ty}px)`; }

        // Node states
        pos.forEach((_, i) => {
          const n = document.getElementById(`exec-cv-node-${i}`);
          if (!n) return;
          if (i < stageIdx) {
            n.setAttribute('fill',   'rgba(201,169,110,0.38)');
            n.setAttribute('stroke', 'rgba(201,169,110,0.55)');
            n.setAttribute('r', '3.5');
          } else if (i === stageIdx) {
            n.setAttribute('fill',   '#c9a96e');
            n.setAttribute('stroke', '#dfc08a');
            n.setAttribute('r', '2');           // dot hides behind glowDot
          } else {
            n.setAttribute('fill',   'rgba(201,169,110,0.07)');
            n.setAttribute('stroke', 'rgba(201,169,110,0.18)');
            n.setAttribute('r', '3.5');
          }
        });
      };
    }
    // -------------------------------------------------------------------------

    window._setExecVisible = function(v) {
      execVisible = v;
      const h = document.getElementById('execution-stage-host');
      if (h) h.classList.toggle('visible', v);
      if (v && !svgBuilt) {
        // Two rAF delays guarantee layout is fully painted before we measure
        requestAnimationFrame(() => requestAnimationFrame(() => {
          _buildConnectorSVG();
          svgBuilt = true;
        }));
      }
      if (!v) {
        // Reset when leaving
        execScrollAccum = 0;
        activeStage = -1;
        document.querySelectorAll('.exec-stage-row').forEach(r => r.classList.remove('revealed','active','passed'));
        if (typeof window._updateConnectorSVG === 'function') window._updateConnectorSVG(-1);
      }
    };
  }

    window._updateVisualPanel = function(sectionIdx, modeIdx) {
      const data = PANEL_DATA[sectionIdx];
      const p = document.getElementById('section-visual-panel');
      if (!p) return;

      // Toggle split-layout on scene-copy so it moves to left column
      const sceneCopy = document.querySelector('.scene-copy');

      if (!data) {
        p.classList.remove('visible');
        if (sceneCopy) sceneCopy.classList.remove('split-layout');
        return;
      }
      p.classList.add('visible');
      if (sceneCopy) sceneCopy.classList.add('split-layout');

      // Mode dots
      const section = window.SECTIONS && window.SECTIONS[sectionIdx];
      const modes = section && section.modes;
      const dotsEl = document.getElementById('vp-mode-dots');
      if (dotsEl && modes) {
        dotsEl.innerHTML = modes.map((m, i) =>
          `<div class="vp-mode-dot ${i === (modeIdx||0) ? 'active' : ''}" title="${m.name}"></div>`
        ).join('');
      } else if (dotsEl) {
        dotsEl.innerHTML = '';
      }

      // Stats: prefer mode-specific stats when the active mode has them
      const statsEl = document.getElementById('vp-stats');
      if (statsEl) {
        // Try mode-specific stats first
        const activeMode = modes && modes[modeIdx || 0];
        const modeStats = activeMode && activeMode.stats;
        const statsToShow = modeStats && modeStats.length ? modeStats : data.stats;
        if (statsToShow) {
          // Fade out → update with count-up animation → fade in
          statsEl.style.opacity = '0';
          statsEl.style.transition = 'opacity 0.3s ease';
          setTimeout(() => {
            statsEl.innerHTML = statsToShow.map(([val, lbl]) => `
              <div class="visual-panel-large-stat">
                <div class="vp-stat-val" data-raw="${val}">${val}</div>
                <div class="vp-stat-label">${lbl}</div>
              </div>
            `).join('<div class="vp-divider" style="width:20px;height:1px;background:rgba(201,169,110,0.12);margin:4px auto;"></div>');
            statsEl.style.opacity = '1';

            // Count-up animation for numeric stat values (v24)
            statsEl.querySelectorAll('.vp-stat-val').forEach(function(el) {
              var raw = el.getAttribute('data-raw') || el.textContent;
              // Match optional non-digit prefix, a number (int or float), then suffix
              var numMatch = raw.match(/^([^\d]*)(\d+(?:\.\d+)?)(.*)$/);
              if (numMatch && parseFloat(numMatch[2]) > 0) {
                var prefix = numMatch[1];
                var target = parseFloat(numMatch[2]);
                var suffix = numMatch[3];
                var decimalPlaces = (numMatch[2].indexOf('.') >= 0) ? numMatch[2].split('.')[1].length : 0;
                var startTime = performance.now();
                var DURATION = 1000; // 1.0s
                function cubicEase(t) {
                  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
                }
                function tick(now) {
                  var elapsed = now - startTime;
                  var progress = Math.min(elapsed / DURATION, 1);
                  var eased = cubicEase(progress);
                  var current = target * eased;
                  var formatted = decimalPlaces > 0
                    ? current.toFixed(decimalPlaces)
                    : Math.round(current).toString();
                  el.textContent = prefix + formatted + suffix;
                  if (progress < 1) {
                    requestAnimationFrame(tick);
                  } else {
                    el.textContent = raw; // ensure exact final value
                  }
                }
                requestAnimationFrame(tick);
              } else {
                // Not clearly numeric — cross-fade opacity
                el.style.opacity = '0';
                el.style.transition = 'opacity 0.5s ease';
                requestAnimationFrame(function() {
                  requestAnimationFrame(function() { el.style.opacity = '1'; });
                });
              }
            });
          }, 160);
        }
        // Also show mode name label
        let modeLbl = statsEl.parentElement && statsEl.parentElement.querySelector('.vp-mode-name-lbl');
        if (!modeLbl) {
          modeLbl = document.createElement('div');
          modeLbl.className = 'vp-mode-name-lbl';
          modeLbl.style.cssText = 'font-family:var(--font-mono);font-size:8px;letter-spacing:0.28em;color:rgba(201,169,110,0.4);text-transform:uppercase;margin-bottom:8px;text-align:center;';
          const vpInner = document.getElementById('vp-inner');
          if (vpInner) vpInner.insertBefore(modeLbl, statsEl);
        }
        if (activeMode && activeMode.name) {
          modeLbl.textContent = activeMode.name;
          modeLbl.style.opacity = '1';
        } else {
          modeLbl.textContent = data.label || '';
          modeLbl.style.opacity = '0.6';
        }
      }
    };
  }

  function wireKeyboard() {
    document.addEventListener('keydown', (e) => {
      // Ignore shortcuts when typing in a form field
      if (['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) return;

      switch (e.key.toUpperCase()) {
        case 'M':
          document.getElementById('btn-audio')?.click();
          break;
        case 'E':
          document.getElementById('btn-explode')?.click();
          break;
        case 'W':
          document.getElementById('btn-wire')?.click();
          break;
        case 'H': {
          const help = document.getElementById('kbd-help');
          if (help) help.classList.toggle('hidden');
          break;
        }
        case 'ARROWDOWN':
        case 'ARROWRIGHT': {
          e.preventDefault();
          const next = (window.activeIdx || 0) + 1;
          if (next < SECTION_NAMES.length && typeof window.goToSection === 'function') {
            window.goToSection(next, 1);
          }
          break;
        }
        case 'ARROWUP':
        case 'ARROWLEFT': {
          e.preventDefault();
          const prev = (window.activeIdx || 0) - 1;
          if (prev >= 0 && typeof window.goToSection === 'function') {
            window.goToSection(prev, -1);
          }
          break;
        }
        default:
          break;
      }
    });
  }

// ─── 2. DRAG-ROTATE ──────────────────────────────────────────────────────────

let isDragging = false;
let dragStartX = 0, dragStartY = 0;
let dragPending = false;
const DRAG_THRESHOLD = 8; // px of intentional movement required before drag activates

document.addEventListener('pointerdown', e => {
  if (e.pointerType === 'touch') return; // touch handled by touchstart/touchmove/touchend
  dragPending = true;
  isDragging = false;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
});

document.addEventListener('pointermove', e => {
  if (e.pointerType === 'touch') return;
  if (dragPending && !isDragging) {
    const dist = Math.sqrt(Math.pow(e.clientX - dragStartX, 2) + Math.pow(e.clientY - dragStartY, 2));
    if (dist >= DRAG_THRESHOLD) {
      isDragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      document.body.style.cursor = 'none';
      document.body.classList.add('is-dragging');
      cursor?.classList.add('cursor-drag');
    }
    return;
  }
  if (!isDragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  window.dragRotYTarget = Math.max(-1.4, Math.min(1.4, (window.dragRotYTarget ?? 0) + dx * 0.005));
  window.dragRotXTarget = Math.max(-0.9, Math.min(0.9, (window.dragRotXTarget ?? 0) + dy * 0.005));
});

document.addEventListener('pointerup', e => {
  if (e.pointerType === 'touch') return;
  isDragging = false;
  dragPending = false;
  document.body.classList.remove('is-dragging');
  cursor?.classList.remove('cursor-drag');
});

// ─── MOUSE HIJACK ─────────────────────────────────────────────────────────
// Cursor dwell near top/bottom 9% of viewport → auto-transition after 700ms
let _hijackTimer = null;
let _hijackDir = 0;
const HIJACK_ZONE = 0.09;   // top/bottom 9% of viewport
const HIJACK_DELAY = 700;   // ms dwell before firing

document.addEventListener('mousemove', e => {
  if (!introComplete || isTransitioning) { clearTimeout(_hijackTimer); _hijackTimer = null; return; }
  const rel = e.clientY / window.innerHeight;
  let newDir = 0;
  if (rel > (1 - HIJACK_ZONE)) newDir = 1;
  else if (rel < HIJACK_ZONE) newDir = -1;
  if (newDir !== 0 && newDir !== _hijackDir) {
    clearTimeout(_hijackTimer);
    _hijackDir = newDir;
    _hijackTimer = setTimeout(() => {
      if (!isTransitioning) {
        const next = Math.max(0, Math.min(9, activeIdx + _hijackDir));
        if (next !== activeIdx) { scrollAccum = 0; goToSection(next, _hijackDir); }
      }
      _hijackTimer = null;
    }, HIJACK_DELAY);
  } else if (newDir === 0) {
    clearTimeout(_hijackTimer);
    _hijackTimer = null;
    _hijackDir = 0;
  }
});

function getPartId(obj) {
  let o = obj;
  while (o) {
    if (o.userData && o.userData.partId) return o.userData.partId;
    o = o.parent;
  }
  return null;
}

function showDetailCard(partId, screenX, screenY) {
  const detail = PART_DETAIL[partId];
  if (!detail) return;
  const card = document.getElementById('detail-card');
  if (!card) return;

  // Set text content
  const lblEl = document.getElementById('card-label');
  const ttlEl = document.getElementById('card-title');
  const bdyEl = document.getElementById('card-body');
  const metaEl = document.getElementById('card-meta-row');
  if (lblEl) lblEl.textContent = detail.label || '';
  if (ttlEl) ttlEl.textContent = detail.title || '';
  if (bdyEl) bdyEl.textContent = detail.body || '';
  if (metaEl && detail.meta) {
    metaEl.lastChild ? metaEl.lastChild.nodeValue = ' ' + detail.meta : (metaEl.textContent = detail.meta);
    metaEl.textContent = detail.meta;
  }

  // Spec grid
  const specGrid = document.getElementById('card-spec-grid');
  if (specGrid) {
    if (detail.specs) {
      specGrid.removeAttribute('hidden');
      const setSpec = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v || '—'; };
      setSpec('card-spec-layer',  detail.specs.layer);
      setSpec('card-spec-risk',   detail.specs.risk);
      setSpec('card-spec-coupon', detail.specs.coupon);
      setSpec('card-spec-tenor',  detail.specs.tenor);
    } else {
      specGrid.setAttribute('hidden', '');
    }
  }

  // Right-side drawer — no longer positions to cursor, slides in from right
  // (Drawer position is fixed in CSS — we just toggle the .hidden class)
  card.classList.remove('hidden');

  // Reset scroll position so user sees the top of the panel
  const scrollable = document.getElementById('detail-scrollable');
  if (scrollable) scrollable.scrollTop = 0;
  if (typeof window._updateDetailScrollbar === 'function') window._updateDetailScrollbar();

  // Focus the close button for keyboard a11y
  setTimeout(() => {
    const closeBtn = document.getElementById('card-close');
    if (closeBtn) closeBtn.focus({ preventScroll: true });
  }, 350);
}

document.addEventListener('click', e => {

  mouse2D.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2D, camera);
  const root = window.pcmRoot;
  if (!root) return;

    if (partId) showDetailCard(partId, e.clientX, e.clientY);
  }
});

// ─── 4. HOVER SCALE-UP ───────────────────────────────────────────────────────

let hoveredPartId = null;
const baseScales = new Map();

function setPartScale(partId, scale) {
  const root = window.pcmRoot;
  if (!root) return;
  root.traverse(obj => {
    if (obj.userData.partId === partId) {
      if (!baseScales.has(obj.uuid)) baseScales.set(obj.uuid, obj.scale.clone());
      const base = baseScales.get(obj.uuid);
      obj.scale.lerp(base.clone().multiplyScalar(scale), 0.12);
    }
  });
}

const HOVER_SCALES = { coin: 1.08, person: 1.06, fulcrum: 1.2, upArrow: 1.15, downArrow: 1.15, ringOuter: 1.03 };

document.addEventListener('mousemove', e => {
  if (isDragging) return;
  if (!camera) return;
  mouse2D.x = (e.clientX / innerWidth) * 2 - 1;
  mouse2D.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse2D, camera);
  const root = window.pcmRoot;
  if (!root) return;
  const hits = raycaster.intersectObjects(root.children, true);
  const newHover = hits.length > 0 ? getPartId(hits[0].object) : null;

  if (newHover !== hoveredPartId) {
    if (hoveredPartId) setPartScale(hoveredPartId, 1.0);
    hoveredPartId = newHover;
    if (cursor) {
      if (newHover) cursor.classList.add('cursor-hot');
      else cursor.classList.remove('cursor-hot');
    }
  }
  if (hoveredPartId && HOVER_SCALES[hoveredPartId]) {
    setPartScale(hoveredPartId, HOVER_SCALES[hoveredPartId]);
  }
});

// ─── 6. EXPLODE MODE ─────────────────────────────────────────────────────────

let exploded = false;
const explodeOffsets = new Map();

function toggleExplode() {
  exploded = !exploded;
  const root = window.pcmRoot;
  if (!root) return;
  root.children.forEach(child => {
    if (child === window.bgPlane || child === window.particles || child === window.haloDisc) return;
    if (!explodeOffsets.has(child.uuid)) {
      const dir = child.position.clone().normalize();
      if (dir.length() < 0.01) dir.set(Math.random()-0.5, Math.random()-0.5, 0.3).normalize();
      explodeOffsets.set(child.uuid, dir.multiplyScalar(1.5));
    }
    const offset = explodeOffsets.get(child.uuid);
    const target = exploded
      ? child.position.clone().add(offset)
      : child.position.clone().sub(offset);
    // Store in userData for lerp in animation loop
    child.userData.explodeTarget = target;
    child.userData.explodeBase = exploded ? child.position.clone() : child.position.clone().add(offset);
  });
  document.getElementById('btn-explode')?.classList.toggle('active', exploded);
}
window.toggleExplode = toggleExplode;
document.getElementById('btn-explode')?.addEventListener('click', toggleExplode);

}

  // ─── animation.js ──────────────────────────────────────────────────
// PCM Cinematic Site — Animation System
// Globals expected: THREE, camera, scene, composer, pcmRoot, leverGroup,
// refreshGroup, orbitalDots, haloDisc, particles, outerRing, accentRingMesh,
// tickGroup, fulcrumGlowRing, centerSpotLight, bgPlane

// ---------------------------------------------------------------------------
// 1. STATE VARIABLES
// ---------------------------------------------------------------------------
let t = 0;
let direction = 1; // +1 forward, -1 backward
let activeIdx = 0;
let motionScale = 1.0;
let dragRotX = 0, dragRotY = 0;
let mouse = { x: 0, y: 0 };
// dragRotXTarget/dragRotYTarget and mouseTarget are shared via window
const _getMouseTarget = () => window.mouseTarget || { x: 0, y: 0 };
let scrollAccum = 0;
let lastScrollTime = 0;
let isTransitioning = false;
let introT = 0;
const INTRO_DUR = 1.8;  // Faster reveal (was 2.5s) — seacat feel
let introComplete = false;
let prevTime = performance.now();
const TRANS_DUR = 1.6;
let transT = 0;
let transFrom = null, transTo = null;

// ---------------------------------------------------------------------------
// 2. CAMERA PRESETS (10 sections)
// ---------------------------------------------------------------------------
const PRESETS = [
  { id: 'home',         cam: [0, 0.6, 11.5],   look: [0, 0, 0],      fov: 34, tilt:  0.16, zoomIn: 8.4 },
  { id: 'firm',         cam: [3.8, 0.8, 9.2],  look: [-0.5, 0, 0],   fov: 36, tilt:  0.14, zoomIn: 7.1 },
  { id: 'edge',         cam: [-3.5, 1.8, 9.2], look: [0.5, 0.2, 0],  fov: 38, tilt:  0.08, zoomIn: 7.1 },
  { id: 'senior',       cam: [0, -2.6, 6.8],   look: [0, 0.4, 0],    fov: 42, tilt:  0.22, zoomIn: 5.0 },
  { id: 'subordinate',  cam: [3.0, 0, 7.2],    look: [-1.8, 0, 0],   fov: 32, tilt:  0.05, zoomIn: 5.4 },
  { id: 'equity',       cam: [-3.0, 0, 7.2],   look: [1.8, 0, 0],    fov: 32, tilt: -0.06, zoomIn: 5.4 },
  { id: 'execution',    cam: [0, 4.8, 6.0],    look: [0, -0.6, 0],   fov: 44, tilt:  0.18, zoomIn: 4.4 },
  { id: 'underwriting', cam: [0, 0, 5.4],      look: [0, 0, 0],      fov: 28, tilt:  0.20, zoomIn: 3.6 },
  { id: 'compliance',   cam: [4.8, 3.0, 6.8],  look: [0, 0, 0],      fov: 38, tilt:  0.04, zoomIn: 5.2 },
  { id: 'engage',       cam: [0, 0.9, 8.4],    look: [0, -0.2, 0],   fov: 36, tilt:  0.12, zoomIn: 6.2 },
];
window.PRESETS = PRESETS;

// ---------------------------------------------------------------------------
// 3. LERP HELPERS
// ---------------------------------------------------------------------------
function lerp(a, b, t) { return a + (b - a) * t; }
function cubicEaseInOut(t) { return t < 0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
const camPos = new THREE.Vector3(0, 12, 22);
const camLook = new THREE.Vector3(0, 0, 0);
const camLookSmooth = new THREE.Vector3(0, 0, 0);
let camFov = 50;

// ---------------------------------------------------------------------------
// 4. TRANSITION FUNCTION
// ---------------------------------------------------------------------------
function goToSection(idx, dir) {
  if (isTransitioning || idx === activeIdx) return;
  direction = dir;
  transFrom = {
    cam: camPos.clone(),
    look: camLookSmooth.clone(),
    fov: camFov,
    tilt: leverGroup ? leverGroup.rotation.z : 0
  };
  transTo = PRESETS[idx];
  transT = 0;
  isTransitioning = true;
  activeIdx = idx;

  // Cinema bars
  document.body.classList.add('transitioning');
  setTimeout(() => document.body.classList.remove('transitioning'), 800);

  // MaskLayer reveal (wipe effect)
  const maskEl = document.getElementById('mask-layer');
  if (maskEl) {
    // Forward: wipe from bottom; backward: wipe from top
    maskEl.style.clipPath = dir > 0 ? 'inset(100% 0 0% 0)' : 'inset(0% 0 100% 0)';
    maskEl.style.transition = 'none';
    // Force reflow
    void maskEl.offsetWidth;
    maskEl.style.transition = 'clip-path 0.55s cubic-bezier(0.77, 0, 0.18, 1)';
    maskEl.style.clipPath = 'inset(0 0 0% 0)';
    // Clear after transition
    setTimeout(function() {
      maskEl.style.transition = 'clip-path 0.45s cubic-bezier(0.77, 0, 0.18, 1)';
      maskEl.style.clipPath = dir > 0 ? 'inset(0 0 100% 0)' : 'inset(100% 0 0% 0)';
    }, 700);
  }

  // Flash — direction-aware color
  const flash = document.getElementById('flash-overlay');
  if (flash) {
    // Forward: warm brass tint; Backward: cool green tint
    flash.style.background = dir > 0
      ? 'rgba(201,169,110,0.1)'
      : 'rgba(127,184,156,0.08)';
    flash.style.opacity = '1';
    setTimeout(() => { flash.style.opacity = '0'; flash.style.background = ''; }, 180);
  }

  // Subtle logo impulse
  if (window.pcmRoot && window.gsap) {
    gsap.to(window.pcmRoot.scale, {
      x: 0.96, y: 0.96, z: 0.96,
      duration: 0.15,
      ease: 'power2.in',
      yoyo: true,
      repeat: 1,
      onComplete: () => { window.pcmRoot.scale.set(1,1,1); }
    });
  }

  // Hide copy during transition
  const copy = document.querySelector('.scene-copy');
  if (copy) copy.classList.remove('visible'), copy.classList.add('hidden');
  const backdrop2 = document.getElementById('section-title-backdrop');
  if (backdrop2) {
    backdrop2.classList.remove('visible');
    backdrop2.classList.add('hidden');
    // Staggered letter reveal — split text into spans after a brief pause
    const sectionTitles = [
      'Home','Firm Overview','Platform Edge','Senior Debt',
      'Sub Capital','Equity','Execution','Underwriting','Compliance','Engage'
    ];
    const newTitle = (sectionTitles[idx] || '').toUpperCase();
    setTimeout(function() {
      // Build letter spans for stagger animation
      const letters = newTitle.split('').map(function(ch, j) {
        return '<span class="bd-letter" style="display:inline-block;opacity:0;transform:translateY(12px);transition:opacity 0.5s ease '
          + (j * 0.042 + 0.05).toFixed(3) + 's,transform 0.5s ease '
          + (j * 0.042 + 0.05).toFixed(3) + 's">'
          + (ch === ' ' ? '&nbsp;' : ch) + '</span>';
      }).join('');
      backdrop2.innerHTML = letters;
      backdrop2.classList.remove('hidden');
      backdrop2.classList.add('visible');
      // Trigger reveal
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          backdrop2.querySelectorAll('.bd-letter').forEach(function(span) {
            span.style.opacity = '1';
            span.style.transform = 'translateY(0)';
          });
        });
      });
    }, 420);
  }

  // Update UI
  updateSectionUI(idx);

  if (window.onSectionChange) window.onSectionChange(idx, dir);
}
window.goToSection = goToSection;
// ─── AUDIO VOLUME CONTROL ────────────────────────────────────────────────────
window.pcmSetVolume = function(val) {
  // val = 0..1
  if (window.audioEngine && window.audioEngine.gainNode) {
    const gain = window.audioEngine.gainNode;
    gain.gain.setTargetAtTime(val * 0.04, window.audioEngine.ctx.currentTime, 0.2);
  }
  // Update mute micro button appearance
  const muteBtn = document.getElementById('audio-mute-micro');
  if (muteBtn) muteBtn.style.opacity = val < 0.01 ? '1' : '0.5';
  // Update slider fill
  const slider = document.getElementById('audio-vol-slider');
  if (slider) slider.value = Math.round(val * 100);
};

// ---------------------------------------------------------------------------
// 5. MAIN ANIMATION LOOP
// ---------------------------------------------------------------------------
function animate() {
  requestAnimationFrame(animate);
  if (!camera) return; // guard: initScene() hasn't run yet
  const now = performance.now();
  const dt = Math.min((now - prevTime) / 1000, 0.05);
  prevTime = now;
  t += dt;

  // INTRO SWOOP
  if (!introComplete) {
    introT += dt / INTRO_DUR;
    if (introT >= 1) { introT = 1; introComplete = true; showSectionCopy(0); }
    const ease = 1 - Math.pow(1 - Math.min(introT, 1), 3);
    const p = PRESETS[0];
    camPos.x = lerp(0, p.cam[0], ease);
    camPos.y = lerp(12, p.cam[1], ease);
    camPos.z = lerp(22, p.cam[2], ease);
    camFov = lerp(50, p.fov, ease);
    camLookSmooth.set(lerp(0, p.look[0], ease), lerp(0, p.look[1], ease), 0);
    camera.position.copy(camPos);
    camera.fov = camFov;
    camera.updateProjectionMatrix();
    camera.lookAt(camLookSmooth);
    if (leverGroup) leverGroup.rotation.z = lerp(0.16, p.tilt, ease);
  }

  // CINEMATIC TRANSITION
  else if (isTransitioning) {
    transT += dt / TRANS_DUR;
    if (transT >= 1) { transT = 1; isTransitioning = false; showSectionCopy(activeIdx); }
    const ease = cubicEaseInOut(Math.min(transT, 1));
    const tt = Math.min(transT, 1);
    const p = transTo;

    // Mid-flight arc lift + Z pullback
    const arcY = Math.sin(tt * Math.PI) * 0.6;
    const arcZ = Math.sin(tt * Math.PI) * 1.4;

    camPos.x = lerp(transFrom.cam.x, p.cam[0], ease);
    camPos.y = lerp(transFrom.cam.y, p.cam[1], ease) + arcY;
    camPos.z = lerp(transFrom.cam.z, p.cam[2], ease) + arcZ;
    camFov = lerp(transFrom.fov, p.fov, ease);

    camLookSmooth.x = lerp(transFrom.look.x, p.look[0], ease);
    camLookSmooth.y = lerp(transFrom.look.y, p.look[1], ease);
    camLookSmooth.z = 0;

    if (leverGroup) leverGroup.rotation.z = lerp(transFrom.tilt, p.tilt, ease);

    camera.position.copy(camPos);
    camera.fov = camFov;
    camera.updateProjectionMatrix();
    camera.lookAt(camLookSmooth);
  }

  // IDLE: scroll-zoom dolly + mouse parallax
  else {
    // Scroll accumulator decay
    const idleMs = now - lastScrollTime;
    if (idleMs > 200) {
      scrollAccum *= 0.92;
    }

    // Zoom dolly
    const p = PRESETS[activeIdx];
    const zoomT = Math.max(0, scrollAccum);
    const targetZ = lerp(p.cam[2], p.zoomIn, zoomT);
    camPos.x = lerp(camPos.x, p.cam[0] + dragRotY * 0.5 + mouse.x * 0.2 * motionScale, 0.06);
    camPos.y = lerp(camPos.y, p.cam[1] + dragRotX * 0.3 + mouse.y * 0.14 * motionScale, 0.06);
    camPos.z = lerp(camPos.z, targetZ, 0.08);

    camLook.set(p.look[0], p.look[1], 0);
    camLookSmooth.lerp(camLook, 0.06);
    camFov = lerp(camFov, p.fov, 0.05);

    camera.position.copy(camPos);
    camera.fov = camFov;
    camera.updateProjectionMatrix();
    camera.lookAt(camLookSmooth);

    // Drag rotation lerp
    dragRotX = lerp(dragRotX, window.dragRotXTarget || 0, 0.1);
    dragRotY = lerp(dragRotY, window.dragRotYTarget || 0, 0.1);
  }

  // Mouse lerp
  const _mt = _getMouseTarget();
  mouse.x = lerp(mouse.x, _mt.x, 0.08);
  mouse.y = lerp(mouse.y, _mt.y, 0.08);

  // ROOT ROTATION (drag + parallax)
  if (window.pcmRoot) {
    window.pcmRoot.rotation.y = dragRotY + mouse.x * 0.2 * motionScale;
    window.pcmRoot.rotation.x = dragRotX + mouse.y * 0.14 * motionScale;
  }

  // DIRECTION-AWARE LOGO ANIMATION
  if (window.outerRing) window.outerRing.rotation.z += 0.0015 * direction;
  if (window.accentRingMesh) window.accentRingMesh.rotation.z -= 0.0025 * direction;
  if (window.tickGroup) window.tickGroup.rotation.z += 0.0008 * direction;
  if (window.refreshGroup) window.refreshGroup.rotation.z = t * 0.5 * direction;

  // Orbital dots
  if (window.orbitalDots) {
    window.orbitalDots.forEach((dot, i) => {
      const phase = dot.userData.phase + t * 0.4 * direction;
      dot.position.set(Math.cos(phase) * 3.4, Math.sin(phase) * 3.4, 0);
      const pulse = 0.88 + Math.sin(t * 1.8 + i * 0.63) * 0.38 + Math.sin(t * 3.5 + i * 1.2) * 0.12;
      dot.scale.setScalar(pulse);
    });
  }

  // Halo disc pulse
  if (window.haloDisc) {
    window.haloDisc.material.opacity = 0.055 + Math.sin(t * 0.8) * 0.04 + Math.sin(t * 2.1) * 0.015;
  }

  // Fulcrum glow ring oscillation
  if (window.fulcrumGlowRing) {
    window.fulcrumGlowRing.material.opacity = 0.4 + Math.sin(t * 2.4) * 0.2;
  }

  // Center spot flicker
  if (window.centerSpotLight) {
    window.centerSpotLight.intensity = 1.85 + Math.sin(t * 1.4) * 0.28 + Math.sin(t * 3.7) * 0.09;
  }

  // BG shader time + per-section tint
  if (window.bgPlane) {
    window.bgPlane.material.uniforms.time.value = t;

    // Per-section tint targets [r, g, b] — subtle atmospheric color temperature
    const SECTION_TINTS = [
      [0.2, 0.6, 0.4],   // 0 Home        — cool green
      [0.4, 0.6, 0.3],   // 1 Firm        — warm green
      [0.2, 0.4, 0.8],   // 2 Platform    — blue hint
      [0.8, 0.6, 0.2],   // 3 Senior Debt — gold/brass
      [0.6, 0.4, 0.2],   // 4 Sub Cap     — amber
      [0.8, 0.7, 0.3],   // 5 Equity      — warm gold
      [0.3, 0.7, 0.5],   // 6 Execution   — teal
      [0.5, 0.4, 0.7],   // 7 Underwriting— deep indigo hint
      [0.3, 0.5, 0.3],   // 8 Compliance  — neutral green
      [0.7, 0.5, 0.2],   // 9 Engage      — brass warm
    ];
    const idx = window.activeIdx || 0;
    const tgt = SECTION_TINTS[idx] || [0.2, 0.6, 0.4];
    const unif = window.bgPlane.material.uniforms;
    const cur = unif.uSectionTint.value;
    cur.x += (tgt[0] - cur.x) * 0.018;
    cur.y += (tgt[1] - cur.y) * 0.018;
    cur.z += (tgt[2] - cur.z) * 0.018;
    unif.uTintStrength.value += (1.0 - unif.uTintStrength.value) * 0.02;
  }

  // Particles drift — velocity + harmonic layering
  if (window.particles) {
    const pos = window.particles.geometry.attributes.position;
    const phases = window.particles.userData.phases;
    const vels  = window.particles.userData.velocities || new Float32Array(240 * 3);
    // scrollSpeed coupling — faster scroll accelerates particles briefly
    const scrollBoost = 1 + Math.abs(scrollAccum) * 0.8;
    for (let i = 0; i < 320; i++) {
      // Evolve velocity with harmonic perturbation
      vels[i * 3]     += Math.sin(t * 0.28 + phases[i] * 1.1) * 0.000025 * direction;
      vels[i * 3 + 1] += Math.cos(t * 0.17 + phases[i] * 0.9) * 0.000018;
      vels[i * 3 + 2] += Math.sin(t * 0.13 + phases[i] * 0.7) * 0.000012;
      // Dampen (keeps velocities bounded)
      vels[i * 3]     *= 0.992;
      vels[i * 3 + 1] *= 0.994;
      vels[i * 3 + 2] *= 0.995;
      // Apply velocity
      pos.array[i * 3]     += vels[i * 3]     * scrollBoost;
      pos.array[i * 3 + 1] += vels[i * 3 + 1];
      pos.array[i * 3 + 2] += vels[i * 3 + 2];
      // Wrap Y
      if (pos.array[i * 3 + 1] >  8) pos.array[i * 3 + 1] = -8;
      if (pos.array[i * 3 + 1] < -8) pos.array[i * 3 + 1] =  8;
      // Wrap X
      if (pos.array[i * 3]     >  9) pos.array[i * 3]     = -9;
      if (pos.array[i * 3]     < -9) pos.array[i * 3]     =  9;
    }
    pos.needsUpdate = true;
  }
  // Boss particles — slow, dreamy drift
  if (window.bossParticles) {
    const bpos = window.bossParticles.geometry.attributes.position;
    const bph  = window.bossParticles.userData.phases;
    for (let i = 0; i < 24; i++) {
      bpos.array[i * 3]     += Math.sin(t * 0.11 + bph[i]) * 0.0008 * direction;
      bpos.array[i * 3 + 1] += Math.cos(t * 0.07 + bph[i] * 1.2) * 0.0005;
      bpos.array[i * 3 + 2] += Math.sin(t * 0.09 + bph[i] * 0.8) * 0.0004;
      if (bpos.array[i * 3 + 1] >  8) bpos.array[i * 3 + 1] = -8;
      if (bpos.array[i * 3 + 1] < -8) bpos.array[i * 3 + 1] =  8;
    }
    // Boss particles pulse opacity with section
    window.bossParticles.material.opacity = 0.22 + Math.sin(t * 0.6) * 0.07;
    bpos.needsUpdate = true;
  }

  // ───────────────────────────────────────────────
  // GAP 6 — SVG waveform animation for audio button
  // ───────────────────────────────────────────────
  const waveEl = document.getElementById('audio-wave-line');
  if (waveEl) {
    const isOn = !!(window.audioEngine && window.audioEngine.enabled);
    if (isOn) {
      const pts = [];
      const time = t;
      for (let i = 0; i <= 28; i += 2) {
        // Multi-frequency sine: warbling wave that feels musical
        const y = 9
          + Math.sin(i * 0.7 + time * 8) * 3.4
          + Math.sin(i * 1.3 + time * 5.2) * 1.6
          + Math.cos(i * 0.4 + time * 3.1) * 0.8;
        pts.push(i + ',' + y.toFixed(2));
      }
      waveEl.setAttribute('points', pts.join(' '));
    } else {
      // Resting flat line with subtle breathing
      const baseline = 9 + Math.sin(t * 0.6) * 0.15;
      waveEl.setAttribute(
        'points',
        `0,${baseline} 4,${baseline} 6,${baseline} 8,${baseline} 10,${baseline} 12,${baseline} 14,${baseline} 16,${baseline} 18,${baseline} 20,${baseline} 22,${baseline} 24,${baseline} 28,${baseline}`
      );
    }
  }

  // Render
  if (window.composer) window.composer.render();
  else if (window.renderer && scene && camera) window.renderer.render(scene, camera);
}
animate();

// ────────────────────────────────────────────────
// V20 — FILM GRAIN: procedural LCG noise canvas
// Runs independently of Three.js at ~30fps (every 2nd rAF).
// Canvas is at 40% viewport resolution; CSS scales it to full size.
// mix-blend-mode: overlay adds both bright and dark grain on the
// near-black (#06090a) backdrop, creating authentic film-grain texture.
// ────────────────────────────────────────────────
(function initGrain() {
  const canvas = document.getElementById('pcm-grain');
  if (!canvas) return;
  const ctx = canvas.getContext('2d', { willReadFrequently: false, alpha: false });
  if (!ctx) return;

  // Drawing resolution: 40% of viewport — bilinear upscale gives softer grain
  const SCALE = 0.40;
  let w = 1, h = 1;

  function resize() {
    w = Math.max(1, Math.ceil(window.innerWidth  * SCALE));
    h = Math.max(1, Math.ceil(window.innerHeight * SCALE));
    canvas.width  = w;
    canvas.height = h;
  }
  resize();

  let _resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(resize, 150);
  }, { passive: true });

  // Splitmix32-derived hash — extremely fast, high quality distribution
  // Each frame uses a different seed so grain is never repeated.
  let frameIdx = 0;
  let _skip = 0;
  const SKIP_FRAMES = 2; // draw every Nth rAF → ~30fps grain at 60fps display

  function drawGrain() {
    requestAnimationFrame(drawGrain);
    if (++_skip < SKIP_FRAMES) return;
    _skip = 0;

    const imgData = ctx.createImageData(w, h);
    const d = imgData.data;
    const n = (frameIdx++ * 0x9e3779b9) | 0; // base seed per frame

    // Fill pixels with LCG-derived noise (grey values only, full alpha)
    let state = n;
    for (let i = 0; i < d.length; i += 4) {
      // Murmur3-inspired scramble — no sin/cos, branch-free
      state = Math.imul(state ^ (state >>> 16), 0x45d9f3b);
      state = Math.imul(state ^ (state >>> 13), 0x3a7a5c25);
      state ^= (state >>> 16);
      const v = ((state >>> 24) & 0xff);
      d[i]     = v;   // R
      d[i + 1] = v;   // G (same as R → greyscale)
      d[i + 2] = v;   // B
      d[i + 3] = 255; // A
    }
    ctx.putImageData(imgData, 0, 0);
  }

  // Delay first draw until after page is painted to avoid competing with loader
  requestAnimationFrame(drawGrain);
})();

window.applyTriangles = function applyTriangles(idx) {

  if (brPoly) {
    brPoly.setAttribute('points', `1 1 ${1 - cfg.br} 1 1 ${1 - cfg.br}`);

  if (trPoly) {

  }
